<style>

<body>
<div class="card">

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBYykNZVf20LLQ-YIIeA2TKz9DSBsypRZM",
  authDomain:"moida-otpfc.firebaseapp.com",
  projectId:"moida-otpfc",
  storageBucket:"moida-otpfc.firebasestorage.app",
  messagingSenderId:"407991675090",
  appId:"1:407991675090:web:df9f7d8a7c93a6eb5ae50b"

const db = firebase.firestore();
const auth = firebase.auth();
const getCol = n => db.collection('artifacts').doc('moida-otpfc').collection('public').doc('data').collection(n);

async function run() {
  const btn = document.getElementById('btn');
  const st = document.getElementById('status');
  btn.disabled = true;
  st.textContent = 'вҸі м—°кІ° мӨ‘...';

    // мқҙлҜё мЎҙмһ¬н•ҳлҠ”м§Җ нҷ•мқё
    const existing = await getCol('members').where('name','==','н…ҢмҠӨнҠё').get();

      st.innerHTML = 'вң… мқҙлҜё мЎҙмһ¬н•©лӢҲлӢӨ!<br><small style="color:#94a3b8">мқҙлҰ„: н…ҢмҠӨнҠё / мғқл…„мӣ”мқј: 000101</small>';
      st.className = 'ok';
      return;
    }

    await getCol('members').add({
      name: 'н…ҢмҠӨнҠё',
      birth: '20000101',
      gender: 'лӮЁм„ұ',
      role: 'нҡҢмӣҗ',

    st.className = 'ok';
  } catch(e) {
    st.textContent = 'вқҢ мӢӨнҢЁ: ' + e.message;
    st.className = 'err';
    btn.disabled = false;
  }
}
