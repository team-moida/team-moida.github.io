const getThisSunday = () => {
    const now = new Date();
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
    const day = d.getDay();
    const diff = (day === 0) ? 0 : 7 - day;
    d.setDate(d.getDate() + diff);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const getNextSundayFromDate = (dateStr) => {
    let d = dateStr ? new Date(parseInt(dateStr.split('-')[0]), parseInt(dateStr.split('-')[1])-1, parseInt(dateStr.split('-')[2]), 12, 0, 0) : new Date();
    if (!dateStr) d.setHours(12,0,0,0);
    const day = d.getDay();
    const diff = (day === 0) ? 7 : 7 - day;
    d.setDate(d.getDate() + diff);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const getMembershipStatus = (member, targetMonthStr) => {
    if (!member.membershipType || member.membershipType === 'monthly' || !member.membershipEndDate) return null;
    const end = new Date(member.membershipEndDate);
    const endMonth = new Date(end.getFullYear(), end.getMonth(), 1);
    const [y, m] = targetMonthStr.split('-').map(Number);
    const current = new Date(y, m-1, 1);
    if (current > endMonth) return { active: false };
    const endDateFormatted = `${end.getFullYear().toString().slice(2)}.${String(end.getMonth()+1).padStart(2,'0')}.${String(end.getDate()).padStart(2,'0')}`;
    return { active: true, type: member.membershipType === 'half_year' ? 'л∞ШлЕД' : '1лЕД', endDateFormatted };
};

// вФАвФАвФА мІАлПД мЮ•мЖМ мД†нГЭ л™®лЛђ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const LocationPickerModal = ({ isOpen, onClose, onConfirm, initialLat, initialLng, initialName }) => {
    const mapContainerRef = useRef(null);
    const mapRef = useRef(null);
    const markerRef = useRef(null);
    const [placeName, setPlaceName] = useState('');
    const [lat, setLat] = useState(37.5665);
    const [lng, setLng] = useState(126.9780);
    const [query, setQuery] = useState('');
    const [results, setResults] = useState([]);
    const [searching, setSearching] = useState(false);
    const [locating, setLocating] = useState(false);

    // мҐМнСЬ вЖТ мЮ•мЖМл™Е мЧ≠л≥АнЩШ (мєімєімШ§ REST + CORS нФДл°ЭмЛЬ)
    const reverseGeocode = async (y, x) => {
        try {
            const url = `https://dapi.kakao.com/v2/local/geo/coord2address.json?x=${x}&y=${y}`;
            const res = await fetch(KAKAO_PROXY + encodeURIComponent(url), {
                headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` }
            });
            const json = await res.json();
            const doc = json.documents && json.documents[0];
            if (doc) {
                const n = (doc.road_address && doc.road_address.building_name)
                    || (doc.address && doc.address.address_name)
                    || (doc.road_address && doc.road_address.address_name)
                    || '';
                if (n) setPlaceName(n.trim());
            }
        } catch (_) {}
    };

    // лІИмї§ мЭілПЩ
    const moveMarker = (newLat, newLng) => {
        setLat(newLat);
        setLng(newLng);
        if (markerRef.current) markerRef.current.setLatLng([newLat, newLng]);
        if (mapRef.current) mapRef.current.setView([newLat, newLng], mapRef.current.getZoom());
    };

    // нВ§мЫМлУЬ к≤АмГЙ
    const doSearch = async () => {
        const q = query.trim();
        if (!q) return;
        setSearching(true);
        setResults([]);
        try {
            const kw = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(q)}&size=8`;
            const r1 = await fetch(KAKAO_PROXY + encodeURIComponent(kw), {
                headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` }
            });
            const d1 = await r1.json();
            if (d1.documents && d1.documents.length > 0) {
                setResults(d1.documents);
            } else {
                const addr = `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(q)}&size=8`;
                const r2 = await fetch(KAKAO_PROXY + encodeURIComponent(addr), {
                    headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` }
                });
                const d2 = await r2.json();
                if (d2.documents && d2.documents.length > 0) {
                    setResults(d2.documents.map(d => ({
                        place_name: d.address_name,
                        road_address_name: (d.road_address && d.road_address.address_name) || '',
                        x: d.x, y: d.y
                    })));
                } else {
                    alert('к≤АмГЙ к≤∞к≥Љк∞А мЧЖмКµлЛИлЛ§.\nмЧЕм≤іл™ЕмЭілВШ м£ЉмЖМл•Љ лЛ§л•ік≤М мЮЕл†•нХіл≥імДЄмЪФ.');
                }
            }
        } catch (_) {
            alert('к≤АмГЙ м§С мШ§л•Шк∞А л∞ЬмГЭнЦИмКµлЛИлЛ§.\nмЮ†мЛЬ нЫД лЛ§мЛЬ мЛЬлПДнХім£ЉмДЄмЪФ.');
        }
        setSearching(false);
    };

    // к≤АмГЙ к≤∞к≥Љ мД†нГЭ
    const selectResult = (place) => {
        const y = parseFloat(place.y);
        const x = parseFloat(place.x);
        moveMarker(y, x);
        if (mapRef.current) mapRef.current.setView([y, x], 17);
        setPlaceName(place.place_name || '');
        setResults([]);
        setQuery('');
    };

    // нШДмЮђ мЬДмєШ
    const goCurrentLocation = () => {
        if (!navigator.geolocation) { alert('мЬДмєШ м†Хл≥іл•Љ мІАмЫРнХШмІА мХКлКФ лЄМлЭЉмЪ∞м†АмЮЕлЛИлЛ§.'); return; }
        setLocating(true);
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const y = pos.coords.latitude;
                const x = pos.coords.longitude;
                moveMarker(y, x);
                if (mapRef.current) mapRef.current.setView([y, x], 17);
                await reverseGeocode(y, x);
                setLocating(false);
            },
            () => { alert('мЬДмєШ м†Хл≥іл•Љ к∞Ам†ЄмШђ мИШ мЧЖмКµлЛИлЛ§.'); setLocating(false); },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    };

    // мІАлПД міИкЄ∞нЩФ
    useEffect(() => {
        if (!isOpen) return;
        setPlaceName(initialName || '');
        setQuery('');
        setResults([]);
        const initLat = initialLat || 37.5665;
        const initLng = initialLng || 126.9780;
        setLat(initLat);
        setLng(initLng);

        const t = setTimeout(() => {
            if (!mapContainerRef.current || mapRef.current) return;
            const map = L.map(mapContainerRef.current, { center: [initLat, initLng], zoom: 16 });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '¬© OpenStreetMap', maxZoom: 19
            }).addTo(map);
            const pin = `<div style="width:26px;height:26px;background:#ef4444;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(239,68,68,0.5)"></div>`;
            const icon = L.divIcon({ html: pin, iconSize: [26, 26], iconAnchor: [13, 26], className: '' });
            const marker = L.marker([initLat, initLng], { draggable: true, icon }).addTo(map);
            marker.on('dragend', async (e) => {
                const p = e.target.getLatLng();
                setLat(p.lat); setLng(p.lng);
                await reverseGeocode(p.lat, p.lng);
            });
            map.on('click', async (e) => {
                marker.setLatLng(e.latlng);
                setLat(e.latlng.lat); setLng(e.latlng.lng);
                await reverseGeocode(e.latlng.lat, e.latlng.lng);
            });
            mapRef.current = map;
            markerRef.current = marker;
            setTimeout(() => map.invalidateSize(), 300);
        }, 200);

        return () => {
            clearTimeout(t);
            if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; markerRef.current = null; }
        };
    }, [isOpen]);

    if (!isOpen) return null;

    return (
        <div style={{ position:'fixed', inset:0, zIndex:9999, display:'flex', flexDirection:'column', background:'var(--t-surface)' }}>

            {/* нЧ§лНФ */}
            <div style={{ position:'relative', zIndex:10, flexShrink:0, display:'flex', alignItems:'center', gap:12, padding:'12px 16px', borderBottom:'1px solid var(--t-border)', background:'var(--t-surface)' }}>
                <button onClick={onClose} style={{ padding:8, borderRadius:12, background:'var(--t-s2)', border:'none', cursor:'pointer', display:'flex' }}>
                    <Icon.ArrowLeft size={18} />
                </button>
                <div style={{ flex:1 }}>
                    <p style={{ fontWeight:700, fontSize:14, color:'var(--t-text)', margin:0 }}>мЮ•мЖМ мД†нГЭ</p>
                    <p style={{ fontSize:10, color:'#94a3b8', margin:0 }}>мЧЕм≤іл™Е¬Јм£ЉмЖМ к≤АмГЙ лШРлКФ мІАлПДл•Љ мІБм†С нБіл¶≠нХШмДЄмЪФ</p>
                </div>
                {locating && <div style={{ width:18, height:18, border:'2px solid #ec4899', borderTopColor:'transparent', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} />}
            </div>

            {/* к≤АмГЙ л∞Ф */}
            <div style={{ position:'relative', zIndex:10, flexShrink:0, padding:'10px 12px', borderBottom:'1px solid var(--t-border)', background:'var(--t-s2)' }}>
                <div style={{ display:'flex', gap:8 }}>
                    <input
                        type="text"
                        value={query}
                        onChange={e => setQuery(e.target.value)}
                        onKeyDown={e => { if (e.key === 'Enter') doSearch(); }}
                        placeholder="мЧЕм≤іл™Е лШРлКФ м£ЉмЖМ к≤АмГЙ"
                        style={{ flex:1, background:'var(--t-surface)', border:'1px solid var(--t-border)', borderRadius:12, padding:'8px 12px', fontSize:12, fontFamily:'inherit', fontWeight:700, outline:'none', userSelect:'text', WebkitUserSelect:'text', color:'var(--t-text)' }}
                    />
                    <button
                        onClick={doSearch}
                        disabled={searching}
                        style={{ padding:'8px 16px', background: searching ? '#94a3b8' : 'var(--t-btn)', color:'#fff', border:'none', borderRadius:12, fontSize:12, fontWeight:700, cursor: searching ? 'default' : 'pointer', fontFamily:'inherit' }}>
                        {searching ? '...' : 'к≤АмГЙ'}
                    </button>
                    <button
                        onClick={goCurrentLocation}
                        style={{ padding:'8px 12px', background:'#fff0f6', border:'none', borderRadius:12, cursor:'pointer', display:'flex', alignItems:'center', color:'#ec4899' }}>
                        <Icon.MapPin size={16} />
                    </button>
                </div>

                {/* к≤АмГЙ к≤∞к≥Љ л™©л°Э */}
                {results.length > 0 && (
                    <div style={{ position:'absolute', top:'100%', left:12, right:12, background:'var(--t-surface)', border:'1px solid var(--t-border)', borderRadius:16, boxShadow:'0 8px 24px rgba(0,0,0,0.18)', zIndex:20, overflow:'hidden', maxHeight:280, overflowY:'auto' }}>
                        {results.map((place, i) => (
                            <button key={i} onClick={() => selectResult(place)}
                                style={{ width:'100%', textAlign:'left', padding:'12px 16px', background:'none', border:'none', borderBottom:'1px solid var(--t-border)', cursor:'pointer', fontFamily:'inherit' }}>
                                <p style={{ fontSize:13, fontWeight:700, color:'var(--t-text)', margin:0 }}>{place.place_name}</p>
                                <p style={{ fontSize:10, color:'#94a3b8', margin:'2px 0 0' }}>{place.road_address_name || place.address_name || ''}</p>
                                {place.category_name && <p style={{ fontSize:10, color:'#ec4899', margin:'2px 0 0' }}>{place.category_name}</p>}
                            </button>
                        ))}
                        <button onClick={() => setResults([])}
                            style={{ width:'100%', padding:'10px', background:'var(--t-s2)', border:'none', fontSize:11, color:'#94a3b8', cursor:'pointer', fontFamily:'inherit', fontWeight:700 }}>
                            лЛЂкЄ∞
                        </button>
                    </div>
                )}
            </div>

            {/* мІАлПД */}
            <div ref={mapContainerRef} style={{ flex:1, minHeight:0, zIndex:1 }} />

            {/* нХШлЛ®: мЮ•мЖМл™Е мЮЕл†• + нЩХмЭЄ */}
            <div style={{ position:'relative', zIndex:10, flexShrink:0, padding:'16px', borderTop:'1px solid var(--t-border)', background:'var(--t-surface)', display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                    <p style={{ fontSize:10, fontWeight:700, color:'#ec4899', textTransform:'uppercase', margin:'0 0 4px 4px' }}>мЮ•мЖМл™Е</p>
                    <input
                        type="text"
                        value={placeName}
                        onChange={e => setPlaceName(e.target.value)}
                        placeholder="мЮ•мЖМл™ЕмЭД мІБм†С мИШм†ХнХ† мИШ мЮИмКµлЛИлЛ§"
                        style={{ width:'100%', background:'var(--t-s2)', border:'1px solid var(--t-border)', borderRadius:12, padding:'12px 16px', fontSize:14, fontFamily:'inherit', fontWeight:700, outline:'none', boxSizing:'border-box', userSelect:'text', WebkitUserSelect:'text', color:'var(--t-text)' }}
                    />
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'0 4px' }}>
                    <span style={{ fontSize:10, color:'#94a3b8', fontFamily:'monospace' }}>{lat.toFixed(5)}, {lng.toFixed(5)}</span>
                    <a href={`https://map.kakao.com/link/map/${encodeURIComponent(placeName||'мЬДмєШ')},${lat},${lng}`}
                       target="_blank" rel="noopener noreferrer"
                       style={{ fontSize:10, color:'#3b82f6', fontWeight:700, textDecoration:'underline' }}>мєімєімШ§лІµ нЩХмЭЄ вЖТ</a>
                </div>
                <button
                    onClick={() => {
                        if (!placeName.trim()) { alert('мЮ•мЖМл™ЕмЭД мЮЕл†•нХім£ЉмДЄмЪФ.'); return; }
                        onConfirm({ name: placeName.trim(), lat, lng });
                    }}
                    style={{ width:'100%', padding:'16px', background:'var(--t-btn)', color:'#fff', border:'none', borderRadius:16, fontSize:14, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>
                    мЭі мЬДмєШл°Ь мД§м†Х
                </button>
            </div>
        </div>
    );
};
// вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА

function App() {
    const [view, setView] = useState(() => sessionStorage.getItem('moida_view') || 'attendance');
    const [members, setMembers] = useState([]);
    const [sessionData, setSessionData] = useState([]);
    const [history, setHistory] = useState([]);
    const [pendingRegistrations, setPendingRegistrations] = useState([]);
    const [selectedHistoryDetail, setSelectedHistoryDetail] = useState(null);
    const [historySortKey, setHistorySortKey] = useState('time');
    const [historySortOrder, setHistorySortOrder] = useState('asc');
    const [meetingTimes, setMeetingTimes] = useState({
        date: getThisSunday(), start:'08:00', end:'10:00', location:'', locationLat:null, locationLng:null, locationRadius:100, managerId:'', managerName:'', maxLimit:18, enableQR:false
    });
    const [currentTime, setCurrentTime] = useState(new Date());
    const [isAppLocked, setIsAppLocked] = useState(false);
    const [lockPassword, setLockPassword] = useState('');
    const [lockModalMode, setLockModalMode] = useState(null);
    const [tempPassword, setTempPassword] = useState('');
    const [modal, setModal] = useState({ type:null, data:null });
    const [alertModal, setAlertModal] = useState({ show:false, title:'', content:'', type:'info', onConfirm:null });
    const [historyEditTarget, setHistoryEditTarget] = useState(null);
    const [isEditingLocation, setIsEditingLocation] = useState(false);
    const [editLocationValue, setEditLocationValue] = useState('');
    const [isEditingManager, setIsEditingManager] = useState(false);
    const [editManagerValue, setEditManagerValue] = useState('');
    const [isLocationPickerOpen, setIsLocationPickerOpen] = useState(false);
    const [teamData, setTeamData] = useState(null);
    const [localTeamData, setLocalTeamData] = useState(null);
    const [isPending, setIsPending] = useState(false);
    const [isGuestModalOpen, setIsGuestModalOpen] = useState(false);
    const [newGuest, setNewGuest] = useState({ name:'', gender:'лВ®мД±', inviterId:'', level:'1' });
    const [loggedInManager, setLoggedInManager] = useState(() => {
        try { const s = localStorage.getItem('moida_manager'); return s ? JSON.parse(s) : null; } catch(e) { return null; }
    });
    const [isLoginModalOpen, setIsLoginModalOpen] = useState(!localStorage.getItem('moida_manager'));
    const [loginForm, setLoginForm] = useState({ name:'' });
    const [setupTabMonthlyMembers, setSetupTabMonthlyMembers] = useState([]);
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const [testMode, setTestMode] = useState(false);
    const [testModeBackup, setTestModeBackup] = useState(null);
    const [isPasswordChangeModalOpen, setIsPasswordChangeModalOpen] = useState(false);
    const [passwordForm, setPasswordForm] = useState({ current:'', next:'', confirm:'' });
    // QR кіАл†® мГБнГЬ
    const [isQRModalOpen, setIsQRModalOpen] = useState(false);
    const [currentQRToken, setCurrentQRToken] = useState('');
    const [isPendingModalOpen, setIsPendingModalOpen] = useState(false);
    const qrCanvasRef = useRef(null);
    const hasAutoNoShowRef = useRef(false);



    const hourOptions = useMemo(() => Array.from({length:24},(_,i)=>String(i).padStart(2,'0')),[]);
    const minuteOptions = useMemo(() => Array.from({length:12},(_,i)=>String(i*5).padStart(2,'0')),[]);

    const activeMembers = useMemo(() => members.filter(m => !m.isResigned), [members]);
    const managers = useMemo(() => activeMembers.filter(m => STAFF_ROLES.includes(m.role)).sort((a,b)=>a.name.localeCompare(b.name)), [activeMembers]);

    useEffect(() => { sessionStorage.setItem('moida_view', view); }, [view]);

    const activeParticipants = useMemo(() => {
        return sessionData.filter(p => p.date === meetingTimes.date)
            .sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||'') || a.name.localeCompare(b.name));
    }, [sessionData, meetingTimes.date]);

    const activeTeamData = useMemo(() => {
        const serverTime = teamData ? new Date(teamData.createdAt).getTime() : 0;
        const localTime = localTeamData ? new Date(localTeamData.updatedAt).getTime() : 0;
        if (localTeamData && localTime > serverTime) return localTeamData;
        return teamData || null;
    }, [localTeamData, teamData]);

    const groupedTeams = useMemo(() => {
        if (!activeTeamData?.teams) return [];
        return activeTeamData.teams.map((t, teamIdx) => {
            const members = t.members.map((tm, mi) => {
                const p = activeParticipants.find(p => p.memberId === (tm.memberId||tm.id));
                return p ? { ...p, jerseyNumber: mi + 1 } : null;
            }).filter(Boolean);
            return members.length > 0 ? { teamName: String.fromCharCode(65+teamIdx), teamIdx, members } : null;
        }).filter(Boolean);
    }, [activeParticipants, activeTeamData]);

    const sortedHistoryRecords = useMemo(() => {
        if (!selectedHistoryDetail?.records) return [];
        const list = selectedHistoryDetail.records.map((r,i) => ({...r, originalIndex:i}));
        if (historySortKey === 'time') return list.sort((a,b)=>(a.timestamp||'99:99').localeCompare(b.timestamp||'99:99'));
        if (historySortKey === 'status') {
            const order = {'м†ХмГБ':1,'мІАк∞Б':2,'лЕЄмЗЉ':3,'лѓЄмґЬмДЭ':4};
            return list.sort((a,b) => {
                let diff = (order[a.status]||9) - (order[b.status]||9);
                if (historySortOrder === 'desc') diff = -diff;
                return diff || (a.timestamp||'99:99').localeCompare(b.timestamp||'99:99');
            });
        }
        return list;
    }, [selectedHistoryDetail, historySortKey, historySortOrder]);

    const toggleTheme = () => { const isDark = !darkMode; setDarkMode(isDark); document.documentElement.classList.toggle('dark', isDark); localStorage.setItem('moida_theme', isDark ? 'dark' : 'light'); };
    const showAlert = (title, content, type='info', onConfirm=null) => setAlertModal({show:true,title,content,type,onConfirm});
    const showConfirm = (title, content, onConfirm) => setAlertModal({show:true,title,content,type:'confirm',onConfirm});

    // QR мљФлУЬ мГЭмД±
    const generateQRCode = async () => {
        try {
            const token = Math.random().toString(36).substring(2,10).toUpperCase() + Date.now().toString(36).toUpperCase();
            const date = meetingTimes.date;
            const [sy,sm,sd] = date.split('-');
            const [startH,startM] = meetingTimes.start.split(':');
            const [endH,endM] = meetingTimes.end.split(':');
            const meetingStartTs = new Date(sy,sm-1,sd, parseInt(startH), parseInt(startM), 0);
            const validFrom = new Date(meetingStartTs.getTime() - 70*60*1000).toISOString(); // мЛЬмЮС 70лґД м†Д
            const validUntil = new Date(sy,sm-1,sd, parseInt(endH), parseInt(endM), 0).toISOString();
            await getQRCol().doc(date).set({ token, date, validFrom, validUntil, createdAt:new Date().toISOString(), usedBy:[] });
            setCurrentQRToken(token);
            setIsQRModalOpen(true);
        } catch(e) { showAlert('мШ§л•Ш','QR мГЭмД± мЛ§нМ®: '+e.message); }
    };

    // QR мљФлУЬ л†МлНФлІБ
    useEffect(() => {
        if (isQRModalOpen && currentQRToken) {
            setTimeout(() => {
                const container = document.getElementById('qr-canvas-area');
                if (!container) return;
                container.innerHTML = '';
                const qrUrl = `https://nakdo0415-crypto.github.io/moida/member.html?token=${currentQRToken}&date=${meetingTimes.date}`;
                new QRCode(container, { text:qrUrl, width:220, height:220, colorDark:'#0f172a', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
            }, 100);

            const todayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

            // нШДмЮђ л™®мЮД мЭЉм†Х л∞±мЧЕ (React state + Firestore мЦСм™љ вАФ мГИл°Ьк≥†мє® лМАлєД)
            setTestModeBackup({ meetingTimes: {...meetingTimes} });
            await getSettingsCol().doc('test_backup').set({
                originalSettings: {...meetingTimes},
                createdAt: new Date().toISOString()
            });

            // нЕМмК§нКЄ л™®лУЬ: 12лґД нЫД мЛЬмЮС, 5лґД л™®мЮД
            // вЖТ мІАкЄИлґАнД∞ 3лґД(=12-9)мЭілВі м≤інБђмЭЄ вЖТ "м†ХмГБ", 3лґД мЭінЫД вЖТ "мІАк∞Б"
            const startTime = new Date(d.getTime() + 12*60*1000); // now + 12лґД
            const endTime = new Date(startTime.getTime() + 5*60*1000); // start + 5лґД

            const h = String(startTime.getHours()).padStart(2,'0');
            const m = String(startTime.getMinutes()).padStart(2,'0');
            const endH = String(endTime.getHours()).padStart(2,'0');
            const endM = String(endTime.getMinutes()).padStart(2,'0');

            // нШДмЮђ GPS мЬДмєШ мЈ®лУЭ (нЕМмК§нКЄмЪ©)
            let testLat = meetingTimes.locationLat || null;
            let testLng = meetingTimes.locationLng || null;
            let testLocation = meetingTimes.location || '';
            let gpsMsg = '';
            let gpsOk = false;
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) =>
                        navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 8000 })
                    );
                    testLat = pos.coords.latitude;
                    testLng = pos.coords.longitude;
                    testLocation = 'рЯУН нЕМмК§нКЄ нШДмЮђмЬДмєШ';
                    gpsMsg = `\nGPS: нШДмЮђмЬДмєШ мЮРлПЩ мД§м†ХлР® (${testLat.toFixed(5)}, ${testLng.toFixed(5)})`;
                    gpsOk = true;
                } catch(e) {
                    gpsMsg = '\nGPS: мЬДмєШ мЈ®лУЭ мЛ§нМ® вАФ кЄ∞м°і мЮ•мЖМ мЬ†мІА';
                }
            } else {
                gpsMsg = '\nGPS: лѓЄмІАмЫР лЄМлЭЉмЪ∞м†А вАФ кЄ∞м°і мЮ•мЖМ мЬ†мІА';
            }

            const updatedTimes = {...meetingTimes, date: todayStr, start: `${h}:${m}`, end: `${endH}:${endM}`,
                location: testLocation, locationLat: testLat, locationLng: testLng, testMode: true};
            setMeetingTimes(updatedTimes);
            await getSettingsCol().doc('meeting_schedule_v2').update({...updatedTimes});
            setTestMode(true);
            if (gpsOk) setIsLocationPickerOpen(true);

            // мЮРлПЩ мЭЄмЫР мД†м†Х
            setTimeout(async () => {
                try {
                    const activeMemberList = members.filter(m => !m.isResigned);
                    const sessionSnap = await getSessionCol().where('date', '==', todayStr).get();
                    const existingIds = new Set(sessionSnap.docs.map(d => d.data().memberId));
                    const toAdd = activeMemberList.filter(m => !existingIds.has(m.id));

                    if (toAdd.length > 0) {
                        await Promise.all(toAdd.map(m => getSessionCol().add({
                            memberId:m.id, name:m.name, gender:m.gender, level:m.level,
                            date:todayStr, checkedIn:false, checkInTime:null, status:'лѓЄмґЬмДЭ',
                            isGuest:false, team:'', createdAt:new Date().toISOString()
                        })));
                    }
                    showAlert('нЕМмК§нКЄ л™®лУЬ нЩЬмД±нЩФ', `${toAdd.length}л™Е мЮРлПЩ мД†м†ХлР®\n\nл™®мЮД мЛЬмЮС: ${h}:${m} (мІАкЄИлґАнД∞ 12лґД нЫД)\nл™®мЮД мҐЕл£М: ${endH}:${endM}\n\nмІАкЄИлґАнД∞ 3лґД мЭілВі м≤інБђмЭЄ вЖТ м†ХмГБ вЬУ\n3лґД мЭінЫД лШРлКФ [мІАк∞Б м†ДнЩШ] вЖТ мІАк∞Б вЪ†пЄП\n[лЕЄмЗЉ м†ДнЩШ] вЖТ лѓЄмґЬмДЭмЮР лЕЄмЗЉ м≤Шл¶ђ вЬЧ${gpsMsg}`);
                } catch(e) {
                    console.error('нЕМмК§нКЄ мЭЄмЫР мД†м†Х мЛ§нМ®:', e);
                    showAlert('мХМл¶Љ', 'мЭЄмЫР мЮРлПЩ мД†м†Х мЛ§нМ®');
                }
            }, 500);
        } else {
            // нЕМмК§нКЄ л™®лУЬ OFF
            showConfirm('нЕМмК§нКЄ л™®лУЬ мҐЕл£М', 'нЕМмК§нКЄ лН∞мЭінД∞л•Љ мВ≠м†ЬнХШк≥† л≥µмЫРнХШмЛЬк≤†мКµлЛИкєМ?', async () => {
                try {
                    const testDate = meetingTimes.date; // нШДмЮђ нЕМмК§нКЄ м§СмЭЄ лВ†мІЬ

                    // мЫРл≥Є мД§м†Х: React state мЪ∞мД†, мЧЖмЬЉл©і Firestore л∞±мЧЕмЧРмДЬ л≥µмЫР
                    let originalSettings = testModeBackup?.meetingTimes || null;
                    if (!originalSettings) {
                        const backupDoc = await getSettingsCol().doc('test_backup').get();
                        if (backupDoc.exists) originalSettings = backupDoc.data().originalSettings;
                    }

                    // FirestoreмЧРмДЬ мІБм†С м°∞нЪМ вАФ stale React state л∞©мІА
                    const sessionSnap = await getSessionCol().where('date', '==', testDate).get();

                    const batch = db.batch();
                    // нЕМмК§нКЄ мДЄмЕШ м†Дм≤і мВ≠м†Ь
                    sessionSnap.docs.forEach(d => batch.delete(getSessionCol().doc(d.id)));
                    // нЕМмК§нКЄмЪ© QR нЖ†нБ∞ мВ≠м†Ь
                    batch.delete(getQRCol().doc(testDate));
                    // л∞±мЧЕ лђЄмДЬ мВ≠м†Ь
                    batch.delete(getSettingsCol().doc('test_backup'));
                    // мЫРл≥Є мД§м†Х л≥µмЫР (л∞±мЧЕ мЧЖмЬЉл©і лЛ§мЭМ мЭЉмЪФмЭЉл°Ь лВ†мІЬ мІДнЦЙ)
                    const restoredSettings = originalSettings
                        ? {...originalSettings, testMode: false}
                        : {...meetingTimes, testMode: false, date: getNextSundayFromDate(testDate), managerId:'', managerName:''};
                    batch.set(getSettingsCol().doc('meeting_schedule_v2'), restoredSettings);

                    await batch.commit();

                    // л°Ьмїђ sessionDataмЧРмДЬ нЕМмК§нКЄ мДЄмЕШ м¶ЙмЛЬ м†Ьк±∞ (onSnapshot мІАмЧ∞ л∞©мІА)
                    setSessionData(prev => prev.filter(p => p.date !== testDate));

                    setTestModeBackup(null);
                    setTestMode(false);
                    showAlert('нЕМмК§нКЄ л™®лУЬ мҐЕл£М', 'нЕМмК§нКЄ лН∞мЭінД∞к∞А л™®лСР мВ≠м†ЬлРШк≥† л≥µмЫРлРШмЧИмКµлЛИлЛ§.');
                } catch(e) {
                    console.error(e);
                    showAlert('мШ§л•Ш', 'лН∞мЭінД∞ л≥µмЫР мЛ§нМ®: ' + e.message);
                }
            });
        }
    };

    const handleCheckIn = async (participant) => {
        // лВ†мІЬ лґИмЭЉмєШ л∞©мЦі: participantмЭШ мДЄмЕШ лВ†мІЬк∞А нШДмЮђ л™®мЮД лВ†мІЬмЩА лЛ§л•іл©і м∞®лЛ®
        if (participant.date !== meetingTimes.date) {
            return showAlert('мШ§л•Ш', `лВ†мІЬ лґИмЭЉмєШ (${participant.date} вЙ† ${meetingTimes.date})\nмГИл°Ьк≥†мє® нЫД лЛ§мЛЬ мЛЬлПДнХім£ЉмДЄмЪФ.`);
        }
        const limit = testMode ? activeParticipants.length : (meetingTimes.maxLimit || 18);
        const rank = activeParticipants.findIndex(p => p.id === participant.id) + 1;
        if (!testMode && rank > limit) return showAlert('лМАкЄ∞мЮР мХИлВі',`мД†м∞©мИЬ(${limit}л™Е) лІИк∞РлРШмЧИмКµлЛИлЛ§.`);
        const now = new Date();
        const [sy,sm,sd] = participant.date.split('-');
        const [shr,smin] = (meetingTimes.start||'08:00').split(':');
        const [ehr,emin] = (meetingTimes.end||'10:00').split(':');
        const meetingStart = new Date(sy,sm-1,sd,parseInt(shr),parseInt(smin),0);
        const meetingEnd   = new Date(sy,sm-1,sd,parseInt(ehr),parseInt(emin),0);
        // м≤інБђмЭЄ нЧИмЪ©: мЛЬмЮС 70лґД м†Д(06:50) ~ мҐЕл£М(10:00)
        const allowFrom = new Date(meetingStart.getTime() - 70*60*1000);
        if (!testMode && now < allowFrom) {
            const allowFromStr = allowFrom.toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'});
            return showAlert('мґЬмДЭ лґИк∞А',`мґЬмДЭ к∞АлК• мЛЬк∞Д: ${participant.date} ${allowFromStr}~${meetingTimes.end}`);
        }
        if (!testMode && now > meetingEnd) {
            return showAlert('мґЬмДЭ лґИк∞А','л™®мЮДмЭі мҐЕл£МлРШмЧИмКµлЛИлЛ§.\nмЮРлПЩ лЕЄмЗЉ м≤Шл¶ђлРШмЧИмКµлЛИлЛ§.');
        }
        // м†ХмГБ: allowFrom ~ мЛЬмЮС 9лґД м†Д(07:51:00)
        // мІАк∞Б: мЛЬмЮС 9лґД м†Д міИк≥Љ ~ мҐЕл£М
        const normalThreshold = new Date(meetingStart.getTime() - 9*60*1000);
        const finalStatus = now <= normalThreshold ? 'м†ХмГБ' : 'мІАк∞Б';
        const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
        try {
            await getSessionCol().doc(participant.id).update({ checkedIn:true, checkInTime:timeStr, status:finalStatus });
            setModal({type:null,data:null});
        } catch(e) { showAlert('мШ§л•Ш','мґЬмДЭ мЛ§нМ®'); }
    };

                                <div><p className="text-xl font-black text-slate-700">{selectedHistoryDetail.total}</p><p className="text-[10px] text-slate-400">м†Дм≤і</p></div>
                                <div><p className="text-xl font-black text-slate-400">{selectedHistoryDetail.total - selectedHistoryDetail.present}</p><p className="text-[10px] text-slate-400">лѓЄмґЬмДЭ</p></div>
                            </div>

                            {/* мЮ•мЖМ нОЄмІС */}
                            <div className="flex items-center gap-2 mb-2">
                                <Icon.MapPin size={12} className="text-slate-400" />
                                {isEditingLocation
                                    ? <><input className="flex-1 text-xs bg-slate-50 border border-slate-200 rounded-lg px-2 py-1" value={editLocationValue} onChange={e=>setEditLocationValue(e.target.value)} />
                                        <button onClick={handleUpdateLocation} className="text-xs px-2 py-1 bg-teal-500 text-white rounded-lg">м†АмЮ•</button>
                                        <button onClick={()=>setIsEditingLocation(false)} className="text-xs px-2 py-1 bg-slate-100 text-slate-500 rounded-lg">мЈ®мЖМ</button></>
                                    : <><span className="text-xs text-slate-600 flex-1">{selectedHistoryDetail.location}</span>
                                        {selectedHistoryDetail.locationLat && (
                                            <a href={`https://map.kakao.com/link/map/${encodeURIComponent(selectedHistoryDetail.location||'мЬДмєШ')},${selectedHistoryDetail.locationLat},${selectedHistoryDetail.locationLng}`}
                                               target="_blank" rel="noopener noreferrer"
                                               className="text-[10px] text-blue-500 font-black mr-1 underline">мІАлПД</a>
                                        )}
                                        <button onClick={()=>{setEditLocationValue(selectedHistoryDetail.location||'');setIsEditingLocation(true);}} className="p-1 text-slate-300 hover:text-slate-500"><Icon.Edit2 size={12} /></button></>
                                }
                            </div>
                        </div>

                        {/* м†Хл†ђ мШµмЕШ */}
                        <div className="flex gap-2 mb-3">
                            {[['time','мЛЬк∞ДмИЬ'],['status','мГБнГЬмИЬ']].map(([k,l]) => (
                                <button key={k} onClick={()=>{if(historySortKey===k&&k==='status')setHistorySortOrder(o=>o==='asc'?'desc':'asc');setHistorySortKey(k);}}
                                    className={`px-3 py-1.5 rounded-xl text-xs font-black transition-all ${historySortKey===k?'bg-teal-500 text-white':'bg-white border border-slate-200 text-slate-500'}`}>
                                    {l} {historySortKey===k&&k==='status'&&(historySortOrder==='asc'?'вЖС':'вЖУ')}
                                </button>
                            ))}
                        </div>

                        {sortedHistoryRecords.map((record) => {
                            const statusColor = record.status==='м†ХмГБ'?'text-emerald-500':record.status==='мІАк∞Б'?'text-yellow-500':record.status==='лЕЄмЗЉ'?'text-red-400':'text-slate-400';
                            return (
                                <div key={record.originalIndex} className="flex items-center justify-between p-3.5 bg-white border border-slate-100 rounded-2xl mb-1.5">
                                    <div className="flex items-center gap-3">
                                        <div>
                                            <span className="font-black text-sm text-slate-800">{record.name}</span>
                                            {record.type==='к≤МмК§нКЄ'&&<span className="ml-1.5 text-[9px] px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded-lg font-black">G</span>}
                                            {record.type==='лМАкЄ∞мЮР'&&<span className="ml-1.5 text-[9px] px-1.5 py-0.5 bg-amber-100 text-amber-600 rounded-lg font-black">лМАкЄ∞</span>}
                                            {record.checkInTime&&record.checkInTime!=='лѓЄмґЬмДЭ'&&<p className="text-[10px] text-slate-400 mt-0.5">{record.checkInTime}</p>}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className={`text-xs font-black ${statusColor}`}>{record.status}</span>
                                        <button onClick={()=>setHistoryEditTarget({docId:selectedHistoryDetail.id,recordIndex:record.originalIndex})} className="p-1 text-slate-300 hover:text-slate-500"><Icon.Edit2 size={12} /></button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
            </main>

            {/* ===== л™®лЛђлУ§ ===== */}

            {/* мґЬмДЭ м≤інБђ л™®лЛђ */}
            {modal.type==='checkin' && modal.data && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in" onClick={()=>setModal({type:null,data:null})}>
                    <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-zoom-in" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-2xl font-black text-slate-800 text-center mb-2">{modal.data.name}</h2>
                        <p className="text-xs text-center text-slate-400 mb-6">{modal.data.gender} ¬Ј Lv.{modal.data.level}</p>
                        {modal.data.checkedIn
                            ? <div className="text-center">
                                <p className="text-emerald-500 font-black text-lg">вЬУ мЭілѓЄ мґЬмДЭлР®</p>
                                <p className="text-slate-400 text-sm mt-1">{modal.data.checkInTime} ¬Ј {modal.data.status}</p>
                                <button onClick={()=>handleUncheckIn(modal.data)} className="mt-4 w-full py-3 bg-red-50 text-red-500 border border-red-200 rounded-2xl font-black text-sm">мґЬмДЭ мЈ®мЖМ</button>
                              </div>
                            : <button onClick={()=>handleCheckIn(modal.data)} className="w-full py-4 bg-teal-500 text-white rounded-2xl font-black text-lg shadow-lg">мґЬмДЭ м≤інБђ</button>
                        }
                        <button onClick={()=>setModal({type:null,data:null})} className="w-full py-3 text-slate-400 text-sm mt-3">лЛЂкЄ∞</button>
                    </div>
                </div>
            )}

            {/* к≤МмК§нКЄ мґФк∞А л™®лЛђ */}
            {isGuestModalOpen && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={()=>setIsGuestModalOpen(false)}>
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-4">к≤МмК§нКЄ мґФк∞А</h2>
                        <div className="space-y-3">
                            <input type="text" placeholder="мЭіл¶Д" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black"
                                value={newGuest.name} onChange={e=>setNewGuest(p=>({...p,name:e.target.value}))} />
                            <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black pr-8"
                                value={newGuest.gender} onChange={e=>setNewGuest(p=>({...p,gender:e.target.value}))}>
                                <option value="лВ®мД±">лВ®мД±</option><option value="мЧђмД±">мЧђмД±</option>
                            </select>
                            <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black pr-8"
                                value={newGuest.inviterId} onChange={e=>setNewGuest(p=>({...p,inviterId:e.target.value}))}>
                                <option value="">міИлМАмЮР мЧЖмЭМ</option>
                                {activeMembers.sort((a,b)=>a.name.localeCompare(b.name)).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                            <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black pr-8"
                                value={newGuest.level} onChange={e=>setNewGuest(p=>({...p,level:e.target.value}))}>
                                {[1,2,3,4,5,6].map(l=><option key={l} value={String(l)}>Lv.{l}</option>)}
                            </select>
                        </div>
                        <div className="flex gap-2 mt-4">
                            <button onClick={()=>setIsGuestModalOpen(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">мЈ®мЖМ</button>
                            <button onClick={handleAddGuest} className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">мґФк∞А</button>
                        </div>
                    </div>
                </div>
            )}

            {/* кЄ∞л°Э мГБнГЬ нОЄмІС л™®лЛђ */}
            {historyEditTarget && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end justify-center z-50" onClick={()=>setHistoryEditTarget(null)}>
                    <div className="bg-white rounded-t-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <p className="font-black text-slate-800 mb-4 text-center">мґЬмДЭ мГБнГЬ л≥Ак≤љ</p>
                        <div className="grid grid-cols-2 gap-2">
                            {['м†ХмГБ','мІАк∞Б','лЕЄмЗЉ','лМАкЄ∞'].map(status => (
                                <button key={status} onClick={()=>handleHistoryStatusUpdate(status)}
                                    className="py-3 rounded-2xl font-black text-sm border border-slate-200 hover:bg-teal-50 hover:border-teal-300 transition-all">
                                    {status}
                                </button>
                            ))}
                        </div>
                        <button onClick={()=>setHistoryEditTarget(null)} className="w-full py-3 text-slate-400 text-sm mt-3">мЈ®мЖМ</button>
                    </div>
                </div>
            )}

            {/* QR мљФлУЬ л™®лЛђ */}
            {isQRModalOpen && (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={()=>setIsQRModalOpen(false)}>
                    <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-1">QR мґЬмДЭ мљФлУЬ</h2>
                        <p className="text-xs text-slate-400 mb-2">{meetingTimes.date} ¬Ј {meetingTimes.start}~{meetingTimes.end}</p>
                        <p className="text-[10px] text-teal-500 font-black mb-5">л™®мЮД мЛЬк∞Д лВімЧРлІМ мЬ†нЪ®нХ©лЛИлЛ§</p>
                        <div id="qr-canvas-area" className="flex justify-center mb-5"></div>
                        <p className="text-xs text-slate-400 mb-4">нЪМмЫРмЧРк≤М мЭі нЩФл©імЭД л≥імЧђм£ЉмДЄмЪФ.<br/>мєіл©ФлЭЉл°Ь мК§мЇФнХШл©і мґЬмДЭлР©лЛИлЛ§.</p>
                        <button onClick={()=>setIsQRModalOpen(false)} className="w-full py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">лЛЂкЄ∞</button>
                    </div>
                </div>
            )}

            {/* к∞АмЮЕ мЛ†м≤≠ л™®лЛђ */}
            {isPendingModalOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={()=>setIsPendingModalOpen(false)}>
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-4">к∞АмЮЕ мЛ†м≤≠ ({pendingRegistrations.length})</h2>
                        {pendingRegistrations.length === 0
                            ? <p className="text-center text-slate-400 py-6">мЛ†м≤≠ лВімЧ≠мЭі мЧЖмКµлЛИлЛ§</p>
                            : pendingRegistrations.map(p => (
                                <div key={p.id} className="bg-slate-50 rounded-2xl p-4 mb-3 border border-slate-100">
                                    <div className="flex items-start justify-between mb-2">
                                        <div>
                                            <p className="font-black text-slate-800">{p.name}</p>
                                            <p className="text-xs text-slate-500 mt-0.5">{p.birth} ¬Ј {p.gender}</p>
                                            <p className="text-xs text-slate-400">{p.phone}</p>
                                            <p className="text-xs text-slate-400">{p.area}</p>
                                        </div>
                                        <p className="text-[10px] text-slate-400">{p.createdAt?.slice(0,10)}</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>handleRejectPending(p)} className="flex-1 py-2 bg-slate-200 text-slate-600 rounded-xl font-black text-xs">к±∞м†И</button>
                                        <button onClick={()=>handleApprovePending(p)} className="flex-1 py-2 bg-teal-500 text-white rounded-xl font-black text-xs">мКємЭЄ</button>
                                    </div>
                                </div>
                            ))
                        }
                        <button onClick={()=>setIsPendingModalOpen(false)} className="w-full py-3 text-slate-400 text-sm mt-2">лЛЂкЄ∞</button>
                    </div>
                </div>
            )}

            {/* мХМл¶Љ/нЩХмЭЄ л™®лЛђ */}
            {alertModal.show && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60] animate-fade-in">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">
                        <h3 className="font-black text-lg text-slate-800 mb-2">{alertModal.title}</h3>
                        <p className="text-sm text-slate-500 whitespace-pre-line mb-5">{alertModal.content}</p>
                        <div className="flex gap-2">
                            {alertModal.type==='confirm' && (
                                <button onClick={()=>setAlertModal(p=>({...p,show:false}))} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">мЈ®мЖМ</button>
                            )}
                            <button onClick={()=>{ if(alertModal.onConfirm)alertModal.onConfirm(); setAlertModal(p=>({...p,show:false})); }}
                                className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">
                                {alertModal.type==='confirm'?'нЩХмЭЄ':'лЛЂкЄ∞'}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* мІАлПД мЮ•мЖМ мД†нГЭ л™®лЛђ */}
            <LocationPickerModal
                isOpen={isLocationPickerOpen}
                onClose={() => setIsLocationPickerOpen(false)}
                initialLat={meetingTimes.locationLat}
                initialLng={meetingTimes.locationLng}
                initialName={meetingTimes.location}
                onConfirm={({ name, lat, lng }) => {
                    updateMeetingTimeSettings({ ...meetingTimes, location: name, locationLat: lat, locationLng: lng });
                    setIsLocationPickerOpen(false);
                }}
            />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
