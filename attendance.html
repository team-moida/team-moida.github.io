const getThisSunday = () => {
    const now = new Date();
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
    const day = d.getDay();
    const diff = (day === 0) ? 0 : 7 - day;
    d.setDate(d.getDate() + diff);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const getNextSundayFromDate = (dateStr) => {
    let d = dateStr ? new Date(parseInt(dateStr.split('-')[0]), parseInt(dateStr.split('-')[1])-1, parseInt(dateStr.split('-')[2]), 12, 0, 0) : new Date();
    if (!dateStr) d.setHours(12,0,0,0);
    const day = d.getDay();
    const diff = (day === 0) ? 7 : 7 - day;
    d.setDate(d.getDate() + diff);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const getMembershipStatus = (member, targetMonthStr) => {
    if (!member.membershipType || member.membershipType === 'monthly' || !member.membershipEndDate) return null;
    const end = new Date(member.membershipEndDate);
    const endMonth = new Date(end.getFullYear(), end.getMonth(), 1);
    const [y, m] = targetMonthStr.split('-').map(Number);
    const current = new Date(y, m-1, 1);
    if (current > endMonth) return { active: false };
    const endDateFormatted = `${end.getFullYear().toString().slice(2)}.${String(end.getMonth()+1).padStart(2,'0')}.${String(end.getDate()).padStart(2,'0')}`;
    return { active: true, type: member.membershipType === 'half_year' ? '반년' : '1년', endDateFormatted };
};

const getPosColorClass = (pos) => {
    if (!pos) return 'bg-slate-50 text-slate-400 border-slate-100';
    const p = String(pos).toLowerCase();
    if (p.includes('피보')) return 'bg-red-50 text-red-500 border-red-100';
    if (p.includes('아라')) return 'bg-green-50 text-green-600 border-green-100';
    if (p.includes('픽소')) return 'bg-blue-50 text-blue-500 border-blue-100';
    if (p.includes('골레이로')) return 'bg-purple-50 text-purple-600 border-purple-100';
    return 'bg-yellow-50 text-yellow-600 border-yellow-100';
};

const CurrentTimeClock = () => {
    const [time, setTime] = useState(new Date());
    useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
    return (
        <div className="flex flex-col items-center justify-center my-6 animate-zoom-in">
            <span className="text-6xl font-black text-slate-800 tabular-nums tracking-tighter drop-shadow-md">
                {time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}
            </span>
            <span className="text-xs font-bold text-slate-400 tracking-widest uppercase mt-3">모이다 · OTP FC Attendance</span>
        </div>
    );
};

// ─── 카카오 REST API 키 ────────────────────────────────────────────────────────
const KAKAO_REST_KEY = 'bdebf2ece4ae2d9315448ec55001d7b2';
const KAKAO_PROXY = 'https://corsproxy.io/?url=';
// ──────────────────────────────────────────────────────────────────────────────

// ─── 지도 장소 선택 모달 ──────────────────────────────────────────────────────
const LocationPickerModal = ({ isOpen, onClose, onConfirm, initialLat, initialLng, initialName }) => {
    const mapContainerRef = useRef(null);
    const mapRef = useRef(null);
    const markerRef = useRef(null);
    const [placeName, setPlaceName] = useState('');
    const [lat, setLat] = useState(37.5665);
    const [lng, setLng] = useState(126.9780);
    const [query, setQuery] = useState('');
    const [results, setResults] = useState([]);
    const [searching, setSearching] = useState(false);
    const [locating, setLocating] = useState(false);
    const [geocodeFailed, setGeocodeFailed] = useState(false);

    // 좌표 → 장소명 역변환 (카카오 REST + CORS 프록시)
    const reverseGeocode = async (y, x) => {
        try {
            const url = `https://dapi.kakao.com/v2/local/geo/coord2address.json?x=${x}&y=${y}`;
            const res = await fetch(KAKAO_PROXY + encodeURIComponent(url), {
                headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` }
            });
            const json = await res.json();
            const doc = json.documents && json.documents[0];
            if (doc) {
                const n = (doc.road_address && doc.road_address.building_name)
                    || (doc.address && doc.address.address_name)
                    || (doc.road_address && doc.road_address.address_name)
                    || '';
                if (n) { setPlaceName(n.trim()); setGeocodeFailed(false); }
            }
        } catch (_) {
            setGeocodeFailed(true);
        }
    };

    // 마커 이동
    const moveMarker = (newLat, newLng) => {
        setLat(newLat);
        setLng(newLng);
        if (markerRef.current) markerRef.current.setLatLng([newLat, newLng]);
        if (mapRef.current) mapRef.current.setView([newLat, newLng], mapRef.current.getZoom());
    };

    // 키워드 검색
    const doSearch = async () => {
        const q = query.trim();
        if (!q) return;
        setSearching(true);
        setResults([]);
        try {
            const kw = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(q)}&size=8`;
            const r1 = await fetch(KAKAO_PROXY + encodeURIComponent(kw), {
                headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` }
            });
            const d1 = await r1.json();
            if (d1.documents && d1.documents.length > 0) {
                setResults(d1.documents);
            } else {
                const addr = `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(q)}&size=8`;
                const r2 = await fetch(KAKAO_PROXY + encodeURIComponent(addr), {
                    headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` }
                });
                const d2 = await r2.json();
                if (d2.documents && d2.documents.length > 0) {
                    setResults(d2.documents.map(d => ({
                        place_name: d.address_name,
                        road_address_name: (d.road_address && d.road_address.address_name) || '',
                        x: d.x, y: d.y
                    })));
                } else {
                    alert('검색 결과가 없습니다.\n업체명이나 주소를 다르게 입력해보세요.');
                }
            }
        } catch (_) {
            alert('검색 중 오류가 발생했습니다.\n잠시 후 다시 시도해주세요.');
        }
        setSearching(false);
    };

    // 검색 결과 선택
    const selectResult = (place) => {
        const y = parseFloat(place.y);
        const x = parseFloat(place.x);
        moveMarker(y, x);
        if (mapRef.current) mapRef.current.setView([y, x], 17);
        setPlaceName(place.place_name || '');
        setResults([]);
        setQuery('');
    };

    // 현재 위치
    const goCurrentLocation = () => {
        if (!navigator.geolocation) { alert('위치 정보를 지원하지 않는 브라우저입니다.'); return; }
        setLocating(true);
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const y = pos.coords.latitude;
                const x = pos.coords.longitude;
                moveMarker(y, x);
                if (mapRef.current) mapRef.current.setView([y, x], 17);
                await reverseGeocode(y, x);
                setLocating(false);
            },
            () => { alert('위치 정보를 가져올 수 없습니다.'); setLocating(false); },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    };

    // 지도 초기화
    useEffect(() => {
        if (!isOpen) return;
        setPlaceName(initialName || '');
        setQuery('');
        setResults([]);
        setGeocodeFailed(false);
        const initLat = initialLat || 37.5665;
        const initLng = initialLng || 126.9780;
        setLat(initLat);
        setLng(initLng);

        const t = setTimeout(() => {
            if (!mapContainerRef.current || mapRef.current) return;
            const map = L.map(mapContainerRef.current, { center: [initLat, initLng], zoom: 16 });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap', maxZoom: 19
            }).addTo(map);
            const pin = `<div style="width:26px;height:26px;background:#ef4444;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(239,68,68,0.5)"></div>`;
            const icon = L.divIcon({ html: pin, iconSize: [26, 26], iconAnchor: [13, 26], className: '' });
            const marker = L.marker([initLat, initLng], { draggable: true, icon }).addTo(map);
            marker.on('dragend', async (e) => {
                const p = e.target.getLatLng();
                setLat(p.lat); setLng(p.lng);
                await reverseGeocode(p.lat, p.lng);
            });
            map.on('click', async (e) => {
                marker.setLatLng(e.latlng);
                setLat(e.latlng.lat); setLng(e.latlng.lng);
                await reverseGeocode(e.latlng.lat, e.latlng.lng);
            });
            mapRef.current = map;
            markerRef.current = marker;
            setTimeout(() => map.invalidateSize(), 300);
        }, 200);

        return () => {
            clearTimeout(t);
            if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; markerRef.current = null; }
        };
    }, [isOpen]);

    if (!isOpen) return null;

    return (
        <div style={{ position:'fixed', inset:0, zIndex:9999, display:'flex', flexDirection:'column', background:'var(--t-surface)' }}>

            {/* 헤더 */}
            <div style={{ position:'relative', zIndex:10, flexShrink:0, display:'flex', alignItems:'center', gap:12, padding:'12px 16px', borderBottom:'1px solid var(--t-border)', background:'var(--t-surface)' }}>
                <button onClick={onClose} style={{ padding:8, borderRadius:12, background:'var(--t-s2)', border:'none', cursor:'pointer', display:'flex' }}>
                    <Icon.ArrowLeft size={18} />
                </button>
                <div style={{ flex:1 }}>
                    <p style={{ fontWeight:700, fontSize:14, color:'var(--t-text)', margin:0 }}>장소 선택</p>
                    <p style={{ fontSize:10, color:'#94a3b8', margin:0 }}>업체명·주소 검색 또는 지도를 직접 클릭하세요</p>
                </div>
                {locating && <div style={{ width:18, height:18, border:'2px solid #ec4899', borderTopColor:'transparent', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} />}
            </div>

            {/* 검색 바 */}
            <div style={{ position:'relative', zIndex:10, flexShrink:0, padding:'10px 12px', borderBottom:'1px solid var(--t-border)', background:'var(--t-s2)' }}>
                <div style={{ display:'flex', gap:8 }}>
                    <input
                        type="text"
                        value={query}
                        onChange={e => setQuery(e.target.value)}
                        onKeyDown={e => { if (e.key === 'Enter') doSearch(); }}
                        placeholder="업체명 또는 주소 검색"
                        style={{ flex:1, background:'var(--t-surface)', border:'1px solid var(--t-border)', borderRadius:12, padding:'8px 12px', fontSize:12, fontFamily:'inherit', fontWeight:700, outline:'none', userSelect:'text', WebkitUserSelect:'text', color:'var(--t-text)' }}
                    />
                    <button
                        onClick={doSearch}
                        disabled={searching}
                        style={{ padding:'8px 16px', background: searching ? '#94a3b8' : 'var(--t-btn)', color:'#fff', border:'none', borderRadius:12, fontSize:12, fontWeight:700, cursor: searching ? 'default' : 'pointer', fontFamily:'inherit' }}>
                        {searching ? '...' : '검색'}
                    </button>
                    <button
                        onClick={goCurrentLocation}
                        style={{ padding:'8px 12px', background:'#fff0f6', border:'none', borderRadius:12, cursor:'pointer', display:'flex', alignItems:'center', color:'#ec4899' }}>
                        <Icon.MapPin size={16} />
                    </button>
                </div>

                {/* 검색 결과 목록 */}
                {results.length > 0 && (
                    <div style={{ position:'absolute', top:'100%', left:12, right:12, background:'var(--t-surface)', border:'1px solid var(--t-border)', borderRadius:16, boxShadow:'0 8px 24px rgba(0,0,0,0.18)', zIndex:20, overflow:'hidden', maxHeight:280, overflowY:'auto' }}>
                        {results.map((place, i) => (
                            <button key={i} onClick={() => selectResult(place)}
                                style={{ width:'100%', textAlign:'left', padding:'12px 16px', background:'none', border:'none', borderBottom:'1px solid var(--t-border)', cursor:'pointer', fontFamily:'inherit' }}>
                                <p style={{ fontSize:13, fontWeight:700, color:'var(--t-text)', margin:0 }}>{place.place_name}</p>
                                <p style={{ fontSize:10, color:'#94a3b8', margin:'2px 0 0' }}>{place.road_address_name || place.address_name || ''}</p>
                                {place.category_name && <p style={{ fontSize:10, color:'#ec4899', margin:'2px 0 0' }}>{place.category_name}</p>}
                            </button>
                        ))}
                        <button onClick={() => setResults([])}
                            style={{ width:'100%', padding:'10px', background:'var(--t-s2)', border:'none', fontSize:11, color:'#94a3b8', cursor:'pointer', fontFamily:'inherit', fontWeight:700 }}>
                            닫기
                        </button>
                    </div>
                )}
            </div>

            {/* 지도 */}
            <div ref={mapContainerRef} style={{ flex:1, minHeight:0, zIndex:1 }} />

            {/* 하단: 장소명 입력 + 확인 */}
            <div style={{ position:'relative', zIndex:10, flexShrink:0, padding:'16px', borderTop:'1px solid var(--t-border)', background:'var(--t-surface)', display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                    <div style={{ display:'flex', justifyContent:'space-between', margin:'0 0 4px 4px' }}>
                        <p style={{ fontSize:10, fontWeight:700, color:'#ec4899', textTransform:'uppercase', margin:0 }}>장소명</p>
                        {geocodeFailed && <p style={{ fontSize:10, fontWeight:700, color:'#ef4444', margin:0 }}>⚠ 주소 자동 조회 실패 — 직접 입력해주세요</p>}
                    </div>
                    <input
                        type="text"
                        value={placeName}
                        onChange={e => { setPlaceName(e.target.value); setGeocodeFailed(false); }}
                        placeholder="장소명을 직접 수정할 수 있습니다"
                        style={{ width:'100%', background:'var(--t-s2)', border:'1px solid var(--t-border)', borderRadius:12, padding:'12px 16px', fontSize:14, fontFamily:'inherit', fontWeight:700, outline:'none', boxSizing:'border-box', userSelect:'text', WebkitUserSelect:'text', color:'var(--t-text)' }}
                    />
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'0 4px' }}>
                    <span style={{ fontSize:10, color:'#94a3b8', fontFamily:'monospace' }}>{lat.toFixed(5)}, {lng.toFixed(5)}</span>
                    <a href={`https://map.kakao.com/link/map/${encodeURIComponent(placeName||'위치')},${lat},${lng}`}
                       target="_blank" rel="noopener noreferrer"
                       style={{ fontSize:10, color:'#3b82f6', fontWeight:700, textDecoration:'underline' }}>카카오맵 확인 →</a>
                </div>
                <button
                    onClick={() => {
                        if (!placeName.trim()) { alert('장소명을 입력해주세요.'); return; }
                        onConfirm({ name: placeName.trim(), lat, lng });
                    }}
                    style={{ width:'100%', padding:'16px', background:'var(--t-btn)', color:'#fff', border:'none', borderRadius:16, fontSize:14, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>
                    이 위치로 설정
                </button>
            </div>
        </div>
    );
};

            }).filter(Boolean)
              .map((p, i) => ({ ...p, jerseyNumber: i + 1 }));

        if (historySortKey === 'status') {
            const order = {'정상':1,'지각':2,'노쇼':3,'미출석':4};

                let diff = (order[a.status]||9) - (order[b.status]||9);

            if (member.isSpecialRest) { guestEligible.push(member); return; }

            if (isResting) {
                const info = getMembershipStatus(member, monthStr);
                if (info?.active) guestEligible.push(member);

            }
            if (!setupTabMonthlyMembers.includes(member.id)) return;
            normal.push(member);

    const toggleTestMode = async () => {
        const n = !testMode;
        if (n) {
            // 테스트 모드 ON
            const d = new Date();
            const todayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

            // 원본 설정 백업 — testMode 값이 이미 켜진 상태(새로고침 후)면 기존 백업을 재사용
            if (!meetingTimes.testMode) {
                // 정상 상태 → 현재 값을 3중 백업 (React state, localStorage, Firestore)
                setTestModeBackup({ meetingTimes: {...meetingTimes} });
                localStorage.setItem('moida_testmode_backup', JSON.stringify({...meetingTimes}));
                await getSettingsCol().doc('test_backup').set({
                    originalSettings: {...meetingTimes},
                    createdAt: new Date().toISOString()
                });
            } else {
                // 이미 testMode 상태 → 기존 Firestore 백업으로 React state/localStorage 복원 (덮어쓰기 방지)
                const existingBackup = await getSettingsCol().doc('test_backup').get();
                if (existingBackup.exists) {
                    const orig = existingBackup.data().originalSettings;
                    setTestModeBackup({ meetingTimes: orig });
                    localStorage.setItem('moida_testmode_backup', JSON.stringify(orig));
                }
            }

            // 테스트 모드: 12분 후 시작, 5분 모임
            // → 지금부터 3분(=12-9)이내 체크인 → "정상", 3분 이후 → "지각"
            const startTime = new Date(d.getTime() + 12*60*1000); // now + 12분
            const endTime = new Date(startTime.getTime() + 5*60*1000); // start + 5분

            const h = String(startTime.getHours()).padStart(2,'0');
            const m = String(startTime.getMinutes()).padStart(2,'0');
            const endH = String(endTime.getHours()).padStart(2,'0');
            const endM = String(endTime.getMinutes()).padStart(2,'0');

            // 현재 GPS 위치 취득 (테스트용)
            let testLat = meetingTimes.locationLat || null;
            let testLng = meetingTimes.locationLng || null;
            let testLocation = meetingTimes.location || '';
            let gpsMsg = '';
            let gpsOk = false;
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) =>
                        navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 8000 })
                    );
                    testLat = pos.coords.latitude;
                    testLng = pos.coords.longitude;
                    testLocation = '📍 테스트 현재위치';
                    gpsMsg = `\nGPS: 현재위치 자동 설정됨 (${testLat.toFixed(5)}, ${testLng.toFixed(5)})`;
                    gpsOk = true;
                } catch(e) {
                    gpsMsg = '\nGPS: 위치 취득 실패 — 기존 장소 유지';
                }
            } else {
                gpsMsg = '\nGPS: 미지원 브라우저 — 기존 장소 유지';
            }

            const updatedTimes = {...meetingTimes, date: todayStr, start: `${h}:${m}`, end: `${endH}:${endM}`,
                location: testLocation, locationLat: testLat, locationLng: testLng, testMode: true};
            setMeetingTimes(updatedTimes);
            await getSettingsCol().doc('meeting_schedule_v2').update({...updatedTimes});
            setTestMode(true);
            if (gpsOk) setIsLocationPickerOpen(true);

            // 자동 인원 선정
            setTimeout(async () => {
                try {
                    const activeMemberList = members.filter(m => !m.isResigned);
                    const sessionSnap = await getSessionCol().where('date', '==', todayStr).get();
                    const existingIds = new Set(sessionSnap.docs.map(d => d.data().memberId));
                    const toAdd = activeMemberList.filter(m => !existingIds.has(m.id));

                    if (toAdd.length > 0) {
                        await Promise.all(toAdd.map(m => getSessionCol().add({
                            memberId:m.id, name:m.name, gender:m.gender, level:m.level,
                            date:todayStr, checkedIn:false, checkInTime:null, status:'미출석',
                            isGuest:false, team:'', createdAt:new Date().toISOString()
                        })));
                    }
                    showAlert('테스트 모드 활성화', `${toAdd.length}명 자동 선정됨\n\n모임 시작: ${h}:${m} (지금부터 12분 후)\n모임 종료: ${endH}:${endM}\n\n지금부터 3분 이내 체크인 → 정상 ✓\n3분 이후 또는 [지각 전환] → 지각 ⚠️\n[노쇼 전환] → 미출석자 노쇼 처리 ✗${gpsMsg}`);
                } catch(e) {
                    console.error('테스트 인원 선정 실패:', e);
                    showAlert('알림', '인원 자동 선정 실패');
                }
            }, 500);
        } else {
            // 테스트 모드 OFF
            showConfirm('테스트 모드 종료', '테스트 데이터를 삭제하고 복원하시겠습니까?', async () => {
                try {
                    const testDate = meetingTimes.date; // 현재 테스트 중인 날짜

                    // 원본 설정 복원 우선순위: React state → localStorage → Firestore 백업 → 기본값
                    let originalSettings = testModeBackup?.meetingTimes || null;
                    if (!originalSettings) {
                        try {
                            const lsRaw = localStorage.getItem('moida_testmode_backup');
                            if (lsRaw) originalSettings = JSON.parse(lsRaw);
                        } catch(e) {}
                    }
                    if (!originalSettings) {
                        const backupDoc = await getSettingsCol().doc('test_backup').get();
                        if (backupDoc.exists) originalSettings = backupDoc.data().originalSettings;
                    }
                    localStorage.removeItem('moida_testmode_backup');

                    // Firestore에서 직접 조회 — stale React state 방지
                    const sessionSnap = await getSessionCol().where('date', '==', testDate).get();

                    const batch = db.batch();
                    // 테스트 세션 전체 삭제
                    sessionSnap.docs.forEach(d => batch.delete(getSessionCol().doc(d.id)));
                    // 테스트용 QR 토큰 삭제
                    batch.delete(getQRCol().doc(testDate));
                    // 백업 문서 삭제
                    batch.delete(getSettingsCol().doc('test_backup'));
                    // 원본 설정 복원 — 백업 없으면 기본값(08:00~10:00)으로 복원 (testMode 잔류 시간 방지)
                    const restoredSettings = originalSettings
                        ? {...originalSettings, testMode: false}
                        : {...meetingTimes, testMode: false, start:'08:00', end:'10:00', date: getNextSundayFromDate(testDate), managerId:'', managerName:''};
                    batch.set(getSettingsCol().doc('meeting_schedule_v2'), restoredSettings);

                    await batch.commit();

                    // 로컬 sessionData에서 테스트 세션 즉시 제거 (onSnapshot 지연 방지)
                    setSessionData(prev => prev.filter(p => p.date !== testDate));
                    setMeetingTimes(restoredSettings);
                    setTestModeBackup(null);
                    setTestMode(false);
                    const restoreMsg = originalSettings
                        ? '테스트 데이터가 모두 삭제되고 복원되었습니다.'
                        : '테스트 데이터가 삭제되었습니다.\n원본 설정을 찾지 못해 08:00~10:00 기본값으로 복원됩니다.\n선정 탭에서 시간을 확인해 주세요.';
                    showAlert('테스트 모드 종료', restoreMsg);
                } catch(e) {
                    console.error(e);
                    showAlert('오류', '데이터 복원 실패: ' + e.message);
                }
            });
        }
    };

    const handleCheckIn = async (participant) => {
        // 날짜 불일치 방어: participant의 세션 날짜가 현재 모임 날짜와 다르면 차단
        if (participant.date !== meetingTimes.date) {
            return showAlert('오류', `날짜 불일치 (${participant.date} ≠ ${meetingTimes.date})\n새로고침 후 다시 시도해주세요.`);
        }
        const limit = testMode ? activeParticipants.length : (meetingTimes.maxLimit || 18);
        const rank = activeParticipants.findIndex(p => p.id === participant.id) + 1;
        if (!testMode && rank > limit) return showAlert('대기자 안내',`선착순(${limit}명) 마감되었습니다.`);
        const now = new Date();
        const [sy,sm,sd] = participant.date.split('-');
        const [shr,smin] = (meetingTimes.start||'08:00').split(':');
        const [ehr,emin] = (meetingTimes.end||'10:00').split(':');
        const meetingStart = new Date(sy,sm-1,sd,parseInt(shr),parseInt(smin),0);
        const meetingEnd   = new Date(sy,sm-1,sd,parseInt(ehr),parseInt(emin),0);
        // 체크인 허용: 시작 70분 전(06:50) ~ 종료(10:00)
        const allowFrom = new Date(meetingStart.getTime() - 70*60*1000);
        if (!testMode && now < allowFrom) {
            const allowFromStr = allowFrom.toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'});
            return showAlert('출석 불가',`출석 가능 시간: ${participant.date} ${allowFromStr}~${meetingTimes.end}`);
        }
        if (!testMode && now > meetingEnd) {
            return showAlert('출석 불가','모임이 종료되었습니다.\n자동 노쇼 처리되었습니다.');
        }
        // 정상: start-70분~start-9분(07:51) / 지각: 07:51:01~종료 (+1분 여유)
        const normalThreshold = new Date(meetingStart.getTime() - 9*60*1000);
        const finalStatus = now <= normalThreshold ? '정상' : '지각';
        const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
        try {
            await getSessionCol().doc(participant.id).update({ checkedIn:true, checkInTime:timeStr, status:finalStatus });
            setModal({type:'checkin', data:{...participant, checkedIn:true, checkInTime:timeStr, status:finalStatus}});
        } catch(e) { showAlert('오류','출석 실패'); }
    };

    const saveAndResetCurrent = async () => {
        const current = sessionData.filter(p => p.date === meetingTimes.date);
        if (current.length === 0) return showAlert('확인','현재 출석부에 인원이 없습니다.');
        showConfirm('기록 확정','기록을 저장하고 다음 주로 날짜를 넘기시겠습니까?', async () => {
            setIsPending(true);
            try {
                const limit = meetingTimes.maxLimit || 18;
                const sorted = [...current].sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||'')||a.name.localeCompare(b.name));
                const records = sorted.map((p,idx) => {
                    const isWaiting = idx+1 > limit;
                    let finalStatus = isWaiting ? '대기' : p.checkedIn ? (p.status||'정상') : '노쇼';
                    return {
                        name: p.isGuest ? `${p.name} - 초대:${p.inviterName}` : p.name,
                        gender:p.gender, status:finalStatus,
                        checkInTime: p.checkedIn ? (p.checkInTime||'-') : '미출석',
                        type: isWaiting ? '대기자' : (p.isGuest ? '게스트' : '정규'),
                        level:p.level||'-', team:p.team||'-',
                        timestamp: p.checkedIn ? p.checkInTime : '99:99:99'
                    };
                });
                const presentCount = records.filter(r=>r.status==='정상'||r.status==='지각').length;
                await getHistoryCol().add({
                    date:meetingTimes.date, meetingTime:`${meetingTimes.start} ~ ${meetingTimes.end}`,
                    location:meetingTimes.location||'장소 미지정',
                    locationLat: meetingTimes.locationLat || null,
                    locationLng: meetingTimes.locationLng || null,
                    managerName:meetingTimes.managerName||'미지정',
                    total:records.length, present:presentCount, records, createdAt:new Date().toISOString()
                });
                const batch = db.batch();
                current.forEach(p => batch.delete(getSessionCol().doc(p.id)));
                const nextSun = getNextSundayFromDate(meetingTimes.date);
                const nextSettings = {...meetingTimes, date:nextSun, managerId:'', managerName:''};
                batch.set(getSettingsCol().doc('meeting_schedule_v2'), nextSettings);
                await batch.commit();
                setMeetingTimes(nextSettings);
                showAlert('기록 완료',`저장되었습니다.\n다음 모임: ${nextSun}`);
            } catch(e) { showAlert('오류','저장 실패'); } finally { setIsPending(false); }
        });
    };

        showConfirm('가입 거절', `${pending.name}님의 가입 신청을 거절하시겠습니까?`, async () => {
            try {
                await getPendingCol().doc(pending.id).update({ status: 'rejected' });
                showAlert('처리 완료', '거절 처리되었습니다.');
            } catch(e) { showAlert('오류', '거절 처리 실패'); }
        });
    };

    useEffect(() => {
        const hideLoader=()=>{const l=document.getElementById('loading-screen');if(l){l.style.opacity='0';setTimeout(()=>{if(l)l.style.display='none';},500);}};
        const t=setTimeout(hideLoader,5000);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(()=>{});
        const unsubAuth = auth.onAuthStateChanged(u => {
            clearTimeout(t);
            hideLoader();
            if (u) {
                getMemberCol().onSnapshot(snap => setMembers(snap.docs.map(d=>({id:d.id,...d.data()}))));
                getSessionCol().onSnapshot(snap => setSessionData(snap.docs.map(d=>({id:d.id,...d.data()}))));
                getHistoryCol().onSnapshot(snap => setHistory(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date))));
                getSettingsCol().doc('meeting_schedule_v2').onSnapshot(async doc => {
                    if(doc.exists) {
                        const data = doc.data();
                        setMeetingTimes(prev=>({...prev,...data}));
                        setTestMode(!!data.testMode);
                        // testMode=false인데 test_backup이 남아있으면 자동 복원 (1회만)
                        if (!hasAutoFixedRef.current && !data.testMode) {
                            hasAutoFixedRef.current = true;
                            try {
                                const backupDoc = await getSettingsCol().doc('test_backup').get();
                                if (backupDoc.exists) {
                                    const orig = backupDoc.data().originalSettings;
                                    const corrected = {...orig, testMode: false};
                                    const fixBatch = db.batch();
                                    fixBatch.set(getSettingsCol().doc('meeting_schedule_v2'), corrected);
                                    fixBatch.delete(getSettingsCol().doc('test_backup'));
                                    await fixBatch.commit();
                                    setMeetingTimes(corrected);
                                    localStorage.removeItem('moida_testmode_backup');
                                }
                            } catch(e) { console.error('자동 복원 실패:', e); }
                        }
                    }
                });
                getTeamDraftsCol().orderBy('createdAt','desc').limit(1).onSnapshot(snap => { setTeamData(snap.empty?null:snap.docs[0].data()); });
                getPendingCol().where('status','==','pending').onSnapshot(snap => setPendingRegistrations(snap.docs.map(d=>({id:d.id,...d.data()}))));
            }
        });
        const timer = setInterval(() => setCurrentTime(new Date()), 10000);
        return () => { unsubAuth(); clearInterval(timer); };
    }, []);

    useEffect(() => {
        if (!meetingTimes.date) return;
        const [y,m] = meetingTimes.date.split('-');
        const docKey = `${y}-${m}`;
        const unsub = getMonthlyCol().doc(docKey).onSnapshot(doc => {
            let validMembers = [];
            const restMembers = [];
            if (doc.exists) {
                const data = doc.data();
                if (data.statuses) {
                    validMembers = Object.keys(data.statuses).filter(id=>data.statuses[id]==='paid');
                    Object.entries(data.statuses).forEach(([id, status]) => {
                        if (status === 'rest') restMembers.push(id);
                    });
                }
                else if (data.memberIds) validMembers = data.memberIds;
            }
            activeMembers.forEach(member => {
                const info = getMembershipStatus(member, docKey);
                if (STAFF_ROLES.includes(member.role)) { if(!validMembers.includes(member.id)) validMembers.push(member.id); }
                else if (info?.active) { if(!validMembers.includes(member.id)) validMembers.push(member.id); }
            });
            setSetupTabMonthlyMembers(validMembers);
            setSetupTabRestMembers(restMembers);
        });
        return () => unsub();
    }, [meetingTimes.date, members]);

    useEffect(() => {
        setModal({type:null,data:null});
        setIsGuestModalOpen(false);
        setLockModalMode(null);
        setSelectedHistoryDetail(null);
        setIsEditingLocation(false);
        setIsEditingManager(false);
        setHistoryEditTarget(null);
        setAlertModal(prev=>({...prev,show:false}));
        setIsPasswordChangeModalOpen(false);
        setIsQRModalOpen(false);
    }, [view]);

    const isMeetingOver = useMemo(() => {
        if (!meetingTimes.date || !meetingTimes.end) return false;
        const [y,m,d] = meetingTimes.date.split('-');
        const [hr,min] = meetingTimes.end.split(':');
        return currentTime >= new Date(y,m-1,d,hr,min,0);
    }, [meetingTimes, currentTime]);

    // 모임 종료 시 미출석 인원 자동 노쇼 처리
    // Firestore 직접 조회 → stale React state로 인한 경쟁 조건 방지
    useEffect(() => {
        if (!isMeetingOver || hasAutoNoShowRef.current) return;
        if (!meetingTimes.date) return;
        // 오늘 날짜 세션에서만 자동 노쇼 — 과거/미래 날짜 설정 시 오작동 방지
        const _d = new Date();
        const todayStr = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
        if (meetingTimes.date !== todayStr) return;
        hasAutoNoShowRef.current = true;
        const lim = meetingTimes.maxLimit || 18;
        const date = meetingTimes.date;
        (async () => {
            try {
                const snap = await getSessionCol().where('date', '==', date).get();
                const sorted = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || '') || a.name.localeCompare(b.name));
                const toNoShow = sorted.slice(0, lim).filter(p => !p.checkedIn && p.status !== '노쇼');
                if (toNoShow.length === 0) return;
                const batch = db.batch();
                toNoShow.forEach(p => batch.update(getSessionCol().doc(p.id), { status: '노쇼' }));
                await batch.commit();
            } catch(e) { console.error('자동 노쇼 처리 실패:', e); }
        })();
    }, [isMeetingOver]);

    // 날짜 또는 종료 시간 변경 시 자동 노쇼 플래그 초기화
    useEffect(() => {
        hasAutoNoShowRef.current = false;
    }, [meetingTimes.date, meetingTimes.end]);

    const limit = testMode ? activeParticipants.length : (meetingTimes.maxLimit || 18);
    const activeList = activeParticipants.slice(0, limit);
    const waitingList = activeParticipants.slice(limit);
    const checkedInCount = activeList.filter(p=>p.checkedIn).length;
    const assignedIds = new Set(groupedTeams.flatMap(g => g.members.map(m => m.id)));
    const unassignedActive = activeList.filter(p => !assignedIds.has(p.id));

    // ===================== RENDER =====================

    return (
        <div className="min-h-screen pb-40 text-slate-900">
            {!isAppLocked && (
                <nav className="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 h-16 flex items-center px-4 shadow-sm">
                    <div className="max-w-5xl mx-auto w-full flex justify-between items-center">
                        <div className="flex items-center gap-1">
                            {['attendance','setup','history_list'].map(v => (
                                <button key={v} onClick={()=>setView(v)} className={`px-3 py-2 rounded-xl font-black text-xs transition-all ${view===v?'bg-teal-500 text-white shadow-lg':'text-slate-400 hover:text-slate-600'}`}>
                                    {v==='attendance'?'출석':v==='setup'?'선정':'기록'}
                                </button>
                            ))}
                        </div>
                        <div className="flex items-center gap-2">
                            {pendingRegistrations.length > 0 && (
                                <button onClick={()=>setIsPendingModalOpen(true)} className="relative p-2.5 rounded-xl bg-rose-50 text-rose-500">
                                    <Icon.Bell size={18} />
                                    <span className="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 text-white text-[9px] font-black rounded-full flex items-center justify-center">{pendingRegistrations.length}</span>
                                </button>
                            )}
                            <button onClick={generateQRCode} className="p-2.5 rounded-xl bg-violet-50 text-violet-600 hover:bg-violet-100" title="QR 출석 생성">
                                <Icon.QrCode size={18} />
                            </button>
                            <button onClick={()=>setIsNotifModalOpen(true)} className="p-2.5 rounded-xl bg-teal-50 text-teal-600 hover:bg-teal-100" title="푸시 알림 발송">
                                <Icon.Bell size={18} />
                            </button>
                            <button onClick={handleLogout} className="p-2.5 rounded-xl bg-red-50 text-red-500"><Icon.LogOut size={18} /></button>
                            <button onClick={toggleTheme} className="p-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200" title="테마">{darkMode ? <Icon.Sun size={18}/> : <Icon.Moon size={18}/>}</button>
                            <button onClick={()=>window.location.href='index.html'} className="p-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200"><Icon.Home size={18}/></button>
                            {/* ⋮ 더보기 */}
                            <div className="relative">
                                <button onClick={()=>setIsMoreMenuOpen(v=>!v)} className={`p-2.5 rounded-xl transition-all ${isMoreMenuOpen?'bg-slate-200 text-slate-700':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`} title="더보기">
                                    <Icon.DotsVertical size={18}/>
                                </button>
                                {isMoreMenuOpen && (
                                    <>
                                        <div className="fixed inset-0" style={{zIndex:199}} onClick={()=>setIsMoreMenuOpen(false)}/>
                                        <div className="absolute right-0 mt-2 w-44 bg-white rounded-2xl shadow-xl overflow-hidden" style={{zIndex:200,border:'1px solid #e2e8f0',top:'100%'}}>
                                            <button onClick={()=>{window.location.reload();}} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 active:bg-slate-100">
                                                <Icon.Refresh size={16}/> 새로고침
                                            </button>
                                            {loggedInManager?.memberId && (
                                                <button onClick={()=>{localStorage.setItem('moida_admin_mode','true');window.location.href='member.html';}} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 active:bg-slate-100">
                                                    <Icon.User size={16}/> 회원 모드로
                                                </button>
                                            )}
                                            <button onClick={()=>{toggleTestMode();setIsMoreMenuOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm ${testMode?'bg-amber-50 text-amber-600 font-bold':'text-slate-700 hover:bg-slate-50 active:bg-slate-100'}`}>
                                                <Icon.Beaker size={16}/> 테스트 모드 {testMode?'ON':'OFF'}
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </nav>
            )}

            <main className={`p-4 max-w-6xl mx-auto animate-zoom-in ${isAppLocked?'pt-16':''}`}>

                {/* ===== 출석 탭 ===== */}
                {view === 'attendance' && !isAppLocked && (
                    <div>
                        <CurrentTimeClock />

                        {testMode && (
                            <div className="flex gap-2 justify-center mb-4 animate-zoom-in">
                                <button onClick={async ()=>{
                                    const d = new Date();
                                    // 시작을 now - 2분으로 → normalThreshold(start-9분) = now-11분 이므로 지각 조건
                                    const startTime = new Date(d.getTime() - 2*60*1000);
                                    const endTime = new Date(startTime.getTime() + 3*60*1000);
                                    const h = String(startTime.getHours()).padStart(2,'0');
                                    const m = String(startTime.getMinutes()).padStart(2,'0');
                                    const endH = String(endTime.getHours()).padStart(2,'0');
                                    const endM = String(endTime.getMinutes()).padStart(2,'0');
                                    const updated = {...meetingTimes, start: `${h}:${m}`, end: `${endH}:${endM}`};
                                    setMeetingTimes(updated);
                                    await getSettingsCol().doc('meeting_schedule_v2').update(updated);
                                    showAlert('지각 시간으로 전환', `시작: ${h}:${m}\n지금 출석하면 "지각" ⚠️`);
                                }}
                                    className="px-4 py-2 rounded-xl font-black text-sm bg-yellow-500 text-white shadow-lg shadow-yellow-500/40">
                                    ⏱️ 지각 시간 전환
                                </button>
                                <button onClick={async ()=>{
                                    const noShowList = activeParticipants.filter(p => !p.checkedIn && p.status !== '노쇼');
                                    if (noShowList.length === 0) { showAlert('알림', '미출석 인원이 없습니다.'); return; }
                                    try {
                                        const batch = db.batch();
                                        noShowList.forEach(p => batch.update(getSessionCol().doc(p.id), { status: '노쇼' }));
                                        await batch.commit();
                                        // onSnapshot 지연 방지: React state 즉시 반영
                                        setSessionData(prev => prev.map(p =>
                                            noShowList.some(ns => ns.id === p.id) ? {...p, status: '노쇼'} : p
                                        ));
                                        showAlert('노쇼 처리', `미출석 ${noShowList.length}명이 노쇼로 처리됨 ✗`);
                                    } catch(e) { showAlert('오류', '노쇼 처리 실패'); }
                                }}
                                    className="px-4 py-2 rounded-xl font-black text-sm bg-red-500 text-white shadow-lg shadow-red-500/40">
                                    ❌ 노쇼 시간 전환
                                </button>
                            </div>
                        )}


                        {/* 모임 정보 카드 */}
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-5 mb-4">
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <p className="text-xs font-black text-teal-500 uppercase tracking-widest">Next Meeting</p>
                                    <p className="text-xl font-black text-slate-800 mt-0.5">{meetingTimes.date}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs text-slate-400">{meetingTimes.start} ~ {meetingTimes.end}</p>
                                    {meetingTimes.location && <p className="text-xs font-black text-slate-600 mt-0.5">📍 {meetingTimes.location}</p>}
                                    {meetingTimes.managerName && <p className="text-xs text-slate-400 mt-0.5 flex items-center gap-1"><Icon.User size={11}/>{meetingTimes.managerName}</p>}
                                </div>
                            </div>
                            <div className="flex gap-2 text-center">
                                <div className="flex-1 bg-teal-50 rounded-2xl p-3">
                                    <p className="text-2xl font-black text-teal-500">{activeList.length}</p>
                                    <p className="text-[10px] text-teal-400 mt-0.5">선정</p>
                                </div>
                                <div className="flex-1 bg-emerald-50 rounded-2xl p-3">
                                    <p className="text-2xl font-black text-emerald-500">{checkedInCount}</p>
                                    <p className="text-[10px] text-emerald-400 mt-0.5">출석</p>
                                </div>
                                <div className="flex-1 bg-slate-50 rounded-2xl p-3">
                                    <p className="text-2xl font-black text-slate-500">{waitingList.length}</p>
                                    <p className="text-[10px] text-slate-400 mt-0.5">대기</p>
                                </div>
                            </div>
                            {/* 출석률 진행 바 */}
                            {activeList.length > 0 && (
                                <div className="mt-3 pt-3 border-t border-slate-100">
                                    <div className="flex items-center justify-between mb-1.5">
                                        <span className="text-[10px] font-black text-slate-400">출석률</span>
                                        <span className="text-[10px] font-black text-emerald-500">{checkedInCount}/{activeList.length} · {Math.round(checkedInCount/activeList.length*100)}%</span>
                                    </div>
                                    <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full rounded-full transition-all duration-700"
                                            style={{width:`${Math.round(checkedInCount/activeList.length*100)}%`,background:checkedInCount===0?'#e2e8f0':'linear-gradient(90deg,#14b8a6,#10b981)'}}/>
                                    </div>
                                </div>
                            )}
                            {/* 출석 상태 통계 */}
                            {activeList.some(p => p.checkedIn) && (
                                <div className="flex gap-2 text-center mt-3 pt-3 border-t border-slate-100">
                                    <div className="flex-1 bg-emerald-50 rounded-xl p-2">
                                        <p className="text-xl font-black text-emerald-600">{activeList.filter(p=>p.checkedIn && p.status==='정상').length}</p>
                                        <p className="text-[9px] text-emerald-500 mt-0.5">정상</p>
                                    </div>
                                    <div className="flex-1 bg-yellow-50 rounded-xl p-2">
                                        <p className="text-xl font-black text-yellow-600">{activeList.filter(p=>p.checkedIn && p.status==='지각').length}</p>
                                        <p className="text-[9px] text-yellow-500 mt-0.5">지각</p>
                                    </div>
                                    <div className="flex-1 bg-red-50 rounded-xl p-2">
                                        <p className="text-xl font-black text-red-600">{activeList.filter(p=>!p.checkedIn).length}</p>
                                        <p className="text-[9px] text-red-500 mt-0.5">노쇼</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 팀별 출석 현황 */}
                        {groupedTeams.length > 0 ? (
                            <div>
                                {groupedTeams.map((group) => (
                                    <div key={group.teamName} className="mb-5">
                                        {/* 팀 헤더 */}
                                        <div className={`flex items-center justify-between rounded-2xl p-3 mb-2 border ${getTeamColorClass(group.teamIdx)}`}>
                                            <div className="flex items-center gap-2">
                                                <span className={`w-8 h-8 rounded-xl text-sm font-black flex items-center justify-center ${getTeamBadgeColor(group.teamIdx)}`}>{group.teamName}</span>
                                                <div>
                                                    <p className="font-black text-slate-700 text-sm">{group.teamName}팀</p>
                                                    <p className="text-[10px] text-slate-400">출석 {group.members.filter(m=>m.checkedIn).length} / {group.members.length}명</p>
                                                </div>
                                            </div>
                                            <span className="text-[10px] font-black text-slate-400">{getTeamColorName(group.teamIdx)} 조끼</span>
                                        </div>
                                        {/* 회원 카드 그리드 — 팀 인원수만큼 한 줄 정사각형 */}
                                        <div className="grid gap-1.5" style={{gridTemplateColumns:`repeat(${group.members.length},1fr)`}}>
                                            {group.members.map(p=>(
                                                <button key={p.id} onClick={()=>setModal({type:'checkin',data:{...p,teamIdx:group.teamIdx,teamName:group.teamName}})}
                                                    className={`relative overflow-hidden rounded-xl aspect-square flex items-center justify-center transition-all ${getTeamBadgeColor(group.teamIdx)} ${p.status==='노쇼'?'opacity-50':''}`}>
                                                    {/* 출석 완료: 상단 흰 스트라이프 */}
                                                    {p.checkedIn&&<div style={{position:'absolute',top:0,left:0,right:0,height:'4px',background:'rgba(255,255,255,0.55)'}}/>}
                                                    {/* 조끼 번호 + W/G 뱃지 (좌상단) */}
                                                    <div style={{position:'absolute',top:'4px',left:'6px',display:'flex',alignItems:'center',gap:'3px',pointerEvents:'none',userSelect:'none'}}>
                                                        <span style={{fontSize:'1.6em',fontWeight:'900',opacity:0.55,lineHeight:1}}>{p.jerseyNumber}</span>
                                                        {p.gender==='여성'&&<span style={{fontSize:'8px',fontWeight:'900',padding:'1px 3px',borderRadius:3,background:'#ec4899',color:'white',lineHeight:1}}>W</span>}
                                                        {p.isGuest&&<span style={{fontSize:'8px',fontWeight:'900',padding:'1px 3px',borderRadius:3,background:'rgba(0,0,0,0.3)',color:'white',lineHeight:1}}>G</span>}
                                                    </div>
                                                    {/* 이름 (정중앙) */}
                                                    <p className="relative font-black text-[17px] text-center" style={{lineHeight:'1.2',wordBreak:'keep-all',maxWidth:'90%'}}>{p.name}</p>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}

                                {/* 미편성 / 게스트 */}
                                {unassignedActive.length > 0 && (
                                    <div className="mb-4">
                                        <p className="text-xs font-black text-slate-400 uppercase tracking-widest px-1 mb-2">미편성 / 게스트</p>
                                        <div className="space-y-1.5">
                                            {unassignedActive.map(p => (
                                                <button key={p.id} onClick={()=>setModal({type:'checkin',data:p})}
                                                    className={`w-full flex items-center gap-3 p-3.5 rounded-2xl border transition-all text-left ${p.status==='노쇼'?'bg-red-50 border-red-200':p.checkedIn?'bg-emerald-50 border-emerald-200':'bg-white border-slate-100 hover:border-teal-200'}`}>
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center gap-1.5">
                                                            <span className="font-black text-sm text-slate-800">{p.name}</span>
                                                            {p.gender==='여성'&&<span className="text-[9px] font-black px-1.5 py-0.5 bg-pink-100 text-pink-600 rounded-lg">W</span>}
                                                            {p.isGuest&&<span className="text-[9px] font-black px-1.5 py-0.5 bg-slate-800 text-white rounded-lg">G</span>}
                                                        </div>
                                                        {p.status === '노쇼' ? (
                                                            <p className="text-[10px] text-red-600 font-black mt-0.5">✗ 노쇼</p>
                                                        ) : p.checkedIn ? (
                                                            p.status === '정상' ? (
                                                                <p className="text-[10px] text-emerald-600 font-black mt-0.5">✓ 정상 · {p.checkInTime}</p>
                                                            ) : (
                                                                <p className="text-[10px] text-yellow-600 font-black mt-0.5">⚠️ 지각 · {p.checkInTime}</p>
                                                            )
                                                        ) : null}
                                                    </div>
                                                    {p.status === '노쇼'
                                                        ? <span className="w-6 h-6 bg-red-500 rounded-full flex items-center justify-center flex-shrink-0 text-white text-xs font-black">✗</span>
                                                        : p.checkedIn
                                                            ? <span className="w-6 h-6 bg-emerald-500 rounded-full flex items-center justify-center flex-shrink-0"><Icon.Check size={12} className="text-white"/></span>
                                                            : <span className="text-xs font-black text-slate-300 flex-shrink-0">체크인 →</span>
                                                    }
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : activeList.length > 0 ? (
                            <div className="space-y-2">

                                            {record.type==='게스트'&&<span className="ml-1.5 text-[9px] px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded-lg font-black">G</span>}
                                            {record.type==='대기자'&&<span className="ml-1.5 text-[9px] px-1.5 py-0.5 bg-amber-100 text-amber-600 rounded-lg font-black">대기</span>}
                                            {record.checkInTime&&record.checkInTime!=='미출석'&&<p className="text-[10px] text-slate-400 mt-0.5">{record.checkInTime}</p>}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className={`text-xs font-black ${statusColor}`}>{record.status}</span>
                                        <button onClick={()=>setHistoryEditTarget({docId:selectedHistoryDetail.id,recordIndex:record.originalIndex})} className="p-1 text-slate-300 hover:text-slate-500"><Icon.Edit2 size={12} /></button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
            </main>

            {/* ===== 모달들 ===== */}

            {/* 출석 체크 모달 */}
            {modal.type==='checkin' && modal.data && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in" onClick={()=>setModal({type:null,data:null})}>
                    <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-zoom-in" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-2xl font-black text-slate-800 text-center mb-2">{modal.data.name}</h2>
                        <p className="text-xs text-center text-slate-400 mb-6">{modal.data.gender}</p>
                        {modal.data.checkedIn
                            ? <div>
                                <div className="text-center mb-4">
                                    <p className="text-emerald-500 font-black text-xl">✓ 출석 완료</p>
                                    <p className="text-slate-400 text-sm mt-1">{modal.data.checkInTime} · <span className={`font-black ${modal.data.status==='지각'?'text-orange-400':'text-emerald-500'}`}>{modal.data.status}</span></p>
                                </div>
                                {modal.data.teamIdx !== undefined && modal.data.jerseyNumber && (
                                    <div className={`rounded-2xl p-4 flex items-center gap-4 mb-4 ${getTeamBadgeColor(modal.data.teamIdx)}`}>
                                        <span className="text-4xl font-black leading-none" style={{minWidth:'2.5rem',textAlign:'center'}}>{modal.data.jerseyNumber}</span>
                                        <div>
                                            <p className="font-black text-base leading-tight">{modal.data.teamName}팀 {modal.data.jerseyNumber}번</p>
                                            <p className="text-sm opacity-80 mt-0.5">{getTeamColorName(modal.data.teamIdx)} 조끼</p>
                                        </div>
                                    </div>
                                )}
                                <button onClick={()=>handleUncheckIn(modal.data)} className="w-full py-3 bg-red-50 text-red-500 border border-red-200 rounded-2xl font-black text-sm">출석 취소</button>
                              </div>
                            : <button onClick={()=>handleCheckIn(modal.data)} className="w-full py-4 bg-teal-500 text-white rounded-2xl font-black text-lg shadow-lg">출석 체크</button>
                        }
                        <button onClick={()=>setModal({type:null,data:null})} className="w-full py-3 text-slate-400 text-sm mt-3">닫기</button>
                    </div>
                </div>
            )}

            {/* 게스트 추가 모달 */}
            {isGuestModalOpen && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={()=>setIsGuestModalOpen(false)}>
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-4">게스트 추가</h2>
                        <div className="space-y-3">
                            <input type="text" placeholder="이름" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black"
                                value={newGuest.name} onChange={e=>setNewGuest(p=>({...p,name:e.target.value}))} />
                            <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black pr-8"
                                value={newGuest.gender} onChange={e=>setNewGuest(p=>({...p,gender:e.target.value}))}>
                                <option value="남성">남성</option><option value="여성">여성</option>
                            </select>
                            <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black pr-8"
                                value={newGuest.inviterId} onChange={e=>setNewGuest(p=>({...p,inviterId:e.target.value}))}>
                                <option value="">초대자 없음</option>
                                {activeMembers.sort((a,b)=>a.name.localeCompare(b.name)).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                            <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black pr-8"
                                value={newGuest.level} onChange={e=>setNewGuest(p=>({...p,level:e.target.value}))}>
                                {[1,2,3,4,5,6].map(l=><option key={l} value={String(l)}>Lv.{l}</option>)}
                            </select>
                        </div>
                        <div className="flex gap-2 mt-4">
                            <button onClick={()=>setIsGuestModalOpen(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>
                            <button onClick={handleAddGuest} className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">추가</button>
                        </div>
                    </div>
                </div>
            )}

            {/* 기록 상태 편집 모달 */}
            {historyEditTarget && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end justify-center z-50" onClick={()=>setHistoryEditTarget(null)}>
                    <div className="bg-white rounded-t-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <p className="font-black text-slate-800 mb-4 text-center">출석 상태 변경</p>
                        <div className="grid grid-cols-2 gap-2">
                            {['정상','지각','노쇼','대기'].map(status => (
                                <button key={status} onClick={()=>handleHistoryStatusUpdate(status)}
                                    className="py-3 rounded-2xl font-black text-sm border border-slate-200 hover:bg-teal-50 hover:border-teal-300 transition-all">
                                    {status}
                                </button>
                            ))}
                        </div>
                        <button onClick={()=>setHistoryEditTarget(null)} className="w-full py-3 text-slate-400 text-sm mt-3">취소</button>
                    </div>
                </div>
            )}

            {/* QR 코드 모달 */}
            {isQRModalOpen && (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={()=>setIsQRModalOpen(false)}>
                    <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-1">QR 출석 코드</h2>
                        <p className="text-xs text-slate-400 mb-2">{meetingTimes.date} · {meetingTimes.start}~{meetingTimes.end}</p>
                        <p className="text-[10px] text-teal-500 font-black mb-5">모임 시간 내에만 유효합니다</p>
                        <div id="qr-canvas-area" className="flex justify-center mb-5"></div>
                        <p className="text-xs text-slate-400 mb-4">회원에게 이 화면을 보여주세요.<br/>카메라로 스캔하면 출석됩니다.</p>
                        <button onClick={()=>setIsQRModalOpen(false)} className="w-full py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">닫기</button>
                    </div>
                </div>
            )}

            {/* 푸시 알림 발송 모달 */}
            {isNotifModalOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={()=>setIsNotifModalOpen(false)}>
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col" style={{maxHeight:'85vh'}} onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-1">공지 발송</h2>
                        <p className="text-xs text-slate-400 mb-5">알림을 허용한 모든 회원에게 전송됩니다</p>
                        <div className="space-y-3 mb-5">
                            <div>
                                <p className="text-xs font-black text-slate-500 mb-1 ml-1">제목</p>
                                <input
                                    type="text"
                                    value={notifTitle}
                                    onChange={e=>setNotifTitle(e.target.value)}
                                    placeholder="예: 팀 편성 완료!"
                                    maxLength={50}
                                    style={{userSelect:'text'}}
                                    className="w-full px-4 py-3 rounded-2xl border border-slate-200 text-sm font-medium text-slate-800 focus:border-teal-400 outline-none"
                                />
                            </div>
                            <div>
                                <p className="text-xs font-black text-slate-500 mb-1 ml-1">내용</p>
                                <textarea
                                    value={notifBody}
                                    onChange={e=>setNotifBody(e.target.value)}
                                    placeholder="예: 이번 주 팀 편성이 완료됐어요. 회원 앱에서 확인하세요!"
                                    maxLength={200}
                                    rows={3}
                                    style={{userSelect:'text', resize:'none'}}
                                    className="w-full px-4 py-3 rounded-2xl border border-slate-200 text-sm font-medium text-slate-800 focus:border-teal-400 outline-none"
                                />
                            </div>
                        </div>
                        <div className="flex gap-2 mb-5">
                            <button onClick={()=>setIsNotifModalOpen(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>
                            <button onClick={sendPushNotification} disabled={notifSending || !notifTitle.trim() || !notifBody.trim()}
                                className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm disabled:opacity-50">
                                {notifSending ? '발송 중...' : '발송'}
                            </button>
                        </div>
                        {notifHistory.length > 0 && (
                            <div className="border-t border-slate-100 pt-4 overflow-y-auto flex-1">
                                <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">발송 기록</p>
                                <div className="space-y-3">
                                    {notifHistory.map(n => (
                                        <div key={n.id} className="pb-3 border-b border-slate-50 last:pb-0 last:border-0">
                                            <div className="flex items-center justify-between gap-2 mb-0.5">
                                                <span className="font-black text-sm text-slate-700 flex-1 truncate">{n.title}</span>
                                                <span className="text-[10px] text-slate-400 flex-shrink-0">
                                                    {n.sentAt ? new Date(n.sentAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'}) : ''}
                                                </span>
                                            </div>
                                            <p className="text-xs text-slate-500 leading-relaxed">{n.body}</p>
                                            {n.sentBy && <p className="text-[10px] text-slate-400 mt-1">{n.sentBy}</p>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            )}

            {/* 가입 신청 모달 */}
            {isPendingModalOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={()=>setIsPendingModalOpen(false)}>
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-4">가입 신청 ({pendingRegistrations.length})</h2>
                        {pendingRegistrations.length === 0
                            ? <p className="text-center text-slate-400 py-6">신청 내역이 없습니다</p>
                            : pendingRegistrations.map(p => (
                                <div key={p.id} className="bg-slate-50 rounded-2xl p-4 mb-3 border border-slate-100">
                                    <div className="flex items-start justify-between mb-2">
                                        <div>
                                            <p className="font-black text-slate-800">{p.name}</p>
                                            <p className="text-xs text-slate-500 mt-0.5">{p.birth} · {p.gender}</p>
                                            <p className="text-xs text-slate-400">{p.phone}</p>
                                            <p className="text-xs text-slate-400">{p.area}</p>
                                        </div>
                                        <p className="text-[10px] text-slate-400">{p.createdAt?.slice(0,10)}</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>handleRejectPending(p)} className="flex-1 py-2 bg-slate-200 text-slate-600 rounded-xl font-black text-xs">거절</button>
                                        <button onClick={()=>handleApprovePending(p)} className="flex-1 py-2 bg-teal-500 text-white rounded-xl font-black text-xs">승인</button>
                                    </div>
                                </div>
                            ))
                        }
                        <button onClick={()=>setIsPendingModalOpen(false)} className="w-full py-3 text-slate-400 text-sm mt-2">닫기</button>
                    </div>
                </div>
            )}

            {/* 알림/확인 모달 */}
            {alertModal.show && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60] animate-fade-in">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">
                        <h3 className="font-black text-lg text-slate-800 mb-2">{alertModal.title}</h3>
                        <p className="text-sm text-slate-500 whitespace-pre-line mb-5">{alertModal.content}</p>
                        <div className="flex gap-2">
                            {alertModal.type==='confirm' && (
                                <button onClick={()=>setAlertModal(p=>({...p,show:false}))} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>
                            )}
                            <button onClick={()=>{ if(alertModal.onConfirm)alertModal.onConfirm(); setAlertModal(p=>({...p,show:false})); }}
                                className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">
                                {alertModal.type==='confirm'?'확인':'닫기'}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* 지도 장소 선택 모달 */}
            <LocationPickerModal
                isOpen={isLocationPickerOpen}
                onClose={() => setIsLocationPickerOpen(false)}
                initialLat={meetingTimes.locationLat}
                initialLng={meetingTimes.locationLng}
                initialName={meetingTimes.location}
                onConfirm={({ name, lat, lng }) => {
                    updateMeetingTimeSettings({ ...meetingTimes, location: name, locationLat: lat, locationLng: lng });
                    setIsLocationPickerOpen(false);
                }}
            />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
