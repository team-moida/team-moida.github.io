<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script>(function(){if(localStorage.getItem('moida_theme')==='dark')document.documentElement.classList.add('dark');})();</script>
    <link rel="stylesheet" href="common.css">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
    <script src="firebase-init.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

        .leaflet-container { font-family: 'Esamanru', sans-serif; }
        .leaflet-control-zoom a { font-family: sans-serif; }
    </style>

        @font-face { font-family:'Esamanru'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicLight.woff') format('woff'); font-weight:300; }
        body { font-family:'Esamanru',sans-serif!important; -webkit-tap-highlight-color:transparent; background:#f8fafc; user-select:none; overscroll-behavior-y:none; -webkit-font-smoothing:antialiased; touch-action:manipulation; }
        .custom-scrollbar::-webkit-scrollbar{width:5px} .custom-scrollbar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}

        /* ── 페이지별 다크모드 ── */

        html.dark .bg-lime-400,html.dark .bg-yellow-400{color:#1e293b!important}
        html.dark .bg-blue-50{background:#0c1a2e!important} html.dark .border-blue-100{border-color:#1e3a5f!important} html.dark .bg-blue-100{background:#1e3a5f!important}
        html.dark .bg-emerald-50{background:#022c22!important} html.dark .border-emerald-100{border-color:#064e3b!important} html.dark .bg-emerald-100{background:#064e3b!important}
        html.dark .bg-violet-50{background:#1e1b4b!important} html.dark .border-violet-100{border-color:#2e1065!important} html.dark .bg-violet-100{background:#2e1065!important}
        html.dark .bg-rose-50{background:#2d0a11!important} html.dark .border-rose-100{border-color:#4c0519!important} html.dark .bg-rose-100{background:#4c0519!important}
        html.dark .bg-amber-50{background:#1c1002!important} html.dark .border-amber-100{border-color:#451a03!important} html.dark .bg-amber-100{background:#451a03!important}
        html.dark .bg-red-50{background:#2d0a11!important} html.dark .border-red-100,html.dark .border-red-200{border-color:#4c0519!important}
        html.dark .text-teal-400{color:#5eead4!important}
        html.dark .text-emerald-500{color:#34d399!important} html.dark .text-emerald-600{color:#34d399!important}
        html.dark .text-violet-600{color:#a78bfa!important} html.dark .text-rose-500{color:#fb7185!important}
        html.dark .text-amber-500{color:#fbbf24!important} html.dark .text-amber-600{color:#fbbf24!important}
        html.dark .text-red-400{color:#f87171!important} html.dark .text-red-500{color:#f87171!important}
    </style>
    <script type="text/babel" src="location-picker.js"></script>
    <script type="text/babel" src="tab-attend-history.js"></script>
    <script type="text/babel" src="handlers-attend-qr.js"></script>
    <script type="text/babel" src="handlers-attend-member.js"></script>
    <script type="text/babel" src="tab-attend-setup.js"></script>
    <script type="text/babel" src="tab-attend-main.js"></script>
    <script type="text/babel" src="modals-attend.js"></script>
    <script type="text/babel" src="handlers-attend-session.js"></script>
</head>
<body>
<div id="loading-screen">
    <div class="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-bold text-slate-500 italic">모이다 연결 중...</p>
</div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

db.enablePersistence({ synchronizeTabs: true }).catch(err => console.warn('오프라인 동기화:', err.code));
const getTeamDraftsCol = () => db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('team_drafts');

function App() {
    const [view, setView] = useState(() => sessionStorage.getItem('moida_view') || 'attendance');
    const [members, setMembers] = useState([]);
    const [sessionData, setSessionData] = useState([]);
    const [history, setHistory] = useState([]);
    const [pendingRegistrations, setPendingRegistrations] = useState([]);
    const [selectedHistoryDetail, setSelectedHistoryDetail] = useState(null);
    const [historySortKey, setHistorySortKey] = useState('time');
    const [historySortOrder, setHistorySortOrder] = useState('asc');
    const [meetingTimes, setMeetingTimes] = useState({
        date: getThisSunday(), start:'08:00', end:'10:00', location:'', locationLat:null, locationLng:null, locationRadius:100, managerId:'', managerName:'', maxLimit:18, enableQR:false
    });
    const [localMaxLimit, setLocalMaxLimit] = useState(null);
    const [currentTime, setCurrentTime] = useState(new Date());
    const [isAppLocked, setIsAppLocked] = useState(false);
    const [lockPassword, setLockPassword] = useState('');
    const [lockModalMode, setLockModalMode] = useState(null);
    const [tempPassword, setTempPassword] = useState('');
    const [modal, setModal] = useState({ type:null, data:null });
    const [alertModal, setAlertModal] = useState({ show:false, title:'', content:'', type:'info', onConfirm:null });
    const [historyEditTarget, setHistoryEditTarget] = useState(null);
    const [isEditingLocation, setIsEditingLocation] = useState(false);
    const [editLocationValue, setEditLocationValue] = useState('');
    const [isEditingManager, setIsEditingManager] = useState(false);
    const [editManagerValue, setEditManagerValue] = useState('');
    const [isLocationPickerOpen, setIsLocationPickerOpen] = useState(false);
    const [teamData, setTeamData] = useState(null);
    const [localTeamData, setLocalTeamData] = useState(null);
    const [isPending, setIsPending] = useState(false);
    const [isGuestModalOpen, setIsGuestModalOpen] = useState(false);
    const [newGuest, setNewGuest] = useState({ name:'', gender:'남성', inviterId:'', level:'1' });
    const [loggedInManager, setLoggedInManager] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (s && s.kakaoId) return s;
            location.href = 'index.html';
            return null;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const [setupTabMonthlyMembers, setSetupTabMonthlyMembers] = useState([]);
    const [setupTabRestMembers, setSetupTabRestMembers] = useState([]);
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const [testMode, setTestMode] = useState(false);
    const [testModeBackup, setTestModeBackup] = useState(null);
    const [isPasswordChangeModalOpen, setIsPasswordChangeModalOpen] = useState(false);
    const [passwordForm, setPasswordForm] = useState({ current:'', next:'', confirm:'' });
    // QR 관련 상태
    const [isQRModalOpen, setIsQRModalOpen] = useState(false);
    const [currentQRToken, setCurrentQRToken] = useState('');
    const [isPendingModalOpen, setIsPendingModalOpen] = useState(false);
    const qrCanvasRef = useRef(null);
    const hasAutoNoShowRef = useRef(false);
    const hasAutoFixedRef = useRef(false);

    // ⋮ 더보기 메뉴
    const [isMoreMenuOpen, setIsMoreMenuOpen] = useState(false);

    // 푸시 알림 발송 모달
    const [isNotifModalOpen, setIsNotifModalOpen] = useState(false);
    const [notifTitle, setNotifTitle] = useState('');
    const [notifBody, setNotifBody] = useState('');
    const [notifSending, setNotifSending] = useState(false);
    const [notifHistory, setNotifHistory] = useState([]);
    const [editingNotifId, setEditingNotifId] = useState(null);
    const [editTitle, setEditTitle] = useState('');
    const [editBody, setEditBody] = useState('');
    const [fcmTokenCount, setFcmTokenCount] = useState(null);

    useEffect(() => {
        const unsub = getCol('notifications')
            .orderBy('sentAt', 'desc')
            .limit(20)
            .onSnapshot(snap => {
                const list = [];
                snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                setNotifHistory(list);
            }, () => {});
        const unsubTokens = getCol('fcm_tokens').onSnapshot(snap => setFcmTokenCount(snap.size), () => {});
        return () => { unsub(); unsubTokens(); };
    }, []);



    const activeMembers = useMemo(() => members.filter(m => !m.isResigned), [members]);
    const managers = useMemo(() => activeMembers.filter(m => STAFF_ROLES.includes(m.role)).sort((a,b)=>a.name.localeCompare(b.name)), [activeMembers]);

    useEffect(() => { sessionStorage.setItem('moida_view', view); }, [view]);

    const activeParticipants = useMemo(() => {
        return sessionData.filter(p => p.date === meetingTimes.date)
            .sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||'') || a.name.localeCompare(b.name));
    }, [sessionData, meetingTimes.date]);

    const activeTeamData = useMemo(() => {
        const serverTime = teamData ? new Date(teamData.createdAt).getTime() : 0;
        const localTime = localTeamData ? new Date(localTeamData.updatedAt).getTime() : 0;
        if (localTeamData && localTime > serverTime) return localTeamData;
        return teamData || null;
    }, [localTeamData, teamData]);

    const groupedTeams = useMemo(() => {
        if (!activeTeamData?.teams) return [];
        return activeTeamData.teams.map((t, teamIdx) => {
            const members = t.members.map((tm) => {
                const p = activeParticipants.find(p => p.memberId === (tm.memberId||tm.id));
                return p || null;
            }).filter(Boolean)
              .map((p, i) => ({ ...p, jerseyNumber: i + 1 }));
            return members.length > 0 ? { teamName: String.fromCharCode(65+teamIdx), teamIdx, members } : null;
        }).filter(Boolean);
    }, [activeParticipants, activeTeamData]);

    const sortedHistoryRecords = useMemo(() => {
        if (!selectedHistoryDetail?.records) return [];
        const list = selectedHistoryDetail.records.map((r,i) => ({...r, originalIndex:i}));
        if (historySortKey === 'time') return list.sort((a,b)=>(a.timestamp||'99:99').localeCompare(b.timestamp||'99:99'));
        if (historySortKey === 'status') {
            const order = {'정상':1,'지각':2,'노쇼':3,'미출석':4};
            return list.sort((a,b) => {
                let diff = (order[a.status]||9) - (order[b.status]||9);
                if (historySortOrder === 'desc') diff = -diff;
                return diff || (a.timestamp||'99:99').localeCompare(b.timestamp||'99:99');
            });
        }
        return list;
    }, [selectedHistoryDetail, historySortKey, historySortOrder]);

    const toggleTheme = () => { const isDark = !darkMode; setDarkMode(isDark); document.documentElement.classList.toggle('dark', isDark); localStorage.setItem('moida_theme', isDark ? 'dark' : 'light'); };
    const showAlert = (title, content, type='info', onConfirm=null) => setAlertModal({show:true,title,content,type,onConfirm});
    const showConfirm = (title, content, onConfirm) => setAlertModal({show:true,title,content,type:'confirm',onConfirm});

    // QR 핸들러
    const { generateQRCode } = makeQRHandlers({ meetingTimes, setCurrentQRToken, setIsQRModalOpen, showAlert });
    const { sendPushNotification, startEditNotif, cancelEditNotif, saveEditNotif, deleteNotif } = makeNotifHandlers({
        loggedInManager, notifTitle, notifBody, editingNotifId, editTitle, editBody,
        showAlert, showConfirm, setNotifSending, setIsNotifModalOpen,
        setNotifTitle, setNotifBody, setEditingNotifId, setEditTitle, setEditBody
    });

    // QR 코드 렌더링
    useEffect(() => {
        if (isQRModalOpen && currentQRToken) {
            setTimeout(() => {
                const container = document.getElementById('qr-canvas-area');
                if (!container) return;
                container.innerHTML = '';
                const qrUrl = `https://nakdo0415-crypto.github.io/moida/member.html?token=${currentQRToken}&date=${meetingTimes.date}`;
                new QRCode(container, { text:qrUrl, width:220, height:220, colorDark:'#0f172a', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
            }, 100);
        }
    }, [isQRModalOpen, currentQRToken]);

    const {
        updateMeetingTimeSettings, handleTestSelect,
        toggleParticipant, toggleParticipantAsGuest, handleLogout,
        toggleTestMode, handlePasswordChange, handleResetSelection,
        handleAddGuest, saveAndResetCurrent, handleDeleteHistory,
        handleHistoryStatusUpdate, handleUpdateLocation, handleUpdateManager
    } = makeAttendSessionHandlers({
        testMode, meetingTimes, members, activeMembers, sessionData,
        testModeBackup, newGuest, isPending, passwordForm, loggedInManager,
        selectedHistoryDetail, historyEditTarget, editLocationValue, editManagerValue,
        setMeetingTimes, setTestMode, setTestModeBackup, setSessionData,
        setIsLocationPickerOpen, setNewGuest, setIsPending, setIsGuestModalOpen,
        setIsPasswordChangeModalOpen, setPasswordForm, setLoggedInManager,
        setSelectedHistoryDetail, setHistoryEditTarget, setIsEditingLocation,
        setIsEditingManager,
        showAlert, showConfirm
    });

    const { normalMembers, guestEligibleMembers } = useMemo(() => {
        const monthStr = meetingTimes.date ? meetingTimes.date.substring(0, 7) : '';
        const normal = [];
        const guestEligible = [];
        activeMembers.filter(m => !m.isResigned).sort((a,b)=>a.name.localeCompare(b.name)).forEach(member => {
            if (STAFF_ROLES.includes(member.role)) { normal.push(member); return; }
            if (member.isSpecialRest) { guestEligible.push(member); return; }
            const isResting = setupTabRestMembers.includes(member.id);
            if (isResting) {
                const info = getMembershipStatus(member, monthStr);
                if (info?.active) guestEligible.push(member);
                return;
            }
            if (!setupTabMonthlyMembers.includes(member.id)) return;
            normal.push(member);
        });
        return { normalMembers: normal, guestEligibleMembers: guestEligible };
    }, [activeMembers, setupTabRestMembers, setupTabMonthlyMembers, meetingTimes.date]);

    const { handleCheckIn, handleUncheckIn } = makeCheckInHandlers({ testMode, activeParticipants, meetingTimes, showAlert, showConfirm, setModal });
    const { handleApprovePending, handleRejectPending } = makePendingHandlers({ loggedInManager, showConfirm, showAlert });

    useEffect(() => {
        const hideLoader=()=>{const l=document.getElementById('loading-screen');if(l){l.style.opacity='0';setTimeout(()=>{if(l)l.style.display='none';},500);}};
        const t=setTimeout(hideLoader,5000);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(()=>{});
        const unsubAuth = auth.onAuthStateChanged(u => {
            clearTimeout(t);
            hideLoader();
            if (u) {
                getMemberCol().onSnapshot(snap => setMembers(snap.docs.map(d=>({id:d.id,...d.data()}))));
                getSessionCol().onSnapshot(snap => setSessionData(snap.docs.map(d=>({id:d.id,...d.data()}))));
                getHistoryCol().onSnapshot(snap => setHistory(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date))));
                getSettingsCol().doc('meeting_schedule_v2').onSnapshot(async doc => {
                    if(doc.exists) {
                        const data = doc.data();
                        setMeetingTimes(prev=>({...prev,...data}));
                        setTestMode(!!data.testMode);
                        // testMode=false인데 test_backup이 남아있으면 자동 복원 (1회만)
                        if (!hasAutoFixedRef.current && !data.testMode) {
                            hasAutoFixedRef.current = true;
                            try {
                                const backupDoc = await getSettingsCol().doc('test_backup').get();
                                if (backupDoc.exists) {
                                    const orig = backupDoc.data().originalSettings;
                                    const corrected = {...orig, testMode: false};
                                    const fixBatch = db.batch();
                                    fixBatch.set(getSettingsCol().doc('meeting_schedule_v2'), corrected);
                                    fixBatch.delete(getSettingsCol().doc('test_backup'));
                                    await fixBatch.commit();
                                    setMeetingTimes(corrected);
                                    localStorage.removeItem('moida_testmode_backup');
                                }
                            } catch(e) { console.error('자동 복원 실패:', e); }
                        }
                    }
                });
                getTeamDraftsCol().orderBy('createdAt','desc').limit(1).onSnapshot(snap => { setTeamData(snap.empty?null:snap.docs[0].data()); });
                getPendingCol().where('status','==','pending').onSnapshot(snap => setPendingRegistrations(snap.docs.map(d=>({id:d.id,...d.data()}))));
            }
        });
        const timer = setInterval(() => setCurrentTime(new Date()), 10000);
        return () => { unsubAuth(); clearInterval(timer); };
    }, []);

    useEffect(() => {
        if (!meetingTimes.date) return;
        const [y,m] = meetingTimes.date.split('-');
        const docKey = `${y}-${m}`;
        const unsub = getMonthlyCol().doc(docKey).onSnapshot(doc => {
            let validMembers = [];
            const restMembers = [];
            if (doc.exists) {
                const data = doc.data();
                if (data.statuses) {
                    validMembers = Object.keys(data.statuses).filter(id=>data.statuses[id]==='paid');
                    Object.entries(data.statuses).forEach(([id, status]) => {
                        if (status === 'rest') restMembers.push(id);
                    });
                }
                else if (data.memberIds) validMembers = data.memberIds;
            }
            activeMembers.forEach(member => {
                const info = getMembershipStatus(member, docKey);
                if (STAFF_ROLES.includes(member.role)) { if(!validMembers.includes(member.id)) validMembers.push(member.id); }
                else if (info?.active) { if(!validMembers.includes(member.id)) validMembers.push(member.id); }
            });
            setSetupTabMonthlyMembers(validMembers);
            setSetupTabRestMembers(restMembers);
        });
        return () => unsub();
    }, [meetingTimes.date, members]);

    useEffect(() => {
        setModal({type:null,data:null});
        setIsGuestModalOpen(false);
        setLockModalMode(null);
        setSelectedHistoryDetail(null);
        setIsEditingLocation(false);
        setIsEditingManager(false);
        setHistoryEditTarget(null);
        setAlertModal(prev=>({...prev,show:false}));
        setIsPasswordChangeModalOpen(false);
        setIsQRModalOpen(false);
    }, [view]);

    const isMeetingOver = useMemo(() => {
        if (!meetingTimes.date || !meetingTimes.end) return false;
        const [y,m,d] = meetingTimes.date.split('-');
        const [hr,min] = meetingTimes.end.split(':');
        return currentTime >= new Date(y,m-1,d,hr,min,0);
    }, [meetingTimes, currentTime]);

    // 모임 종료 시 미출석 인원 자동 노쇼 처리
    // Firestore 직접 조회 → stale React state로 인한 경쟁 조건 방지
    useEffect(() => {
        if (!isMeetingOver || hasAutoNoShowRef.current) return;
        if (!meetingTimes.date) return;
        // 오늘 날짜 세션에서만 자동 노쇼 — 과거/미래 날짜 설정 시 오작동 방지
        const _d = new Date();
        const todayStr = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
        if (meetingTimes.date !== todayStr) return;
        hasAutoNoShowRef.current = true;
        const lim = meetingTimes.maxLimit || 18;
        const date = meetingTimes.date;
        (async () => {
            try {
                const snap = await getSessionCol().where('date', '==', date).get();
                const sorted = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || '') || a.name.localeCompare(b.name));
                const toNoShow = sorted.slice(0, lim).filter(p => !p.checkedIn && p.status !== '노쇼');
                if (toNoShow.length === 0) return;
                const batch = db.batch();
                toNoShow.forEach(p => batch.update(getSessionCol().doc(p.id), { status: '노쇼' }));
                await batch.commit();
            } catch(e) { console.error('자동 노쇼 처리 실패:', e); }
        })();
    }, [isMeetingOver]);

    // 날짜 또는 종료 시간 변경 시 자동 노쇼 플래그 초기화
    useEffect(() => {
        hasAutoNoShowRef.current = false;
    }, [meetingTimes.date, meetingTimes.end]);

    const limit = testMode ? activeParticipants.length : (meetingTimes.maxLimit || 18);
    const activeList = activeParticipants.slice(0, limit);
    const waitingList = activeParticipants.slice(limit);
    const checkedInCount = activeList.filter(p=>p.checkedIn).length;
    const assignedIds = new Set(groupedTeams.flatMap(g => g.members.map(m => m.id)));
    const unassignedActive = activeList.filter(p => !assignedIds.has(p.id));

    // ===================== RENDER =====================

    return (
        <div className="min-h-screen pb-40 text-slate-900">
            {!isAppLocked && (
                <nav className="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 h-16 flex items-center px-4 shadow-sm">
                    <div className="max-w-5xl mx-auto w-full flex justify-between items-center">
                        <div className="flex items-center gap-1">
                            {['attendance','setup','history_list'].map(v => (
                                <button key={v} onClick={()=>setView(v)} className={`px-3 py-2 rounded-xl font-black text-xs transition-all ${view===v?'bg-teal-500 text-white shadow-lg':'text-slate-400 hover:text-slate-600'}`}>
                                    {v==='attendance'?'출석':v==='setup'?'선정':'기록'}
                                </button>
                            ))}
                        </div>
                        <div className="flex items-center gap-2">
                            {pendingRegistrations.length > 0 && (
                                <button onClick={()=>setIsPendingModalOpen(true)} className="relative p-2.5 rounded-xl bg-rose-50 text-rose-500">
                                    <Icon.Bell size={18} />
                                    <span className="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 text-white text-[9px] font-black rounded-full flex items-center justify-center">{pendingRegistrations.length}</span>
                                </button>
                            )}
                            <button onClick={generateQRCode} className="p-2.5 rounded-xl bg-violet-50 text-violet-600 hover:bg-violet-100" title="QR 출석 생성">
                                <Icon.QrCode size={18} />
                            </button>
                            {/* 회원 모드 토글 — OFF 상태 */}
                            <button onClick={()=>{localStorage.setItem('moida_admin_mode','true');window.location.href='member.html';}}
                                className="flex items-center gap-1.5 px-2.5 py-2 rounded-xl text-xs font-black bg-slate-100 text-slate-400 hover:bg-slate-200 transition-all" title="회원 모드">
                                <span className="w-2 h-2 rounded-full bg-slate-300 flex-shrink-0"/>
                                회원
                            </button>
                            <button onClick={()=>window.location.href='index.html'} className="p-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200"><Icon.Home size={18}/></button>
                            {/* ⋮ 더보기 */}
                            <div className="relative">
                                <button onClick={()=>setIsMoreMenuOpen(v=>!v)} className={`p-2.5 rounded-xl transition-all ${isMoreMenuOpen?'bg-slate-200 text-slate-700':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`} title="더보기">
                                    <Icon.DotsVertical size={18}/>
                                </button>
                                {isMoreMenuOpen && (
                                    <>
                                        <div className="fixed inset-0" style={{zIndex:199}} onClick={()=>setIsMoreMenuOpen(false)}/>
                                        <div className="absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-xl overflow-hidden" style={{zIndex:200,border:'1px solid #e2e8f0',top:'100%'}}>
                                            <button onClick={()=>{setIsNotifModalOpen(true);setIsMoreMenuOpen(false);}} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-teal-600 hover:bg-teal-50 active:bg-teal-100">
                                                <Icon.Bell size={16}/> 공지 발송
                                            </button>
                                            <div style={{height:1,background:'#f1f5f9',margin:'0 16px'}}/>
                                            <button onClick={()=>{window.location.reload();}} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 active:bg-slate-100">
                                                <Icon.Refresh size={16}/> 새로고침
                                            </button>
                                            <button onClick={()=>{toggleTheme();}} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 active:bg-slate-100">
                                                {darkMode ? <Icon.Sun size={16}/> : <Icon.Moon size={16}/>} {darkMode?'라이트 모드':'다크 모드'}
                                            </button>
                                            <button onClick={()=>{toggleTestMode();setIsMoreMenuOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm ${testMode?'bg-amber-50 text-amber-600 font-bold':'text-slate-700 hover:bg-slate-50 active:bg-slate-100'}`}>
                                                <Icon.Beaker size={16}/> 테스트 모드 {testMode?'ON':'OFF'}
                                            </button>
                                            <div style={{height:1,background:'#f1f5f9',margin:'0 16px'}}/>
                                            <button onClick={()=>{setIsMoreMenuOpen(false);handleLogout();}} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-red-50 active:bg-red-100">
                                                <Icon.LogOut size={16}/> 로그아웃
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </nav>
            )}

            <main className={`p-4 max-w-6xl mx-auto animate-zoom-in ${isAppLocked?'pt-16':''}`}>

                {/* ===== 출석 탭 ===== */}
                {view === 'attendance' && !isAppLocked && (
                    <AttendMainTab
                        meetingTimes={meetingTimes}
                        testMode={testMode}
                        setMeetingTimes={setMeetingTimes}
                        setSessionData={setSessionData}
                        activeList={activeList}
                        waitingList={waitingList}
                        checkedInCount={checkedInCount}
                        groupedTeams={groupedTeams}
                        unassignedActive={unassignedActive}
                        limit={limit}
                        isPending={isPending}
                        setModal={setModal}
                        saveAndResetCurrent={saveAndResetCurrent}
                        showAlert={showAlert}
                    />
                )}
                {/* ===== 선정 탭 ===== */}
                {view === 'setup' && (
                    <AttendSetupTab
                        darkMode={darkMode}
                        meetingTimes={meetingTimes}
                        activeParticipants={activeParticipants}
                        updateMeetingTimeSettings={updateMeetingTimeSettings}
                        localMaxLimit={localMaxLimit}
                        setLocalMaxLimit={setLocalMaxLimit}
                        loggedInManager={loggedInManager}
                        normalMembers={normalMembers}
                        guestEligibleMembers={guestEligibleMembers}
                        sessionData={sessionData}
                        toggleParticipant={toggleParticipant}
                        toggleParticipantAsGuest={toggleParticipantAsGuest}
                        handleTestSelect={handleTestSelect}
                        handleResetSelection={handleResetSelection}
                        setIsGuestModalOpen={setIsGuestModalOpen}
                        setIsLocationPickerOpen={setIsLocationPickerOpen}
                    />
                )}

                {/* ===== 기록 탭 ===== */}
                {view === 'history_list' && (
                    <AttendHistoryTab
                        history={history}
                        selectedHistoryDetail={selectedHistoryDetail}
                        setSelectedHistoryDetail={setSelectedHistoryDetail}
                        historySortKey={historySortKey}
                        setHistorySortKey={setHistorySortKey}
                        historySortOrder={historySortOrder}
                        setHistorySortOrder={setHistorySortOrder}
                        sortedHistoryRecords={sortedHistoryRecords}
                        handleDeleteHistory={handleDeleteHistory}
                        setHistoryEditTarget={setHistoryEditTarget}
                        isEditingLocation={isEditingLocation}
                        setIsEditingLocation={setIsEditingLocation}
                        editLocationValue={editLocationValue}
                        setEditLocationValue={setEditLocationValue}
                        handleUpdateLocation={handleUpdateLocation}
                    />
                )}
            </main>

            {/* ===== 모달들 ===== */}

            <CheckInModal modal={modal} setModal={setModal} handleCheckIn={handleCheckIn} handleUncheckIn={handleUncheckIn} />

            <GuestModal isOpen={isGuestModalOpen} onClose={()=>setIsGuestModalOpen(false)}
                newGuest={newGuest} setNewGuest={setNewGuest} onAdd={handleAddGuest}
                activeMembers={activeMembers} isPending={isPending} />

            <HistoryEditModal target={historyEditTarget} onClose={()=>setHistoryEditTarget(null)} onUpdate={handleHistoryStatusUpdate} />

            <QRModal isOpen={isQRModalOpen} meetingTimes={meetingTimes} onClose={()=>setIsQRModalOpen(false)} />

            <NotifModal isOpen={isNotifModalOpen} onClose={()=>setIsNotifModalOpen(false)}
                fcmTokenCount={fcmTokenCount}
                notifTitle={notifTitle} setNotifTitle={setNotifTitle}
                notifBody={notifBody} setNotifBody={setNotifBody}
                notifSending={notifSending} onSend={sendPushNotification}
                notifHistory={notifHistory} editingNotifId={editingNotifId}
                editTitle={editTitle} setEditTitle={setEditTitle}
                editBody={editBody} setEditBody={setEditBody}
                onStartEdit={startEditNotif} onCancelEdit={cancelEditNotif}
                onSaveEdit={saveEditNotif} onDeleteNotif={deleteNotif} />

            <PendingModal isOpen={isPendingModalOpen} onClose={()=>setIsPendingModalOpen(false)} pendingRegistrations={pendingRegistrations} onApprove={handleApprovePending} onReject={handleRejectPending} />

            <AlertModal alertModal={alertModal} setAlertModal={setAlertModal} />

            {/* 지도 장소 선택 모달 */}
            <LocationPickerModal
                isOpen={isLocationPickerOpen}
                onClose={() => setIsLocationPickerOpen(false)}
                initialLat={meetingTimes.locationLat}
                initialLng={meetingTimes.locationLng}
                initialName={meetingTimes.location}
                onConfirm={({ name, lat, lng }) => {
                    updateMeetingTimeSettings({ ...meetingTimes, location: name, locationLat: lat, locationLng: lng });
                    setIsLocationPickerOpen(false);
                }}
            />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
