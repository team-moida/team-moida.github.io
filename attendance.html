<body>
<div id="loading-screen">
    <div class="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-bold text-slate-500 italic">모이다 연결 중...</p>
</div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

db.enablePersistence({ synchronizeTabs: true }).catch(err => console.warn('오프라인 동기화:', err.code));
const getTeamDraftsCol = () => db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('team_drafts');

const CurrentTimeClock = () => {
    const [time, setTime] = useState(new Date());
    useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
    return (
        <div className="flex flex-col items-center justify-center my-6 animate-zoom-in">
            <span className="text-6xl font-black text-slate-800 tabular-nums tracking-tighter drop-shadow-md">
                {time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}
            </span>
            <span className="text-xs font-bold text-slate-400 tracking-widest uppercase mt-3">모이다 · OTP FC Attendance</span>
        </div>
    );
};

function App() {
    const [view, setView] = useState(() => sessionStorage.getItem('moida_view') || 'attendance');
    const [members, setMembers] = useState([]);
    const [sessionData, setSessionData] = useState([]);
    const [history, setHistory] = useState([]);
    const [pendingRegistrations, setPendingRegistrations] = useState([]);
    const [selectedHistoryDetail, setSelectedHistoryDetail] = useState(null);
    const [historySortKey, setHistorySortKey] = useState('time');
    const [historySortOrder, setHistorySortOrder] = useState('asc');
    const [meetingTimes, setMeetingTimes] = useState({
        date: getThisSunday(), start:'08:00', end:'10:00', location:'', locationLat:null, locationLng:null, locationRadius:100, managerId:'', managerName:'', maxLimit:18, enableQR:false
    });
    const [localMaxLimit, setLocalMaxLimit] = useState(null);
    const [currentTime, setCurrentTime] = useState(new Date());
    const [isAppLocked, setIsAppLocked] = useState(false);
    const [lockPassword, setLockPassword] = useState('');
    const [lockModalMode, setLockModalMode] = useState(null);
    const [tempPassword, setTempPassword] = useState('');
    const [modal, setModal] = useState({ type:null, data:null });
    const [alertModal, setAlertModal] = useState({ show:false, title:'', content:'', type:'info', onConfirm:null });
    const [historyEditTarget, setHistoryEditTarget] = useState(null);
    const [isEditingLocation, setIsEditingLocation] = useState(false);
    const [editLocationValue, setEditLocationValue] = useState('');
    const [isEditingManager, setIsEditingManager] = useState(false);
    const [editManagerValue, setEditManagerValue] = useState('');
    const [isLocationPickerOpen, setIsLocationPickerOpen] = useState(false);
    const [teamData, setTeamData] = useState(null);
    const [localTeamData, setLocalTeamData] = useState(null);
    const [isPending, setIsPending] = useState(false);
    const [isGuestModalOpen, setIsGuestModalOpen] = useState(false);
    const [newGuest, setNewGuest] = useState({ name:'', gender:'남성', inviterId:'', level:'1' });
    const [loggedInManager, setLoggedInManager] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (s && s.kakaoId) return s;
            location.href = 'index.html';
            return null;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const [setupTabMonthlyMembers, setSetupTabMonthlyMembers] = useState([]);
    const [setupTabRestMembers, setSetupTabRestMembers] = useState([]);
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const [testMode, setTestMode] = useState(false);
    const [testModeBackup, setTestModeBackup] = useState(null);
    const [isPasswordChangeModalOpen, setIsPasswordChangeModalOpen] = useState(false);
    const [passwordForm, setPasswordForm] = useState({ current:'', next:'', confirm:'' });
    // QR 관련 상태
    const [isQRModalOpen, setIsQRModalOpen] = useState(false);
    const [currentQRToken, setCurrentQRToken] = useState('');
    const [isPendingModalOpen, setIsPendingModalOpen] = useState(false);
    const qrCanvasRef = useRef(null);
    const hasAutoNoShowRef = useRef(false);
    const hasAutoFixedRef = useRef(false);

    // ⋮ 더보기 메뉴
    const [isMoreMenuOpen, setIsMoreMenuOpen] = useState(false);

    // 푸시 알림 발송 모달
    const [isNotifModalOpen, setIsNotifModalOpen] = useState(false);
    const [notifTitle, setNotifTitle] = useState('');
    const [notifBody, setNotifBody] = useState('');
    const [notifSending, setNotifSending] = useState(false);
    const [notifHistory, setNotifHistory] = useState([]);
    const [editingNotifId, setEditingNotifId] = useState(null);
    const [editTitle, setEditTitle] = useState('');
    const [editBody, setEditBody] = useState('');
    const [fcmTokenCount, setFcmTokenCount] = useState(null);

    const startEditNotif = (n) => { setEditingNotifId(n.id); setEditTitle(n.title || ''); setEditBody(n.body || ''); };
    const cancelEditNotif = () => setEditingNotifId(null);
    const saveEditNotif = async () => {
        if (!editTitle.trim() || !editBody.trim()) return;
        try {
            await getCol('notifications').doc(editingNotifId).update({ title: editTitle.trim(), body: editBody.trim() });
            setEditingNotifId(null);
        } catch(e) { showAlert('오류', '수정 실패'); }
    };
    const deleteNotif = (id) => {
        showConfirm('공지 삭제', '이 공지를 삭제하시겠습니까?', async () => {
            try { await getCol('notifications').doc(id).delete(); } catch(e) {}
        });
    };

    const sendPushNotification = async () => {
        if (!notifTitle.trim() || !notifBody.trim()) return showAlert('입력 오류', '제목과 내용을 모두 입력해주세요.');
        setNotifSending(true);
        try {
            await getCol('notifications').add({
                title: notifTitle.trim(),
                body: notifBody.trim(),
                sentAt: new Date().toISOString(),
                sentBy: loggedInManager?.name || '관리자',
            });
            setIsNotifModalOpen(false);
            setNotifTitle('');
            setNotifBody('');
            showAlert('발송 완료', '푸시 알림이 전송되었습니다.');
        } catch(e) {
            showAlert('오류', '알림 발송 실패: ' + e.message);
        } finally {
            setNotifSending(false);
        }
    };

    useEffect(() => {
        const unsub = getCol('notifications')
            .orderBy('sentAt', 'desc')
            .limit(20)
            .onSnapshot(snap => {
                const list = [];
                snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                setNotifHistory(list);
            }, () => {});
        const unsubTokens = getCol('fcm_tokens').onSnapshot(snap => setFcmTokenCount(snap.size), () => {});
        return () => { unsub(); unsubTokens(); };
    }, []);



    const hourOptions = useMemo(() => Array.from({length:24},(_,i)=>String(i).padStart(2,'0')),[]);
    const minuteOptions = useMemo(() => Array.from({length:12},(_,i)=>String(i*5).padStart(2,'0')),[]);
    // 저장된 분이 5분 단위가 아닐 때(테스트모드 등) 가장 가까운 5분 단위로 스냅
    const snapMin = (m) => { const n=parseInt(m)||0; const s=Math.round(n/5)*5; return String(s>=60?0:s).padStart(2,'0'); };

    const activeMembers = useMemo(() => members.filter(m => !m.isResigned), [members]);
    const managers = useMemo(() => activeMembers.filter(m => STAFF_ROLES.includes(m.role)).sort((a,b)=>a.name.localeCompare(b.name)), [activeMembers]);

    useEffect(() => { sessionStorage.setItem('moida_view', view); }, [view]);

    const activeParticipants = useMemo(() => {
        return sessionData.filter(p => p.date === meetingTimes.date)
            .sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||'') || a.name.localeCompare(b.name));
    }, [sessionData, meetingTimes.date]);

    const activeTeamData = useMemo(() => {
        const serverTime = teamData ? new Date(teamData.createdAt).getTime() : 0;
        const localTime = localTeamData ? new Date(localTeamData.updatedAt).getTime() : 0;
        if (localTeamData && localTime > serverTime) return localTeamData;
        return teamData || null;
    }, [localTeamData, teamData]);

    const groupedTeams = useMemo(() => {
        if (!activeTeamData?.teams) return [];
        return activeTeamData.teams.map((t, teamIdx) => {
            const members = t.members.map((tm) => {
                const p = activeParticipants.find(p => p.memberId === (tm.memberId||tm.id));
                return p || null;
            }).filter(Boolean)
              .map((p, i) => ({ ...p, jerseyNumber: i + 1 }));
            return members.length > 0 ? { teamName: String.fromCharCode(65+teamIdx), teamIdx, members } : null;
        }).filter(Boolean);
    }, [activeParticipants, activeTeamData]);

    const sortedHistoryRecords = useMemo(() => {
        if (!selectedHistoryDetail?.records) return [];
        const list = selectedHistoryDetail.records.map((r,i) => ({...r, originalIndex:i}));
        if (historySortKey === 'time') return list.sort((a,b)=>(a.timestamp||'99:99').localeCompare(b.timestamp||'99:99'));
        if (historySortKey === 'status') {
            const order = {'정상':1,'지각':2,'노쇼':3,'미출석':4};
            return list.sort((a,b) => {
                let diff = (order[a.status]||9) - (order[b.status]||9);
                if (historySortOrder === 'desc') diff = -diff;
                return diff || (a.timestamp||'99:99').localeCompare(b.timestamp||'99:99');
            });
        }
        return list;
    }, [selectedHistoryDetail, historySortKey, historySortOrder]);

    const toggleTheme = () => { const isDark = !darkMode; setDarkMode(isDark); document.documentElement.classList.toggle('dark', isDark); localStorage.setItem('moida_theme', isDark ? 'dark' : 'light'); };
    const showAlert = (title, content, type='info', onConfirm=null) => setAlertModal({show:true,title,content,type,onConfirm});
    const showConfirm = (title, content, onConfirm) => setAlertModal({show:true,title,content,type:'confirm',onConfirm});

    // QR 핸들러
    const { generateQRCode } = makeQRHandlers({ meetingTimes, setCurrentQRToken, setIsQRModalOpen, showAlert });

    // QR 코드 렌더링
    useEffect(() => {
        if (isQRModalOpen && currentQRToken) {
            setTimeout(() => {
                const container = document.getElementById('qr-canvas-area');
                if (!container) return;
                container.innerHTML = '';
                const qrUrl = `https://nakdo0415-crypto.github.io/moida/member.html?token=${currentQRToken}&date=${meetingTimes.date}`;
                new QRCode(container, { text:qrUrl, width:220, height:220, colorDark:'#0f172a', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
            }, 100);
        }
    }, [isQRModalOpen, currentQRToken]);

    const updateMeetingTimeSettings = async (newData) => {
        const prev = meetingTimes;
        setMeetingTimes(newData);
        try {
            await getSettingsCol().doc('meeting_schedule_v2').set(newData);
        } catch(e) {
            console.error('설정 저장 실패:', e);
            setMeetingTimes(prev);
            showAlert('오류', '설정 저장에 실패했습니다.\n네트워크를 확인해주세요.');
        }
    };

    const handleTestSelect = async () => {
        const d = new Date();
        const todayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        await updateMeetingTimeSettings({...meetingTimes, date: todayStr});
        const toAdd = activeMembers.filter(m => !m.isResigned && !sessionData.some(p => p.memberId === m.id && p.date === todayStr));
        await Promise.all(toAdd.map(m => getSessionCol().add({
            memberId:m.id, name:m.name, gender:m.gender, level:m.level,
            date:todayStr, checkedIn:false, checkInTime:null, status:'미출석',
            isGuest:false, team:'', createdAt:new Date().toISOString()
        })));
        showAlert('테스트 선정 완료', `오늘(${todayStr}) 기준 ${toAdd.length}명 선정됨`);
    };

    const { normalMembers, guestEligibleMembers } = useMemo(() => {
        const monthStr = meetingTimes.date ? meetingTimes.date.substring(0, 7) : '';
        const normal = [];
        const guestEligible = [];
        activeMembers.filter(m => !m.isResigned).sort((a,b)=>a.name.localeCompare(b.name)).forEach(member => {
            if (STAFF_ROLES.includes(member.role)) { normal.push(member); return; }
            if (member.isSpecialRest) { guestEligible.push(member); return; }
            const isResting = setupTabRestMembers.includes(member.id);
            if (isResting) {
                const info = getMembershipStatus(member, monthStr);
                if (info?.active) guestEligible.push(member);
                return;
            }
            if (!setupTabMonthlyMembers.includes(member.id)) return;
            normal.push(member);
        });
        return { normalMembers: normal, guestEligibleMembers: guestEligible };
    }, [activeMembers, setupTabRestMembers, setupTabMonthlyMembers, meetingTimes.date]);

    const toggleParticipant = async (member) => {
        const existing = sessionData.find(p => p.memberId === member.id && p.date === meetingTimes.date);
        if (existing) { await getSessionCol().doc(existing.id).delete(); }
        else {
            await getSessionCol().add({
                memberId:member.id, name:member.name, gender:member.gender, level:member.level,
                date:meetingTimes.date, checkedIn:false, checkInTime:null, status:'미출석',
                isGuest:false, team:'', createdAt:new Date().toISOString()
            });
        }
    };

    const toggleParticipantAsGuest = async (member) => {
        const existing = sessionData.find(p => p.memberId === member.id && p.date === meetingTimes.date);
        if (existing) { await getSessionCol().doc(existing.id).delete(); }
        else {
            await getSessionCol().add({
                memberId:member.id, name:member.name, gender:member.gender, level:member.level,
                date:meetingTimes.date, checkedIn:false, checkInTime:null, status:'미출석',
                isGuest:true, team:'', createdAt:new Date().toISOString()
            });
        }
    };

    const handleLogout = () => {
        localStorage.removeItem('moida_member_data');
        location.href = 'index.html';
    };

    const toggleTestMode = async () => {
        const n = !testMode;
        if (n) {
            // 테스트 모드 ON
            const d = new Date();
            const todayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

            // 원본 설정 백업 — testMode 값이 이미 켜진 상태(새로고침 후)면 기존 백업을 재사용
            if (!meetingTimes.testMode) {
                // 정상 상태 → 현재 값을 3중 백업 (React state, localStorage, Firestore)
                setTestModeBackup({ meetingTimes: {...meetingTimes} });
                localStorage.setItem('moida_testmode_backup', JSON.stringify({...meetingTimes}));
                await getSettingsCol().doc('test_backup').set({
                    originalSettings: {...meetingTimes},
                    createdAt: new Date().toISOString()
                });
            } else {
                // 이미 testMode 상태 → 기존 Firestore 백업으로 React state/localStorage 복원 (덮어쓰기 방지)
                const existingBackup = await getSettingsCol().doc('test_backup').get();
                if (existingBackup.exists) {
                    const orig = existingBackup.data().originalSettings;
                    setTestModeBackup({ meetingTimes: orig });
                    localStorage.setItem('moida_testmode_backup', JSON.stringify(orig));
                }
            }

            // 테스트 모드: 12분 후 시작, 5분 모임
            // → 지금부터 3분(=12-9)이내 체크인 → "정상", 3분 이후 → "지각"
            const startTime = new Date(d.getTime() + 12*60*1000); // now + 12분
            const endTime = new Date(startTime.getTime() + 5*60*1000); // start + 5분

            const h = String(startTime.getHours()).padStart(2,'0');
            const m = String(startTime.getMinutes()).padStart(2,'0');
            const endH = String(endTime.getHours()).padStart(2,'0');
            const endM = String(endTime.getMinutes()).padStart(2,'0');

            // 현재 GPS 위치 취득 (테스트용)
            let testLat = meetingTimes.locationLat || null;
            let testLng = meetingTimes.locationLng || null;
            let testLocation = meetingTimes.location || '';
            let gpsMsg = '';
            let gpsOk = false;
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) =>
                        navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 8000 })
                    );
                    testLat = pos.coords.latitude;
                    testLng = pos.coords.longitude;
                    testLocation = '📍 테스트 현재위치';
                    gpsMsg = `\nGPS: 현재위치 자동 설정됨 (${testLat.toFixed(5)}, ${testLng.toFixed(5)})`;
                    gpsOk = true;
                } catch(e) {
                    gpsMsg = '\nGPS: 위치 취득 실패 — 기존 장소 유지';
                }
            } else {
                gpsMsg = '\nGPS: 미지원 브라우저 — 기존 장소 유지';
            }

            const updatedTimes = {...meetingTimes, date: todayStr, start: `${h}:${m}`, end: `${endH}:${endM}`,
                location: testLocation, locationLat: testLat, locationLng: testLng, testMode: true};
            setMeetingTimes(updatedTimes);
            await getSettingsCol().doc('meeting_schedule_v2').update({...updatedTimes});
            setTestMode(true);
            if (gpsOk) setIsLocationPickerOpen(true);

            // 자동 인원 선정
            setTimeout(async () => {
                try {
                    const activeMemberList = members.filter(m => !m.isResigned);
                    const sessionSnap = await getSessionCol().where('date', '==', todayStr).get();
                    const existingIds = new Set(sessionSnap.docs.map(d => d.data().memberId));
                    const toAdd = activeMemberList.filter(m => !existingIds.has(m.id));

                    if (toAdd.length > 0) {
                        await Promise.all(toAdd.map(m => getSessionCol().add({
                            memberId:m.id, name:m.name, gender:m.gender, level:m.level,
                            date:todayStr, checkedIn:false, checkInTime:null, status:'미출석',
                            isGuest:false, team:'', createdAt:new Date().toISOString()
                        })));
                    }
                    showAlert('테스트 모드 활성화', `${toAdd.length}명 자동 선정됨\n\n모임 시작: ${h}:${m} (지금부터 12분 후)\n모임 종료: ${endH}:${endM}\n\n지금부터 3분 이내 체크인 → 정상 ✓\n3분 이후 또는 [지각 전환] → 지각 ⚠️\n[노쇼 전환] → 미출석자 노쇼 처리 ✗${gpsMsg}`);
                } catch(e) {
                    console.error('테스트 인원 선정 실패:', e);
                    showAlert('알림', '인원 자동 선정 실패');
                }
            }, 500);
        } else {
            // 테스트 모드 OFF
            showConfirm('테스트 모드 종료', '테스트 데이터를 삭제하고 복원하시겠습니까?', async () => {
                try {
                    const testDate = meetingTimes.date; // 현재 테스트 중인 날짜

                    // 원본 설정 복원 우선순위: React state → localStorage → Firestore 백업 → 기본값
                    let originalSettings = testModeBackup?.meetingTimes || null;
                    if (!originalSettings) {
                        try {
                            const lsRaw = localStorage.getItem('moida_testmode_backup');
                            if (lsRaw) originalSettings = JSON.parse(lsRaw);
                        } catch(e) {}
                    }
                    if (!originalSettings) {
                        const backupDoc = await getSettingsCol().doc('test_backup').get();
                        if (backupDoc.exists) originalSettings = backupDoc.data().originalSettings;
                    }
                    localStorage.removeItem('moida_testmode_backup');

                    // Firestore에서 직접 조회 — stale React state 방지
                    const sessionSnap = await getSessionCol().where('date', '==', testDate).get();

                    const batch = db.batch();
                    // 테스트 세션 전체 삭제
                    sessionSnap.docs.forEach(d => batch.delete(getSessionCol().doc(d.id)));
                    // 테스트용 QR 토큰 삭제
                    batch.delete(getQRCol().doc(testDate));
                    // 백업 문서 삭제
                    batch.delete(getSettingsCol().doc('test_backup'));
                    // 원본 설정 복원 — 백업 없으면 기본값(08:00~10:00)으로 복원 (testMode 잔류 시간 방지)
                    const restoredSettings = originalSettings
                        ? {...originalSettings, testMode: false}
                        : {...meetingTimes, testMode: false, start:'08:00', end:'10:00', date: getNextSundayFromDate(testDate), managerId:'', managerName:''};
                    batch.set(getSettingsCol().doc('meeting_schedule_v2'), restoredSettings);

                    await batch.commit();

                    // 로컬 sessionData에서 테스트 세션 즉시 제거 (onSnapshot 지연 방지)
                    setSessionData(prev => prev.filter(p => p.date !== testDate));
                    setMeetingTimes(restoredSettings);
                    setTestModeBackup(null);
                    setTestMode(false);
                    const restoreMsg = originalSettings
                        ? '테스트 데이터가 모두 삭제되고 복원되었습니다.'
                        : '테스트 데이터가 삭제되었습니다.\n원본 설정을 찾지 못해 08:00~10:00 기본값으로 복원됩니다.\n선정 탭에서 시간을 확인해 주세요.';
                    showAlert('테스트 모드 종료', restoreMsg);
                } catch(e) {
                    console.error(e);
                    showAlert('오류', '데이터 복원 실패: ' + e.message);
                }
            });
        }
    };

    const handlePasswordChange = async () => {
        const { current, next, confirm } = passwordForm;
        const defaultPw = loggedInManager.birth ? loggedInManager.birth.substring(2,8) : '000000';
        if (current !== (loggedInManager.password || defaultPw)) return showAlert('오류','현재 비밀번호가 틀립니다.');
        if (next.length < 4) return showAlert('알림','비밀번호는 4자리 이상이어야 합니다.');
        if (next !== confirm) return showAlert('오류','새 비밀번호가 일치하지 않습니다.');
        try {
            await getMemberCol().doc(loggedInManager.memberId).update({ password:next });
            const updated = {...loggedInManager, password:next};
            localStorage.setItem('moida_member_data', JSON.stringify(updated));
            setLoggedInManager(updated);
            setIsPasswordChangeModalOpen(false);
            setPasswordForm({current:'',next:'',confirm:''});
            showAlert('성공','비밀번호가 변경되었습니다.');
        } catch(e) { showAlert('오류','변경 실패'); }
    };

    const handleUncheckIn = async (participant) => {
        showConfirm('출석 취소', `${participant.name}의 출석을 취소하시겠습니까?`, async () => {
            try {
                await getSessionCol().doc(participant.id).update({ checkedIn:false, checkInTime:null, status:'미출석' });
                setModal({type:null,data:null});
            } catch(e) { showAlert('오류','출석 취소 실패'); }
        });
    };

    const handleCheckIn = async (participant) => {
        // 날짜 불일치 방어: participant의 세션 날짜가 현재 모임 날짜와 다르면 차단
        if (participant.date !== meetingTimes.date) {
            return showAlert('오류', `날짜 불일치 (${participant.date} ≠ ${meetingTimes.date})\n새로고침 후 다시 시도해주세요.`);
        }
        const limit = testMode ? activeParticipants.length : (meetingTimes.maxLimit || 18);
        const rank = activeParticipants.findIndex(p => p.id === participant.id) + 1;
        if (!testMode && rank > limit) return showAlert('대기자 안내',`선착순(${limit}명) 마감되었습니다.`);
        const now = new Date();
        const [sy,sm,sd] = participant.date.split('-');
        const [shr,smin] = (meetingTimes.start||'08:00').split(':');
        const [ehr,emin] = (meetingTimes.end||'10:00').split(':');
        const meetingStart = new Date(sy,sm-1,sd,parseInt(shr),parseInt(smin),0);
        const meetingEnd   = new Date(sy,sm-1,sd,parseInt(ehr),parseInt(emin),0);
        // 체크인 허용: 시작 70분 전(06:50) ~ 종료(10:00)
        const allowFrom = new Date(meetingStart.getTime() - 70*60*1000);
        if (!testMode && now < allowFrom) {
            const allowFromStr = allowFrom.toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'});
            return showAlert('출석 불가',`출석 가능 시간: ${participant.date} ${allowFromStr}~${meetingTimes.end}`);
        }
        if (!testMode && now > meetingEnd) {
            return showAlert('출석 불가','모임이 종료되었습니다.\n자동 노쇼 처리되었습니다.');
        }
        // 정상: start-70분~start-9분(07:51) / 지각: 07:51:01~종료 (+1분 여유)
        const normalThreshold = new Date(meetingStart.getTime() - 9*60*1000);
        const finalStatus = now <= normalThreshold ? '정상' : '지각';
        const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
        try {
            await getSessionCol().doc(participant.id).update({ checkedIn:true, checkInTime:timeStr, status:finalStatus });
            setModal({type:'checkin', data:{...participant, checkedIn:true, checkInTime:timeStr, status:finalStatus}});
        } catch(e) { showAlert('오류','출석 실패'); }
    };

    const handleResetSelection = () => {
        const targets = sessionData.filter(p => p.date === meetingTimes.date);
        if (targets.length === 0) return showAlert('알림','초기화할 명단이 없습니다.');
        showConfirm('명단 초기화','이번 모임 선정 인원을 전체 해제하시겠습니까?', async () => {
            setIsPending(true);
            try {
                const batch = db.batch();
                targets.forEach(p => batch.delete(getSessionCol().doc(p.id)));
                await batch.commit();
                showAlert('성공','선정 명단이 초기화되었습니다.');
            } catch(e) { showAlert('오류','초기화 실패'); } finally { setIsPending(false); }
        });
    };

    const handleAddGuest = async () => {
        if (!newGuest.name.trim()) return showAlert('알림','게스트 이름을 입력해주세요.');
        if (isPending) return;
        setIsPending(true);
        const inviter = members.find(m => m.id === newGuest.inviterId);
        try {
            await getSessionCol().add({
                memberId:'guest_'+Date.now(), name:newGuest.name, inviterName:inviter?.name||'없음',
                inviterId:newGuest.inviterId||'', gender:newGuest.gender, level:newGuest.level,
                date:meetingTimes.date, checkedIn:false, checkInTime:null, status:'미출석',
                isGuest:true, createdAt:new Date().toISOString()
            });
            setIsGuestModalOpen(false);
            setNewGuest({name:'',gender:'남성',inviterId:'',level:'1'});
            showAlert('성공','게스트가 추가되었습니다.');
        } catch(e) { showAlert('오류','게스트 등록 실패'); }
        finally { setIsPending(false); }
    };

    const saveAndResetCurrent = async () => {
        const current = sessionData.filter(p => p.date === meetingTimes.date);
        if (current.length === 0) return showAlert('확인','현재 출석부에 인원이 없습니다.');
        showConfirm('기록 확정','기록을 저장하고 다음 주로 날짜를 넘기시겠습니까?', async () => {
            setIsPending(true);
            try {
                const limit = meetingTimes.maxLimit || 18;
                const sorted = [...current].sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||'')||a.name.localeCompare(b.name));
                const records = sorted.map((p,idx) => {
                    const isWaiting = idx+1 > limit;
                    let finalStatus = isWaiting ? '대기' : p.checkedIn ? (p.status||'정상') : '노쇼';
                    return {
                        name: p.isGuest ? `${p.name} - 초대:${p.inviterName}` : p.name,
                        gender:p.gender, status:finalStatus,
                        checkInTime: p.checkedIn ? (p.checkInTime||'-') : '미출석',
                        type: isWaiting ? '대기자' : (p.isGuest ? '게스트' : '정규'),
                        level:p.level||'-', team:p.team||'-',
                        timestamp: p.checkedIn ? p.checkInTime : '99:99:99'
                    };
                });
                const presentCount = records.filter(r=>r.status==='정상'||r.status==='지각').length;
                await getHistoryCol().add({
                    date:meetingTimes.date, meetingTime:`${meetingTimes.start} ~ ${meetingTimes.end}`,
                    location:meetingTimes.location||'장소 미지정',
                    locationLat: meetingTimes.locationLat || null,
                    locationLng: meetingTimes.locationLng || null,
                    managerName:meetingTimes.managerName||'미지정',
                    total:records.length, present:presentCount, records, createdAt:new Date().toISOString()
                });
                const batch = db.batch();
                current.forEach(p => batch.delete(getSessionCol().doc(p.id)));
                const nextSun = getNextSundayFromDate(meetingTimes.date);
                const nextSettings = {...meetingTimes, date:nextSun, managerId:'', managerName:''};
                batch.set(getSettingsCol().doc('meeting_schedule_v2'), nextSettings);
                await batch.commit();
                setMeetingTimes(nextSettings);
                showAlert('기록 완료',`저장되었습니다.\n다음 모임: ${nextSun}`);
            } catch(e) { showAlert('오류','저장 실패'); } finally { setIsPending(false); }
        });
    };

    const handleDeleteHistory = () => {
        if (!selectedHistoryDetail) return;
        showConfirm('기록 삭제','이 기록을 영구 삭제하시겠습니까?', async () => {
            try {
                await getHistoryCol().doc(selectedHistoryDetail.id).delete();
                setSelectedHistoryDetail(null);
                showAlert('삭제 완료','기록이 삭제되었습니다.');
            } catch(e) { showAlert('오류','삭제 실패'); }
        });
    };

    const handleHistoryStatusUpdate = async (newStatus) => {
        if (!historyEditTarget || !selectedHistoryDetail) return;
        const { docId, recordIndex } = historyEditTarget;
        try {
            const updatedRecords = [...selectedHistoryDetail.records];
            updatedRecords[recordIndex] = {...updatedRecords[recordIndex], status:newStatus};
            await getHistoryCol().doc(docId).update({ records:updatedRecords });
            setSelectedHistoryDetail(prev => ({...prev, records:updatedRecords}));
            setHistoryEditTarget(null);
            showAlert('수정 완료','출석 상태가 변경되었습니다.');
        } catch(e) { showAlert('오류','수정 실패'); }
    };

    const handleUpdateLocation = async () => {
        if (!selectedHistoryDetail) return;
        try {
            await getHistoryCol().doc(selectedHistoryDetail.id).update({ location:editLocationValue });
            setSelectedHistoryDetail(prev => ({...prev, location:editLocationValue}));
            setIsEditingLocation(false);
            showAlert('수정 완료','장소명이 변경되었습니다.');
        } catch(e) { showAlert('오류','장소명 수정 실패'); }
    };

    const handleUpdateManager = async () => {
        if (!selectedHistoryDetail) return;
        try {
            await getHistoryCol().doc(selectedHistoryDetail.id).update({ managerName:editManagerValue });
            setSelectedHistoryDetail(prev => ({...prev, managerName:editManagerValue}));
            setIsEditingManager(false);
            showAlert('수정 완료','관리자가 변경되었습니다.');
        } catch(e) { showAlert('오류','수정 실패'); }
    };

    const { handleApprovePending, handleRejectPending } = makePendingHandlers({ loggedInManager, showConfirm, showAlert });

    useEffect(() => {
        const hideLoader=()=>{const l=document.getElementById('loading-screen');if(l){l.style.opacity='0';setTimeout(()=>{if(l)l.style.display='none';},500);}};
        const t=setTimeout(hideLoader,5000);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(()=>{});
        const unsubAuth = auth.onAuthStateChanged(u => {
            clearTimeout(t);
            hideLoader();
            if (u) {
                getMemberCol().onSnapshot(snap => setMembers(snap.docs.map(d=>({id:d.id,...d.data()}))));
                getSessionCol().onSnapshot(snap => setSessionData(snap.docs.map(d=>({id:d.id,...d.data()}))));
                getHistoryCol().onSnapshot(snap => setHistory(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date))));
                getSettingsCol().doc('meeting_schedule_v2').onSnapshot(async doc => {
                    if(doc.exists) {
                        const data = doc.data();
                        setMeetingTimes(prev=>({...prev,...data}));
                        setTestMode(!!data.testMode);
                        // testMode=false인데 test_backup이 남아있으면 자동 복원 (1회만)
                        if (!hasAutoFixedRef.current && !data.testMode) {
                            hasAutoFixedRef.current = true;
                            try {
                                const backupDoc = await getSettingsCol().doc('test_backup').get();
                                if (backupDoc.exists) {
                                    const orig = backupDoc.data().originalSettings;
                                    const corrected = {...orig, testMode: false};
                                    const fixBatch = db.batch();
                                    fixBatch.set(getSettingsCol().doc('meeting_schedule_v2'), corrected);
                                    fixBatch.delete(getSettingsCol().doc('test_backup'));
                                    await fixBatch.commit();
                                    setMeetingTimes(corrected);
                                    localStorage.removeItem('moida_testmode_backup');
                                }
                            } catch(e) { console.error('자동 복원 실패:', e); }
                        }
                    }
                });
                getTeamDraftsCol().orderBy('createdAt','desc').limit(1).onSnapshot(snap => { setTeamData(snap.empty?null:snap.docs[0].data()); });
                getPendingCol().where('status','==','pending').onSnapshot(snap => setPendingRegistrations(snap.docs.map(d=>({id:d.id,...d.data()}))));
            }
        });
        const timer = setInterval(() => setCurrentTime(new Date()), 10000);
        return () => { unsubAuth(); clearInterval(timer); };
    }, []);

    useEffect(() => {
        if (!meetingTimes.date) return;
        const [y,m] = meetingTimes.date.split('-');
        const docKey = `${y}-${m}`;
        const unsub = getMonthlyCol().doc(docKey).onSnapshot(doc => {
            let validMembers = [];
            const restMembers = [];
            if (doc.exists) {
                const data = doc.data();
                if (data.statuses) {
                    validMembers = Object.keys(data.statuses).filter(id=>data.statuses[id]==='paid');
                    Object.entries(data.statuses).forEach(([id, status]) => {
                        if (status === 'rest') restMembers.push(id);
                    });
                }
                else if (data.memberIds) validMembers = data.memberIds;
            }
            activeMembers.forEach(member => {
                const info = getMembershipStatus(member, docKey);
                if (STAFF_ROLES.includes(member.role)) { if(!validMembers.includes(member.id)) validMembers.push(member.id); }
                else if (info?.active) { if(!validMembers.includes(member.id)) validMembers.push(member.id); }
            });
            setSetupTabMonthlyMembers(validMembers);
            setSetupTabRestMembers(restMembers);
        });
        return () => unsub();
    }, [meetingTimes.date, members]);

    useEffect(() => {
        setModal({type:null,data:null});
        setIsGuestModalOpen(false);
        setLockModalMode(null);
        setSelectedHistoryDetail(null);
        setIsEditingLocation(false);
        setIsEditingManager(false);
        setHistoryEditTarget(null);
        setAlertModal(prev=>({...prev,show:false}));
        setIsPasswordChangeModalOpen(false);
        setIsQRModalOpen(false);
    }, [view]);

    const isMeetingOver = useMemo(() => {
        if (!meetingTimes.date || !meetingTimes.end) return false;
        const [y,m,d] = meetingTimes.date.split('-');
        const [hr,min] = meetingTimes.end.split(':');
        return currentTime >= new Date(y,m-1,d,hr,min,0);
    }, [meetingTimes, currentTime]);

    // 모임 종료 시 미출석 인원 자동 노쇼 처리
    // Firestore 직접 조회 → stale React state로 인한 경쟁 조건 방지
    useEffect(() => {
        if (!isMeetingOver || hasAutoNoShowRef.current) return;
        if (!meetingTimes.date) return;
        // 오늘 날짜 세션에서만 자동 노쇼 — 과거/미래 날짜 설정 시 오작동 방지
        const _d = new Date();
        const todayStr = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
        if (meetingTimes.date !== todayStr) return;
        hasAutoNoShowRef.current = true;
        const lim = meetingTimes.maxLimit || 18;
        const date = meetingTimes.date;
        (async () => {
            try {
                const snap = await getSessionCol().where('date', '==', date).get();
                const sorted = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || '') || a.name.localeCompare(b.name));
                const toNoShow = sorted.slice(0, lim).filter(p => !p.checkedIn && p.status !== '노쇼');
                if (toNoShow.length === 0) return;
                const batch = db.batch();
                toNoShow.forEach(p => batch.update(getSessionCol().doc(p.id), { status: '노쇼' }));
                await batch.commit();
            } catch(e) { console.error('자동 노쇼 처리 실패:', e); }
        })();
    }, [isMeetingOver]);

    // 날짜 또는 종료 시간 변경 시 자동 노쇼 플래그 초기화
    useEffect(() => {
        hasAutoNoShowRef.current = false;
    }, [meetingTimes.date, meetingTimes.end]);

    const limit = testMode ? activeParticipants.length : (meetingTimes.maxLimit || 18);
    const activeList = activeParticipants.slice(0, limit);
    const waitingList = activeParticipants.slice(limit);
    const checkedInCount = activeList.filter(p=>p.checkedIn).length;
    const assignedIds = new Set(groupedTeams.flatMap(g => g.members.map(m => m.id)));
    const unassignedActive = activeList.filter(p => !assignedIds.has(p.id));

    // ===================== RENDER =====================

    return (
        <div className="min-h-screen pb-40 text-slate-900">
            {!isAppLocked && (
                <nav className="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 h-16 flex items-center px-4 shadow-sm">
                    <div className="max-w-5xl mx-auto w-full flex justify-between items-center">
                        <div className="flex items-center gap-1">
                            {['attendance','setup','history_list'].map(v => (
                                <button key={v} onClick={()=>setView(v)} className={`px-3 py-2 rounded-xl font-black text-xs transition-all ${view===v?'bg-teal-500 text-white shadow-lg':'text-slate-400 hover:text-slate-600'}`}>
                                    {v==='attendance'?'출석':v==='setup'?'선정':'기록'}
                                </button>
                            ))}
                        </div>
                        <div className="flex items-center gap-2">
                            {pendingRegistrations.length > 0 && (
                                <button onClick={()=>setIsPendingModalOpen(true)} className="relative p-2.5 rounded-xl bg-rose-50 text-rose-500">
                                    <Icon.Bell size={18} />
                                    <span className="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 text-white text-[9px] font-black rounded-full flex items-center justify-center">{pendingRegistrations.length}</span>

                                                    <textarea value={editBody} onChange={e=>setEditBody(e.target.value)} rows={3}

                                <button onClick={()=>setAlertModal(p=>({...p,show:false}))} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>
                            )}
                            <button onClick={()=>{ if(alertModal.onConfirm)alertModal.onConfirm(); setAlertModal(p=>({...p,show:false})); }}
                                className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">
                                {alertModal.type==='confirm'?'확인':'닫기'}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* 지도 장소 선택 모달 */}
            <LocationPickerModal
                isOpen={isLocationPickerOpen}
                onClose={() => setIsLocationPickerOpen(false)}
                initialLat={meetingTimes.locationLat}
                initialLng={meetingTimes.locationLng}
                initialName={meetingTimes.location}
                onConfirm={({ name, lat, lng }) => {
                    updateMeetingTimeSettings({ ...meetingTimes, location: name, locationLat: lat, locationLng: lng });
                    setIsLocationPickerOpen(false);
                }}
            />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
