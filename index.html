<head>

    <script>(function(){if(localStorage.getItem('moida_theme')==='dark')document.documentElement.classList.add('dark');})();</script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background: #f8fafc;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .card { transition: transform 0.15s ease, opacity 0.15s ease; }
        .card:active { transform: scale(0.97); opacity: 0.9; }
        .shake { animation: shake 0.4s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        input:focus { outline: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }
        /* ── 다크모드 ── */
        :root{--t-bg:#f8fafc;--t-surface:#ffffff;--t-s2:#f8fafc;--t-border:#e2e8f0;--t-text:#1e293b;--t-btn:#1e293b}
        html.dark{--t-bg:#0f172a;--t-surface:#1e293b;--t-s2:#0f172a;--t-border:#334155;--t-text:#f1f5f9;--t-btn:#14b8a6}
        html.dark body{background:var(--t-bg)!important;color:var(--t-text)}
        html.dark .card{background:var(--t-surface)!important;border-color:var(--t-border)!important}
        html.dark .bg-white{background:var(--t-surface)!important}
        html.dark .bg-slate-50{background:var(--t-s2)!important}
        html.dark .bg-slate-100{background:#334155!important}
        html.dark .bg-slate-200{background:#475569!important}
        html.dark .border-slate-100,html.dark .border-slate-200{border-color:var(--t-border)!important}
        html.dark .text-slate-900,html.dark .text-slate-800{color:var(--t-text)!important}
        html.dark .text-slate-700{color:#cbd5e1!important}
        html.dark .text-slate-500,html.dark .text-slate-400{color:#94a3b8!important}
        html.dark input{background:var(--t-surface)!important;border-color:var(--t-border)!important;color:var(--t-text)!important}
        html.dark .bg-blue-50{background:#0c1a2e!important} html.dark .border-blue-100{border-color:#1e3a5f!important} html.dark .bg-blue-100{background:#1e3a5f!important}
        html.dark .bg-emerald-50{background:#022c22!important} html.dark .border-emerald-100{border-color:#064e3b!important} html.dark .bg-emerald-100{background:#064e3b!important}
        html.dark .bg-teal-50{background:#042f2e!important} html.dark .border-teal-100{border-color:#134e4a!important} html.dark .bg-teal-100{background:#134e4a!important}
        html.dark .bg-violet-50{background:#1e1b4b!important} html.dark .border-violet-100{border-color:#2e1065!important} html.dark .bg-violet-100{background:#2e1065!important}
        html.dark .bg-rose-50{background:#2d0a11!important} html.dark .border-rose-100{border-color:#4c0519!important} html.dark .bg-rose-100{background:#4c0519!important}
        html.dark .text-blue-500{color:#60a5fa!important} html.dark .text-emerald-600{color:#34d399!important}
        html.dark .text-teal-600{color:#2dd4bf!important} html.dark .text-violet-600{color:#a78bfa!important} html.dark .text-rose-500{color:#fb7185!important}
    </style>
</head>

                    <svg width="22" height="22" viewBox="0 0 24 24" fill="black"><path d="M12 3C6.477 3 2 6.82 2 11.5c0 2.974 1.74 5.602 4.36 7.207L5.24 21 9.5 18.677c.827.162 1.674.246 2.5.246 5.523 0 10-3.82 10-8.5C22 6.82 17.523 3 12 3z"/></svg>

        <!-- 로딩 -->

    <!-- 토스트 -->
    <div id="toast" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;"
         class="text-white text-sm font-bold px-5 py-3 rounded-2xl shadow-lg whitespace-nowrap"></div>

    <script>
        const SVG_SUN = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
        const SVG_MOON = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('moida_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-toggle').innerHTML = isDark ? SVG_SUN : SVG_MOON;
        }
        (function(){ const isDark = document.documentElement.classList.contains('dark'); document.getElementById('theme-toggle').innerHTML = isDark ? SVG_SUN : SVG_MOON; })();

        const firebaseConfig = {
            apiKey: "AIzaSyBYykNZVf20LLQ-YIIeA2TKz9DSBsypRZM",
            authDomain: "moida-otpfc.firebaseapp.com",
            projectId: "moida-otpfc",
            storageBucket: "moida-otpfc.firebasestorage.app",
            messagingSenderId: "407991675090",
            appId: "1:407991675090:web:df9f7d8a7c93a6eb5ae50b"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const getCol = (n) => db.collection('artifacts').doc('moida-otpfc').collection('public').doc('data').collection(n);

        const ADMIN_ROLES = ['회장', '매니저', '총무', '부총무'];
        const LS_KEY = 'moida_member_data';

        if (window.Kakao && !Kakao.isInitialized()) Kakao.init('ce0f70554512198de18a346beb970a91');

        let pendingKakaoId = '';
        let pendingNickname = '';
        let isKakaoLoading = false;

        function getSaved() {
            try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch(e) { return null; }
        }

        function setKakaoLoginLoading(v) {
            isKakaoLoading = v;
            const btn = document.getElementById('kakao-login-btn');
            if (btn) {
                btn.disabled = v;
                btn.style.opacity = v ? '0.6' : '1';
                btn.innerHTML = v ? '연결 중...' :
                    '<svg width="22" height="22" viewBox="0 0 24 24" fill="black"><path d="M12 3C6.477 3 2 6.82 2 11.5c0 2.974 1.74 5.602 4.36 7.207L5.24 21 9.5 18.677c.827.162 1.674.246 2.5.246 5.523 0 10-3.82 10-8.5C22 6.82 17.523 3 12 3z"/></svg>카카오로 로그인';
            }
        }

        function resetKakaoStep() {
            pendingKakaoId = '';
            pendingNickname = '';
            document.getElementById('kakao-idle-step').style.display = 'block';
            document.getElementById('kakao-linking-step').style.display = 'none';
        }

        let loginTimeoutId = null;

        function handleKakaoLogin() {
            if (isKakaoLoading) return;
            try {
                if (!window.Kakao) { showToast('카카오 SDK 로드 실패. 새로고침 해주세요.', 'error'); return; }
                if (!Kakao.isInitialized()) Kakao.init('ce0f70554512198de18a346beb970a91');
            } catch(e) { showToast('카카오 초기화 오류: ' + e.message, 'error'); return; }

            setKakaoLoginLoading(true);

            // 팝업 차단 등으로 콜백 미호출 시 30초 후 자동 해제
            loginTimeoutId = setTimeout(() => {
                if (isKakaoLoading) {
                    setKakaoLoginLoading(false);
                    showToast('로그인 시간 초과. 팝업이 차단되었을 수 있습니다.', 'error');
                }
            }, 30000);

            const resetAndToast = (msg) => {
                clearTimeout(loginTimeoutId);
                setKakaoLoginLoading(false);
                showToast(msg, 'error');
            };

            try {
                Kakao.Auth.login({
                    success: () => {
                        Kakao.API.request({
                            url: '/v2/user/me',
                            success: async (res) => {
                                const kakaoId = String(res.id);
                                pendingNickname = res.kakao_account?.profile?.nickname || '';
                                try {
                                    const snap = await getCol('members').where('kakaoId', '==', kakaoId).get();
                                    clearTimeout(loginTimeoutId);
                                    if (!snap.empty) {
                                        const doc = snap.docs[0];
                                        const data = doc.data();
                                        if (data.isResigned) { resetAndToast('탈퇴한 회원입니다.'); return; }
                                        const memberData = { memberId: doc.id, name: data.name, role: data.role || '회원', kakaoId };
                                        localStorage.setItem(LS_KEY, JSON.stringify(memberData));
                                        routeByRole(memberData);
                                    } else {
                                        pendingKakaoId = kakaoId;
                                        document.getElementById('link-desc').innerHTML =
                                            (pendingNickname ? `<b>${pendingNickname}</b>님, ` : '') + '처음 로그인이시네요.<br/>기존 회원 계정과 카카오를 연결해주세요.';
                                        document.getElementById('kakao-idle-step').style.display = 'none';
                                        document.getElementById('kakao-linking-step').style.display = 'block';
                                        setKakaoLoginLoading(false);
                                    }
                                } catch(e) { resetAndToast('오류: ' + e.message); }
                            },
                            fail: (err) => { resetAndToast('카카오 정보 조회 실패: ' + (err?.error_description || err?.error || '오류')); }
                        });
                    },
                    fail: (err) => { resetAndToast('카카오 로그인 실패: ' + (err?.error_description || err?.error || '취소')); }
                });
            } catch(e) {
                resetAndToast('카카오 로그인 오류: ' + e.message);
            }
        }

        async function handleKakaoLink() {
            const name = (document.getElementById('link-name').value || '').trim();
            const birth6 = (document.getElementById('link-birth').value || '').replace(/[^0-9]/g, '').slice(0, 6);
            if (!name) { showToast('이름을 입력해주세요.', 'error'); return; }
            if (birth6.length !== 6) { showToast('생년월일 6자리(YYMMDD)를 입력해주세요.', 'error'); return; }

            const btn = document.getElementById('link-btn');
            btn.disabled = true;
            btn.textContent = '연결 중...';

            try {
                const snap = await getCol('members').where('name', '==', name).get();
                let found = null;
                snap.forEach(doc => {
                    const data = doc.data();
                    if (data.isResigned) return;
                    const b = String(data.birth || '');
                    if (b.substring(2) === birth6 || b === birth6) found = { id: doc.id, ...data };
                });
                if (!found) { showToast('이름 또는 생년월일이 일치하지 않습니다.', 'error'); return; }
                await getCol('members').doc(found.id).update({ kakaoId: pendingKakaoId });
                const memberData = { memberId: found.id, name: found.name, role: found.role || '회원', kakaoId: pendingKakaoId };
                localStorage.setItem(LS_KEY, JSON.stringify(memberData));
                showToast('카카오 계정이 연결되었습니다!', 'ok');
                setTimeout(() => routeByRole(memberData), 600);
            } catch(e) {
                showToast('연결 실패: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '계정 연결';
            }
        }

        function showView(id) {
            ['login-view', 'admin-view', 'loading-view'].forEach(v => {
                document.getElementById(v).style.display = 'none';
            });
            document.getElementById(id).style.display = id === 'loading-view' ? 'flex' : 'block';
        }

        let toastTimer = null;
        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.style.background = type === 'ok' ? '#059669' : '#ef4444';
            el.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function routeByRole(data) {
            if (ADMIN_ROLES.includes(data.role)) {
                document.getElementById('greeting-name').textContent = data.name + '님';
                document.getElementById('greeting-role').textContent = data.role;
                showView('admin-view');
            } else {
                location.href = 'member.html';
            }
        }

        async function initApp() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
            await auth.signInAnonymously().catch(() => {});

            const saved = getSaved();
            if (saved && saved.memberId && saved.kakaoId) {
                if (!saved.role) {
                    try {
                        const doc = await getCol('members').doc(saved.memberId).get();
                        if (doc.exists && !doc.data().isResigned) {
                            saved.role = doc.data().role || '회원';
                            localStorage.setItem(LS_KEY, JSON.stringify(saved));
                        } else {
                            localStorage.removeItem(LS_KEY);
                            showView('login-view');
                            return;
                        }
                    } catch(e) {
                        showView('login-view');
                        return;
                    }
                }
                routeByRole(saved);
            } else {
                showView('login-view');
            }
        }

        function doLogout() {
            localStorage.removeItem(LS_KEY);
            resetKakaoStep();
            showView('login-view');
        }

        initApp();
    </script>
</body>
</html>
