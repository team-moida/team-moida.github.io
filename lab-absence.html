<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>신청 단계 LAB · 불참/노쇼</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; --orange:#f97316; --warn:#F59E0B; --deep:#EA580C; --danger:#EF4444; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    margin:0; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(125% 90% at 50% -8%, #e8ecf9 0%, #f3f5fb 46%, #f4f6fa 100%);
    min-height:100vh; color:#0f172a; user-select:none;
  }
  .wrap{ max-width:440px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom)); }
  h1{ font-size:18px; font-weight:900; margin:6px 4px 2px; }
  .lead{ font-size:12px; font-weight:700; color:#94a3b8; margin:0 4px 16px; line-height:1.6; }
  .seclabel{ font-size:12px; font-weight:900; color:var(--accent); margin:20px 4px 8px; letter-spacing:.02em; }
  .seclabel small{ color:#94a3b8; font-weight:800; }

  /* 시점 선택 — 세로 타임라인 */
  .phases{ display:flex; flex-direction:column; gap:7px; }
  .ph{ display:flex; align-items:center; gap:11px; width:100%; text-align:left; border:1.5px solid #e6eaf2; background:#fff; border-radius:15px; padding:12px 14px; cursor:pointer; font-family:inherit; transition:border-color .15s, background .15s; }
  .ph .dot{ width:11px; height:11px; border-radius:50%; flex-shrink:0; background:#cbd5e1; }
  .ph .pt{ font-size:13.5px; font-weight:900; color:#334155; }
  .ph .pd{ font-size:11px; font-weight:700; color:#94a3b8; margin-top:2px; }
  .ph.on{ border-color:currentColor; background:#fbfcff; }
  .ph.on .dot{ background:currentColor; }
  .ph.on .pt{ color:currentColor; }

  .controls{ display:flex; gap:8px; margin-top:8px; }
  .seg{ display:flex; gap:6px; background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:5px; box-shadow:0 4px 14px rgba(0,0,0,.05); flex:1; }
  .seg button{ flex:1; border:0; background:transparent; border-radius:10px; padding:10px 4px; font-weight:900; font-size:12.5px; color:#64748b; cursor:pointer; font-family:inherit; }
  .seg button.on{ background:var(--accent); color:#fff; }

  /* 미리보기 카드 = 인디고 모임 카드 느낌 */
  .card{ background:linear-gradient(160deg,#1d47bd,#16357f); border-radius:22px; box-shadow:0 16px 34px -10px rgba(24,63,176,.5); padding:20px; color:#fff; }
  .chead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .chead .t{ font-size:11px; font-weight:900; color:rgba(255,255,255,.8); text-transform:uppercase; letter-spacing:.1em; }
  .chead .c{ display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:900; color:#fff; background:rgba(255,255,255,.2); padding:6px 12px; border-radius:999px; line-height:1; }
  .chead .c b{ font-size:16px; }
  .cdesc{ font-size:12px; font-weight:700; color:rgba(255,255,255,.72); margin:2px 0 18px; line-height:1.5; }
  .row{ display:flex; align-items:center; justify-content:center; gap:22px; padding:6px 0 10px; }
  .info{ display:flex; flex-direction:column; gap:9px; }
  .info .lab{ font-size:13px; font-weight:900; color:rgba(255,255,255,.82); }
  .info .k{ font-size:10.5px; font-weight:900; color:rgba(255,255,255,.62); margin-bottom:1px; }
  .info .v{ font-size:23px; font-weight:900; line-height:1; }

  /* 원형 토글 */
  .circle{ width:150px; height:150px; border-radius:50%; border:0; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:transform .14s ease, box-shadow .2s, background .2s; font-family:inherit; flex-shrink:0; color:#fff; }
  .circle:active{ transform:scale(.96); }
  .circle .big{ font-weight:900; font-size:19px; letter-spacing:.01em; text-align:center; }
  .circle .sub{ font-size:10.5px; font-weight:800; opacity:.85; margin-top:5px; }
  .circle.cancel{ background:rgba(255,255,255,.16); border:2px solid rgba(255,255,255,.42); }

  /* 가로 버튼 */
  .bar{ width:100%; border:0; border-radius:16px; font-weight:900; font-size:15px; padding:16px; cursor:pointer; transition:transform .14s, background .2s; font-family:inherit; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; }
  .bar:active{ transform:scale(.98); }
  .bar.cancel{ background:rgba(255,255,255,.16); border:1.5px solid rgba(255,255,255,.4); color:#fff; }

  /* 팝업 */
  .modal-bg{ position:fixed; inset:0; background:rgba(15,23,42,.46); backdrop-filter:blur(2px); display:none; align-items:center; justify-content:center; padding:26px; z-index:10; }
  .modal-bg.show{ display:flex; animation:bgIn .18s ease-out; }
  .modal{ background:#fff; border-radius:26px; padding:30px 24px 22px; max-width:320px; width:100%; text-align:center; box-shadow:0 30px 70px -22px rgba(0,0,0,.45); animation:popIn .26s cubic-bezier(.22,1,.36,1); color:#0f172a; }
  @keyframes bgIn{ from{opacity:0} }
  @keyframes popIn{ from{opacity:0;transform:translateY(10px) scale(.96)} }
  .badge{ width:66px; height:66px; border-radius:50%; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; font-size:34px; color:#fff; font-weight:900; }
  .modal .mt{ font-size:13px; font-weight:900; color:#94a3b8; }
  .modal .mnum{ font-size:30px; font-weight:900; color:#0f172a; margin:4px 0 2px; letter-spacing:-.01em; }
  .modal .msub{ font-size:12.5px; font-weight:800; color:#94a3b8; line-height:1.55; margin-top:6px; }
  .modal .mok{ margin-top:20px; width:100%; border:0; border-radius:16px; color:#fff; font-weight:900; font-size:15px; padding:14px; cursor:pointer; font-family:inherit; }
  .modal .mtitle{ font-size:18px; font-weight:900; color:#0f172a; }
  .modal .mwarn{ margin-top:14px; background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; font-size:12px; font-weight:800; line-height:1.55; padding:11px 13px; border-radius:14px; text-align:left; }
  .modal .mwarn b{ white-space:nowrap; }
  .modal .mreason{ width:100%; min-height:78px; resize:none; border:1.5px solid #e2e8f0; border-radius:14px; padding:11px 13px; font-family:inherit; font-size:13px; font-weight:700; color:#0f172a; margin-top:14px; line-height:1.5; }
  .modal .mreason:focus{ outline:none; border-color:#cbd5e1; }
  .modal .mreason::placeholder{ color:#cbd5e1; font-weight:700; }
  .rsn{ font-size:11px; font-weight:800; color:rgba(255,255,255,.72); margin-top:1px; max-width:150px; line-height:1.4; }
  .rsnbar{ text-align:center; font-size:11.5px; font-weight:800; color:rgba(255,255,255,.72); margin-top:11px; }
  /* 운영진 폰에 가는 알림 미리보기 */
  .notif{ background:#fff; border:1px solid #e6eaf2; border-radius:16px; padding:13px 14px; box-shadow:0 8px 20px -10px rgba(0,0,0,.16); display:flex; gap:11px; align-items:flex-start; animation:popIn .3s cubic-bezier(.22,1,.36,1); }
  .notif .ic{ width:38px; height:38px; border-radius:11px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .notif .nlab{ font-size:10.5px; font-weight:900; color:#94a3b8; margin-bottom:3px; }
  .notif .nt{ font-size:13.5px; font-weight:900; color:#0f172a; }
  .notif .nb{ font-size:12px; font-weight:700; color:#64748b; margin-top:2px; line-height:1.45; }
  .modal .mrow{ display:flex; gap:8px; margin-top:20px; }
  .modal .mrow button{ flex:1; border:0; border-radius:16px; font-weight:900; font-size:14.5px; padding:14px; cursor:pointer; font-family:inherit; }
  .modal .mkeep{ background:#f1f5f9; color:#64748b; }
  .modal .mcancel{ color:#fff; }

  .hint{ font-size:12px; font-weight:800; color:#94a3b8; margin:18px 4px 0; line-height:1.65; }
  #toast{ position:fixed; left:50%; bottom:32px; transform:translateX(-50%); background:#0f172a; color:#fff; font-weight:900; font-size:13px; padding:11px 18px; border-radius:999px; z-index:11; box-shadow:0 10px 30px rgba(0,0,0,.25); opacity:0; transition:.2s; pointer-events:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>신청 단계 LAB · 불참 / 노쇼</h1>
  <p class="lead">시간이 지나면 같은 자리의 신청 버튼이 <b>신청하기 → 불참 신청 → 노쇼 신청 → 당일 노쇼 신청</b>으로 바뀝니다. 불참·노쇼는 누를 때 <b>사유를 적을 수 있고</b>, 한 번 빠지면 대기 여부와 상관없이 <b>취소해도 순번이 항상 맨 뒤로</b> 밀려요. 신청하면 <b>담당 운영진에게 알림</b>이 갑니다(맨 아래 미리보기). 아래에서 시점을 바꿔보세요.</p>

  <div class="seclabel">현재 시점 <small>· 골라보세요</small></div>
  <div class="phases" id="phases"></div>

  <div class="controls">
    <div class="seg" id="segShape">
      <button data-v="circle" class="on">원형(홈)</button>
      <button data-v="bar">가로(모임)</button>
    </div>
  </div>

  <div class="seclabel">미리보기 <small>· 버튼을 눌러보세요</small></div>
  <div class="card">
    <div class="chead"><span class="t" id="ctag">선착순 신청</span><span class="c" id="count"><b>12</b> / 18명</span></div>
    <div class="cdesc" id="cdesc"></div>
    <div class="row" id="row"></div>
  </div>

  <div id="notifWrap"></div>

  <p class="hint" id="hint"></p>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script>
const ICON='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';

const PHASES = [
  { key:'open', color:'var(--orange)', cssColor:'#f97316', glow:'249,115,22',
    pt:'접수중', pd:'신청 마감 전 — 신청/취소',
    tag:'선착순 신청', desc:'지금은 신청을 받는 중이에요.',
    applyBig:'신청하기', applySub:'탭하면 신청', cancelBig:'신청 취소', cancelSub:'탭하면 취소',
    done:{ badge:'✓', t:'신청 완료', num:'참가 <b>13</b>번째', sub:'선착순 13 / 18명으로 신청됐어요.' },
    cancelWarn:'지금 취소하면 다시 신청할 때 <b>순번이 맨 뒤로 밀려요.</b> 정원이 찼다면 대기로 넘어갈 수 있어요.',
    hint:'접수중 — 평소 신청 화면. 누르면 순번 안내 + 버튼이 신청 취소로 토글돼요.' },

  { key:'absent', color:'var(--warn)', cssColor:'#F59E0B', glow:'245,158,11',
    pt:'신청 마감 후', pd:'불참 신청 기간 — 미리 알리면 벌금 없음',
    tag:'신청 마감 · 불참 알리기', desc:'신청은 마감됐어요. 못 오면 미리 알려주세요.',
    applyBig:'불참 신청', applySub:'못 가면 미리', cancelBig:'불참 취소', cancelSub:'참석으로',
    done:{ badge:'!', t:'불참으로 알렸어요', num:'미리 통보', sub:'미리 알려주셔서 벌금 없이 처리돼요.' },
    cancelWarn:'불참을 취소하면 다시 참석하게 되지만, 대기 여부와 상관없이 <b>순번이 맨 뒤로 밀려요.</b>',
    hint:'신청 마감 후 — 등록한 사람이 “못 간다”를 미리 알리는 단계(불참 신청). 벌금 없음.' },

  { key:'noshow', color:'var(--deep)', cssColor:'#EA580C', glow:'234,88,12',
    pt:'불참 기간 종료', pd:'노쇼 신청 — 늦은 통보(벌금)',
    tag:'불참 기간 종료 · 노쇼', desc:'불참 기간이 지났어요. 지금 빠지면 노쇼로 기록돼요.',
    applyBig:'노쇼 신청', applySub:'늦은 통보', cancelBig:'노쇼 취소', cancelSub:'참석으로',
    done:{ badge:'!', t:'노쇼로 기록돼요', num:'통보 노쇼', sub:'불참 기간이 지나 노쇼(벌금)로 처리돼요.' },
    cancelWarn:'노쇼 신청을 취소해도 참석 순번은 대기 여부와 상관없이 <b>맨 뒤로 밀려요.</b>',
    hint:'불참 기간 종료 후 — 빠지면 노쇼(벌금). “노쇼 신청”으로 통보는 남겨요.' },

  { key:'today', color:'var(--danger)', cssColor:'#EF4444', glow:'239,68,68',
    pt:'당일', pd:'당일 노쇼 — 벌금 가장 큼',
    tag:'당일 · 노쇼', desc:'오늘 모임 당일이에요. 지금 빠지면 당일 노쇼예요.',
    applyBig:'당일 노쇼 신청', applySub:'벌금 가장 큼', cancelBig:'당일 노쇼 취소', cancelSub:'참석으로',
    done:{ badge:'!', t:'당일 노쇼로 기록돼요', num:'당일 노쇼', sub:'당일 통보라 벌금이 가장 커요.' },
    cancelWarn:'당일 노쇼 신청을 취소해도 참석 순번은 대기 여부와 상관없이 <b>맨 뒤로 밀려요.</b>',
    hint:'당일 — 당일 노쇼(벌금 최대). 라벨·색이 가장 강해요.' },
];

let pi=0, shape='circle', applied=false, reason='';
const row=document.getElementById('row'), countEl=document.getElementById('count');
const ctag=document.getElementById('ctag'), cdesc=document.getElementById('cdesc'), hint=document.getElementById('hint');
const modalBg=document.getElementById('modalBg'), modal=document.getElementById('modal');

// 시점 타임라인 버튼
const phasesEl=document.getElementById('phases');
PHASES.forEach((p,i)=>{
  const b=document.createElement('button');
  b.className='ph'+(i===0?' on':''); b.style.color=p.cssColor;
  b.innerHTML=`<span class="dot"></span><span><span class="pt">${p.pt}</span><span class="pd">${p.pd}</span></span>`;
  b.onclick=()=>{ pi=i; applied=false; reason=''; document.querySelectorAll('.ph').forEach(x=>x.classList.remove('on')); b.classList.add('on'); render(); };
  phasesEl.appendChild(b);
});

function render(){
  const p=PHASES[pi];
  ctag.textContent=p.tag;
  cdesc.textContent=p.desc;
  hint.textContent=p.hint;
  countEl.innerHTML=`${ICON}<span><b>12</b> / 18명</span>`;
  row.innerHTML='';

  const apply=!applied;
  if(shape==='circle'){
    const el=document.createElement('button');
    el.className='circle'+(apply?'':' cancel');
    if(apply){ el.style.background=p.cssColor; el.style.boxShadow=`0 0 0 8px rgba(${p.glow},.12), 0 16px 30px -14px rgba(${p.glow},.65)`; }
    el.innerHTML = apply
      ? `<span class="big">${p.applyBig}</span><span class="sub">${p.applySub}</span>`
      : `<span class="big">${p.cancelBig}</span><span class="sub">${p.cancelSub}</span>`;
    el.onclick = apply ? doApply : doCancel;
    row.appendChild(el);

    const info=document.createElement('div');
    info.className='info';
    const counts=`<div><div class="k">현재 인원</div><div class="v">12<span style="font-size:14px"> 명</span></div></div><div><div class="k">정원</div><div class="v">18<span style="font-size:14px"> 명</span></div></div>`;
    const rsn=(applied && reason) ? `<div class="rsn">사유: ${reason}</div>` : '';
    info.innerHTML = (applied ? `<span class="lab">${p.done.t}</span>${rsn}` : `<span class="lab">${p.tag}</span>`) + counts;
    row.appendChild(info);
  } else {
    row.style.display='block';
    const el=document.createElement('button');
    el.className='bar'+(apply?'':' cancel');
    if(apply){ el.style.background=p.cssColor; el.style.boxShadow=`0 12px 26px -12px rgba(${p.glow},.55)`; }
    el.textContent = apply ? p.applyBig : p.cancelBig;
    el.onclick = apply ? doApply : doCancel;
    row.appendChild(el);
    if(applied && reason){ const r=document.createElement('div'); r.className='rsnbar'; r.textContent='사유: '+reason; row.appendChild(r); }
  }
  if(shape==='circle') row.style.display='flex';

  // 운영진(담당자) 폰에 가는 알림 미리보기 — 불참/노쇼 신청을 했을 때만
  const nw=document.getElementById('notifWrap');
  if(applied && pi>0){
    const who='김모이', isNo=pi>=2, fine=pi===2?10000:pi===3?20000:0;
    const title=isNo?'🚫 노쇼 신청':'🙏 불참 신청';
    let body=`${who}님이 7/5 모임에 ${isNo?'노쇼':'불참'}을 신청했어요.`;
    if(fine>0) body+=` (벌금 ${fine.toLocaleString()}원)`;
    if(reason) body+=` · 사유: ${reason}`;
    nw.innerHTML=`<div class="seclabel" style="margin-top:18px">담당 운영진 폰 알림 <small>· 신청하면 이렇게 가요</small></div>
      <div class="notif"><div class="ic">🔔</div><div style="min-width:0"><div class="nlab">모이다 · 방금</div><div class="nt">${title}</div><div class="nb">${body}</div></div></div>`;
  } else nw.innerHTML='';
}

function doApply(){
  const p=PHASES[pi], d=p.done;
  if(pi===0){
    // 신청 — 완료 팝업(순번 안내)
    modal.innerHTML = `
      <div class="badge" style="background:${p.cssColor};box-shadow:0 12px 26px -10px rgba(${p.glow},.55)">${d.badge}</div>
      <div class="mt">${d.t}</div>
      <div class="mnum">${d.num}</div>
      <div class="msub">${d.sub}</div>
      <button class="mok" style="background:${p.cssColor}">확인</button>`;
    modalBg.classList.add('show');
    modal.querySelector('.mok').onclick=()=>{ modalBg.classList.remove('show'); applied=true; render(); };
  } else {
    // 불참/노쇼 — 사유 입력 후 확정
    modal.innerHTML = `
      <div class="badge" style="background:${p.cssColor};box-shadow:0 12px 26px -10px rgba(${p.glow},.55)">!</div>
      <div class="mtitle">${p.applyBig}</div>
      <textarea class="mreason" id="reasonInput" placeholder="사유를 적어주세요 (선택)&#10;예: 갑자기 일이 생겼어요">${reason}</textarea>
      <div class="msub" style="margin-top:10px">${d.sub}</div>
      <div class="mwarn">담당 운영진에게 <b>알림이 가요.</b> 다시 참석하려면 취소할 수 있지만 <b>순번은 맨 뒤로</b> 밀려요.</div>
      <div class="mrow">
        <button class="mkeep">그대로 둘게요</button>
        <button class="mcancel" style="background:${p.cssColor}">${p.applyBig}</button>
      </div>`;
    modalBg.classList.add('show');
    setTimeout(()=>{ const ta=document.getElementById('reasonInput'); if(ta) ta.focus(); }, 80);
    modal.querySelector('.mkeep').onclick=()=>{ modalBg.classList.remove('show'); };
    modal.querySelector('.mcancel').onclick=()=>{ reason=(document.getElementById('reasonInput').value||'').trim(); modalBg.classList.remove('show'); applied=true; render(); flash('담당 운영진에게 알림이 갔어요 📨'); };
  }
}
function doCancel(){
  const p=PHASES[pi];
  modal.innerHTML = `
    <div class="badge" style="background:var(--warn)">!</div>
    <div class="mtitle">${p.cancelBig}할까요?</div>
    <div class="mwarn">${p.cancelWarn}</div>
    <div class="mrow">
      <button class="mkeep">그대로 둘게요</button>
      <button class="mcancel" style="background:${p.cssColor}">${p.cancelBig}</button>
    </div>`;
  modalBg.classList.add('show');
  modal.querySelector('.mkeep').onclick=()=>{ modalBg.classList.remove('show'); };
  modal.querySelector('.mcancel').onclick=()=>{ modalBg.classList.remove('show'); applied=false; render(); flash(p.cancelBig+'됐어요'); };
}
modalBg.onclick=(e)=>{ if(e.target===modalBg) modalBg.classList.remove('show'); };

document.getElementById('segShape').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#segShape button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); shape=b.dataset.v; render(); });

let toastT; const toast=document.getElementById('toast');
function flash(m){ toast.textContent=m; toast.style.opacity='1'; clearTimeout(toastT); toastT=setTimeout(()=>toast.style.opacity='0',1400); }

render();
</script>
</body>
</html>
