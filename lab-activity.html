<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="robots" content="noindex"/>
<title>내 활동 카드 — lab (기준)</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#f1f5f9;
    font-family:system-ui,-apple-system,"Segoe UI","Pretendard",sans-serif;color:#0f172a;
    padding:max(16px,env(safe-area-inset-top)) 0 max(40px,env(safe-area-inset-bottom));}
  .lab-wrap{max-width:420px;margin:0 auto;padding:0 16px;}
  .lab-top{padding:8px 4px 4px;}
  .lab-top h1{font-size:18px;font-weight:900;margin:0 0 4px;letter-spacing:-.5px;}
  .lab-top p{font-size:12px;color:#64748b;margin:0;line-height:1.5;font-weight:700;}
  .lab-item{margin-top:22px;}
  .lab-cap{margin:0 2px 9px;}
  .lab-no{display:inline-block;font-size:11px;font-weight:900;color:#fff;background:#122E78;border-radius:6px;padding:2px 7px;margin-right:6px;vertical-align:middle;}
  .lab-name{font-size:14px;font-weight:900;letter-spacing:-.3px;vertical-align:middle;}
  .lab-foot{margin-top:34px;text-align:center;font-size:11px;color:#94a3b8;font-weight:700;}

  /* =========================================================
     '내 활동' 카드 — 현재 앱(tab-home.js MyActivitySummaryCard)과 동일
     아래 .act-* 만 손보면 됩니다. (값 1개씩 바꿔가며 시안)
     ========================================================= */

  /* 카드 본체 (card rounded-2xl p-5) */
  .act-card{
    display:block; width:100%; text-align:left; cursor:pointer;
    background:#fff; border:0; border-radius:16px; padding:20px;
    box-shadow:0 4px 14px rgba(0,0,0,.05);
    transition:transform .1s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .act-card:active{ transform:scale(.98); }

  /* 헤더: 제목 + 자세히 */
  .act-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .act-title{ margin:0; font-size:16px; font-weight:900; color:#1e293b; }
  .act-more{ display:inline-flex; align-items:center; gap:2px; font-size:12px; font-weight:900; color:#94a3b8; }
  .act-more svg{ display:block; }

  /* 본문: 출석률 링 + 통계 3종 */
  .act-body{ display:flex; align-items:center; gap:12px; }

  /* 출석률 도넛 (conic-gradient) */
  .act-ring{
    width:64px; height:64px; flex:0 0 auto; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:conic-gradient(#183FB0 0% 83%, #e6ebf5 83% 100%);
  }
  .act-ring-inner{
    width:48px; height:48px; border-radius:50%; background:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .act-rate{ font-size:16px; font-weight:900; color:#122E78; line-height:1; }

  /* 통계 3종 (grid 3) */
  .act-stats{ flex:1; min-width:0; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .act-stat{ border-radius:12px; padding:8px 0; text-align:center; }
  .act-stat-num{ margin:0; font-size:18px; font-weight:900; line-height:1; }
  .act-stat-label{ margin:4px 0 0; font-size:10px; font-weight:900; }
  .act-go{ background:#ecfdf5; } .act-go .act-stat-num,.act-go .act-stat-label{ color:#059669; }
  .act-late{ background:#fffbeb; } .act-late .act-stat-num,.act-late .act-stat-label{ color:#d97706; }
  .act-no{ background:#fff1f2; } .act-no .act-stat-num,.act-no .act-stat-label{ color:#f43f5e; }

  /* 연속 출석 배지 (streak>=2일 때만) */
  .act-streak{
    display:inline-flex; align-items:center; gap:4px; margin-top:12px;
    font-size:11.5px; font-weight:900; color:#15171E;
    background:#C2F94A; border-radius:999px; padding:4px 10px;
  }

  /* 빈 상태 (기록 없을 때) */
  .act-empty{ text-align:center; }
  .act-empty-title{ margin:0; font-size:14px; font-weight:900; color:#334155; }
  .act-empty-sub{ margin:4px 0 0; font-size:12px; color:#94a3b8; }
</style>
</head>
<body>
  <div class="lab-wrap">
    <div class="lab-top">
      <h1>🧪 "내 활동" 카드 · lab (기준)</h1>
      <p>지금 앱에 있는 카드 그대로입니다. 여기서 색·크기·배치를 조금씩 바꿔가며 시안을 잡습니다. 바꾸고 싶은 부분을 말해주세요.</p>
    </div>

    <section class="lab-item">
      <div class="lab-cap"><span class="lab-no">기본</span><span class="lab-name">활동 있을 때 (출석률 83% · 출석10·지각2·노쇼1 · 🔥5회 연속)</span></div>
      <button class="act-card">
        <div class="act-head">
          <p class="act-title">내 활동</p>
          <span class="act-more">자세히 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
        </div>
        <div class="act-body">
          <div class="act-ring"><div class="act-ring-inner"><span class="act-rate">83%</span></div></div>
          <div class="act-stats">
            <div class="act-stat act-go"><p class="act-stat-num">10</p><p class="act-stat-label">출석</p></div>
            <div class="act-stat act-late"><p class="act-stat-num">2</p><p class="act-stat-label">지각</p></div>
            <div class="act-stat act-no"><p class="act-stat-num">1</p><p class="act-stat-label">노쇼</p></div>
          </div>
        </div>
        <span class="act-streak">🔥 5회 연속 출석 중</span>
      </button>
    </section>

    <section class="lab-item">
      <div class="lab-cap"><span class="lab-no">빈 상태</span><span class="lab-name">활동 기록 없을 때</span></div>
      <div class="act-card act-empty">
        <p class="act-empty-title">아직 활동 기록이 없어요</p>
        <p class="act-empty-sub">첫 모임에 참여하면 여기에 내 출석이 쌓여요</p>
      </div>
    </section>

    <p class="lab-foot">미리보기 전용(noindex) · 확정 후 실제 카드에 적용하고 이 페이지는 제거합니다</p>
  </div>
</body>
</html>
