<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>내 활동 카드 — lab (실제 카드)</title>

<!-- 앱(member.html)과 동일한 렌더 환경 그대로 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/subsets/Paperlogy-dynamic-subset.css" type="text/css">
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="member.css">
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="tailwind-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="member-icons.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

<style>
  body{ background:#eef2fb; }
  .lab-wrap{ max-width:420px; margin:0 auto; padding:max(16px,env(safe-area-inset-top)) 16px max(40px,env(safe-area-inset-bottom)); }
  .lab-top h1{ font-size:18px; font-weight:900; margin:0 0 4px; letter-spacing:-.5px; }
  .lab-top p{ font-size:12px; color:#64748b; margin:0; line-height:1.5; font-weight:700; }
  .lab-item{ margin-top:22px; }
  .lab-cap{ margin:0 2px 9px; }
  .lab-no{ display:inline-block; font-size:11px; font-weight:900; color:#fff; background:#122E78; border-radius:6px; padding:2px 7px; margin-right:6px; vertical-align:middle; }
  .lab-name{ font-size:13px; font-weight:900; letter-spacing:-.3px; vertical-align:middle; color:#334155; }
  .lab-foot{ margin-top:34px; text-align:center; font-size:11px; color:#94a3b8; font-weight:700; }
</style>
</head>
<body class="min-h-screen">
  <div class="lab-wrap">
    <div class="lab-top">
      <h1>🧪 "내 활동" 카드 · lab (실제 카드)</h1>
      <p>앱 코드(MyActivitySummaryCard)를 그대로 같은 환경에서 렌더한 것입니다 = 지금 쓰는 카드와 동일. 여기서 조금씩 고쳐 시안을 잡습니다.</p>
    </div>

    <section class="lab-item">
      <div class="lab-cap"><span class="lab-no">기본</span><span class="lab-name">활동 있을 때</span></div>
      <div id="card-active"></div>
    </section>

    <section class="lab-item">
      <div class="lab-cap"><span class="lab-no">빈 상태</span><span class="lab-name">활동 기록 없을 때</span></div>
      <div id="card-empty"></div>
    </section>

    <p class="lab-foot">미리보기 전용(noindex) · 확정 후 실제 카드에 적용하고 이 페이지는 제거합니다</p>
  </div>

<script type="text/babel">
// ── 앱 tab-home.js의 MyActivitySummaryCard 원본 그대로 (수정 없음) ──
const MyActivitySummaryCard = ({ attendHistory, memberInfo, onTabChange }) => {
    const myId = memberInfo?.id;
    const mine = React.useMemo(() => {
        if (!myId) return [];
        const out = [];
        (attendHistory || []).forEach(h => {
            const rec = (h.records || []).find(r => r.memberId === myId);
            if (rec && rec.status && rec.status !== '대기') out.push({ date: h.date || '', status: rec.status });
        });
        return out.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }, [attendHistory, myId]);

    if (!myId || mine.length === 0) {
        return (
            <div className="card rounded-2xl p-5 text-center">
                <p className="font-black text-sm text-slate-700">아직 활동 기록이 없어요</p>
                <p className="text-xs text-slate-400 mt-1">첫 모임에 참여하면 여기에 내 출석이 쌓여요</p>
            </div>
        );
    }

    const go = mine.filter(m => m.status === '정상').length;
    const late = mine.filter(m => m.status === '지각').length;
    const no = mine.filter(m => m.status === '노쇼').length;
    const confirmed = go + late + no;
    const rate = confirmed ? Math.round((go + late) / confirmed * 100) : 0;
    let streak = 0;
    for (const m of mine) { if (m.status === '정상' || m.status === '지각') streak++; else break; }

    return (
        <button onClick={() => onTabChange && onTabChange('my')} className="w-full card rounded-2xl p-5 text-left active:scale-98 transition-all">
            <div className="flex items-center justify-between mb-3">
                <p className="font-black text-base text-slate-800">내 활동</p>
                <span className="inline-flex items-center gap-0.5 text-xs font-black text-slate-400">자세히 <Icon.ChevronRight size={14}/></span>
            </div>
            <div className="flex items-center gap-3">
                <div className="w-16 h-16 rounded-full flex-shrink-0 flex items-center justify-center" style={{ background: `conic-gradient(#183FB0 0% ${rate}%, #e6ebf5 ${rate}% 100%)` }}>
                    <div className="w-12 h-12 rounded-full bg-white flex flex-col items-center justify-center">
                        <span className="text-base font-black text-teal-600 leading-none">{rate}%</span>
                    </div>
                </div>
                <div className="flex-1 grid grid-cols-3 gap-2 min-w-0">
                    <div className="rounded-xl py-2 text-center bg-emerald-50"><p className="text-lg font-black text-emerald-600 leading-none">{go}</p><p className="text-[10px] font-black text-emerald-600 mt-1">출석</p></div>
                    <div className="rounded-xl py-2 text-center bg-amber-50"><p className="text-lg font-black text-amber-600 leading-none">{late}</p><p className="text-[10px] font-black text-amber-600 mt-1">지각</p></div>
                    <div className="rounded-xl py-2 text-center bg-rose-50"><p className="text-lg font-black text-rose-500 leading-none">{no}</p><p className="text-[10px] font-black text-rose-500 mt-1">노쇼</p></div>
                </div>
            </div>
            {streak >= 2 && <span className="inline-flex items-center gap-1 mt-3 text-[11.5px] font-black px-2.5 py-1 rounded-full bg-live text-[#15171E]">🔥 {streak}회 연속 출석 중</span>}
        </button>
    );
};

// 샘플 데이터: 정상10·지각2·노쇼1 (rate 92%), 최근 5회 연속 출석
const HIST = [
    { date:'2026-06-28', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-06-21', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-06-14', records:[{memberId:'me', status:'지각'}] },
    { date:'2026-06-07', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-05-31', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-05-24', records:[{memberId:'me', status:'노쇼'}] },
    { date:'2026-05-17', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-05-10', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-05-03', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-04-26', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-04-19', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-04-12', records:[{memberId:'me', status:'지각'}] },
    { date:'2026-04-05', records:[{memberId:'me', status:'정상'}] },
];

ReactDOM.createRoot(document.getElementById('card-active'))
    .render(<MyActivitySummaryCard attendHistory={HIST} memberInfo={{ id:'me' }} onTabChange={()=>{}} />);
ReactDOM.createRoot(document.getElementById('card-empty'))
    .render(<MyActivitySummaryCard attendHistory={[]} memberInfo={{ id:'me' }} onTabChange={()=>{}} />);
</script>
</body>
</html>
