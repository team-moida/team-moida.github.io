  body{ background:#eef2fb; }
  .lab-wrap{ max-width:420px; margin:0 auto; padding:max(16px,env(safe-area-inset-top)) 16px max(40px,env(safe-area-inset-bottom)); }
  .lab-top h1{ font-size:18px; font-weight:900; margin:0 0 4px; letter-spacing:-.5px; }
  .lab-top p{ font-size:12px; color:#64748b; margin:0; line-height:1.5; font-weight:700; }
  .lab-item{ margin-top:22px; }
  .lab-cap{ margin:0 2px 9px; }

  .lab-foot{ margin-top:34px; text-align:center; font-size:11px; color:#94a3b8; font-weight:700; }

<body class="min-h-screen">
  <div class="lab-wrap">
    <div class="lab-top">
      <h1>🧪 "내 활동" · 비율색 도넛 + 애니메이션</h1>
      <p>도넛 색이 출석률에 따라 초록(높음)↔빨강(낮음)으로 변합니다. % 는 도넛 정중앙(라벨 제거), 진입 시 그래프 채움 + 숫자 카운트업. "다시 보기"로 애니메이션 재생.</p>
    </div>
    <section class="lab-item"><div class="lab-cap"><span class="lab-no">새안 1</span><span class="lab-name">가운데 대형 도넛</span></div><div id="card-centered"></div></section>
    <section class="lab-item"><div class="lab-cap"><span class="lab-no">새안 2</span><span class="lab-name">좌측 도넛 + 세로 범례</span></div><div id="card-side"></div></section>
    <section class="lab-item"><div class="lab-cap"><span class="lab-no">현재</span><span class="lab-name">지금 쓰는 카드 (참고)</span></div><div id="card-orig"></div></section>
    <section class="lab-item"><div class="lab-cap"><span class="lab-no">빈 상태</span><span class="lab-name">활동 기록 없을 때</span></div><div id="card-empty"></div></section>
    <p class="lab-foot">미리보기 전용(noindex) · 확정 후 실제 카드에 적용하고 이 페이지는 제거합니다</p>
  </div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// 진입 시 0→1 로 올라가는 진행도(easeOutCubic). 마운트될 때마다 1회 실행.
function easeOutCubic(x){ return 1 - Math.pow(1 - x, 3); }
function useCountUp(duration){
    const [t, setT] = useState(0);
    useEffect(() => {
        let raf; const start = performance.now();
        const tick = (now) => {
            const p = Math.min(1, (now - start) / duration);
            setT(easeOutCubic(p));
            if (p < 1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
    }, []);
    return t;
}

// 출석률(0~100) → 빨강(0)·주황(50)·초록(100) 보간. 색은 팔레트(노쇼#EF4444·지각#F59E0B·출석#059669)와 맞춤.
function rateColor(rate){
    const r = Math.max(0, Math.min(100, rate)) / 100;
    const red = [239,68,68], amber = [245,158,11], green = [5,150,105];
    let a, b, tt;
    if (r < 0.5) { a = red; b = amber; tt = r / 0.5; }
    else { a = amber; b = green; tt = (r - 0.5) / 0.5; }
    const m = a.map((v,i) => Math.round(v + (b[i] - v) * tt));
    return `rgb(${m[0]}, ${m[1]}, ${m[2]})`;
}

// 공통 계산 (원본과 동일)
function useActivity(attendHistory, memberInfo){
    const myId = memberInfo?.id;
    const mine = useMemo(() => {
        if (!myId) return [];
        const out = [];
        (attendHistory || []).forEach(h => {
            const rec = (h.records || []).find(r => r.memberId === myId);
            if (rec && rec.status && rec.status !== '대기') out.push({ date: h.date || '', status: rec.status });
        });
        return out.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }, [attendHistory, myId]);
    const go = mine.filter(m => m.status === '정상').length;
    const late = mine.filter(m => m.status === '지각').length;
    const no = mine.filter(m => m.status === '노쇼').length;
    const confirmed = go + late + no;
    const rate = confirmed ? Math.round((go + late) / confirmed * 100) : 0;
    let streak = 0;
    for (const m of mine) { if (m.status === '정상' || m.status === '지각') streak++; else break; }
    return { hasData: !!myId && mine.length > 0, go, late, no, confirmed, rate, streak };
}

const EmptyCard = () => (
    <div className="card rounded-2xl p-5 text-center">
        <p className="font-black text-sm text-slate-700">아직 활동 기록이 없어요</p>
        <p className="text-xs text-slate-400 mt-1">첫 모임에 참여하면 여기에 내 출석이 쌓여요</p>
    </div>
);

const Header = () => (
    <div className="flex items-center justify-between mb-4">
        <p className="font-black text-base text-slate-800">내 활동</p>
        <span className="inline-flex items-center gap-0.5 text-xs font-black text-slate-400">자세히 <Icon.ChevronRight size={14}/></span>
    </div>
);

// ── 슬롯머신 숫자: 0~9 릴을 여러 바퀴 빠르게 돌다가 ease-out으로 서서히 최종 숫자에 멈춤 ──
const SLOT_EASE = 'cubic-bezier(0.16, 1, 0.3, 1)';
const SlotDigit = ({ d, delay, duration }) => {
    const LOOPS = 5;                       // 멈추기 전 도는 바퀴 수(빠른 회전 느낌)
    const cells = [];
    for (let l = 0; l < LOOPS; l++) for (let n = 0; n < 10; n++) cells.push(n);
    for (let n = 0; n <= d; n++) cells.push(n);   // 마지막에 목표 숫자에서 멈춤
    const finalIndex = LOOPS * 10 + d;
    const [y, setY] = useState(0);
    useEffect(() => {
        let r1, r2;
        r1 = requestAnimationFrame(() => { r2 = requestAnimationFrame(() => setY(finalIndex)); });
        return () => { cancelAnimationFrame(r1); cancelAnimationFrame(r2); };
    }, []);
    return (
        <span style={{ display:'inline-block', height:'1em', lineHeight:'1em', overflow:'hidden', verticalAlign:'bottom' }}>
            <span style={{ display:'flex', flexDirection:'column', transform:`translateY(-${y}em)`, transition:`transform ${duration}ms ${SLOT_EASE} ${delay}ms` }}>
                {cells.map((n, i) => <span key={i} style={{ height:'1em', textAlign:'center' }}>{n}</span>)}
            </span>
        </span>
    );
};
const SlotNumber = ({ value, baseDelay = 0, baseDuration = 1100 }) => {
    const digits = String(Math.max(0, Math.round(value || 0))).split('');
    return (
        <span style={{ fontVariantNumeric:'tabular-nums', display:'inline-flex' }}>
            {digits.map((ch, i) => <SlotDigit key={i} d={parseInt(ch, 10)} delay={baseDelay + i * 90} duration={baseDuration + i * 160} />)}
        </span>
    );
};

// ── 새안 1: 가운데 대형 도넛 ──
const CardCentered = ({ attendHistory, memberInfo, onTabChange }) => {
    const t = useCountUp(1100);
    const a = useActivity(attendHistory, memberInfo);
    if (!a.hasData) return <EmptyCard/>;
    const dRate = Math.round(a.rate * t), dGo = Math.round(a.go * t), dLate = Math.round(a.late * t), dNo = Math.round(a.no * t);
    const segGo = a.confirmed ? a.go / a.confirmed * 100 : 0;
    const segLate = a.confirmed ? (a.go + a.late) / a.confirmed * 100 : 0;
    const sweep = 100 * t, g = Math.min(segGo, sweep), y = Math.min(segLate, sweep);
    // 링: 출석(초록)→지각(노랑)→노쇼(빨강) 세그먼트, 진입 시 sweep 만큼만 드러남(나머지 회색 트랙)
    const ringBg = `conic-gradient(#059669 0 ${g}%, #F59E0B ${g}% ${y}%, #EF4444 ${y}% ${sweep}%, #eef2f7 ${sweep}% 100%)`;
    // 가운데 % 색: 카운트업 값에 따라 빨강→노랑→초록
    const numCol = rateColor(dRate);
    return (
        <button onClick={() => onTabChange && onTabChange('my')} className="w-full card rounded-2xl p-5 text-left active:scale-98 transition-all">
            <Header/>
            <div className="relative flex flex-col items-center">
                {a.streak >= 2 && (
                    <span className="absolute top-0 right-0 inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-live text-[#15171E] text-xs font-black">🔥 {a.streak}연속</span>
                )}
                <div className="relative rounded-full flex items-center justify-center" style={{ width:168, height:168, background:ringBg }}>
                    <div className="absolute rounded-full bg-white flex items-center justify-center" style={{ width:122, height:122 }}>
                        <span className="font-black leading-none" style={{ color:numCol, fontSize:46 }}>{dRate}<span style={{ fontSize:26 }}>%</span></span>
                    </div>
                </div>
            </div>
            <div className="mt-5 flex items-center justify-around">
                <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ background:'#059669' }}/><span className="text-xs font-black text-slate-500">출석</span><span className="text-sm font-black text-slate-800"><SlotNumber value={a.go} baseDelay={0}/></span></div>
                <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ background:'#F59E0B' }}/><span className="text-xs font-black text-slate-500">지각</span><span className="text-sm font-black text-slate-800"><SlotNumber value={a.late} baseDelay={140}/></span></div>
                <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ background:'#EF4444' }}/><span className="text-xs font-black text-slate-500">노쇼</span><span className="text-sm font-black text-slate-800"><SlotNumber value={a.no} baseDelay={280}/></span></div>
            </div>
        </button>
    );
};

// ── 새안 2: 좌측 도넛 + 세로 범례 ──
const CardSide = ({ attendHistory, memberInfo, onTabChange }) => {
    const t = useCountUp(1100);
    const a = useActivity(attendHistory, memberInfo);
    if (!a.hasData) return <EmptyCard/>;
    const dRate = Math.round(a.rate * t), dGo = Math.round(a.go * t), dLate = Math.round(a.late * t), dNo = Math.round(a.no * t);
    const segGo = a.confirmed ? a.go / a.confirmed * 100 : 0;
    const segLate = a.confirmed ? (a.go + a.late) / a.confirmed * 100 : 0;
    const sweep = 100 * t, g = Math.min(segGo, sweep), y = Math.min(segLate, sweep);
    // 링: 출석(초록)→지각(노랑)→노쇼(빨강) 세그먼트, 진입 시 sweep 만큼만 드러남(나머지 회색 트랙)
    const ringBg = `conic-gradient(#059669 0 ${g}%, #F59E0B ${g}% ${y}%, #EF4444 ${y}% ${sweep}%, #eef2f7 ${sweep}% 100%)`;
    // 가운데 % 색: 카운트업 값에 따라 빨강→노랑→초록
    const numCol = rateColor(dRate);
    const Row = ({ c, label, val }) => (
        <div className="flex items-center justify-between">
            <span className="flex items-center gap-2 text-sm font-black text-slate-500"><span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background:c }}/>{label}</span>
            <span className="text-sm font-black text-slate-800 tabular-nums">{val}</span>
        </div>
    );
    return (
        <button onClick={() => onTabChange && onTabChange('my')} className="w-full card rounded-2xl p-5 text-left active:scale-98 transition-all">
            <Header/>
            <div className="flex items-center gap-5">
                <div className="relative shrink-0 rounded-full flex items-center justify-center" style={{ width:140, height:140, background:ringBg }}>
                    <div className="absolute rounded-full bg-white flex items-center justify-center" style={{ width:100, height:100 }}>
                        <span className="font-black leading-none" style={{ color:numCol, fontSize:32 }}>{dRate}<span style={{ fontSize:20 }}>%</span></span>
                    </div>
                </div>
                <div className="flex-1 min-w-0 flex flex-col gap-2.5">
                    <Row c="#059669" label="출석" val={<SlotNumber value={a.go} baseDelay={0}/>}/>
                    <Row c="#F59E0B" label="지각" val={<SlotNumber value={a.late} baseDelay={140}/>}/>
                    <Row c="#EF4444" label="노쇼" val={<SlotNumber value={a.no} baseDelay={280}/>}/>
                </div>
            </div>
            {a.streak >= 2 && (
                <div className="mt-4 flex items-center justify-center gap-1.5 rounded-full bg-live py-1.5 text-[13px] font-black text-[#15171E]">🔥 연속 출석 {a.streak}회</div>
            )}
        </button>
    );
};

// ── 현재 카드(참고, 애니메이션 없음) ──
const CardOriginal = ({ attendHistory, memberInfo, onTabChange }) => {
    const a = useActivity(attendHistory, memberInfo);
    if (!a.hasData) return <EmptyCard/>;
    const { go, late, no, rate, streak } = a;
    return (
        <button onClick={() => onTabChange && onTabChange('my')} className="w-full card rounded-2xl p-5 text-left active:scale-98 transition-all">
            <Header/>
            <div className="flex items-center gap-3">
                <div className="w-16 h-16 rounded-full flex-shrink-0 flex items-center justify-center" style={{ background: `conic-gradient(#183FB0 0% ${rate}%, #e6ebf5 ${rate}% 100%)` }}>
                    <div className="w-12 h-12 rounded-full bg-white flex flex-col items-center justify-center">
                        <span className="text-base font-black text-teal-600 leading-none">{rate}%</span>
                    </div>
                </div>
                <div className="flex-1 grid grid-cols-3 gap-2 min-w-0">
                    <div className="rounded-xl py-2 text-center bg-emerald-50"><p className="text-lg font-black text-emerald-600 leading-none">{go}</p><p className="text-[10px] font-black text-emerald-600 mt-1">출석</p></div>
                    <div className="rounded-xl py-2 text-center bg-amber-50"><p className="text-lg font-black text-amber-600 leading-none">{late}</p><p className="text-[10px] font-black text-amber-600 mt-1">지각</p></div>
                    <div className="rounded-xl py-2 text-center bg-rose-50"><p className="text-lg font-black text-rose-500 leading-none">{no}</p><p className="text-[10px] font-black text-rose-500 mt-1">노쇼</p></div>
                </div>
            </div>
            {streak >= 2 && <span className="inline-flex items-center gap-1 mt-3 text-[11.5px] font-black px-2.5 py-1 rounded-full bg-live text-[#15171E]">🔥 {streak}회 연속 출석 중</span>}
        </button>
    );
};

const HIST = [
    { date:'2026-06-28', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-06-21', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-06-14', records:[{memberId:'me', status:'지각'}] },
    { date:'2026-06-07', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-05-31', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-05-24', records:[{memberId:'me', status:'노쇼'}] },
    { date:'2026-05-17', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-05-10', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-05-03', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-04-26', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-04-19', records:[{memberId:'me', status:'정상'}] },
    { date:'2026-04-12', records:[{memberId:'me', status:'지각'}] },
    { date:'2026-04-05', records:[{memberId:'me', status:'정상'}] },
];
const P = { attendHistory: HIST, memberInfo:{ id:'me' }, onTabChange:()=>{} };

// 마운트마다 애니메이션 재생되도록 key 증가시키는 래퍼 + 다시보기 버튼
const Replayable = ({ comp:Comp }) => {
    const [k, setK] = useState(0);
    return (
        <div>
            <Comp key={k} {...P} />
            <div className="mt-2 text-center">
                <button onClick={() => setK(k + 1)} className="text-xs font-black text-slate-500 px-3 py-1.5 rounded-full bg-white border border-slate-200 active:scale-95">▶ 다시 보기</button>
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('card-centered')).render(<Replayable comp={CardCentered}/>);
ReactDOM.createRoot(document.getElementById('card-side')).render(<Replayable comp={CardSide}/>);
ReactDOM.createRoot(document.getElementById('card-orig')).render(<CardOriginal {...P}/>);
ReactDOM.createRoot(document.getElementById('card-empty')).render(<CardOriginal attendHistory={[]} memberInfo={{id:'me'}} onTabChange={()=>{}}/>);
</script>
</body>
</html>
