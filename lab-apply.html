<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>신청 버튼 LAB</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; --orange:#f97316; --warn:#F59E0B; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    margin:0; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(125% 90% at 50% -8%, #e8ecf9 0%, #f3f5fb 46%, #f4f6fa 100%);
    min-height:100vh; color:#0f172a; user-select:none;
  }
  .wrap{ max-width:440px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom)); }
  h1{ font-size:18px; font-weight:900; margin:6px 4px 2px; }
  .lead{ font-size:12px; font-weight:700; color:#94a3b8; margin:0 4px 16px; line-height:1.55; }
  .seclabel{ font-size:12px; font-weight:900; color:var(--accent); margin:20px 4px 8px; letter-spacing:.02em; }
  .seclabel small{ color:#94a3b8; font-weight:800; }

  .controls{ display:flex; gap:8px; }
  .seg{ display:flex; gap:6px; background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:5px; box-shadow:0 4px 14px rgba(0,0,0,.05); flex:1; }
  .seg button{ flex:1; border:0; background:transparent; border-radius:10px; padding:10px 4px; font-weight:900; font-size:12.5px; color:#64748b; cursor:pointer; font-family:inherit; }
  .seg button.on{ background:var(--accent); color:#fff; }

  .card{ background:#fff; border:1px solid #e2e8f0; border-radius:20px; box-shadow:0 4px 14px rgba(0,0,0,.05); padding:22px 20px; }
  .chead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .chead .t{ font-size:11px; font-weight:900; color:var(--orange); text-transform:uppercase; letter-spacing:.12em; }
  /* 우측 상단 인원 카운트 — 시인성 높인 알약 배지 */
  .chead .c{ display:inline-flex; align-items:center; gap:6px; font-size:13.5px; font-weight:900; color:var(--accent-deep); background:#e7edfa; padding:7px 13px; border-radius:999px; line-height:1; }
  .chead .c svg{ opacity:.8; }
  .chead .c b{ font-size:17px; }
  .chead .c.full{ color:#92400e; background:#fef0c7; }
  .center{ display:flex; flex-direction:column; align-items:center; }

  /* ── 원형 (차분하게: 정적 헤일로 + 부드러운 그림자, 펄스 없음) ── */
  .circle{ width:160px; height:160px; border-radius:50%; border:0; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:transform .14s ease, box-shadow .2s, background .2s; font-family:inherit; }
  .circle:active{ transform:scale(.97); }
  .circle .big{ font-weight:900; font-size:21px; letter-spacing:.01em; }
  .circle .sub{ font-size:11px; font-weight:800; opacity:.82; margin-top:4px; }
  .c-apply{ background:var(--orange); color:#fff; box-shadow:0 0 0 7px rgba(249,115,22,.10), 0 16px 30px -14px rgba(249,115,22,.6); }
  .c-cancel{ background:#fff; color:#94a3b8; border:1.5px solid #e9edf3; box-shadow:0 6px 16px -10px rgba(15,23,42,.18); }

  /* ── 가로 버튼 ── */
  .bar{ width:100%; border:0; border-radius:16px; font-weight:900; font-size:15px; padding:17px; cursor:pointer; transition:transform .14s, background .2s; font-family:inherit; }
  .bar:active{ transform:scale(.98); }
  .bar.c-apply{ background:var(--orange); color:#fff; box-shadow:0 12px 26px -12px rgba(249,115,22,.55); }
  .bar.c-cancel{ background:#fff; color:#64748b; border:1.5px solid #e9edf3; box-shadow:none; }

  /* ── 완료 팝업 ── */
  .modal-bg{ position:fixed; inset:0; background:rgba(15,23,42,.46); backdrop-filter:blur(2px); display:none; align-items:center; justify-content:center; padding:26px; z-index:10; }
  .modal-bg.show{ display:flex; animation:bgIn .18s ease-out; }
  .modal{ background:#fff; border-radius:26px; padding:30px 24px 22px; max-width:320px; width:100%; text-align:center; box-shadow:0 30px 70px -22px rgba(0,0,0,.45); animation:popIn .26s cubic-bezier(.22,1,.36,1); }
  @keyframes bgIn{ from{opacity:0} }
  @keyframes popIn{ from{opacity:0;transform:translateY(10px) scale(.96)} }
  .badge{ width:66px; height:66px; border-radius:50%; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; font-size:34px; color:#fff; }
  .badge.ok{ background:var(--accent); box-shadow:0 12px 26px -10px rgba(24,63,176,.55); }
  .badge.wait{ background:var(--warn); box-shadow:0 12px 26px -10px rgba(245,158,11,.5); }
  .modal .mt{ font-size:13px; font-weight:900; color:#94a3b8; }
  .modal .mnum{ font-size:34px; font-weight:900; color:#0f172a; margin:4px 0 2px; letter-spacing:-.01em; }
  .modal .mnum b{ color:var(--orange); }
  .modal .mnum.wait b{ color:var(--warn); }
  .modal .msub{ font-size:12.5px; font-weight:800; color:#94a3b8; line-height:1.5; margin-top:4px; }
  .modal .mok{ margin-top:20px; width:100%; border:0; border-radius:16px; background:var(--orange); color:#fff; font-weight:900; font-size:15px; padding:14px; cursor:pointer; font-family:inherit; }
  /* 취소 확인 팝업 */
  .badge.ask{ background:var(--warn); box-shadow:0 12px 26px -10px rgba(245,158,11,.5); }
  .modal .mtitle{ font-size:18px; font-weight:900; color:#0f172a; }
  .modal .mwarn{ margin-top:14px; background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; font-size:12px; font-weight:800; line-height:1.55; padding:11px 13px; border-radius:14px; text-align:left; }
  .modal .mrow{ display:flex; gap:8px; margin-top:20px; }
  .modal .mrow button{ flex:1; border:0; border-radius:16px; font-weight:900; font-size:14.5px; padding:14px; cursor:pointer; font-family:inherit; }
  .modal .mkeep{ background:#f1f5f9; color:#64748b; }
  .modal .mcancel{ background:var(--danger); color:#fff; }

  .hint{ text-align:center; font-size:12px; font-weight:800; color:#94a3b8; margin:18px 4px 0; line-height:1.6; }

  #toast{ position:fixed; left:50%; bottom:32px; transform:translateX(-50%); background:#0f172a; color:#fff; font-weight:900; font-size:13px; padding:11px 18px; border-radius:999px; z-index:11; box-shadow:0 10px 30px rgba(0,0,0,.25); opacity:0; transition:.2s; pointer-events:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>신청 버튼 LAB · 다듬은 버전</h1>
  <p class="lead">신청하기(주황)를 누르면 <b>완료 팝업 + 내 순번</b>이 뜨고, 버튼은 바로 <b>신청 취소</b>로 바뀝니다. 별도 '참가 확정'은 없어요. 글로우는 빼고 차분하게 다듬었어요.</p>

  <div class="seclabel">옵션</div>
  <div class="controls">
    <div class="seg" id="segShape">
      <button data-v="circle" class="on">원형</button>
      <button data-v="bar">가로 버튼</button>
    </div>
    <div class="seg" id="segFull">
      <button data-v="open" class="on">정원 여유</button>
      <button data-v="full">정원 마감</button>
    </div>
  </div>

  <div class="seclabel">미리보기 <small>· 눌러보세요</small></div>
  <div class="card">
    <div class="chead"><span class="t">선착순 신청</span><span class="c" id="count">12 / 18명</span></div>
    <div class="center">
      <div data-slot></div>
    </div>
  </div>

  <p class="hint">신청하기↔신청취소가 같은 자리·같은 모양으로 토글돼요. 순번은 신청 시 팝업으로 안내하고, 평소엔 우측 상단 인원 배지로 현황을 보여줘요.<br>색/크기/배지 모양은 더 조절할 수 있어요.</p>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script>
let shape='circle', full=false, st='apply';
const MAX=18, CONF=12;                       // 정원 18, 현재 확정 12명
const slot=document.querySelector('[data-slot]');
const countEl=document.getElementById('count');
const ICON='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';
const modalBg=document.getElementById('modalBg');
const modal=document.getElementById('modal');

function myPos(){ return full ? 3 : CONF+1; }      // 여유→참가 13번 / 마감→대기 3번

function render(){
  slot.innerHTML='';
  const apply = st==='apply';
  if(shape==='circle'){
    const el=document.createElement('button');
    el.className='circle '+(apply?'c-apply':'c-cancel');
    el.innerHTML = apply
      ? `<span class="big">신청하기</span><span class="sub">탭하면 신청</span>`
      : `<span class="big">신청 취소</span><span class="sub">탭하면 취소</span>`;
    el.onclick = apply ? doApply : doCancel;
    slot.appendChild(el);
  } else {
    const el=document.createElement('button');
    el.className='bar '+(apply?'c-apply':'c-cancel');
    el.textContent = apply ? '신청하기' : '신청 취소';
    el.onclick = apply ? doApply : doCancel;
    slot.appendChild(el);
  }
  // 우측 상단 인원 카운트 (시인성 배지)
  if(full){
    countEl.className='c full';
    countEl.innerHTML = `${ICON}<span><b>${MAX}</b> / ${MAX}명 · 마감</span>`;
  } else {
    countEl.className='c';
    const n = st==='applied' ? CONF+1 : CONF;
    countEl.innerHTML = `${ICON}<span><b>${n}</b> / ${MAX}명</span>`;
  }
}

function doApply(){
  // 완료 팝업
  if(full){
    modal.innerHTML = `
      <div class="badge wait">🕒</div>
      <div class="mt">대기 신청 완료</div>
      <div class="mnum wait">대기 <b>${myPos()}</b>번</div>
      <div class="msub">정원이 차서 대기로 등록됐어요.<br>자리가 나면 자동으로 확정돼요.</div>
      <button class="mok">확인</button>`;
  } else {
    modal.innerHTML = `
      <div class="badge ok">✓</div>
      <div class="mt">신청 완료</div>
      <div class="mnum">참가 <b>${myPos()}</b>번째</div>
      <div class="msub">선착순 ${myPos()} / ${MAX}명으로 신청됐어요.</div>
      <button class="mok">확인</button>`;
  }
  modalBg.classList.add('show');
  modal.querySelector('.mok').onclick = ()=>{ modalBg.classList.remove('show'); st='applied'; render(); };
}
function doCancel(){
  // 취소 확인 팝업 (재신청 시 순번 밀림 안내)
  modal.innerHTML = `
    <div class="badge ask">!</div>
    <div class="mtitle">신청을 취소할까요?</div>
    <div class="mwarn">지금 취소하면 다시 신청할 때 <b>순번이 맨 뒤로 밀려요.</b> 정원이 찼다면 대기로 넘어갈 수 있어요.</div>
    <div class="mrow">
      <button class="mkeep">그대로 둘게요</button>
      <button class="mcancel">신청 취소</button>
    </div>`;
  modalBg.classList.add('show');
  modal.querySelector('.mkeep').onclick = ()=>{ modalBg.classList.remove('show'); };
  modal.querySelector('.mcancel').onclick = ()=>{ modalBg.classList.remove('show'); st='apply'; render(); flash('신청이 취소되었어요'); };
}

modalBg.onclick = (e)=>{ if(e.target===modalBg){ modalBg.classList.remove('show'); st='applied'; render(); } };

let toastT; const toast=document.getElementById('toast');
function flash(msg){ toast.textContent=msg; toast.style.opacity='1'; clearTimeout(toastT); toastT=setTimeout(()=>toast.style.opacity='0',1400); }

document.getElementById('segShape').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#segShape button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); shape=b.dataset.v; render(); });
document.getElementById('segFull').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#segFull button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); full=(b.dataset.v==='full'); st='apply'; render(); });

render();
</script>
</body>
</html>
