<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>모임 운영(편집) LAB · 3안 비교</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; --ink:#0f172a; --sub:#64748b; --line:#e6eaf2; --bg:#f4f6fa; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(125% 90% at 50% -8%, #e8ecf9 0%, #f3f5fb 46%, #f4f6fa 100%); min-height:100vh; color:var(--ink); user-select:none; }
  .wrap{ max-width:440px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom)); }
  h1{ font-size:18px; font-weight:900; margin:6px 4px 2px; }
  .lead{ font-size:12px; font-weight:700; color:#94a3b8; margin:0 4px 14px; line-height:1.6; }
  .seclabel{ font-size:12px; font-weight:900; color:var(--accent); margin:18px 4px 8px; }
  .seclabel small{ color:#94a3b8; font-weight:800; }

  .seg{ display:flex; gap:5px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:5px; box-shadow:0 4px 14px rgba(0,0,0,.05); }
  .seg button{ flex:1; border:0; background:transparent; border-radius:10px; padding:11px 4px; font-weight:900; font-size:12px; color:#64748b; cursor:pointer; font-family:inherit; line-height:1.3; }
  .seg button.on{ background:var(--accent); color:#fff; }

  /* 화면 카드 (절대배치 없음 — 그 자리 인라인) */
  .screen{ background:#fff; border:1px solid var(--line); border-radius:20px; overflow:hidden; box-shadow:0 14px 34px -16px rgba(15,23,42,.2); margin-top:12px; }
  .schead{ padding:14px 16px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:8px; background:#fbfcff; }
  .schead b{ font-size:15px; font-weight:900; }
  .schead span{ font-size:12px; font-weight:800; color:#94a3b8; }
  .scbody{ padding:14px; }

  /* 모임 상세(회원 화면) 미니 헤더 + 소탭 — C안에서 사용 */
  .mhead{ padding:12px 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  .mhead .bk{ font-size:20px; color:#94a3b8; }
  .mhead .mt b{ font-size:14px; font-weight:900; display:block; } .mhead .mt span{ font-size:11px; font-weight:700; color:#94a3b8; }
  .subtabs{ display:flex; gap:4px; padding:0 10px; border-bottom:1px solid var(--line); }
  .subtabs div{ padding:11px 14px; font-size:13px; font-weight:900; color:#94a3b8; border-bottom:2px solid transparent; }
  .subtabs div.on{ color:var(--accent); border-bottom-color:var(--accent); }

  /* 회원용(정보 많은) 목업 */
  .mcard{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px; margin-bottom:10px; }
  .mcard:last-child{ margin-bottom:0; }
  .mcard .ct{ font-size:12px; font-weight:900; color:var(--sub); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .person{ display:flex; align-items:center; gap:9px; padding:7px 0; border-top:1px solid #f1f5f9; }
  .person:first-of-type{ border-top:0; }
  .av{ width:30px; height:30px; border-radius:9px; background:#eef2fb; color:var(--accent-deep); font-weight:900; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .person .nm{ font-size:13px; font-weight:800; flex:1; }
  .person .tg{ font-size:10.5px; font-weight:900; color:#94a3b8; background:#f1f5f9; padding:3px 8px; border-radius:999px; }
  .chip{ border:0; font-family:inherit; font-weight:900; font-size:11px; color:#fff; background:var(--accent); border-radius:9px; padding:6px 11px; cursor:pointer; }

  /* A. 운영 허브 카드 */
  .opwrap{ border:1px solid var(--line); border-radius:16px; margin-bottom:11px; overflow:hidden; }
  .opwrap:last-child{ margin-bottom:0; }
  .opcard{ width:100%; text-align:left; border:0; background:#fff; padding:15px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:13px; }
  .opcard .ic{ width:46px; height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .opcard .tx{ flex:1; min-width:0; }
  .opcard .tx b{ font-size:15.5px; font-weight:900; display:block; }
  .opcard .tx .d{ font-size:12px; font-weight:800; color:#94a3b8; margin:1px 0 4px; }
  .opcard .go{ font-size:13px; font-weight:900; color:var(--accent); flex-shrink:0; transition:transform .2s; }
  .opwrap.open .opcard .go{ transform:rotate(90deg); }
  .st{ display:inline-block; font-size:10.5px; font-weight:900; padding:2px 8px; border-radius:999px; }
  .st.done{ background:#dcfce7; color:#15803d; } .st.todo{ background:#fef0c7; color:#92400e; }

  /* B. 시트 행 */
  .srow{ width:100%; text-align:left; border:0; background:#fff; font-family:inherit; padding:15px 4px; border-top:1px solid #f1f5f9; display:flex; align-items:center; gap:12px; cursor:pointer; }
  .srows .srow:first-child{ border-top:0; }
  .srow .n{ width:22px; height:22px; border-radius:7px; background:#eef2fb; color:var(--accent-deep); font-weight:900; font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .srow .l{ font-size:14px; font-weight:900; width:46px; flex-shrink:0; }
  .srow .v{ flex:1; font-size:13px; font-weight:700; color:var(--sub); text-align:right; }
  .srow .ar{ color:#cbd5e1; font-weight:900; margin-left:6px; }

  /* 아코디언 (그 자리 펼침) */
  .acc{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .28s cubic-bezier(.4,0,.2,1); background:#f8fafc; }
  .acc.open{ grid-template-rows:1fr; }
  .accin{ overflow:hidden; min-height:0; }
  .accpad{ padding:14px 15px; }
  .lab{ font-size:11.5px; font-weight:900; color:var(--sub); margin:13px 2px 6px; }
  .lab.first{ margin-top:0; }
  .field{ width:100%; border:1.5px solid var(--line); border-radius:12px; padding:11px 13px; font-size:14px; font-weight:700; font-family:inherit; background:#fff; }
  .stepper{ display:flex; align-items:center; gap:14px; }
  .stepper button{ width:42px; height:42px; border-radius:12px; border:1.5px solid var(--line); background:#fff; font-size:22px; font-weight:900; cursor:pointer; font-family:inherit; color:var(--accent); }
  .stepper .num{ font-size:28px; font-weight:900; min-width:54px; text-align:center; }
  .ph{ background:#fff; border:1.5px dashed #cbd5e1; border-radius:14px; padding:22px 14px; text-align:center; color:#94a3b8; font-weight:800; font-size:13px; line-height:1.7; }
  .save{ width:100%; border:0; background:var(--accent); color:#fff; font-weight:900; font-size:14.5px; border-radius:13px; padding:13px; margin-top:14px; cursor:pointer; font-family:inherit; }

  .note{ font-size:12px; font-weight:800; color:#475569; margin:12px 2px 0; line-height:1.7; background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 14px; }
  .note b{ color:var(--accent-deep); }
  #toast{ position:fixed; left:50%; bottom:30px; transform:translateX(-50%); background:#0f172a; color:#fff; font-weight:900; font-size:13px; padding:11px 18px; border-radius:999px; z-index:30; box-shadow:0 10px 30px rgba(0,0,0,.25); opacity:0; transition:.2s; pointer-events:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>모임 운영(편집) LAB · 3안 비교</h1>
  <p class="lead">운영진이 모임에서 만지는 건 결국 <b>모임정보·팀·매치</b> 3가지예요. 위에서 방식을 바꿔 어떻게 편집하는지 직접 눌러보세요. (각 화면은 펼침으로 동작 — 절대배치 없이 안 깨지게)</p>

  <div class="seclabel">운영 편집 방식 <small>· 골라서 비교</small></div>
  <div class="seg" id="segConcept">
    <button data-v="A" class="on">A 운영 허브</button>
    <button data-v="B">B 바텀시트</button>
    <button data-v="C">C 인라인칩</button>
  </div>

  <div id="stage"></div>
</div>
<div id="toast"></div>

<script>
let concept='A', openIdx=null;
const stage=document.getElementById('stage');

const ITEMS=[
  { k:'info', icon:'🕐', bg:'#eef2fb', name:'모임 정보', desc:'시간 · 장소 · 인원', st:'7/5 20:00 · ○○풋살장 · 18명', stcls:'done' },
  { k:'team', icon:'🦺', bg:'#dcfce7', name:'팀 편성',  desc:'팀 나누기 · 조끼색',   st:'3팀 확정', stcls:'done' },
  { k:'match',icon:'⚔️', bg:'#fee2e2', name:'매치표',   desc:'대진 · 라운드',        st:'아직 안 만듦', stcls:'todo' },
];

function editorHTML(k){
  if(k==='info') return `
    <div class="lab first">시간</div><input class="field" type="datetime-local" value="2026-07-05T20:00">
    <div class="lab">장소</div><input class="field" value="○○풋살장 A">
    <div class="lab">정원</div><div class="stepper"><button type="button">−</button><span class="num">18</span><button type="button">＋</button></div>
    <button class="save" data-save="모임 정보 저장됨">저장</button>`;
  if(k==='team') return `<div class="ph">🦺 팀 편성 화면<br>(자동 분배 · 드래그 이동 · 조끼색 · 확정)<br><br>여기서 팀만 집중해서 편성</div><button class="save" data-save="팀 확정됨">팀 확정</button>`;
  return `<div class="ph">⚔️ 매치표 생성 화면<br>(라운드 자동 생성 · 대진 편집 · 코트 배정)<br><br>여기서 매치만 집중해서 구성</div><button class="save" data-save="매치표 생성됨">매치표 생성</button>`;
}

function viewA(){
  const cards=ITEMS.map((it,i)=>`
    <div class="opwrap ${openIdx===i?'open':''}">
      <button class="opcard" data-i="${i}">
        <div class="ic" style="background:${it.bg}">${it.icon}</div>
        <div class="tx"><b>${it.name}</b><div class="d">${it.desc}</div><span class="st ${it.stcls}">${it.st}</span></div>
        <div class="go">›</div>
      </button>
      <div class="acc ${openIdx===i?'open':''}"><div class="accin"><div class="accpad">${editorHTML(it.k)}</div></div></div>
    </div>`).join('');
  return `<div class="screen"><div class="schead"><b>⚙ 운영</b><span>7/5(토) 정기모임</span></div><div class="scbody">${cards}</div></div>
    <p class="note">진입: 모임 상세 우상단 <b>⚙ 운영</b> 버튼 → 이 화면. 편집할 3가지만 큰 카드로, 회원 정보는 안 보여요. 카드를 누르면 그 자리에서 편집이 펼쳐집니다.</p>`;
}

function viewB(){
  const rows=[
    {k:'info',l:'시간',v:'7/5(토) 20:00'},
    {k:'info',l:'장소',v:'○○풋살장 A'},
    {k:'info',l:'인원',v:'18명'},
    {k:'team',l:'팀',v:'3팀 확정'},
    {k:'match',l:'매치',v:'아직 안 만듦'},
  ];
  const inlineKind=['time','place','cap','team','match'];
  const html=rows.map((r,i)=>{
    let ed='';
    if(inlineKind[i]==='time') ed=`<div class="accpad"><input class="field" type="datetime-local" value="2026-07-05T20:00"></div>`;
    else if(inlineKind[i]==='place') ed=`<div class="accpad"><input class="field" value="○○풋살장 A"></div>`;
    else if(inlineKind[i]==='cap') ed=`<div class="accpad"><div class="stepper"><button type="button">−</button><span class="num">18</span><button type="button">＋</button></div></div>`;
    else ed=`<div class="accpad">${editorHTML(r.k)}</div>`;
    return `<button class="srow" data-i="${i}"><span class="n">${i+1}</span><span class="l">${r.l}</span><span class="v">${r.v}</span><span class="ar">${openIdx===i?'⌃':(i<3?'⌄':'›')}</span></button>
      <div class="acc ${openIdx===i?'open':''}"><div class="accin">${ed}</div></div>`;
  }).join('');
  return `<div class="screen"><div class="schead"><b>✎ 모임 편집</b><span>7/5(토) 정기모임</span></div><div class="scbody"><div class="srows">${html}</div></div></div>
    <p class="note">진입: 모임 상세 우상단 <b>✎</b> 버튼 → 아래서 시트가 올라옴. 시간·장소·인원은 그 자리 편집, 팀·매치는 펼쳐서 작업. 모임 생성 마법사와 같은 흐름.</p>`;
}

function viewC(){
  const chip=(t)=>`<button class="chip" data-edit="${t}">편집</button>`;
  return `<div class="screen">
    <div class="mhead"><span class="bk">‹</span><div class="mt"><b>7/5(토) 정기모임</b><span>20:00 · ○○풋살장 A</span></div></div>
    <div class="subtabs"><div class="on">출석</div><div>팀</div><div>매치</div></div>
    <div class="scbody">
      <div class="mcard"><div class="ct"><span>모임 정보</span>${chip('모임 정보')}</div>
        <div style="font-size:13px;font-weight:800;line-height:1.7;color:#475569">🕐 20:00~22:00 · 📍 ○○풋살장 A<br>👥 현재 13 / 18명 · 🧑‍💼 담당 김총무</div></div>
      <div class="mcard"><div class="ct"><span>참가 명단 13명</span>${chip('인원')}</div>
        <div class="person"><div class="av">김</div><div class="nm">김모이</div><span class="tg">출석</span></div>
        <div class="person"><div class="av">이</div><div class="nm">이풋살</div><span class="tg">출석</span></div>
        <div class="person"><div class="av">박</div><div class="nm">박패스</div><span class="tg">대기 1</span></div>
        <div class="person"><div class="av">정</div><div class="nm">정골핑</div><span class="tg">출석</span></div></div>
      <div class="mcard"><div class="ct"><span>출석 체크 · QR / GPS</span></div>
        <div style="font-size:12px;font-weight:800;color:#94a3b8;line-height:1.8">QR 코드 생성 · GPS 반경 80m · 자동 마감 22:00<br>대기 자동 승급 ON · 선착순 ON</div></div>
    </div></div>
    <p class="note">지금 구조 그대로, 각 항목 옆 <b>[편집]</b> 칩만 추가. 변화는 가장 적지만 정보 과부하는 그대로 남아요. (팀·매치 소탭에도 동일하게 칩)</p>`;
}

function render(){
  if(concept==='A') stage.innerHTML=viewA();
  else if(concept==='B') stage.innerHTML=viewB();
  else stage.innerHTML=viewC();
  // 핸들러
  stage.querySelectorAll('.opcard, .srow').forEach(b=> b.onclick=()=>{ const i=+b.dataset.i; openIdx = openIdx===i ? null : i; render(); });
  stage.querySelectorAll('[data-save]').forEach(b=> b.onclick=()=> flash(b.dataset.save+' (목업)'));
  stage.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=> flash(b.dataset.edit+' 편집 (목업)'));
}

document.getElementById('segConcept').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#segConcept button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); concept=b.dataset.v; openIdx=null; render(); });

let toastT; const toast=document.getElementById('toast');
function flash(m){ toast.textContent=m; toast.style.opacity='1'; clearTimeout(toastT); toastT=setTimeout(()=>toast.style.opacity='0',1500); }

render();
</script>
</body>
</html>
