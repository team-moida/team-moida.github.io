<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>회원 모임 탭 LAB</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; --ink:#0f172a; --sub:#64748b; --line:#e6eaf2; --bg:#f4f6fa; --live:#C2F94A; --lime-deep:#3f6212; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(125% 90% at 50% -8%, #e8ecf9 0%, #f3f5fb 46%, #f4f6fa 100%); min-height:100vh; color:var(--ink); user-select:none; }
  .wrap{ max-width:440px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom)); }
  h1{ font-size:18px; font-weight:900; margin:6px 4px 2px; }
  .lead{ font-size:12px; font-weight:700; color:#94a3b8; margin:0 4px 14px; line-height:1.6; }

  /* 정기 요약 한 줄 */
  .recur{ display:flex; align-items:center; gap:9px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:11px 13px; margin-bottom:12px; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .recur .ic{ font-size:16px; } .recur b{ font-size:13px; font-weight:900; } .recur span{ font-size:12px; font-weight:700; color:#94a3b8; }

  /* 예정/기록 토글 */
  .seg{ display:flex; gap:5px; background:#eef1f7; border-radius:13px; padding:4px; margin-bottom:14px; }
  .seg button{ flex:1; border:0; background:transparent; border-radius:10px; padding:10px 4px; font-weight:900; font-size:13.5px; color:#64748b; cursor:pointer; font-family:inherit; }
  .seg button.on{ background:#fff; color:var(--accent-deep); box-shadow:0 2px 8px rgba(0,0,0,.08); }

  .list{ display:flex; flex-direction:column; gap:10px; }
  .mc{ background:#fff; border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .mc.hl{ border-color:transparent; box-shadow:0 0 0 2px var(--live), 0 10px 24px -10px rgba(63,98,18,.35); }
  .head{ width:100%; text-align:left; border:0; background:#fff; font-family:inherit; padding:13px; display:flex; align-items:center; gap:13px; cursor:pointer; }
  .datepill{ width:50px; height:54px; border-radius:14px; background:#eef2fb; color:var(--accent-deep); display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; }
  .datepill b{ font-size:21px; font-weight:900; line-height:1; } .datepill span{ font-size:11px; font-weight:900; margin-top:2px; }
  .datepill.match{ background:#f0fdf4; color:#15803d; } .datepill.live{ background:var(--live); color:var(--lime-deep); } .datepill.past{ background:#f1f5f9; color:#94a3b8; }
  .info{ flex:1; min-width:0; }
  .info .ttl{ font-size:15px; font-weight:900; display:flex; align-items:center; gap:7px; min-width:0; }
  .info .ttl .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .info .meta{ font-size:12px; font-weight:700; color:#94a3b8; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chev{ color:#cbd5e1; font-weight:900; font-size:18px; flex-shrink:0; transition:transform .25s; }
  .mc.open .chev{ transform:rotate(90deg); }

  .chip{ font-size:11px; font-weight:900; padding:3px 9px; border-radius:999px; flex-shrink:0; white-space:nowrap; }
  .chip.open{ background:#eef2fb; color:var(--accent-deep); } .chip.done{ background:#dcfce7; color:#15803d; }
  .chip.closed{ background:#f1f5f9; color:#94a3b8; } .chip.live{ background:var(--live); color:#15171E; } .chip.miss{ background:#fef2f2; color:#dc2626; }

  .acc{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .28s cubic-bezier(.4,0,.2,1); }
  .mc.open .acc{ grid-template-rows:1fr; } .accin{ overflow:hidden; min-height:0; } .accpad{ padding:0 13px 14px; }
  .me{ display:flex; align-items:center; gap:11px; background:#f8fafc; border:1px solid #eef2f6; border-radius:14px; padding:12px; }
  .me .big{ width:46px; height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:21px; font-weight:900; flex-shrink:0; color:#fff; }
  .me .mt b{ font-size:14.5px; font-weight:900; display:block; } .me .mt span{ font-size:12px; font-weight:800; color:#94a3b8; }
  .act{ width:100%; border:0; font-family:inherit; font-weight:900; font-size:14px; border-radius:13px; padding:12px; margin-top:10px; cursor:pointer; }
  .act.apply{ background:#f97316; color:#fff; box-shadow:0 10px 22px -12px rgba(249,115,22,.55); } .act.ghost{ background:#f1f5f9; color:#475569; }
  .srow{ display:flex; align-items:center; gap:10px; padding:11px 2px; border-top:1px solid #f1f5f9; }
  .srow .ic{ width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .srow .l{ font-size:13px; font-weight:900; width:42px; flex-shrink:0; } .srow .v{ flex:1; font-size:12.5px; font-weight:800; color:var(--sub); } .srow .go{ font-size:12px; font-weight:900; color:var(--accent); }

  /* 기록 — 내 출석 요약 */
  .stat{ display:flex; gap:9px; margin-bottom:14px; }
  .stbox{ flex:1; background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px 10px; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .stbox b{ font-size:26px; font-weight:900; display:block; line-height:1; } .stbox span{ font-size:11.5px; font-weight:800; color:#94a3b8; margin-top:5px; display:block; }
  .stbox.go b{ color:#15803d; } .stbox.no b{ color:#94a3b8; } .stbox.bad b{ color:#dc2626; }
  .prow{ display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 13px; }
  .prow .dp{ width:42px; height:46px; border-radius:11px; background:#f1f5f9; color:#94a3b8; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; }
  .prow .dp b{ font-size:17px; font-weight:900; line-height:1; } .prow .dp span{ font-size:10px; font-weight:900; margin-top:2px; }
  .prow .pi{ flex:1; min-width:0; } .prow .pi b{ font-size:14px; font-weight:900; } .prow .pi span{ font-size:11.5px; font-weight:700; color:#94a3b8; display:block; }

  .note{ font-size:12px; font-weight:800; color:#475569; margin:16px 4px 0; line-height:1.7; background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px 14px; }
  .note b{ color:var(--accent-deep); }
</style>
</head>
<body>
<div class="wrap">
  <h1>회원 모임 탭 — 가벼운 버전</h1>
  <p class="lead">회원은 <b>예정 목록(펼침) + 내 기록</b>만. 자세한 신청·출석·내 팀은 홈에서. 운영진은 같은 탭에서 관리 허브를 봐요(여긴 회원 시점).</p>

  <div class="recur"><span class="ic">🔁</span><div><b>정기 · 매주 토 20:00</b> <span>· ○○풋살장 A</span></div></div>
  <div class="seg" id="seg"><button data-v="up" class="on">예정</button><button data-v="rec">기록</button></div>

  <div id="stage"></div>
  <p class="note" id="note"></p>
</div>

<script>
let view='up', openId=0;
const MEET=[
  { kind:'live', day:5, dow:'토', title:'정기모임', time:'20:00~22:00', place:'○○풋살장 A', hl:true, chip:{t:'● 진행 중',cls:'live'},
    me:{bg:'#ef4444',ico:'7',t:'🟥 빨강 vs 🟦 파랑',s:'2라운드 진행 · 코트 A'}, act:{cls:'ghost',t:'매치표 크게 보기'},
    rows:[['👥','#eef2fb','인원','18명 참여'],['🦺','#fee2e2','팀','3팀 · 내 팀 빨강 7번'],['⚔️','#dcfce7','매치','5R · 지금 2R']] },
  { kind:'self', day:12, dow:'토', title:'정기모임', time:'20:00', place:'○○풋살장 A', chip:{t:'신청 완료',cls:'done'},
    me:{bg:'#f97316',ico:'✓',t:'신청 완료 · 13번째',s:'선착순 13 / 18명 · D-7'}, act:{cls:'ghost',t:'신청 취소'},
    rows:[['👥','#eef2fb','인원','13 / 18명 · 대기 1'],['🦺','#fee2e2','팀','아직 안 나눔'],['⚔️','#dcfce7','매치','아직 안 만듦']] },
  { kind:'match', day:15, dow:'화', title:'매칭 vs FC번개', time:'19:00', place:'△△구장', chip:{t:'접수중',cls:'open'},
    me:{bg:'#16357f',ico:'?',t:'아직 신청 안 함',s:'남 4/6 · 여 2/4 · D-10'}, act:{cls:'apply',t:'신청하기'},
    rows:[['👥','#eef2fb','인원','남 4/6 · 여 2/4']] },
  { kind:'self', day:19, dow:'토', title:'정기모임', time:'20:00', place:'○○풋살장 A', chip:{t:'접수중 9/18',cls:'open'},
    me:{bg:'#16357f',ico:'?',t:'아직 신청 안 함',s:'선착순 9 / 18명 · D-14'}, act:{cls:'apply',t:'신청하기'},
    rows:[['👥','#eef2fb','인원','9 / 18명']] },
];
const PAST=[
  { day:28, dow:'토', title:'정기모임', place:'○○풋살장 A', st:{t:'참석',cls:'done'} },
  { day:21, dow:'토', title:'정기모임', place:'○○풋살장 A', st:{t:'불참',cls:'closed'} },
  { day:14, dow:'토', title:'매칭 vs 번개', place:'△△구장',  st:{t:'참석',cls:'done'} },
  { day:7,  dow:'토', title:'정기모임', place:'○○풋살장 A', st:{t:'참석',cls:'done'} },
  { day:31, dow:'토', title:'정기모임', place:'○○풋살장 A', st:{t:'노쇼',cls:'miss'} },
];

function bodyHTML(m){
  const rows=m.rows.map(r=>`<div class="srow"><div class="ic" style="background:${r[1]}">${r[0]}</div><div class="l">${r[2]}</div><div class="v">${r[3]}</div><div class="go">›</div></div>`).join('');
  const act=m.act?`<button class="act ${m.act.cls}">${m.act.t}</button>`:'';
  return `<div class="accpad"><div class="me"><div class="big" style="background:${m.me.bg}">${m.me.ico}</div><div class="mt"><b>${m.me.t}</b><span>${m.me.s}</span></div></div>${act}${rows}</div>`;
}
function upcoming(){
  return `<div class="list">`+MEET.map((m,i)=>{ const open=openId===i; const dp=m.kind==='live'?'live':m.kind==='match'?'match':'';
    return `<div class="mc${m.hl?' hl':''}${open?' open':''}" data-i="${i}">
      <button class="head"><div class="datepill ${dp}"><b>${m.day}</b><span>${m.dow}</span></div>
        <div class="info"><div class="ttl"><span class="nm">${m.title}</span><span class="chip ${m.chip.cls}">${m.chip.t}</span></div>
          <div class="meta">⏰ ${m.time} · 📍 ${m.place}</div></div><div class="chev">›</div></button>
      <div class="acc"><div class="accin">${bodyHTML(m)}</div></div></div>`; }).join('')+`</div>`;
}
function records(){
  const past=PAST.map(p=>`<div class="prow"><div class="dp"><b>${p.day}</b><span>${p.dow}</span></div>
    <div class="pi"><b>${p.title}</b><span>📍 ${p.place}</span></div><span class="chip ${p.st.cls}">${p.st.t}</span></div>`).join('');
  return `<div class="stat">
      <div class="stbox go"><b>7</b><span>참석</span></div>
      <div class="stbox bad"><b>1</b><span>불참</span></div>
      <div class="stbox no"><b>1</b><span>노쇼</span></div>
    </div>
    <div class="list" style="gap:8px">${past}</div>`;
}
function render(){
  document.getElementById('stage').innerHTML = view==='up' ? upcoming() : records();
  document.getElementById('note').textContent = view==='up'
    ? '예정 — 컴팩트 카드+상태칩, 탭하면 그 자리서 펼침. 진행 중 1개만 강조.'
    : '기록 — 내 출석 요약(참석/불참/노쇼) + 지난 모임 내 상태. (홈·MY 통계와 연결)';
  if(view==='up') document.querySelectorAll('.mc').forEach(c=> c.querySelector('.head').onclick=()=>{ const i=+c.dataset.i; openId=openId===i?null:i; render(); });
}
document.getElementById('seg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); view=b.dataset.v; render(); });
render();
</script>
</body>
</html>
