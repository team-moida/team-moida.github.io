<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>모임 탭 간소화안 LAB</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; --teal:#0d9488; --ink:#0f172a; --sub:#64748b; --line:#e6eaf2; --bg:#f4f6fa; --live:#C2F94A; --lime-deep:#3f6212; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(125% 90% at 50% -8%, #e8ecf9 0%, #f3f5fb 46%, #f4f6fa 100%); min-height:100vh; color:var(--ink); user-select:none; }
  .wrap{ max-width:440px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom)); }
  h1{ font-size:18px; font-weight:900; margin:6px 4px 2px; }
  .lead{ font-size:12px; font-weight:700; color:#94a3b8; margin:0 4px 14px; line-height:1.6; }
  .recur{ display:flex; align-items:center; gap:9px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:11px 13px; margin-bottom:12px; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .recur .ic{ font-size:16px; } .recur b{ font-size:13px; font-weight:900; } .recur span{ font-size:12px; font-weight:700; color:#94a3b8; }
  .crumb{ font-size:11px; font-weight:900; color:var(--accent); margin:0 4px 9px; }

  .list{ display:flex; flex-direction:column; gap:10px; }
  .mc{ background:#fff; border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .mc.hl{ border-color:transparent; box-shadow:0 0 0 2px var(--live), 0 10px 24px -10px rgba(63,98,18,.35); }
  .head{ width:100%; text-align:left; border:0; background:#fff; font-family:inherit; padding:13px; display:flex; align-items:center; gap:13px; cursor:pointer; }
  .dchip{ width:54px; height:56px; border-radius:15px; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; color:#fff; }
  .dchip b{ font-size:21px; font-weight:900; line-height:1; } .dchip span{ font-size:10px; font-weight:900; margin-top:2px; opacity:.9; }
  .dchip.live{ background:var(--live); color:var(--lime-deep); }
  .info{ flex:1; min-width:0; }
  .info .ttl{ font-size:15px; font-weight:900; display:flex; align-items:center; gap:7px; min-width:0; }
  .info .ttl .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .info .meta{ font-size:12px; font-weight:700; color:#94a3b8; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chev{ color:#cbd5e1; font-weight:900; font-size:18px; flex-shrink:0; transition:transform .25s; }
  .mc.open .chev{ transform:rotate(90deg); }

  .chip{ font-size:11px; font-weight:900; padding:3px 9px; border-radius:999px; flex-shrink:0; white-space:nowrap; }
  .chip.open{ background:#eef2fb; color:var(--accent-deep); } .chip.done{ background:#dcfce7; color:#15803d; }
  .chip.closed{ background:#f1f5f9; color:#94a3b8; } .chip.live{ background:var(--live); color:#15171E; }

  .acc{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .28s cubic-bezier(.4,0,.2,1); }
  .mc.open .acc{ grid-template-rows:1fr; } .accin{ overflow:hidden; min-height:0; } .accpad{ padding:0 13px 14px; }
  /* 간단 정보 */
  .irow{ display:flex; align-items:center; gap:9px; padding:8px 2px; border-top:1px solid #f1f5f9; font-size:13px; font-weight:800; color:#475569; }
  .irow:first-child{ border-top:0; } .irow .k{ width:18px; text-align:center; } .irow .v b{ color:#0f172a; }
  .status{ display:flex; align-items:center; gap:7px; background:#f8fafc; border:1px solid #eef2f6; border-radius:12px; padding:11px 12px; margin-top:10px; font-size:13px; font-weight:900; }
  .status .dotc{ width:34px; height:34px; border-radius:11px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; flex-shrink:0; }
  .act{ width:100%; border:0; font-family:inherit; font-weight:900; font-size:14.5px; border-radius:13px; padding:13px; margin-top:10px; cursor:pointer; }
  .act.apply{ background:#f97316; color:#fff; box-shadow:0 10px 22px -12px rgba(249,115,22,.55); }
  .act.cancel{ background:#f1f5f9; color:#64748b; } .act.home{ background:#eef2fb; color:var(--accent-deep); }
  .hint{ font-size:11.5px; font-weight:800; color:#94a3b8; text-align:center; margin-top:8px; }

  .note{ font-size:12px; font-weight:800; color:#475569; margin:16px 4px 0; line-height:1.7; background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px 14px; }
  .note b{ color:var(--accent-deep); }
</style>
</head>
<body>
<div class="wrap">
  <h1>모임 탭 (회원) — 간소화안</h1>
  <p class="lead">모임 탭은 <b>앞으로의 일정 + 신청</b>까지만. 카드를 누르면 <b>시간·장소·인원·내 상태 + 신청/취소</b>만 간단히. 팀·출석·매치 같은 진행 정보는 <b>홈 탭</b>에서. (임박/진행 중인 건 "홈에서 보기"로 안내)</p>

  <div class="recur"><span class="ic">🔁</span><div><b>정기 · 매주 토 20:00</b> <span>· ○○풋살장 A</span></div></div>
  <div class="crumb">예정 모임 · 눌러보세요</div>
  <div class="list" id="list"></div>
  <p class="note">간소화 핵심: 모임 탭에선 <b>일정 보고 신청</b>까지만(임박 안 한 모임도 여기서 신청). 자세한 진행(내 팀·번호·출석체크·매치표)은 임박했을 때 <b>홈</b>이 담당 → 홈과 안 겹쳐요. 운영진은 같은 탭에서 관리(추가·수정·팀·매치).</p>
</div>

<script>
let openId=1;
const MEET=[
  { kind:'live', day:5, dow:'토', title:'정기모임', time:'20:00~22:00', place:'○○풋살장 A', hl:true, chip:{t:'● 진행 중',cls:'live'},
    info:[['⏰','20:00~22:00'],['📍','○○풋살장 A'],['👥','18명 참여 중']],
    state:{ mode:'home', c:'#15803d', ic:'▶', t:'지금 진행 중', s:'출석·팀·매치는 홈에서 봐요' } },
  { kind:'self', day:12, dow:'토', title:'정기모임', time:'20:00', place:'○○풋살장 A', chip:{t:'신청 완료',cls:'done'},
    info:[['⏰','20:00~22:00'],['📍','○○풋살장 A'],['👥','13 / 18명 · 대기 1']],
    state:{ mode:'cancel', c:'#f97316', ic:'✓', t:'신청 완료 · 13번째', s:'선착순 13 / 18명 · D-7' } },
  { kind:'match', day:15, dow:'화', title:'매칭 vs FC번개', time:'19:00', place:'△△구장', chip:{t:'접수중',cls:'open'},
    info:[['⏰','19:00'],['📍','△△구장'],['👥','남 4/6 · 여 2/4']],
    state:{ mode:'apply', c:'#16357f', ic:'?', t:'아직 신청 안 함', s:'매칭 · D-10' } },
  { kind:'self', day:19, dow:'토', title:'정기모임', time:'20:00', place:'○○풋살장 A', chip:{t:'접수중 9/18',cls:'open'},
    info:[['⏰','20:00~22:00'],['📍','○○풋살장 A'],['👥','9 / 18명']],
    state:{ mode:'apply', c:'#16357f', ic:'?', t:'아직 신청 안 함', s:'선착순 9 / 18명 · D-14' } },
  { kind:'self', day:26, dow:'토', title:'정기모임', time:'20:00', place:'○○풋살장 A', chip:{t:'신청 마감',cls:'closed'},
    info:[['⏰','20:00~22:00'],['📍','○○풋살장 A'],['👥','18 / 18명 마감']],
    state:{ mode:'none', c:'#10b981', ic:'✓', t:'참가 확정', s:'신청 마감 · 18/18명' } },
];

function actHTML(st){
  if(st.mode==='apply')  return `<button class="act apply">신청하기</button>`;
  if(st.mode==='cancel') return `<button class="act cancel">신청 취소</button>`;
  if(st.mode==='home')   return `<button class="act home">홈에서 보기 ›</button>`;
  return `<div class="hint">신청이 마감되었어요</div>`;
}
function bodyHTML(m){
  const rows=m.info.map(r=>`<div class="irow"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`).join('');
  const st=m.state;
  return `<div class="accpad">${rows}
    <div class="status"><div class="dotc" style="background:${st.c}">${st.ic}</div><div><div>${st.t}</div><div style="font-size:11.5px;font-weight:800;color:#94a3b8;margin-top:1px">${st.s}</div></div></div>
    ${actHTML(st)}</div>`;
}
function render(){
  const list=document.getElementById('list');
  list.innerHTML=MEET.map((m,i)=>{ const open=openId===i; const isM=m.kind==='match';
    const chipBg=m.kind==='live'?'':isM?'#C2F94A':'#183FB0', chipFg=isM?'#15171E':'#fff';
    const dp = m.kind==='live' ? 'live' : '';
    const dpStyle = m.kind==='live' ? '' : `style="background:${isM?'#C2F94A':'#183FB0'};color:${chipFg}"`;
    return `<div class="mc${m.hl?' hl':''}${open?' open':''}" data-i="${i}">
      <button class="head"><div class="dchip ${dp}" ${dpStyle}><b>${m.day}</b><span>${m.dow}</span></div>
        <div class="info"><div class="ttl"><span class="nm">${m.title}</span><span class="chip ${m.chip.cls}">${m.chip.t}</span></div>
          <div class="meta">⏰ ${m.time} · 📍 ${m.place}</div></div><div class="chev">›</div></button>
      <div class="acc"><div class="accin">${bodyHTML(m)}</div></div></div>`; }).join('');
  list.querySelectorAll('.mc').forEach(c=> c.querySelector('.head').onclick=()=>{ const i=+c.dataset.i; openId=openId===i?null:i; render(); });
}
render();
</script>
</body>
</html>
