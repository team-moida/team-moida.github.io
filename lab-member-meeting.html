<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>회원용 모임 상세 — 홈 톤 LAB</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; --ink:#0f172a; --sub:#475569; --mut:#94a3b8; --line:#e6eaf2;
         --live:#C2F94A; --green:#10B981; --amber:#F59E0B; --red:#EF4444; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(125% 90% at 50% -8%, #e8ecf9 0%, #f3f5fb 46%, #f4f6fa 100%); min-height:100vh; color:var(--ink); user-select:none; }
  .wrap{ max-width:440px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom)); }
  h1{ font-size:18px; font-weight:900; margin:6px 4px 2px; }
  .lead{ font-size:12px; font-weight:700; color:var(--mut); margin:0 4px 14px; line-height:1.6; }
  .lead b{ color:var(--accent-deep); }
  svg{ display:block; }

  /* 시점 토글 (LAB 전용) */
  .seg{ display:flex; gap:5px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:5px; box-shadow:0 4px 14px rgba(0,0,0,.05); margin-bottom:14px; }
  .seg button{ flex:1; border:0; background:transparent; border-radius:10px; padding:9px 4px; font-weight:900; font-size:11px; color:var(--sub); cursor:pointer; font-family:inherit; }
  .seg button.on{ background:var(--accent); color:#fff; }

  /* 상단 바 (뒤로) */
  .topbar{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .topbar .bk{ width:38px; height:38px; border-radius:12px; background:#fff; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--sub); cursor:pointer; flex-shrink:0; }
  .topbar .tt{ font-size:15px; font-weight:900; }

  /* ①+② 히어로 (홈 '다음 모임' 카드 톤) */
  .hero{ border-radius:28px; padding:20px; color:#fff; }
  .hero .toprow{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; }
  .hero .kind{ font-size:12px; font-weight:900; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.8); }
  .hero .dday{ font-size:12px; font-weight:900; padding:5px 11px; border-radius:12px; background:rgba(255,255,255,.2); color:#fff; }
  .hero .dday.live{ background:var(--live); color:#15171E; border-radius:999px; }
  .hero .date{ display:flex; align-items:flex-end; gap:12px; }
  .hero .date .d{ font-size:84px; font-weight:900; line-height:.78; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .hero .date .mo{ font-size:13px; font-weight:900; letter-spacing:.08em; color:rgba(255,255,255,.6); line-height:1; }
  .hero .date .dw{ font-size:22px; font-weight:900; line-height:1.1; margin-top:5px; }
  .hero .meta{ display:flex; flex-wrap:wrap; align-items:center; gap:4px 14px; margin-top:12px; font-size:13.5px; font-weight:700; color:rgba(255,255,255,.85); }
  .hero .meta span{ display:flex; align-items:center; gap:5px; }
  .hero .meta em{ font-style:normal; font-size:15px; line-height:1; }

  .hero .reg{ margin-top:15px; padding-top:14px; border-top:1px solid rgba(255,255,255,.22); }
  .hero .btnW{ width:100%; border:0; font-family:inherit; font-weight:900; font-size:15px; border-radius:16px; padding:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; background:#fff; }
  .hero .regrow{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .hero .regrow .st{ display:flex; align-items:center; gap:7px; font-size:15px; font-weight:900; min-width:0; }
  .hero .chip{ font-size:11px; font-weight:900; padding:6px 11px; border-radius:10px; background:rgba(255,255,255,.25); color:#fff; cursor:pointer; flex-shrink:0; }
  .hero .revealline{ display:flex; align-items:center; gap:12px; }
  .hero .vestbig{ width:60px; height:60px; border-radius:18px; background:#fff; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:900; flex-shrink:0; }
  .hero .rl b{ font-size:19px; font-weight:900; display:block; } .hero .rl span{ font-size:12.5px; font-weight:800; color:rgba(255,255,255,.8); }

  /* 아래 흰 카드 (홈 서브카드 톤) */
  .cards{ margin-top:14px; display:flex; flex-direction:column; gap:12px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:20px; overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.05); }
  .chead{ display:flex; align-items:center; gap:12px; padding:16px; }
  .cic{ width:40px; height:40px; border-radius:12px; background:#eef2fb; color:var(--accent); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .cic.team{ background:#dcfce7; color:#15803d; } .cic.match{ background:#fee2e2; color:#b91c1c; }
  .ct{ flex:1; min-width:0; } .ct b{ font-size:15px; font-weight:900; display:block; } .ct span{ font-size:12px; font-weight:700; color:var(--mut); }
  .cstat{ font-size:10.5px; font-weight:900; padding:3px 9px; border-radius:999px; flex-shrink:0; }
  .cstat.done{ background:#ecfdf5; color:#059669; } .cstat.muted{ background:#f1f5f9; color:var(--mut); }

  .pr{ display:flex; align-items:center; gap:10px; padding:9px 16px; border-top:1px solid #f1f5f9; }
  .pr .av{ width:30px; height:30px; border-radius:9px; background:#eef2fb; color:var(--accent-deep); font-weight:900; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .pr .av.vest{ color:#fff; } .pr.me{ background:#f8faff; }
  .pr .nm{ font-size:13.5px; font-weight:800; flex:1; }
  .pr .tg{ font-size:10.5px; font-weight:900; padding:2px 8px; border-radius:999px; }
  .pr .tg.att{ background:#ecfdf5; color:#059669; } .pr .tg.app{ background:#eef2fb; color:#122E78; } .pr .tg.wait{ background:#fffbeb; color:#d97706; } .pr .tg.me{ background:#ef4444; color:#fff; }

  .mr{ display:flex; align-items:center; gap:10px; padding:11px 16px; border-top:1px solid #f1f5f9; font-size:13px; font-weight:800; }
  .mr .rd{ font-weight:900; color:var(--accent-deep); width:26px; flex-shrink:0; }
  .mr.me{ background:#f8faff; }
  .mr .court{ margin-left:auto; font-size:11px; font-weight:900; color:var(--mut); }
  .more{ display:flex; align-items:center; justify-content:center; gap:4px; font-size:12px; font-weight:800; color:var(--mut); padding:12px; border-top:1px solid #f1f5f9; cursor:pointer; }

  .emptyrow{ padding:16px; border-top:1px solid #f1f5f9; font-size:12.5px; font-weight:700; color:var(--mut); }

  .note{ font-size:12px; font-weight:800; color:var(--sub); margin:16px 4px 0; line-height:1.7; background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px 14px; }
  .note b{ color:var(--accent-deep); }
</style>
</head>
<body>
<div class="wrap">
  <h1>회원용 모임 상세 — 홈 톤 LAB</h1>
  <p class="lead">홈 '다음 모임' 카드의 <b>분위기·색</b>을 그대로. 큰 솔리드 히어로(초대형 날짜) + 흰 서브카드. <b>팀 발표되면 히어로가 내 조끼색</b>으로 바뀝니다. 아래 <b>시점</b>을 바꿔보세요. (읽기 전용)</p>

  <div class="seg" id="seg">
    <button data-v="pre" class="on">신청 전</button>
    <button data-v="done">신청 완료</button>
    <button data-v="wait">대기</button>
    <button data-v="reveal">팀·매치 발표</button>
  </div>

  <div class="topbar">
    <div class="bk"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div class="tt">7/5(토) 정기모임</div>
  </div>

  <div id="hero"></div>
  <div class="cards" id="cards"></div>

  <p class="note">홈과 같은 언어: ① 히어로(정기=인디고, 발표 시 조끼색)에 <b>날짜·장소·담당·신청</b>까지, ② 그 아래 <b>내 팀 · 매치표 · 참가 명단</b>은 흰 카드. 팀·매치는 정해지기 전엔 숨기거나 한 줄.</p>
</div>

<script>
var P = {
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  userplus:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  swords:'<path d="M4.5 19.5 L15 9"/><path d="M4.5 16.5 L7.5 19.5"/><path d="M3.5 20.5 L5 19"/><path d="M19.5 19.5 L9 9"/><path d="M19.5 16.5 L16.5 19.5"/><path d="M20.5 20.5 L19 19"/>',
  qr:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><line x1="17" y1="17" x2="20" y2="17"/><line x1="20" y1="14" x2="20" y2="20"/>',
  chevR:'<polyline points="9 18 15 12 9 6"/>'
};
function ic(name,size,color){ size=size||24; var c=color?(' style="color:'+color+'"'):''; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"'+c+'>'+P[name]+'</svg>'; }

var phase='pre';
var VEST='#ef4444';           // 빨강 조끼 (getTeamBadge 순서 중 하나)

function hero(){
  var reveal = phase==='reveal';
  var bg = reveal ? VEST : '#183FB0';
  var glow = reveal ? '0 16px 34px -6px rgba(239,68,68,.42)' : '0 16px 34px -6px rgba(24,63,176,.42)';
  var btnInk = reveal ? '#b91c1c' : '#122E78';   // 흰 버튼 글자색 = 히어로색 계열
  var dday = reveal ? '<span class="dday live">● D-DAY</span>' : '<span class="dday">'+(phase==='wait'?'D-1':'D-3')+'</span>';

  var reg;
  if(phase==='pre'){
    reg = '<div class="reg"><button class="btnW" style="color:'+btnInk+'">'+ic('userplus',18,btnInk)+'이 모임 신청하기</button></div>';
  } else if(phase==='done'){
    reg = '<div class="reg"><div class="regrow"><span class="st">'+ic('check',18,'#fff')+'신청 완료 · 13번째</span><span class="chip">신청 취소 · 불참</span></div></div>';
  } else if(phase==='wait'){
    reg = '<div class="reg"><div class="regrow"><span class="st">대기 3번</span><span class="chip">대기 취소</span></div></div>';
  } else {
    reg = '<div class="reg"><div class="revealline">'
        + '<div class="vestbig" style="color:'+VEST+'">7</div>'
        + '<div class="rl"><b>오늘 김모이님은 빨강 7번!</b><span>빨강 조끼 · 우리 팀 6명</span></div>'
        + '</div><button class="btnW" style="color:'+btnInk+';margin-top:14px">'+ic('qr',18,btnInk)+'QR 출석 체크</button></div>';
  }

  document.getElementById('hero').innerHTML =
    '<div class="hero" style="background:'+bg+';box-shadow:'+glow+'">'
    + '<div class="toprow"><span class="kind">정기모임</span>'+dday+'</div>'
    + '<div class="date"><span class="d">5</span><div><p class="mo">JULY</p><p class="dw">토요일</p></div></div>'
    + '<div class="meta">'
    +   '<span><em>⏰</em>20:00~22:00</span>'
    +   '<span><em>📍</em>○○풋살장 A</span>'
    +   '<span><em>👥</em>현재 13 · 정원 18명</span>'
    +   '<span><em>🧑‍💼</em>담당 김총무</span>'
    + '</div>'
    + reg
    + '</div>';
}

function teamCard(){
  if(phase==='reveal'){
    return '<div class="card">'
      + '<div class="chead"><div class="cic team">'+ic('users',20)+'</div><div class="ct"><b>내 팀 · 빨강</b><span>우리 팀 6명</span></div><span class="cstat done">공개됨</span></div>'
      + '<div class="pr me"><div class="av vest" style="background:'+VEST+'">7</div><div class="nm">김모이 (나)</div><span class="tg me">빨강 7번</span></div>'
      + '<div class="pr"><div class="av vest" style="background:'+VEST+'">3</div><div class="nm">이풋살</div><span class="tg app">빨강 3번</span></div>'
      + '<div class="pr"><div class="av vest" style="background:'+VEST+'">5</div><div class="nm">박패스</div><span class="tg app">빨강 5번</span></div>'
      + '<div class="more">우리 팀 전체 보기'+ic('chevR',14)+'</div>'
      + '</div>';
  }
  return '<div class="card">'
    + '<div class="chead"><div class="cic team">'+ic('users',20)+'</div><div class="ct"><b>내 팀</b><span>아직 편성 전이에요</span></div><span class="cstat muted">대기 중</span></div>'
    + '<div class="emptyrow">팀이 정해지면 내 조끼색·번호가 여기(그리고 위 카드)에 표시돼요.</div>'
    + '</div>';
}

function matchCard(){
  if(phase!=='reveal') return '';  // 매치표 없으면 섹션 자체를 숨김
  return '<div class="card">'
    + '<div class="chead"><div class="cic match">'+ic('swords',20)+'</div><div class="ct"><b>매치표</b><span>전체 5경기 · 내 경기 2</span></div></div>'
    + '<div class="mr me"><span class="rd">1R</span><span>빨강 vs 노랑</span><span class="court">코트 A</span></div>'
    + '<div class="mr me"><span class="rd">2R</span><span>빨강 vs 파랑</span><span class="court">코트 A</span></div>'
    + '<div class="mr"><span class="rd">3R</span><span>빨강 휴식</span><span class="court">휴식</span></div>'
    + '<div class="more">전체 경기 보기'+ic('chevR',14)+'</div>'
    + '</div>';
}

function rosterCard(){
  var cls = phase==='reveal' ? 'att' : 'app';
  var t   = phase==='reveal' ? '출석' : '신청';
  function p(av,nm,c,tx){ return '<div class="pr"><div class="av">'+av+'</div><div class="nm">'+nm+'</div><span class="tg '+c+'">'+tx+'</span></div>'; }
  return '<div class="card">'
    + '<div class="chead"><div class="cic">'+ic('users',20)+'</div><div class="ct"><b>참가 명단</b><span>13명 신청 · 대기 1명</span></div></div>'
    + p('김','김모이',cls,t)+p('이','이풋살',cls,t)+p('박','박패스',cls,t)+p('최','최슈팅','wait','대기 1')
    + '<div class="more">+ 9명 더 보기'+ic('chevR',14)+'</div>'
    + '</div>';
}

function render(){
  hero();
  document.getElementById('cards').innerHTML = teamCard()+matchCard()+rosterCard();
}
document.getElementById('seg').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return;
  var arr=document.querySelectorAll('#seg button');
  for(var i=0;i<arr.length;i++) arr[i].classList.remove('on');
  b.classList.add('on'); phase=b.dataset.v; render();
});
render();
</script>
</body>
</html>
