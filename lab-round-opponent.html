<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB · 홈 카드 이번 라운드 상대/구장</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; background:#eef1f6; color:#0f172a; padding:20px 14px 60px; }
  .wrap{ max-width:440px; margin:0 auto; }
  h1{ font-size:15px; font-weight:900; color:#334155; margin-bottom:4px; }
  .sub{ font-size:12px; color:#94A3B8; font-weight:700; margin-bottom:16px; line-height:1.5; }
  .ctrl{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
  .ctrl .cap{ font-size:11px; font-weight:900; color:#94A3B8; margin-right:2px; }
  .seg{ display:inline-flex; background:#e2e8f0; border-radius:12px; padding:4px; gap:4px; }
  .seg button{ border:none; border-radius:9px; padding:8px 14px; font-weight:900; font-size:12px; cursor:pointer; background:transparent; color:#64748b; }
  .seg button.on{ background:#fff; color:var(--accent-deep); box-shadow:0 1px 3px rgba(0,0,0,.08); }
  /* 카드 */
  .card{ border-radius:24px; padding:20px; color:#fff; box-shadow:0 6px 18px -8px rgba(15,23,42,.22); margin:16px 0; }
  .chdr{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; }
  .klabel{ font-size:11px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; opacity:.8; }
  .kbadge{ font-size:11px; font-weight:900; padding:4px 12px; border-radius:999px; background:rgba(255,255,255,.22); }
  .cdate{ font-size:22px; font-weight:900; line-height:1.15; }
  .cmeta{ font-size:12px; font-weight:800; opacity:.8; margin-top:3px; }
  /* 내 정체(번호+조끼) */
  .vestrow{ display:flex; align-items:center; gap:18px; padding:8px 0 4px; }
  .patch{ width:100px; height:100px; border-radius:24px; background:#fff; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; box-shadow:0 8px 20px rgba(0,0,0,.18); }
  .patch span{ font-weight:900; font-size:52px; line-height:1; }
  .vesttxt .l1{ font-size:14px; font-weight:900; opacity:.85; }
  .vesttxt .l2{ font-size:22px; font-weight:900; line-height:1.2; margin-top:2px; }
  .vesttxt .l2 small{ font-size:15px; }
  .vesttxt .l3{ font-size:12px; font-weight:900; opacity:.7; margin-top:7px; }
  .icon{ width:1em; height:1em; display:inline-block; vertical-align:-.12em; }

  /* ── 공통: 상대 배지(번호 패치와 같은 룩) ── */
  .oppbadge{ border-radius:24px; display:flex; align-items:center; justify-content:center; font-weight:900;
    box-shadow:0 8px 20px rgba(0,0,0,.18); flex-shrink:0; }
  /* 구장 핀 칩(흰 알약) */
  .courtchip{ display:inline-flex; align-items:center; gap:6px; background:#fff; color:#0f172a; font-weight:900;
    font-size:14px; padding:7px 15px; border-radius:999px; box-shadow:0 4px 12px rgba(0,0,0,.1); }

  /* ── 시안1: 가로형(번호 줄과 같은 정렬) ── */
  .p1{ margin-top:14px; padding-top:16px; border-top:1px solid rgba(255,255,255,.25); display:flex; align-items:center; gap:18px; }
  .p1 .oppbadge{ width:80px; height:80px; font-size:42px; }
  .p1 .t .l1{ font-size:13px; font-weight:900; opacity:.8; }
  .p1 .t .l2{ font-size:22px; font-weight:900; line-height:1.2; margin:2px 0 8px; }
  .p1 .t .l2 em{ font-style:normal; opacity:.5; font-size:16px; margin-right:6px; }

  /* ── 시안2: 세로 정제형(가운데, 라벨/칩 강조) ── */
  .p2{ margin-top:14px; border-radius:20px; padding:18px 16px; background:rgba(255,255,255,.15);
    display:flex; flex-direction:column; align-items:center; gap:12px; }
  .p2 .lbl{ font-size:11px; font-weight:900; letter-spacing:.14em; text-transform:uppercase; opacity:.75; }
  .p2 .vsrow{ display:flex; align-items:center; gap:16px; }
  .p2 .vs{ font-size:30px; font-weight:900; font-style:italic; opacity:.5; }
  .p2 .oppbadge{ width:84px; height:84px; font-size:44px; }

  /* ── 시안3: 미니 매치보드(팝업과 통일) ── */
  .p3{ margin-top:14px; border-radius:20px; padding:16px; background:#fff; color:#0f172a; box-shadow:0 6px 16px rgba(0,0,0,.12); }
  .p3 .head{ text-align:center; font-size:12px; font-weight:900; color:#64748b; margin-bottom:12px; letter-spacing:.02em; }
  .p3 .vsrow{ display:flex; align-items:center; justify-content:center; gap:16px; }
  .p3 .me{ width:74px; height:74px; border-radius:20px; display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:22px; border:2px dashed #cbd5e1; color:#94a3b8; }
  .p3 .vs{ font-size:24px; font-weight:900; font-style:italic; color:#cbd5e1; }
  .p3 .oppbadge{ width:74px; height:74px; font-size:38px; box-shadow:0 5px 14px rgba(0,0,0,.15); }
  .p3 .cap{ text-align:center; font-size:12px; font-weight:900; margin-top:8px; }

  /* 휴식 */
  .rest{ margin-top:14px; border-radius:18px; padding:16px; background:rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; gap:10px; font-size:17px; font-weight:900; }
  .note{ font-size:11px; color:#94A3B8; text-align:center; margin-top:6px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <h1>홈 카드 · 이번 경기 상대/구장</h1>
  <p class="sub">내 조끼색·번호는 그대로 두고, 상대·구장을 카드에 어우러지게 붙이는 3가지 시안입니다.</p>

  <div class="ctrl">
    <span class="cap">디자인</span>
    <div class="seg" id="vSeg">
      <button data-v="1" class="on">1 · 가로형</button>
      <button data-v="2">2 · 세로형</button>
      <button data-v="3">3 · 미니보드</button>
    </div>
  </div>
  <div class="ctrl">
    <span class="cap">상태</span>
    <div class="seg" id="stSeg">
      <button data-st="play" class="on">경기 있음</button>
      <button data-st="rest">휴식</button>
    </div>
  </div>

  <div id="cardHost"></div>

  <p class="note">※ 상대 조끼색이 밝으면(연두·노랑) 글자색을 자동으로 어둡게 처리합니다.</p>
</div>

<script>
  const VEST = [
    {hex:'#ec4899', name:'핑크', light:false},
    {hex:'#38bdf8', name:'하늘', light:false},
    {hex:'#a3e635', name:'연두', light:true},
    {hex:'#facc15', name:'노랑', light:true},
    {hex:'#2563eb', name:'파랑', light:false},
    {hex:'#ef4444', name:'빨강', light:false},
  ];
  const me = { name:'재원', teamIdx:2, letter:'C', jersey:3 };
  const oppIdx = 4, oppLetter = 'E';
  const court = '2구장', time = '20:00';

  let variant = '1', st = 'play';

  const svg = (p)=>`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  const iPin  = svg('<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>');
  const iCoffee = svg('<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/>');

  function oppBadge(){ const o=VEST[oppIdx]; const ink=o.light?'#15171E':'#fff';
    return `<div class="oppbadge" style="background:${o.hex}; color:${ink}">${oppLetter}</div>`; }

  function panel(){
    const o = VEST[oppIdx];
    if(variant==='1') return `
      <div class="p1">
        ${oppBadge()}
        <div class="t">
          <p class="l1">이번 경기 상대</p>
          <p class="l2"><em>VS</em>${o.name}팀</p>
          <span class="courtchip">${iPin}${court}</span>
        </div>
      </div>`;
    if(variant==='2') return `
      <div class="p2">
        <p class="lbl">이번 경기</p>
        <div class="vsrow"><span class="vs">VS</span>${oppBadge()}</div>
        <span class="courtchip">${iPin}${court}</span>
      </div>`;
    return `
      <div class="p3">
        <p class="head">${iPin} ${court}</p>
        <div class="vsrow">
          <div class="me">나</div>
          <span class="vs">VS</span>
          ${oppBadge()}
        </div>
        <p class="cap" style="color:${o.hex}">${o.name}팀과 경기</p>
      </div>`;
  }

  function render(){
    const v = VEST[me.teamIdx];
    const ink = v.light ? '#15171E' : '#fff';
    const numColor = v.light ? '#1e293b' : v.hex;
    document.getElementById('cardHost').innerHTML = `
      <div class="card" style="background:${v.hex}; color:${ink}">
        <div class="chdr">
          <span class="klabel">정기 모임</span>
          <span class="kbadge">오늘 · ${time}</span>
        </div>
        <div class="cdate">6월 30일 (일)</div>
        <div class="cmeta">양산 실내풋살장 · 18명 참여</div>
        <div class="vestrow">
          <div class="patch"><span style="color:${numColor}">${me.jersey}</span></div>
          <div class="vesttxt">
            <p class="l1">오늘 ${me.name}님은</p>
            <p class="l2">${v.name}색 ${me.jersey}번<small>이에요!</small></p>
            <p class="l3">${me.letter}팀 · ${v.name} 조끼</p>
          </div>
        </div>
        ${st==='play' ? panel() : `<div class="rest" style="color:${ink}">${iCoffee} 이번 라운드는 쉬어가요</div>`}
      </div>`;
  }

  document.querySelectorAll('#vSeg button').forEach(b=>b.addEventListener('click',()=>{
    variant=b.dataset.v; document.querySelectorAll('#vSeg button').forEach(x=>x.classList.toggle('on',x===b)); render();
  }));
  document.querySelectorAll('#stSeg button').forEach(b=>b.addEventListener('click',()=>{
    st=b.dataset.st; document.querySelectorAll('#stSeg button').forEach(x=>x.classList.toggle('on',x===b)); render();
  }));
  render();
</script>
</body>
</html>
