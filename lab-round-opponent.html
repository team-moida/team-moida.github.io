<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB · 홈 카드 이번 라운드 상대/구장</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; background:#eef1f6; color:#0f172a; padding:20px 14px 60px; }
  .wrap{ max-width:440px; margin:0 auto; }
  h1{ font-size:15px; font-weight:900; color:#334155; margin-bottom:4px; }
  .sub{ font-size:12px; color:#94A3B8; font-weight:700; margin-bottom:16px; line-height:1.5; }
  .ctrl{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
  .ctrl .cap{ font-size:11px; font-weight:900; color:#94A3B8; margin-right:2px; }
  .seg{ display:inline-flex; background:#e2e8f0; border-radius:12px; padding:4px; gap:4px; }
  .seg button{ border:none; border-radius:9px; padding:8px 16px; font-weight:900; font-size:12px; cursor:pointer; background:transparent; color:#64748b; }
  .seg button.on{ background:#fff; color:var(--accent-deep); box-shadow:0 1px 3px rgba(0,0,0,.08); }
  /* 카드 */
  .card{ border-radius:24px; padding:20px; color:#fff; box-shadow:0 6px 18px -8px rgba(15,23,42,.22); margin:16px 0; }
  .chdr{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; }
  .klabel{ font-size:11px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; opacity:.8; }
  .kbadge{ font-size:11px; font-weight:900; padding:4px 12px; border-radius:999px; background:rgba(255,255,255,.22); }
  .cdate{ font-size:22px; font-weight:900; line-height:1.15; }
  .cmeta{ font-size:12px; font-weight:800; opacity:.8; margin-top:3px; }
  /* 조끼/상대 공통 줄(쌍둥이 구조) */
  .row{ display:flex; align-items:center; gap:18px; }
  .row + .row{ margin-top:14px; padding-top:14px; border-top:1px solid; border-color:currentColor; }
  .row + .row{ position:relative; }
  .divsoft{ opacity:.22; }               /* 구분선을 은은하게 (border-color=글자색 → 낮춤) */
  .patch{ width:96px; height:96px; border-radius:24px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; box-shadow:0 8px 20px rgba(0,0,0,.18); font-weight:900; font-size:50px; line-height:1; }
  .txt .l1{ font-size:14px; font-weight:900; opacity:.85; }
  .txt .l2{ font-size:22px; font-weight:900; line-height:1.2; margin-top:2px; }
  .txt .l2 small{ font-size:15px; }
  .txt .l3{ font-size:12px; font-weight:900; opacity:.7; margin-top:7px; display:inline-flex; align-items:center; gap:5px; }
  .icon{ width:1em; height:1em; display:inline-block; vertical-align:-.12em; }
  .rest2 .l2{ display:inline-flex; align-items:center; gap:8px; }
  .note{ font-size:11px; color:#94A3B8; text-align:center; margin-top:6px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <h1>홈 카드 · 이번 경기 상대/구장</h1>
  <p class="sub">조끼 설명과 같은 문장 스타일로, 상대 안내도 카드색 위에 그대로 얹었습니다. (상대 배지만 상대 조끼색)</p>

  <div class="ctrl">
    <span class="cap">상태</span>
    <div class="seg" id="stSeg">
      <button data-st="play" class="on">경기 있음</button>
      <button data-st="rest">휴식</button>
    </div>
  </div>
  <div class="ctrl">
    <span class="cap">내 조끼</span>
    <div class="seg" id="meSeg">
      <button data-me="2" class="on">연두(밝음)</button>
      <button data-me="4">파랑(어두움)</button>
    </div>
  </div>

  <div id="cardHost"></div>

  <p class="note">※ 조끼색이 밝으면(연두·노랑) 글자·배지 글자를 자동으로 어둡게 처리합니다.</p>
</div>

<script>
  const VEST = [
    {hex:'#ec4899', name:'핑크', light:false},
    {hex:'#38bdf8', name:'하늘', light:false},
    {hex:'#a3e635', name:'연두', light:true},
    {hex:'#facc15', name:'노랑', light:true},
    {hex:'#2563eb', name:'파랑', light:false},
    {hex:'#ef4444', name:'빨강', light:false},
  ];
  let meIdx = 2;                 // 내 팀(=카드색)
  const meInfo = { name:'재원', letter:'C', jersey:3 };
  let oppIdx = 4;               // 상대(내가 파랑이면 상대는 연두로 스왑)
  const court = '2구장', time = '20:00';
  let st = 'play';

  const svg = (p)=>`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  const iPin  = svg('<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>');
  const iCoffee = svg('<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/>');

  function render(){
    const v = VEST[meIdx];
    const ink = v.light ? '#15171E' : '#fff';
    const numColor = v.light ? '#1e293b' : v.hex;     // 흰 번호패치 안 숫자색(내 조끼색)
    const o = VEST[oppIdx];
    const oppInk = o.light ? '#15171E' : '#fff';

    const oppRow = `
      <div class="row rowsep">
        <div class="patch" style="background:${o.hex}; color:${oppInk}">C</div>
        <div class="txt">
          <p class="l1">이번 경기 상대는</p>
          <p class="l2">${o.name}팀<small>이에요!</small></p>
          <p class="l3">${iPin} ${court}에서 만나요</p>
        </div>
      </div>`;

    const restRow = `
      <div class="row rowsep rest2">
        <div class="patch" style="background:rgba(255,255,255,.22); color:${ink}">${iCoffee}</div>
        <div class="txt">
          <p class="l1">이번 라운드는</p>
          <p class="l2">쉬어가요</p>
          <p class="l3">다음 경기를 기다려 주세요</p>
        </div>
      </div>`;

    document.getElementById('cardHost').innerHTML = `
      <div class="card" style="background:${v.hex}; color:${ink}">
        <div class="chdr">
          <span class="klabel">정기 모임</span>
          <span class="kbadge">오늘 · ${time}</span>
        </div>
        <div class="cdate">6월 30일 (일)</div>
        <div class="cmeta">양산 실내풋살장 · 18명 참여</div>
        <div class="row" style="margin-top:12px">
          <div class="patch" style="background:#fff; color:${numColor}">${meInfo.jersey}</div>
          <div class="txt">
            <p class="l1">오늘 ${meInfo.name}님은</p>
            <p class="l2">${v.name}색 ${meInfo.jersey}번<small>이에요!</small></p>
            <p class="l3">${meInfo.letter}팀 · ${v.name} 조끼</p>
          </div>
        </div>
        ${st==='play' ? oppRow : restRow}
      </div>`;
    // 구분선 은은하게(글자색 기반)
    document.querySelectorAll('.rowsep').forEach(el=>{ el.style.borderTop='1px solid'; el.style.borderColor=ink; el.style.borderTopColor=(v.light?'rgba(21,23,30,.18)':'rgba(255,255,255,.28)'); el.style.marginTop='14px'; el.style.paddingTop='14px'; });
  }

  document.querySelectorAll('#stSeg button').forEach(b=>b.addEventListener('click',()=>{
    st=b.dataset.st; document.querySelectorAll('#stSeg button').forEach(x=>x.classList.toggle('on',x===b)); render();
  }));
  document.querySelectorAll('#meSeg button').forEach(b=>b.addEventListener('click',()=>{
    meIdx=+b.dataset.me; oppIdx = (meIdx===2?4:2); document.querySelectorAll('#meSeg button').forEach(x=>x.classList.toggle('on',x===b)); render();
  }));
  render();
</script>
</body>
</html>
