<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>팀 편성 개편 — LAB</title>
<style>
  :root{ --accent:#183FB0; --accent-deep:#122E78; --ink:#0f172a; --sub:#475569; --mut:#94a3b8; --line:#e6eaf2; --bg:#f4f6fa; --live:#C2F94A; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(125% 90% at 50% -8%, #e8ecf9 0%, #f3f5fb 46%, #f4f6fa 100%); min-height:100vh; color:var(--ink); user-select:none; }
  .wrap{ max-width:440px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom)); }
  h1{ font-size:18px; font-weight:900; margin:6px 4px 2px; }
  .lead{ font-size:12px; font-weight:700; color:var(--mut); margin:0 4px 14px; line-height:1.6; }
  .lead b{ color:var(--accent-deep); }
  svg{ display:block; }

  .seg{ display:flex; gap:5px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:5px; box-shadow:0 4px 14px rgba(0,0,0,.05); margin-bottom:16px; }
  .seg button{ flex:1; border:0; background:transparent; border-radius:10px; padding:9px 4px; font-weight:900; font-size:11px; color:var(--sub); cursor:pointer; font-family:inherit; }
  .seg button.on{ background:var(--accent); color:#fff; }

  /* 상단 바 */
  .top{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .top .tt{ font-size:17px; font-weight:900; }
  .top .tsub{ font-size:11.5px; font-weight:800; color:var(--mut); }
  .top .sp{ flex:1; }
  .btn{ border:0; font-family:inherit; font-weight:900; cursor:pointer; display:inline-flex; align-items:center; gap:5px; border-radius:12px; }
  .btn.pri{ background:var(--accent); color:#fff; padding:9px 14px; font-size:13px; }
  .btn.ghost{ background:#eef2fb; color:var(--accent-deep); padding:9px 13px; font-size:13px; }

  /* 팀 카드 */
  .teams{ display:flex; flex-direction:column; gap:10px; }
  .tcard{ background:#fff; border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.05); }
  .thead{ display:flex; align-items:center; gap:8px; padding:10px 14px; color:#fff; font-weight:900; }
  .thead .dot{ width:16px; height:16px; border-radius:6px; background:#fff; }
  .thead .tn{ font-size:15px; }
  .thead .tc{ margin-left:auto; font-size:12px; opacity:.92; }
  .tbody{ display:flex; flex-wrap:wrap; gap:6px; padding:12px 14px; }
  .tchip{ font-size:13px; font-weight:800; padding:6px 11px; border-radius:10px; background:#f4f6fa; color:#0f172a; border:1px solid var(--line); }
  .tchip .lv{ color:var(--mut); font-size:10.5px; margin-left:3px; }

  /* 빈 상태 */
  .empty{ background:#fff; border:1px solid var(--line); border-radius:20px; box-shadow:0 4px 14px rgba(0,0,0,.05); padding:40px 20px; text-align:center; }
  .empty .ic{ display:flex; justify-content:center; color:#cbd5e1; margin-bottom:12px; }
  .empty b{ font-size:15px; font-weight:900; display:block; }
  .empty span{ font-size:12.5px; font-weight:700; color:var(--mut); }
  .empty .btn{ margin-top:18px; padding:14px 22px; font-size:15px; }

  /* 마법사 스텝 표시 */
  .steps{ display:flex; align-items:center; margin:2px 2px 16px; }
  .steps .st{ display:flex; align-items:center; gap:7px; }
  .steps .no{ width:26px; height:26px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; background:#e6eaf2; color:#94a3b8; flex-shrink:0; }
  .steps .st.on .no{ background:var(--accent); color:#fff; }
  .steps .st.done .no{ background:#dbe3f6; color:var(--accent-deep); }
  .steps .lb{ font-size:11.5px; font-weight:900; color:var(--mut); }
  .steps .st.on .lb{ color:var(--accent-deep); }
  .steps .bar{ flex:1; height:2px; background:#e6eaf2; margin:0 6px; border-radius:2px; }
  .steps .bar.done{ background:var(--accent); }

  .card{ background:#fff; border:1px solid var(--line); border-radius:18px; box-shadow:0 4px 14px rgba(0,0,0,.05); padding:16px; margin-bottom:12px; }
  .card .clab{ font-size:10px; font-weight:900; color:var(--accent); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
  .binfo{ display:flex; align-items:center; justify-content:space-between; }
  .binfo .big{ font-size:26px; font-weight:900; } .binfo .cap{ font-size:10px; font-weight:800; color:var(--mut); }

  .pool{ display:flex; flex-wrap:wrap; gap:7px; }
  .pchip{ font-size:13px; font-weight:800; padding:7px 12px; border-radius:11px; background:#eef2fb; color:var(--accent-deep); border:1px solid #dbe3f6; cursor:pointer; }
  .pchip.ex{ background:#f1f5f9; color:#cbd5e1; border-color:#e6eaf2; text-decoration:line-through; }
  .pchip .lv{ font-size:10px; color:var(--mut); margin-left:3px; }

  .cnt{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:14px; }
  .cnt button{ padding:12px 0; border-radius:12px; font-weight:900; font-size:15px; border:1px solid var(--line); background:#f8fafc; color:var(--sub); cursor:pointer; font-family:inherit; }
  .cnt button.on{ background:var(--accent); color:#fff; border-color:var(--accent); }

  .opt{ display:flex; align-items:center; gap:12px; padding:13px 14px; border:1px solid var(--line); border-radius:13px; background:#fff; cursor:pointer; margin-bottom:8px; }
  .opt.on{ background:#eef2fb; border-color:#c7d3ee; }
  .opt .box{ width:20px; height:20px; border-radius:6px; border:2px solid #cbd5e1; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; }
  .opt.on .box{ background:var(--accent); border-color:var(--accent); }
  .opt .ot{ font-size:13.5px; font-weight:900; } .opt .os{ font-size:11px; font-weight:700; color:var(--mut); }

  .hint{ display:flex; align-items:center; gap:6px; font-size:11.5px; font-weight:800; color:var(--mut); margin:2px 2px 10px; }
  .regen{ width:100%; margin-top:2px; padding:12px; border-radius:13px; border:1px solid var(--line); background:#fff; color:var(--accent-deep); font-family:inherit; font-weight:900; font-size:13.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }

  .wnav{ display:flex; gap:8px; margin-top:16px; }
  .wnav button{ padding:15px; border-radius:14px; font-weight:900; font-size:15px; border:0; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:6px; }
  .wnav .prev{ background:#eef1f7; color:#475569; flex:0 0 auto; padding:15px 20px; }
  .wnav .next{ background:var(--accent); color:#fff; flex:1; }
  .wnav .confirm{ background:var(--accent); color:#fff; flex:1; }

  .note{ font-size:12px; font-weight:800; color:var(--sub); margin:16px 4px 0; line-height:1.7; background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px 14px; }
  .note b{ color:var(--accent-deep); }
</style>
</head>
<body>
<div class="wrap">
  <h1>팀 편성 개편 — LAB</h1>
  <p class="lead">팀 버튼 → 기본은 <b>결과</b>. 팀 없으면 <b>[생성]</b>, 있으면 <b>[수정]</b>. 생성·수정은 <b>단계별 마법사</b>(대상 → 팀수·옵션 → 편성결과 → 확정). 아래에서 화면을 바꿔보세요.</p>

  <div class="seg" id="viewSeg">
    <button data-v="result" class="on">결과(팀 있음)</button>
    <button data-v="empty">결과(빈 상태)</button>
    <button data-v="wizard">생성/수정 마법사</button>
  </div>

  <div id="screen"></div>

  <p class="note">핵심: <b>결과가 기본 화면</b>이라 팀을 바로 확인. 만들거나 고칠 때만 <b>마법사</b>로 들어가 한 단계씩 진행 → 마지막에 <b>확정(발표)</b>. 지금의 "긴 설정 한 판"을 단계로 쪼갠 형태예요.</p>
</div>

<script>
var P = {
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  history:'<path d="M12 8v4l3 3"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/>',
  refresh:'<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M21 21v-5h-5"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  chevL:'<polyline points="15 18 9 12 15 6"/>',
  chevR:'<polyline points="9 18 15 12 9 6"/>',
  move:'<polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/>'
};
function ic(name,size,color){ size=size||20; var c=color?(' style="color:'+color+'"'):''; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"'+c+'>'+P[name]+'</svg>'; }

// 조끼색(getTeamBadge 순서 중) — 빨강·파랑·노랑
var TEAMS = [
  {name:'빨강', color:'#ef4444', dark:false, members:[['김모이',4],['이풋살',3],['박패스',2],['최슈팅',5],['정골핑',3],['한수비',2]]},
  {name:'파랑', color:'#2563eb', dark:false, members:[['오미드',4],['윤공격',3],['장미들',2],['서골키',5],['임윙',3],['조라이트',2]]},
  {name:'노랑', color:'#facc15', dark:true,  members:[['강센터',4],['신포워',3],['권백',2],['문수',5],['배런닝',3],['노패스',2]]},
];
var POOL = [];
TEAMS.forEach(function(t){ t.members.forEach(function(m){ POOL.push(m); }); });

var view='result', step=1;
var excluded={};
var teamCount=3;
var opts={couples:true, avoid:true};

function teamCards(){
  return '<div class="teams">' + TEAMS.map(function(t){
    var head = 'color:'+(t.dark?'#15171E':'#fff')+';background:'+t.color;
    var dot = t.dark?'background:#15171E':'background:#fff';
    var chips = t.members.map(function(m){ return '<span class="tchip">'+m[0]+'<span class="lv">'+m[1]+'</span></span>'; }).join('');
    return '<div class="tcard"><div class="thead" style="'+head+'"><span class="dot" style="'+dot+'"></span><span class="tn">'+t.name+'팀</span><span class="tc">'+t.members.length+'명</span></div><div class="tbody">'+chips+'</div></div>';
  }).join('') + '</div>';
}

function resultScreen(){
  return ''
   + '<div class="top"><div><div class="tt">팀 편성</div><div class="tsub">3팀 · 18명 · 확정·공개됨</div></div><div class="sp"></div>'
   + '<button class="btn ghost" onclick="go(\'wizard\')">'+ic('history',15)+'기록</button>'
   + '<button class="btn pri" onclick="go(\'wizard\')">'+ic('edit',15)+'수정</button></div>'
   + teamCards();
}

function emptyScreen(){
  return ''
   + '<div class="top"><div><div class="tt">팀 편성</div><div class="tsub">아직 편성 전</div></div></div>'
   + '<div class="empty"><div class="ic">'+ic('users',44)+'</div>'
   + '<b>아직 팀이 편성되지 않았어요</b><span>[생성]을 눌러 단계별로 팀을 만들어요</span>'
   + '<button class="btn pri" onclick="go(\'wizard\')">'+ic('plus',18)+'팀 생성</button></div>';
}

function stepBar(){
  var labels=['대상','팀수·옵션','편성 결과'];
  var html='<div class="steps">';
  for(var i=1;i<=3;i++){
    var cls = i===step?'on':(i<step?'done':'');
    html += '<div class="st '+cls+'"><span class="no">'+(i<step?'✓':i)+'</span><span class="lb">'+labels[i-1]+'</span></div>';
    if(i<3) html += '<span class="bar '+(i<step?'done':'')+'"></span>';
  }
  return html+'</div>';
}

function step1(){
  var cnt = POOL.filter(function(m){ return !excluded[m[0]]; }).length;
  var chips = POOL.map(function(m){
    return '<span class="pchip'+(excluded[m[0]]?' ex':'')+'" onclick="toggleEx(\''+m[0]+'\')">'+m[0]+'<span class="lv">'+m[1]+'</span></span>';
  }).join('');
  return '<div class="card"><div class="binfo"><div><div class="clab">편성 대상</div><div style="font-size:13px;font-weight:800;color:var(--mut)">이번 모임 선정 명단</div></div>'
    + '<div style="text-align:right"><div class="big">'+cnt+'<span style="font-size:15px">명</span></div><div class="cap">뺄 사람은 탭</div></div></div></div>'
    + '<div class="card"><div class="clab">명단 (탭하면 제외)</div><div class="pool">'+chips+'</div></div>';
}

function step2(){
  var cntBtns='';
  [2,3,4,5,6].forEach(function(n){ cntBtns+='<button class="'+(teamCount===n?'on':'')+'" onclick="setCount('+n+')">'+n+'팀</button>'; });
  function opt(k,t,s){ return '<div class="opt'+(opts[k]?' on':'')+'" onclick="toggleOpt(\''+k+'\')"><div class="box">'+(opts[k]?ic('check',12,'#fff'):'')+'</div><div><div class="ot">'+t+'</div><div class="os">'+s+'</div></div></div>'; }
  return '<div class="card"><div class="clab">팀 수</div><div class="cnt">'+cntBtns+'</div>'
    + '<div class="clab" style="margin-top:4px">편성 옵션</div>'
    + opt('couples','커플 같은 팀 유지','등록된 커플을 한 팀으로')
    + opt('avoid','지난 주 팀메이트 중복 회피','최대한 새로운 조합으로')
    + '</div>';
}

function step3(){
  return '<div class="hint">'+ic('move',13)+'선수를 길게 눌러 다른 팀으로 옮길 수 있어요 (실제 화면)</div>'
    + teamCards()
    + '<button class="regen" onclick="alert(\'재생성(LAB 데모)\')">'+ic('refresh',15)+'다시 자동 편성</button>';
}

function wizardScreen(){
  var body = step===1?step1():step===2?step2():step3();
  var nav = '<div class="wnav">';
  if(step>1) nav += '<button class="prev" onclick="setStep('+(step-1)+')">'+ic('chevL',16)+'이전</button>';
  if(step<3) nav += '<button class="next" onclick="setStep('+(step+1)+')">다음'+ic('chevR',16)+'</button>';
  else nav += '<button class="confirm" onclick="go(\'result\')">'+ic('check',17)+'이 팀으로 확정 · 발표</button>';
  nav += '</div>';
  return ''
   + '<div class="top"><button class="btn ghost" onclick="go(\'result\')">'+ic('chevL',15)+'결과</button><div style="margin-left:2px"><div class="tt" style="font-size:16px">팀 만들기</div></div></div>'
   + stepBar() + body + nav;
}

function render(){
  var el=document.getElementById('screen');
  el.innerHTML = view==='result'?resultScreen():view==='empty'?emptyScreen():wizardScreen();
}
function go(v){ view=v; if(v==='wizard') step=1; syncSeg(); render(); }
function setStep(s){ step=s; render(); }
function setCount(n){ teamCount=n; render(); }
function toggleOpt(k){ opts[k]=!opts[k]; render(); }
function toggleEx(n){ excluded[n]=!excluded[n]; render(); }
function syncSeg(){ var a=document.querySelectorAll('#viewSeg button'); for(var i=0;i<a.length;i++) a[i].classList.toggle('on', a[i].dataset.v===view); }

document.getElementById('viewSeg').addEventListener('click', function(e){ var b=e.target.closest('button'); if(!b) return; go(b.dataset.v); });
render();
</script>
</body>
</html>
