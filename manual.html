<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모이다 사용 설명서</title>
<style>
  @font-face{font-family:'Esamanru';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicMedium.woff') format('woff');font-weight:normal}
  @font-face{font-family:'Esamanru';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicBold.woff') format('woff');font-weight:700}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Esamanru',sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .logo{font-size:64px}
  h1{font-size:34px;font-weight:700;margin-top:8px}
  .sub{color:#64748b;font-size:15px;margin:6px 0 30px}
  .cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:380px}
  a.card{text-decoration:none;color:#fff;border-radius:20px;padding:24px 26px;display:flex;align-items:center;gap:16px;box-shadow:0 10px 24px rgba(0,0,0,.12)}
  a.member{background:linear-gradient(135deg,#183FB0,#122E78)}
  a.admin{background:linear-gradient(135deg,#6366f1,#4f46e5)}
  a.card .ico{font-size:36px}
  a.card .t{font-size:20px;font-weight:700}
  a.card .d{font-size:13px;opacity:.9;margin-top:2px}
  .foot{color:#94a3b8;font-size:12px;margin-top:28px}
</style>
</head>
<body>
  <div class="logo">⚽</div>
  <h1>모이다 사용 설명서</h1>
  <div class="sub">OTP FC 모이다 · 보고 싶은 설명서를 골라주세요</div>
  <div class="cards">
    <a class="card member" href="manual-member.html">
      <span class="ico">🙋</span>
      <span><div class="t">회원용 설명서</div><div class="d">로그인 · 모임신청 · 출석 · 회비 · 팀/매치 · 공지</div></span>
    </a>
    <a class="card admin" href="manual-admin.html">
      <span class="ico">🛠️</span>
      <span><div class="t">관리자용 설명서</div><div class="d">모임관리 · 키오스크 · 팀편성 · 매치 · 벌금 · 공지발송</div></span>
    </a>
  </div>
  <div class="foot">각 설명서에서 '🖨 PDF로 저장' 버튼으로 PDF를 만들 수 있습니다.</div>
</body>
</html>
