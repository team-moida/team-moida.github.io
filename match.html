<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8fafc">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>모이다 - 매치 테이블</title>
    <script>(function(){if(localStorage.getItem('moida_theme')==='dark')document.documentElement.classList.add('dark');})();</script>
    <script src="safety-net.js"></script>
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="match/match-export.js"></script>
    <script type="text/babel" src="match/match-utils.js"></script>
    <script type="text/babel" src="match/match-generator.js"></script>
    <script type="text/babel" src="match/match-results.js"></script>
    <script type="text/babel" src="match/match-score.js"></script>
    <style>
        body{font-family:'Esamanru',sans-serif!important;background:#f8fafc;user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;touch-action:manipulation}
        .match-row{transition:all 0.2s ease;cursor:pointer}
        .match-row:active{background:#f1f5f9}
        .match-completed{opacity:0.45;background:#f8fafc}
        select,input{font-family:'Esamanru',sans-serif}
        select{padding-right:2rem!important}
        /* ── 페이지별 다크모드 ── */
        html.dark .match-row:active{background:#334155!important}
        html.dark .match-completed{background:var(--t-bg)!important}
        html.dark .border-teal-300{border-color:#0d9488!important}
        html.dark .text-teal-100{color:#ccfbf1!important}
    </style>
</head>
<body>
<div id="loading-screen">
    <div class="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-bold text-slate-500 italic">모이다 연결 중...</p>
</div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

function App() {
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const [view, setView] = useState('setup');
    const [loading, setLoading] = useState(true);
    const [confirmedData, setConfirmedData] = useState(null);
    const [schedule, setSchedule] = useState({list:[],stats:{}});
    const [completedMatches, setCompletedMatches] = useState(new Set());
    const [presets, setPresets] = useState([]);
    const [savedSchedules, setSavedSchedules] = useState([]);
    const [selectedPresetId, setSelectedPresetId] = useState('manual');
    const [presetToggles, setPresetToggles] = useState([]);
    const [isLoadModalOpen, setIsLoadModalOpen] = useState(false);
    const [isPresetModalOpen, setIsPresetModalOpen] = useState(false);
    const [presetForm, setPresetForm] = useState({name:'',courtCount:3,fieldNames:['1구장','2구장','3구장'],fieldTypes:['6vs6','6vs6','6vs6']});
    const [isSaving, setIsSaving] = useState(false);
    const [isCapturing, setIsCapturing] = useState(false);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null});
    const [activeScheduleId, setActiveScheduleId] = useState(null);
    const [currentMatchIndex, setCurrentMatchIndex] = useState(0);

    const [config, setConfig] = useState({
        meetingDate:new Date().toISOString().split('T')[0],
        courtCount:3, matchDuration:12, breakDuration:3,
        startTime:'08:00', endTime:'10:00',
        fieldNames:['1구장','2구장','3구장'], fieldTypes:['6vs6','6vs6','6vs6'],
        strictCourtSize:false
    });

    const showAlert = (title,content,type='info',onConfirm=null) => setAlertModal({show:true,title,content,type,onConfirm});
    const showConfirm = (title,content,onConfirm) => setAlertModal({show:true,title,content,type:'confirm',onConfirm});

    const [loggedInManager] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (s && s.kakaoId) return s;
            location.href = 'index.html';
            return null;
        } catch(e) { location.href = 'index.html'; return null; }
    });

    const toggleTheme = () => { const isDark = !darkMode; setDarkMode(isDark); document.documentElement.classList.toggle('dark', isDark); localStorage.setItem('moida_theme', isDark ? 'dark' : 'light'); };

    useEffect(()=>{
        const hideLoader=()=>{setLoading(false);const l=document.getElementById('loading-screen');if(l){l.style.opacity='0';setTimeout(()=>{if(l)l.style.display='none';},500);}};
        const t=setTimeout(hideLoader,5000);
        if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(()=>{});
        const unsubAuth=auth.onAuthStateChanged(u=>{
            clearTimeout(t);
            hideLoader();
            if(!u)return;
            getCol('team_drafts').onSnapshot(snap=>{
                const drafts=snap.docs.map(d=>({id:d.id,...d.data()}));
                const latest=drafts.filter(d=>d.isConfirmed).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
                if(latest){setConfirmedData(latest);if(latest.meetingDate)setConfig(p=>({...p,meetingDate:latest.meetingDate}));}
            });
            getCol('court_presets').onSnapshot(snap=>setPresets(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt))));
            getCol('match_schedules').onSnapshot(snap=>setSavedSchedules(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))));
        });
        return()=>unsubAuth();
    },[]);

    const handleGenerateMatchTable = () => {
        if(!confirmedData){return showAlert('알림','먼저 팀 편성을 확정해주세요.');}
        const result = generateSchedule(config, confirmedData);
        setSchedule(result);
        setCompletedMatches(new Set());
        setCurrentMatchIndex(0);
        setActiveScheduleId(null);
        setView('results');
    };

    const saveMatchSchedule = async () => {
        if(!schedule.list.length)return;
        setIsSaving(true);
        try {
            const docRef = await getCol('match_schedules').add({
                schedule,config,completedMatches:Array.from(completedMatches),
                currentMatchIndex,
                createdAt:new Date().toISOString(),meetingDate:config.meetingDate,
                label:`${config.meetingDate} 매치 (${schedule.list.length}라운드)`
            });
            setActiveScheduleId(docRef.id);
            showAlert('저장 완료','매치 테이블이 저장되었습니다.');
        } catch(e){showAlert('오류','저장 실패');} finally{setIsSaving(false);}
    };

    const handleNextMatch = async () => {
        if (!schedule.list.length || currentMatchIndex >= schedule.list.length) return;
        const currentSession = schedule.list[currentMatchIndex];
        const newCompleted = new Set(completedMatches);
        newCompleted.add(currentSession.id);
        setCompletedMatches(newCompleted);
        const newIndex = currentMatchIndex + 1;
        setCurrentMatchIndex(newIndex);
        if (activeScheduleId) {
            try {
                await getCol('match_schedules').doc(activeScheduleId).update({
                    completedMatches: Array.from(newCompleted),
                    currentMatchIndex: newIndex
                });
            } catch(e) {}
        }
    };

    const handleCapture = async () => {
        setIsCapturing(true);
        await new Promise(r=>setTimeout(r,500));
        try {
            await captureMatchTable(config.meetingDate);
        } catch(e){showAlert('오류','캡쳐 실패');}
        finally{setIsCapturing(false);}
    };

    const handlePresetSelect = (preset) => {
        if(!preset){setSelectedPresetId('manual');return;}
        setSelectedPresetId(preset.id);
        setPresetToggles(new Array(preset.courtCount).fill(false));
        setConfig(p=>({...p,courtCount:0,fieldNames:[],fieldTypes:[]}));
    };

    const handleToggleSubCourt = (idx) => {
        const newToggles=[...presetToggles];newToggles[idx]=!newToggles[idx];setPresetToggles(newToggles);
        const p=presets.find(pr=>pr.id===selectedPresetId);if(!p)return;
        const names=[],types=[];
        newToggles.forEach((on,i)=>{if(on){names.push(p.fieldNames[i]);types.push(p.fieldTypes[i]);}});
        setConfig(prev=>({...prev,courtCount:names.length,fieldNames:names,fieldTypes:types}));
    };

    const savePreset = async () => {
        if(!presetForm.name.trim())return showAlert('알림','프리셋 이름을 입력해주세요.');
        try {
            await getCol('court_presets').add({...presetForm,createdAt:new Date().toISOString()});
            setIsPresetModalOpen(false);
            setPresetForm({name:'',courtCount:3,fieldNames:['1구장','2구장','3구장'],fieldTypes:['6vs6','6vs6','6vs6']});
            showAlert('완료','프리셋이 저장되었습니다.');
        } catch(e){showAlert('오류','저장 실패');}
    };

    const statsData = useMemo(() => computeStats(schedule, confirmedData), [schedule, confirmedData]);

    const handleToggleComplete = (sessionId) => {
        setCompletedMatches(prev=>{const n=new Set(prev);n.has(sessionId)?n.delete(sessionId):n.add(sessionId);return n;});
    };

    const handleLoadSchedule = (s) => {
        setSchedule(s.schedule);
        setConfig(p=>({...p,...s.config}));
        setCompletedMatches(new Set(s.completedMatches||[]));
        setCurrentMatchIndex(s.currentMatchIndex||0);
        setActiveScheduleId(s.id);
        setView('results');
        setIsLoadModalOpen(false);
    };

    const handleDeleteSchedule = (id) => showConfirm('삭제','이 기록을 삭제하시겠습니까?',async()=>await getCol('match_schedules').doc(id).delete());

    const handleLogout = () => { showConfirm('로그아웃', '로그아웃 하시겠어요?', () => { localStorage.removeItem('moida_member_data'); location.href = 'index.html'; }); };

    if(loading)return(
        <div className="h-screen flex items-center justify-center">
            <div className="w-10 h-10 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    );

    return (
        <div className="min-h-screen pb-32 text-slate-900">
            <nav className="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 shadow-sm" style={{paddingTop:'env(safe-area-inset-top)'}}>
                <div className="h-16 flex items-center px-4 max-w-5xl mx-auto w-full justify-between">
                    <div className="flex items-center gap-1">
                        {[['setup','설정'],['results','매치표'],['stats','통계']].map(([v,l])=>(
                            <button key={v} onClick={()=>setView(v)} className={`px-3 py-2 rounded-xl font-black text-xs transition-all ${view===v?'bg-teal-500 text-white shadow-lg':'text-slate-400 hover:text-slate-600'}`}>{l}</button>
                        ))}
                    </div>
                    <div className="flex gap-2">
                        {schedule.list.length>0&&<button onClick={saveMatchSchedule} disabled={isSaving} className="p-2.5 rounded-xl bg-slate-50 text-slate-400 hover:text-blue-600"><Icon.Save size={16}/></button>}
                        {schedule.list.length>0&&<button onClick={handleCapture} disabled={isCapturing} className="p-2.5 rounded-xl bg-slate-50 text-slate-400 hover:text-teal-500"><Icon.Camera size={16}/></button>}
                        <button onClick={()=>window.location.reload()} className="p-2.5 rounded-xl bg-slate-50 text-slate-400"><Icon.Refresh size={16}/></button>
                        <button onClick={toggleTheme} className="p-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200" title="테마">{darkMode ? <Icon.Sun size={18}/> : <Icon.Moon size={18}/>}</button>
                        <button onClick={()=>window.location.href='index.html'} className="p-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200"><Icon.Home size={18}/></button>
                        <button onClick={handleLogout} className="p-2.5 rounded-xl bg-red-50 text-red-500" title="로그아웃"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                    </div>
                </div>
            </nav>

            <main className="p-4 max-w-5xl mx-auto animate-zoom-in">
                {view==='setup' && <SetupTab config={config} setConfig={setConfig} confirmedData={confirmedData} presets={presets} selectedPresetId={selectedPresetId} presetToggles={presetToggles} onGenerate={handleGenerateMatchTable} onLoadOpen={()=>setIsLoadModalOpen(true)} onPresetModalOpen={()=>setIsPresetModalOpen(true)} onPresetSelect={handlePresetSelect} onToggleSubCourt={handleToggleSubCourt}/>}
                {view==='results' && <ResultsTab schedule={schedule} completedMatches={completedMatches} currentMatchIndex={currentMatchIndex} config={config} onToggleComplete={handleToggleComplete}/>}
                {view==='stats' && <StatsTab statsData={statsData}/>}
            </main>

            {view==='results' && schedule.list.length>0 && !isCapturing && (
                <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:40,background:'var(--t-surface)',backdropFilter:'blur(12px)',borderTop:'1px solid var(--t-border)',padding:'12px 16px',paddingBottom:'calc(12px + env(safe-area-inset-bottom))'}}>
                    <div className="max-w-5xl mx-auto flex items-center gap-3">
                        <div className="flex-1">
                            {currentMatchIndex < schedule.list.length ? (
                                <div>
                                    <p className="text-xs font-black text-slate-500">{currentMatchIndex+1} / {schedule.list.length} 라운드</p>
                                    <p className="text-[10px] text-slate-400 mt-0.5">{schedule.list[currentMatchIndex]?.time}</p>
                                </div>
                            ) : (
                                <p className="text-sm font-black text-emerald-500">✓ 모든 경기 종료</p>
                            )}
                        </div>
                        <button onClick={handleNextMatch} disabled={currentMatchIndex>=schedule.list.length}
                            style={{minWidth:130}} className="py-3 px-6 bg-teal-500 text-white rounded-2xl font-black text-sm disabled:opacity-30 active:scale-95 transition-all shadow-lg">
                            {currentMatchIndex>=schedule.list.length?'종료':'다음 매치 →'}
                        </button>
                    </div>
                </div>
            )}

            {isLoadModalOpen && <LoadModal savedSchedules={savedSchedules} onLoad={handleLoadSchedule} onDelete={handleDeleteSchedule} onClose={()=>setIsLoadModalOpen(false)}/>}
            {isPresetModalOpen && <PresetModal presetForm={presetForm} setPresetForm={setPresetForm} onSave={savePreset} onClose={()=>setIsPresetModalOpen(false)}/>}

            {alertModal.show && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">
                        <h3 className="font-black text-lg text-slate-800 mb-2">{alertModal.title}</h3>
                        <p className="text-sm text-slate-500 whitespace-pre-line mb-5">{alertModal.content}</p>
                        <div className="flex gap-2">
                            {alertModal.type==='confirm'&&<button onClick={()=>setAlertModal(p=>({...p,show:false}))} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>}
                            <button onClick={()=>{if(alertModal.onConfirm)alertModal.onConfirm();setAlertModal(p=>({...p,show:false}));}} className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">
                                {alertModal.type==='confirm'?'확인':'닫기'}
                            </button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
