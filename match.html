<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const firebaseConfig = {
    apiKey: "AIzaSyBYykNZVf20LLQ-YIIeA2TKz9DSBsypRZM",

    projectId: "moida-otpfc",

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const STAFF_ROLES = ['회장','매니저','총무','부총무'];
if (window.Kakao && !Kakao.isInitialized()) Kakao.init('ce0f70554512198de18a346beb970a91');

const getTeamBadge = (idx) => ['bg-pink-500 text-white','bg-sky-400 text-white','bg-lime-400 text-slate-800','bg-yellow-400 text-slate-800','bg-blue-600 text-white','bg-red-500 text-white'][idx] || 'bg-slate-400 text-white';

const Icon = {
    Home:({size=18,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    Refresh:({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M21 21v-5h-5"/></svg>,
    Save:({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>,
    Camera:({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
    Download:({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    Plus:({size=14,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 4v16m8-8H4"/></svg>,
    Minus:({size=14,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 12H4"/></svg>,
    Trash:({size=14,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
    Check:({size=14,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
    Chart:({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>,
    Sun:({size=18,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
    Moon:({size=18,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
    Calendar:({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
};

function App() {
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const [view, setView] = useState('setup');
    const [loading, setLoading] = useState(true);
    const [confirmedData, setConfirmedData] = useState(null);
    const [schedule, setSchedule] = useState({list:[],stats:{}});
    const [completedMatches, setCompletedMatches] = useState(new Set());
    const [presets, setPresets] = useState([]);
    const [savedSchedules, setSavedSchedules] = useState([]);
    const [selectedPresetId, setSelectedPresetId] = useState('manual');
    const [presetToggles, setPresetToggles] = useState([]);
    const [isLoadModalOpen, setIsLoadModalOpen] = useState(false);
    const [isPresetModalOpen, setIsPresetModalOpen] = useState(false);
    const [presetForm, setPresetForm] = useState({name:'',courtCount:3,fieldNames:['1구장','2구장','3구장'],fieldTypes:['6vs6','6vs6','6vs6']});
    const [isSaving, setIsSaving] = useState(false);
    const [isCapturing, setIsCapturing] = useState(false);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null});

    const [config, setConfig] = useState({
        meetingDate:new Date().toISOString().split('T')[0],
        courtCount:3, matchDuration:12, breakDuration:3,
        startTime:'08:00', endTime:'10:00',
        fieldNames:['1구장','2구장','3구장'], fieldTypes:['6vs6','6vs6','6vs6'],
        strictCourtSize:false
    });

    const showAlert=(title,content,type='info',onConfirm=null)=>setAlertModal({show:true,title,content,type,onConfirm});

    const [loggedInManager, setLoggedInManager] = useState(() => {
        try { const s = JSON.parse(localStorage.getItem('moida_manager')); return (s && s.kakaoId) ? s : null; } catch(e) { return null; }
    });
    const [isLoginModalOpen, setIsLoginModalOpen] = useState(() => {
        try { const s = JSON.parse(localStorage.getItem('moida_manager')); return !(s && s.kakaoId); } catch(e) { return true; }
    });
    const [kakaoStep, setKakaoStep] = useState('idle');
    const [pendingKakaoId, setPendingKakaoId] = useState('');
    const [linkForm, setLinkForm] = useState({ name:'', birth:'' });
    const [isKakaoLoading, setIsKakaoLoading] = useState(false);
    const showConfirm=(title,content,onConfirm)=>setAlertModal({show:true,title,content,type:'confirm',onConfirm});

    const hoursList=Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
    const minutesList=['00','10','20','30','40','50'];
    const splitTime=(t)=>{const p=(t||'08:00').split(':');return{h:p[0]||'08',m:p[1]||'00'};};

    const toggleTheme = () => { const isDark = !darkMode; setDarkMode(isDark); document.documentElement.classList.toggle('dark', isDark); localStorage.setItem('moida_theme', isDark ? 'dark' : 'light'); };

    useEffect(()=>{
        const init=async()=>{
            try{await auth.signInAnonymously();}catch(e){console.error(e);}
            finally{setLoading(false);const l=document.getElementById('loading-screen');if(l){l.style.opacity='0';setTimeout(()=>{if(l)l.style.display='none';},500);}}
        };
        init();
        if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        const unsubAuth=auth.onAuthStateChanged(u=>{
            if(!u)return;
            getCol('team_drafts').onSnapshot(snap=>{
                const drafts=snap.docs.map(d=>({id:d.id,...d.data()}));
                const latest=drafts.filter(d=>d.isConfirmed).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
                if(latest){setConfirmedData(latest);if(latest.meetingDate)setConfig(p=>({...p,meetingDate:latest.meetingDate}));}
            });
            getCol('court_presets').onSnapshot(snap=>setPresets(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt))));
            getCol('match_schedules').onSnapshot(snap=>setSavedSchedules(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))));
        });
        return()=>unsubAuth();
    },[]);

    const generateMatchTable = () => {
        if(!confirmedData){return showAlert('알림','먼저 팀 편성을 확정해주세요.');}
        const teams=confirmedData.teams.map((_,i)=>getTeamName(i));
        const teamSizes={};confirmedData.teams.forEach((t,i)=>{teamSizes[getTeamName(i)]=t.members.length;});
        const{courtCount,matchDuration,breakDuration,startTime,endTime}=config;
        let currentTime=new Date(`2024-01-01T${startTime}:00`);
        const limitTime=new Date(`2024-01-01T${endTime}:00`);
        const teamStats={};teams.forEach(t=>teamStats[t]=0);
        const matchupHistory={};teams.forEach(t1=>{matchupHistory[t1]={};teams.forEach(t2=>{if(t1!==t2)matchupHistory[t1][t2]=0;});});
        const courtUsage={};const lastOpponent={};
        teams.forEach(t=>{courtUsage[t]={};for(let i=0;i<courtCount;i++)courtUsage[t][i]=0;lastOpponent[t]=null;});
        let sessionList=[];let matchIdx=1;

        while(currentTime<limitTime){
            let usedInSession=new Set();
            let sessionMatches=[];
            const sessionCourts=Array.from({length:courtCount},(_,i)=>({idx:i,type:config.fieldTypes[i]||'6vs6'}));
            for(const court of sessionCourts){
                const isSmall=court.type==='5vs5';
                let candidates=teams.filter(t=>!usedInSession.has(t));
                if(config.strictCourtSize&&isSmall)candidates=candidates.filter(t=>teamSizes[t]<=5);
                if(candidates.length<2)continue;
                candidates.sort(()=>Math.random()-0.5);
                let bestPair=null;let minScore=Infinity;
                for(let i=0;i<candidates.length;i++){
                    for(let j=i+1;j<candidates.length;j++){
                        const t1=candidates[i],t2=candidates[j];
                        const isB2B=(lastOpponent[t1]===t2||lastOpponent[t2]===t1);
                        const score=matchupHistory[t1][t2]*10000+(teamStats[t1]+teamStats[t2])*100+(courtUsage[t1][court.idx]+courtUsage[t2][court.idx])*50+(isB2B?500000:0)+Math.random();
                        if(score<minScore){minScore=score;bestPair=[t1,t2];}
                    }
                }
                if(bestPair){
                    const[t1,t2]=bestPair;
                    sessionMatches.push({match:[t1,t2],fieldIdx:court.idx});
                    usedInSession.add(t1);usedInSession.add(t2);
                    matchupHistory[t1][t2]++;matchupHistory[t2][t1]++;
                    teamStats[t1]++;teamStats[t2]++;
                    courtUsage[t1][court.idx]++;courtUsage[t2][court.idx]++;
                    lastOpponent[t1]=t2;lastOpponent[t2]=t1;
                }
            }
            if(sessionMatches.length>0){
                const startL=currentTime.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});
                const endC=new Date(currentTime.getTime()+matchDuration*60000);
                const endL=endC.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});
                sessionList.push({id:matchIdx++,time:`${startL} - ${endL}`,startTime:startL,endTime:endL,matches:sessionMatches.sort((a,b)=>a.fieldIdx-b.fieldIdx),resting:teams.filter(t=>!usedInSession.has(t))});
                currentTime=new Date(currentTime.getTime()+(matchDuration+breakDuration)*60000);
                if(new Date(currentTime.getTime()-breakDuration*60000)>=limitTime)break;
            } else break;
        }
        setSchedule({list:sessionList,stats:teamStats});
        setCompletedMatches(new Set());
        setView('results');
    };

    const saveMatchSchedule = async () => {
        if(!schedule.list.length)return;
        setIsSaving(true);
        try {
            await getCol('match_schedules').add({
                schedule,config,completedMatches:Array.from(completedMatches),
                createdAt:new Date().toISOString(),meetingDate:config.meetingDate,
                label:`${config.meetingDate} 매치 (${schedule.list.length}라운드)`
            });
            showAlert('저장 완료','매치 테이블이 저장되었습니다.');
        } catch(e){showAlert('오류','저장 실패');} finally{setIsSaving(false);}
    };

    const handleCapture = async () => {
        setIsCapturing(true);
        await new Promise(r=>setTimeout(r,500));
        try {
            const el=document.getElementById('capture-area');
            if(!el)return;
            const canvas=await window.html2canvas(el,{scale:2,backgroundColor:'#f8fafc',useCORS:true,scrollY:0});
            const link=document.createElement('a');
            link.download=`모이다_매치표_${config.meetingDate}.png`;
            link.href=canvas.toDataURL('image/png',1.0);
            link.click();
        } catch(e){showAlert('오류','캡쳐 실패');}
        finally{setIsCapturing(false);}
    };

    const handlePresetSelect = (preset) => {
        setSelectedPresetId(preset.id);
        setPresetToggles(new Array(preset.courtCount).fill(false));
        setConfig(p=>({...p,courtCount:0,fieldNames:[],fieldTypes:[]}));
    };

    const handleToggleSubCourt = (idx) => {
        const newToggles=[...presetToggles];newToggles[idx]=!newToggles[idx];setPresetToggles(newToggles);
        const p=presets.find(pr=>pr.id===selectedPresetId);if(!p)return;
        const names=[],types=[];
        newToggles.forEach((on,i)=>{if(on){names.push(p.fieldNames[i]);types.push(p.fieldTypes[i]);}});
        setConfig(prev=>({...prev,courtCount:names.length,fieldNames:names,fieldTypes:types}));
    };

    const savePreset = async () => {
        if(!presetForm.name.trim())return showAlert('알림','프리셋 이름을 입력해주세요.');
        try {
            await getCol('court_presets').add({...presetForm,createdAt:new Date().toISOString()});
            setIsPresetModalOpen(false);
            setPresetForm({name:'',courtCount:3,fieldNames:['1구장','2구장','3구장'],fieldTypes:['6vs6','6vs6','6vs6']});
            showAlert('완료','프리셋이 저장되었습니다.');
        } catch(e){showAlert('오류','저장 실패');}
    };

    const statsData = useMemo(()=>{
        if(!schedule.list.length||!confirmedData)return null;
        const teams=confirmedData.teams.map((_,i)=>getTeamName(i));
        const matchupCounts={},totalMatches={};
        teams.forEach(t=>{matchupCounts[t]={};teams.forEach(o=>{if(t!==o)matchupCounts[t][o]=0;});totalMatches[t]=0;});
        schedule.list.forEach(session=>{
            session.matches.forEach(m=>{
                const[t1,t2]=m.match;matchupCounts[t1][t2]++;matchupCounts[t2][t1]++;totalMatches[t1]++;totalMatches[t2]++;
            });
        });
        return{matchupCounts,totalMatches,teams};

    const handleKakaoLogin = () => {
        if (!window.Kakao?.isInitialized()) Kakao.init('ce0f70554512198de18a346beb970a91');
        setIsKakaoLoading(true);
        Kakao.Auth.login({
            success: (authObj) => {
                Kakao.API.request({
                    url: '/v2/user/me',
                    success: async (res) => {
                        const kakaoId = String(res.id);
                        try {
                            const snap = await getCol('members').where('kakaoId', '==', kakaoId).get();
                            setIsKakaoLoading(false);
                            if (!snap.empty) {
                                const doc = snap.docs[0];
                                const data = doc.data();
                                if (!STAFF_ROLES.includes(data.role)) return showAlert('오류','관리자 권한이 없습니다.');
                                const user = { id: doc.id, ...data, kakaoId };
                                localStorage.setItem('moida_manager', JSON.stringify(user));
                                setLoggedInManager(user);
                                setIsLoginModalOpen(false);
                            } else {
                                setPendingKakaoId(kakaoId);
                                setKakaoStep('linking');
                            }
                        } catch(e) { setIsKakaoLoading(false); showAlert('오류','로그인 실패: ' + e.message); }
                    },
                    fail: () => { setIsKakaoLoading(false); showAlert('오류','카카오 정보 조회 실패'); }
                });
            },
            fail: () => { setIsKakaoLoading(false); showAlert('오류','카카오 로그인 실패'); }
        });
    };

    const handleKakaoLink = async () => {
        const birth6 = linkForm.birth.replace(/[^0-9]/g, '').slice(0, 6);
        if (!linkForm.name.trim()) return showAlert('알림','이름을 입력해주세요.');
        if (birth6.length !== 6) return showAlert('알림','생년월일 6자리(YYMMDD)를 입력해주세요.');
        setIsKakaoLoading(true);
        try {
            const snap = await getCol('members').where('name', '==', linkForm.name.trim()).get();
            let found = null;
            snap.forEach(doc => {
                const data = doc.data();
                if (data.isResigned) return;
                const b = String(data.birth || '');
                if (b.substring(2) === birth6 || b === birth6) found = { id: doc.id, ...data };
            });
            if (!found) return showAlert('오류','이름 또는 생년월일이 일치하지 않습니다.');
            if (!STAFF_ROLES.includes(found.role)) return showAlert('오류','관리자 권한이 없습니다.');
            await getCol('members').doc(found.id).update({ kakaoId: pendingKakaoId });
            const user = { ...found, kakaoId: pendingKakaoId };
            localStorage.setItem('moida_manager', JSON.stringify(user));
            setLoggedInManager(user);
            setIsLoginModalOpen(false);
            setKakaoStep('idle');
        } catch(e) { showAlert('오류','연결 실패: ' + e.message); }
        finally { setIsKakaoLoading(false); }
    };

    const handleLogout = () => {
        localStorage.removeItem('moida_manager');

                                                    <tr>
                                                        <th className="p-2 text-slate-400">vs</th>
                                                        {statsData.teams.map(t=><th key={t} className="p-2"><span className={`inline-flex w-7 h-7 rounded-lg text-xs items-center justify-center ${getTeamBadge(statsData.teams.indexOf(t))}`}>{t}</span></th>)}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {statsData.teams.map((t1,i)=>(
                                                        <tr key={t1}>
                                                            <td className="p-2"><span className={`inline-flex w-7 h-7 rounded-lg text-xs items-center justify-center ${getTeamBadge(i)}`}>{t1}</span></td>
                                                            {statsData.teams.map(t2=>(
                                                                <td key={t2} className={`p-2 ${t1===t2?'text-slate-200':'text-slate-700'}`}>
                                                                    {t1===t2?'-':statsData.matchupCounts[t1]?.[t2]||0}
                                                                </td>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )
                        }
                    </div>
                )}
            </main>

            {/* 기록 불러오기 모달 */}
            {isLoadModalOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end justify-center z-50" onClick={()=>setIsLoadModalOpen(false)}>
                    <div className="bg-white rounded-t-3xl p-6 w-full max-w-sm shadow-2xl max-h-[80vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-4">과거 기록 불러오기</h2>
                        {savedSchedules.length===0
                            ? <p className="text-center text-slate-400 py-8">저장된 기록이 없습니다</p>
                            : savedSchedules.map(s=>(
                                <div key={s.id} className="flex items-center gap-3 p-4 bg-slate-50 border border-slate-100 rounded-2xl mb-2">
                                    <div className="flex-1">
                                        <p className="font-black text-slate-800 text-sm">{s.meetingDate}</p>
                                        <p className="text-xs text-slate-400 mt-0.5">{s.schedule?.list?.length||0}라운드 · {s.config?.courtCount||0}구장</p>
                                    </div>
                                    <button onClick={()=>{setSchedule(s.schedule);setConfig(p=>({...p,...s.config}));setCompletedMatches(new Set(s.completedMatches||[]));setView('results');setIsLoadModalOpen(false);}} className="px-3 py-2 bg-teal-500 text-white rounded-xl font-black text-xs">불러오기</button>
                                    <button onClick={()=>showConfirm('삭제','이 기록을 삭제하시겠습니까?',async()=>await getCol('match_schedules').doc(s.id).delete())} className="p-2 bg-red-50 text-red-400 rounded-xl"><Icon.Trash size={12}/></button>
                                </div>
                            ))
                        }
                        <button onClick={()=>setIsLoadModalOpen(false)} className="w-full py-3 text-slate-400 text-sm mt-2">닫기</button>
                    </div>
                </div>
            )}

            {/* 프리셋 추가 모달 */}
            {isPresetModalOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={()=>setIsPresetModalOpen(false)}>
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-xl font-black text-slate-800 mb-4">구장 프리셋 추가</h2>
                        <div className="space-y-3 mb-4">
                            <input type="text" placeholder="프리셋 이름 (예: 강남 풋살장)" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black"
                                value={presetForm.name} onChange={e=>setPresetForm(p=>({...p,name:e.target.value}))}/>
                            <div className="flex items-center gap-2">
                                <p className="text-sm font-black text-slate-600">구장 수:</p>
                                <button onClick={()=>{if(presetForm.courtCount>1){const fn=[...presetForm.fieldNames];fn.pop();const ft=[...presetForm.fieldTypes];ft.pop();setPresetForm(p=>({...p,courtCount:p.courtCount-1,fieldNames:fn,fieldTypes:ft}));}}} className="p-2 rounded-lg bg-slate-100"><Icon.Minus size={14}/></button>
                                <span className="font-black text-lg w-6 text-center">{presetForm.courtCount}</span>
                                <button onClick={()=>{if(presetForm.courtCount<6){const fn=[...presetForm.fieldNames,`${presetForm.courtCount+1}구장`];const ft=[...presetForm.fieldTypes,'6vs6'];setPresetForm(p=>({...p,courtCount:p.courtCount+1,fieldNames:fn,fieldTypes:ft}));}}} className="p-2 rounded-lg bg-slate-100"><Icon.Plus size={14}/></button>
                            </div>
                            {presetForm.fieldNames.map((name,i)=>(
                                <div key={i} className="flex gap-2">
                                    <input type="text" className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-black" value={name}
                                        onChange={e=>{const fn=[...presetForm.fieldNames];fn[i]=e.target.value;setPresetForm(p=>({...p,fieldNames:fn}));}}/>
                                    <select className="bg-slate-50 border border-slate-200 rounded-xl px-2 py-2 text-xs font-black"
                                        value={presetForm.fieldTypes[i]} onChange={e=>{const ft=[...presetForm.fieldTypes];ft[i]=e.target.value;setPresetForm(p=>({...p,fieldTypes:ft}));}}>
                                        <option value="6vs6">6vs6</option><option value="5vs5">5vs5</option>
                                    </select>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>setIsPresetModalOpen(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>
                            <button onClick={savePreset} className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">저장</button>
                        </div>
                    </div>
                </div>
            )}

            {/* 알림 모달 */}
            {alertModal.show && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">
                        <h3 className="font-black text-lg text-slate-800 mb-2">{alertModal.title}</h3>
                        <p className="text-sm text-slate-500 whitespace-pre-line mb-5">{alertModal.content}</p>
                        <div className="flex gap-2">
                            {alertModal.type==='confirm'&&<button onClick={()=>setAlertModal(p=>({...p,show:false}))} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>}
                            <button onClick={()=>{if(alertModal.onConfirm)alertModal.onConfirm();setAlertModal(p=>({...p,show:false}));}} className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">
                                {alertModal.type==='confirm'?'확인':'닫기'}
                            </button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
