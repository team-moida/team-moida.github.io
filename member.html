// 거리 계산 (Haversine)
const calcDistance = (lat1, lng1, lat2, lng2) => {
    const R = 6371000;
    const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
    const Δφ = (lat2-lat1) * Math.PI / 180, Δλ = (lng2-lng1) * Math.PI / 180;
    const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
};

// URL 파라미터 파싱
const getUrlParams = () => {
    const params = new URLSearchParams(window.location.search);
    return { token: params.get('token'), date: params.get('date') };
};

const ADMIN_ROLES = ['회장', '매니저', '총무', '부총무'];

const getTeamName = (idx) => String.fromCharCode(65+idx);

const getRoleBadgeClass = (role) => {
    switch(role){case '회장':return 'bg-slate-900 text-white';case '매니저':return 'bg-blue-600 text-white';case '총무':return 'bg-green-600 text-white';case '부총무':return 'bg-green-100 text-green-700';default:return 'bg-slate-100 text-slate-400';}
};
const getLevelColor = (l) => {
    const n=parseInt(l)>6?parseInt(l)-6:parseInt(l);
    return ['','bg-rose-500 text-white','bg-orange-500 text-white','bg-amber-400 text-slate-800','bg-emerald-500 text-white','bg-blue-500 text-white','bg-violet-500 text-white'][n]||'bg-slate-400 text-white';
};
const formatBirth = (b) => {
    if(!b)return '생일미입력';
    const c=String(b).replace(/[^0-9]/g,'');
    if(c.length===8)return `${c.substring(0,4)}.${c.substring(4,6)}.${c.substring(6,8)}`;
    if(c.length===6){const yy=parseInt(c.substring(0,2));return `${yy<50?'20':'19'}${c.substring(0,2)}.${c.substring(2,4)}.${c.substring(4,6)}`;}
    return b;
};
const formatBirthInput = (v) => {
    const d=String(v||'').replace(/[^0-9]/g,'');
    if(d.length<=4)return d;
    if(d.length<=6)return `${d.slice(0,4)}.${d.slice(4)}`;
    return `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
};
const formatPhoneInput = (v) => {
    const d=String(v||'').replace(/[^0-9]/g,'');
    if(d.length<=3)return d;
    if(d.length<=7)return `${d.slice(0,3)}-${d.slice(3)}`;
    return `${d.slice(0,3)}-${d.slice(3,7)}-${d.slice(7,11)}`;
};
const getMembershipStatus = (member, targetMonthStr) => {
    if(!member.membershipType||member.membershipType==='monthly'||!member.membershipEndDate)return null;
    const end=new Date(member.membershipEndDate);
    const endMonth=new Date(end.getFullYear(),end.getMonth(),1);
    const[y,m]=targetMonthStr.split('-').map(Number);
    const current=new Date(y,m-1,1);
    if(current>endMonth)return{active:false,msg:'만료됨',type:member.membershipType==='half_year'?'반년':'1년'};
    const monthsRemaining=(endMonth.getFullYear()-current.getFullYear())*12+(endMonth.getMonth()-current.getMonth())+1;
    const maxRest=member.membershipType==='half_year'?3:6;
    const usedRest=member.totalRestMonths||0;
    const endDateFormatted=`${end.getFullYear().toString().slice(2)}.${String(end.getMonth()+1).padStart(2,'0')}.${String(end.getDate()).padStart(2,'0')}`;
    return{active:true,remaining:monthsRemaining,type:member.membershipType==='half_year'?'반년':'1년',endDate:member.membershipEndDate,endDateFormatted,maxRest,usedRest,remainingRest:maxRest-usedRest};
};
const STAFF_ROLES_CONST = ['회장','매니저','총무','부총무'];
const getMemberStatusType = (member, statuses, reasons, targetMonthStr) => {
    if(STAFF_ROLES_CONST.includes(member.role))return 'staff';
    if(member.isSpecialRest&&targetMonthStr>=(member.specialRestStartMonth||'0000-00'))return 'special';
    const status=statuses[member.id];
    const membershipInfo=getMembershipStatus(member,targetMonthStr);
    if(membershipInfo&&membershipInfo.active){if(status==='rest')return 'rest';return membershipInfo.type==='반년'?'half':'full';}
    if(status==='paid')return 'monthly';
    if(status==='rest')return reasons[member.id]?'special':'rest';
    return 'unpaid';
};
const calculateEndDate = (startMonthStr, durationMonths) => {
    if(!startMonthStr)return '';
    const[y,m]=startMonthStr.split('-').map(Number);
    const end=new Date(y,m-1+durationMonths+1,0);
    return `${end.getFullYear()}-${String(end.getMonth()+1).padStart(2,'0')}-${String(end.getDate()).padStart(2,'0')}`;
};
const extendEndDate = (currentEndDateStr, monthsToAdd=1) => {
    if(!currentEndDateStr)return '';
    const[y,m]=currentEndDateStr.split('-').map(Number);
    const end=new Date(y,m+monthsToAdd,0);
    return `${end.getFullYear()}-${String(end.getMonth()+1).padStart(2,'0')}-${String(end.getDate()).padStart(2,'0')}`;
};

};

// ─── 인앱 QR 스캐너 모달 ──────────────────────────────────────────────────────
const QRScannerModal = ({ isOpen, onScan, onClose }) => {
    const videoRef = useRef(null);
    const canvasRef = useRef(null);
    const streamRef = useRef(null);
    const rafRef = useRef(null);
    const [camError, setCamError] = useState('');

    useEffect(() => {
        if (!isOpen) return;
        setCamError('');
        let active = true;

        navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
        }).then(stream => {
            if (!active) { stream.getTracks().forEach(t => t.stop()); return; }
            streamRef.current = stream;
            const video = videoRef.current;
            if (!video) return;
            video.srcObject = stream;
            video.play().then(() => {
                const scan = () => {
                    if (!active || !videoRef.current || !canvasRef.current) return;
                    const v = videoRef.current;
                    if (v.readyState === v.HAVE_ENOUGH_DATA) {
                        const c = canvasRef.current;
                        c.width = v.videoWidth; c.height = v.videoHeight;
                        const ctx = c.getContext('2d');
                        ctx.drawImage(v, 0, 0);
                        const img = ctx.getImageData(0, 0, c.width, c.height);
                        try {
                            const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
                            if (code?.data) { onScan(code.data); return; }
                        } catch(_) {}
                    }
                    rafRef.current = requestAnimationFrame(scan);
                };
                rafRef.current = requestAnimationFrame(scan);
            }).catch(() => setCamError('카메라를 시작할 수 없습니다.'));
        }).catch(err => {
            if (!active) return;
            setCamError(err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError'
                ? '카메라 권한을 허용해주세요.\n설정 › 브라우저 › 카메라'
                : '카메라를 사용할 수 없습니다.');
        });

        return () => {
            active = false;
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
            if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
        };
    }, [isOpen]);

    if (!isOpen) return null;

    return (
        <div style={{ position:'fixed', inset:0, zIndex:9999, background:'#000', display:'flex', flexDirection:'column' }}>
            {camError ? (
                <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center' }}>
                    <p style={{ fontSize:52, marginBottom:16 }}>📷</p>
                    <p style={{ color:'#f87171', fontWeight:900, fontSize:15, marginBottom:8, whiteSpace:'pre-line' }}>{camError}</p>
                    <button onClick={onClose} style={{ marginTop:24, padding:'12px 32px', background:'#334155', color:'white', border:'none', borderRadius:20, fontWeight:900, fontSize:14 }}>닫기</button>
                </div>
            ) : (
                <>
                    <video ref={videoRef} autoPlay playsInline muted
                        style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover' }} />
                    <canvas ref={canvasRef} style={{ display:'none' }} />

                    {/* 반투명 오버레이 */}
                    <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                        {/* 스캔 가이드 박스 */}
                        <div style={{ position:'relative', width:240, height:240 }}>
                            {/* 네 모서리 */}
                            {[{top:0,left:0,borderTop:'3px solid #ec4899',borderLeft:'3px solid #ec4899',borderRadius:'6px 0 0 0'},
                              {top:0,right:0,borderTop:'3px solid #ec4899',borderRight:'3px solid #ec4899',borderRadius:'0 6px 0 0'},
                              {bottom:0,left:0,borderBottom:'3px solid #ec4899',borderLeft:'3px solid #ec4899',borderRadius:'0 0 0 6px'},
                              {bottom:0,right:0,borderBottom:'3px solid #ec4899',borderRight:'3px solid #ec4899',borderRadius:'0 0 6px 0'}
                            ].map((s,i) => <div key={i} style={{ position:'absolute', width:30, height:30, ...s }} />)}
                            {/* 스캔 라인 */}
                            <div className="qr-scan-line" style={{ position:'absolute', left:6, right:6, height:2, background:'linear-gradient(90deg,transparent,#ec4899,transparent)', borderRadius:1 }} />
                        </div>
                        <p style={{ color:'white', fontWeight:900, fontSize:14, marginTop:20, textShadow:'0 1px 4px rgba(0,0,0,0.9)' }}>
                            QR코드를 네모 안에 맞춰주세요
                        </p>
                    </div>

                    {/* 닫기 버튼 */}
                    <button onClick={onClose} style={{ position:'absolute', top:20, left:16, zIndex:10, background:'rgba(0,0,0,0.5)', border:'1px solid rgba(255,255,255,0.2)', color:'white', padding:'8px 18px', borderRadius:20, fontWeight:900, fontSize:13, backdropFilter:'blur(8px)' }}>
                        ← 닫기
                    </button>
                </>
            )}
        </div>
    );
};

function App() {
    // 앱 상태
    const [appView, setAppView] = useState('loading'); // loading | app
    const [tab, setTab] = useState('home');

    // 회원 데이터
    const [memberData, setMemberData] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (!s) { location.href = 'index.html'; return null; }
            return s;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const [memberInfo, setMemberInfo] = useState(null); // Firestore members doc

    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));

    // 관리자 여부 (role 기반)
    const isAdmin = ADMIN_ROLES.includes(memberData?.role);
    const [isAdminMode, setIsAdminMode] = useState(
        () => ADMIN_ROLES.includes(memberData?.role) && localStorage.getItem('moida_admin_mode') === 'true'
    );

    // Firebase 데이터
    const [meetingSettings, setMeetingSettings] = useState(null);
    // testMode는 관리자(attendance.html)만 제어 — 회원 앱은 읽기 전용
    const testMode = !!meetingSettings?.testMode;
    const [teamDraftData, setTeamDraftData] = useState(null);
    const [confirmedDrafts, setConfirmedDrafts] = useState([]);
    const [scheduleData, setScheduleData] = useState(null);
    const [matchViewMode, setMatchViewMode] = useState('my'); // 'my' | 'all'
    const [mySession, setMySession] = useState(null); // 오늘 내 출석 세션

    // ── 명단/회비 (관리자 전용) ──────────────────────────────────────────────────
    const [allMembers, setAllMembers] = useState([]);
    const [rosterSubTab, setRosterSubTab] = useState('directory');
    const [targetMonth, setTargetMonth] = useState(()=>{
        const n=new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
    });
    const [filterCategory, setFilterCategory] = useState('all');
    const [monthlyStatuses, setMonthlyStatuses] = useState({});
    const [monthlyReasons, setMonthlyReasons] = useState({});
    const [monthlyPaymentDates, setMonthlyPaymentDates] = useState({});
    const [isAddModalOpen, setIsAddModalOpen] = useState(false);
    const [newMemberForm, setNewMemberForm] = useState({name:'',birth:'',gender:'남성',position:'all',level:'4',role:'회원',coupleId:'',joinDate:'',address:'',phone:''});
    const [editingMember, setEditingMember] = useState(null);
    const [resigningMember, setResigningMember] = useState(null);
    const [resignForm, setResignForm] = useState({date:'',reason:'',isForced:false});
    const [billingMember, setBillingMember] = useState(null);
    const [actionStep, setActionStep] = useState('main');
    const [selectedAction, setSelectedAction] = useState(null);
    const [paymentDateInput, setPaymentDateInput] = useState('');
    const [manualEndDate, setManualEndDate] = useState('');
    const [specialRestReason, setSpecialRestReason] = useState('');
    const [tempRestCount, setTempRestCount] = useState(0);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null});
    // ─────────────────────────────────────────────────────────────────────────────

    // GPS 상태
    const [gpsStatus, setGpsStatus] = useState('idle'); // idle | checking | within | outside | no_location | error
    const [distance, setDistance] = useState(null);
    const [isCheckingIn, setIsCheckingIn] = useState(false);

    // QR 상태
    const [qrStatus, setQrStatus] = useState('idle'); // idle | processing | success | error
    const [qrMessage, setQrMessage] = useState('');
    const [isQRScannerOpen, setIsQRScannerOpen] = useState(false);
    const [lastScannedQR, setLastScannedQR] = useState({ token:null, date:null });
    const [nowTime, setNowTime] = useState(() => new Date());
    useEffect(() => { const t = setInterval(() => setNowTime(new Date()), 30000); return () => clearInterval(t); }, []);

    const meetingDayInfo = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [my,mm,md] = meetingSettings.date.split('-').map(Number);
        const [sh,sm] = meetingSettings.start.split(':').map(Number);
        const meetingStart = new Date(my,mm-1,md,sh,sm,0);
        const today0 = new Date(nowTime.getFullYear(),nowTime.getMonth(),nowTime.getDate(),0,0,0);
        const meetDay0 = new Date(my,mm-1,md,0,0,0);
        const dDays = Math.round((meetDay0-today0)/(1000*60*60*24));
        if (dDays < 0) return { type:'past' };
        if (dDays > 0) return { type:'future', label:`D-${dDays}` };
        const minsUntil = Math.round((meetingStart-nowTime)/60000);
        if (minsUntil > 60) return { type:'today', label:`${Math.floor(minsUntil/60)}시간 ${minsUntil%60}분 후` };
        if (minsUntil > 0) return { type:'today', label:`${minsUntil}분 후 시작`, urgent: minsUntil <= 30 };
        return { type:'started', label:'모임 중' };
    }, [meetingSettings, nowTime]);

    // 팀 공개 시각 = allowFrom (모임 시작 -70분), 출석 가능 시간과 동일
    const allowFromDisplay = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [y,m,d] = meetingSettings.date.split('-').map(Number);
        const [h,min] = meetingSettings.start.split(':').map(Number);
        const af = new Date(y, m-1, d, h, min, 0);
        af.setTime(af.getTime() - 70*60*1000);
        return `${String(af.getHours()).padStart(2,'0')}:${String(af.getMinutes()).padStart(2,'0')}`;
    }, [meetingSettings]);

    const teamReady = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return false;
        if (testMode) return true;
        if (meetingDayInfo?.type === 'past') return true;
        if (meetingDayInfo?.type === 'future') return false;
        const [y,m,d] = meetingSettings.date.split('-').map(Number);
        const [h,min] = meetingSettings.start.split(':').map(Number);
        const allowFrom = new Date(y, m-1, d, h, min, 0).getTime() - 70*60*1000;
        return nowTime.getTime() >= allowFrom;
    }, [meetingSettings, meetingDayInfo, nowTime, testMode]);

    // 알림
    const [toast, setToast] = useState({ show:false, msg:'', type:'info' });
    const showToast = (msg, type='info') => {
        setToast({show:true,msg,type});
        setTimeout(()=>setToast(p=>({...p,show:false})),3000);
    };

    // URL에 QR 토큰이 있는지 확인
    const urlParams = useMemo(() => getUrlParams(), []);

    // Firebase 인증 + FCM 토큰 등록
    const VAPID_KEY = 'BMuOxkIP0Xm912P0lVDUP8KUFR2y2FD-Acxgal5lNYemqWaldDon6kr9c_KrLEqKRFuumPCenIYnwEn0z_1WuXU';
    useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(e=>console.error(e));
    }, []);

    // FCM 알림 권한 상태
    const [notifPermission, setNotifPermission] = useState(() =>
        ('Notification' in window) ? Notification.permission : 'unsupported'
    );

    const registerFcmToken = async () => {
        try {
            if (!('Notification' in window)) return;
            const permission = await Notification.requestPermission();
            setNotifPermission(permission);
            if (permission !== 'granted') return;
            const swReg = await navigator.serviceWorker.ready;
            const messaging = firebase.messaging();
            const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
            if (token && memberData?.memberId) {
                await getCol('fcm_tokens').doc(memberData.memberId).set({
                    token,
                    name: memberData.name || '',
                    updatedAt: new Date().toISOString(),
                });
                showToast('알림이 등록됐어요!', 'success');
            }
        } catch(e) { console.warn('FCM 토큰 등록 실패:', e); }
    };

    // 이미 허용된 경우 자동 토큰 갱신
    useEffect(() => {
        if (!memberData?.memberId) return;
        if (Notification.permission !== 'granted') return;
        (async () => {
            try {
                const swReg = await navigator.serviceWorker.ready;
                const messaging = firebase.messaging();
                const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
                if (token) {
                    await getCol('fcm_tokens').doc(memberData.memberId).set({
                        token, name: memberData.name || '', updatedAt: new Date().toISOString(),
                    });
                }
            } catch(e) { console.warn('FCM 토큰 갱신 실패:', e); }
        })();
    }, [memberData?.memberId]);

    // 포그라운드 푸시 메시지 처리 (앱이 열려있을 때도 알림 표시)
    useEffect(() => {
        if (!('Notification' in window) || notifPermission !== 'granted') return;
        let unsub = null;
        navigator.serviceWorker.ready.then(swReg => {
            try {
                const messaging = firebase.messaging();
                unsub = messaging.onMessage(payload => {
                    const title = payload.notification?.title || '모이다';
                    const body  = payload.notification?.body  || '';
                    swReg.showNotification(title, {
                        body,
                        icon:  '/moida/icon.png',
                        badge: '/moida/icon.png',
                        data:  { url: 'https://nakdo0415-crypto.github.io/moida/' },
                    });
                });
            } catch(e) { console.warn('FCM onMessage 설정 실패:', e); }
        });
        return () => { if (unsub) unsub(); };
    }, [notifPermission]);

    // 공지사항 로딩
    const [announcements, setAnnouncements] = useState([]);
    useEffect(() => {
        const unsub = getCol('notifications')
            .orderBy('sentAt', 'desc')
            .limit(10)
            .onSnapshot(snap => {
                const list = [];
                snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                setAnnouncements(list);
            }, () => {});
        return () => unsub();
    }, []);

    // 설정 읽기
    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_v2').onSnapshot(doc => {
            if (doc.exists) setMeetingSettings(doc.data());
        });
        return () => unsub();
    }, []);

    // 팀 편성 읽기 (orderBy 없이 — 복합 인덱스 불필요, JS에서 필터/정렬)
    useEffect(() => {
        const unsub = getCol('team_drafts')
            .where('isConfirmed', '==', true)
            .onSnapshot(snap => {
                const list = [];
                snap.forEach(d => list.push(d.data()));
                setConfirmedDrafts(list);
            }, () => {});
        return () => unsub();
    }, []);

    // 현재 모임 날짜에 맞는 확정 팀 편성 선택
    useEffect(() => {
        const date = meetingSettings?.date;
        if (!date || !confirmedDrafts.length) { setTeamDraftData(null); return; }
        const filtered = confirmedDrafts
            .filter(d => d.meetingDate === date)
            .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
        setTeamDraftData(filtered[0] || null);
    }, [confirmedDrafts, meetingSettings?.date]);

    // 매치 테이블 읽기
    useEffect(() => {
        const unsub = getCol('match_schedules')
            .orderBy('createdAt', 'desc')
            .limit(1)
            .onSnapshot(snap => {
                setScheduleData(snap.empty ? null : snap.docs[0].data());
            });
        return () => unsub();
    }, []);

    // 내 출석 세션 읽기
    useEffect(() => {
        if (!memberData?.memberId || !meetingSettings?.date) return;
        setMySession(null);
        const unsub = getCol('weekly_session')
            .where('memberId', '==', memberData.memberId)
            .where('date', '==', meetingSettings.date)
            .onSnapshot(snap => {
                setMySession(snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() });
            });
        return () => unsub();
    }, [memberData?.memberId, meetingSettings?.date]);

    // members 문서 읽기
    useEffect(() => {
        if (!memberData?.memberId) return;
        const unsub = getCol('members').doc(memberData.memberId).onSnapshot(doc => {
            if (doc.exists) setMemberInfo({ id: doc.id, ...doc.data() });
        });
        return () => unsub();
    }, [memberData]);

    // allMembers: 관리자 모드일 때만 구독
    useEffect(() => {
        if (!isAdminMode) return;
        const unsub = getMemberCol().onSnapshot(snap => {
            setAllMembers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        return () => unsub();
    }, [isAdminMode]);

    // monthly_checks: 관리자 모드 + targetMonth 변경 시
    useEffect(() => {
        if (!isAdminMode || !targetMonth) return;
        const unsub = getMonthlyCol().doc(targetMonth).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                setMonthlyStatuses(data.statuses || {});
                setMonthlyReasons(data.reasons || {});
                setMonthlyPaymentDates(data.paymentDates || {});
            } else {
                setMonthlyStatuses({});
                setMonthlyReasons({});
                setMonthlyPaymentDates({});
            }
        });
        return () => unsub();
    }, [isAdminMode, targetMonth]);

    // 초기 앱 뷰 설정
    useEffect(() => {
        if (memberData?.memberId) setAppView('app');
    }, []);

    // QR 토큰 공통 처리 (URL 방식 + 인앱 스캔 공유)
    const processQRToken = useCallback(async (token, date) => {
        if (!token || !date) return;
        if (!memberData?.memberId) { setQrMessage('로그인 후 이용 가능합니다.'); setQrStatus('error'); return; }
        setQrStatus('processing');
        setTab('attend');
        try {
            const tokenDoc = await getCol('qr_tokens').doc(date).get();
            if (!tokenDoc.exists) { setQrMessage('유효하지 않은 QR코드입니다.'); setQrStatus('error'); return; }
            const tokenData = tokenDoc.data();
            if (tokenData.token !== token) { setQrMessage('QR 코드가 일치하지 않습니다.'); setQrStatus('error'); return; }

            const now = new Date();
            if (!testMode) {
                if (now < new Date(tokenData.validFrom)) { setQrMessage(`아직 출석 시간이 아닙니다.\n출석 가능: ${new Date(tokenData.validFrom).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`); setQrStatus('error'); return; }
                if (now > new Date(tokenData.validUntil)) { setQrMessage('QR 코드 유효 시간이 지났습니다.'); setQrStatus('error'); return; }
            }

            const usedBy = tokenData.usedBy || [];
            if (usedBy.includes(memberData.memberId)) { setQrMessage('이미 QR 출석이 완료되었습니다.'); setQrStatus('success'); return; }

            const sessionSnap = await getCol('weekly_session')
                .where('memberId', '==', memberData.memberId)
                .where('date', '==', date)
                .get();
            if (sessionSnap.empty) { setQrMessage('오늘 선정 명단에 없습니다.\n관리자에게 문의하세요.'); setQrStatus('error'); return; }

            const sessionDoc = sessionSnap.docs[0];
            if (sessionDoc.data().checkedIn) { setQrMessage('이미 출석 처리되었습니다.'); setQrStatus('success'); return; }

            const [sy,sm,sd] = date.split('-');
            // state 로딩 타이밍 이슈 방지: Firestore에서 직접 조회
            const settingsDoc = await getCol('settings').doc('meeting_schedule_v2').get();
            const startStr = settingsDoc.exists ? (settingsDoc.data().start || '08:00') : '08:00';
            const [shr,smin] = startStr.split(':');
            const meetingStart = new Date(sy,sm-1,sd,parseInt(shr),parseInt(smin),0);
            // 정상: start-70분~start-9분(07:51) / 지각: 07:51:01~종료 (+1분 여유)
            const normalThreshold = new Date(meetingStart.getTime() - 9*60*1000);
            const status = now <= normalThreshold ? '정상' : '지각';
            const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

            const batch = db.batch();
            batch.update(getCol('weekly_session').doc(sessionDoc.id), { checkedIn:true, checkInTime:timeStr, status });
            batch.update(getCol('qr_tokens').doc(date), { usedBy: firebase.firestore.FieldValue.arrayUnion(memberData.memberId) });
            await batch.commit();

            setQrMessage(`출석 완료! (${status})\n${timeStr}`);
            setQrStatus('success');
        } catch(e) {
            console.error(e);
            setQrMessage('오류가 발생했습니다: ' + e.message);
            setQrStatus('error');
        }
    }, [memberData, testMode]);

    // URL 파라미터로 진입한 경우 (외부 카메라 앱 스캔)
    const handleQRAttendance = useCallback(async () => {
        if (!urlParams.token || !urlParams.date) return;
        await processQRToken(urlParams.token, urlParams.date);
        window.history.replaceState({}, '', window.location.pathname);
    }, [urlParams, processQRToken]);

    // 인앱 카메라로 스캔한 경우
    const handleInAppQRScan = useCallback((scannedUrl) => {
        setIsQRScannerOpen(false);
        try {
            const url = new URL(scannedUrl);
            const token = url.searchParams.get('token');
            const date = url.searchParams.get('date');
            if (!token || !date) { setQrMessage('올바른 모이다 QR코드가 아닙니다.'); setQrStatus('error'); setTab('attend'); return; }
            setLastScannedQR({ token, date });
            processQRToken(token, date);
        } catch(_) {
            setQrMessage('QR코드를 읽을 수 없습니다.'); setQrStatus('error'); setTab('attend');
        }
    }, [processQRToken]);

    useEffect(() => {
        if (urlParams.token && appView === 'app') handleQRAttendance();
    }, [urlParams.token, appView]);

    // 로그아웃
    const handleLogout = () => {
        localStorage.removeItem('moida_member_data');
        localStorage.removeItem('moida_admin_mode');
        location.href = 'index.html';
    };

    const toggleTheme = () => {
        const isDark = !darkMode;
        setDarkMode(isDark);
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem('moida_theme', isDark ? 'dark' : 'light');
    };

    const toggleAdminMode = () => {
        const next = !isAdminMode;
        setIsAdminMode(next);
        localStorage.setItem('moida_admin_mode', next ? 'true' : 'false');
        if (!next && tab === 'roster') setTab('home');
    };

    // GPS 출석 체크
    const handleGPSCheckIn = async () => {
        if (!memberData?.memberId) return;
        setGpsStatus('checking');
        if (!navigator.geolocation) { setGpsStatus('error'); showToast('이 기기는 GPS를 지원하지 않습니다.', 'error'); return; }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const locationLat = meetingSettings?.locationLat;
            const locationLng = meetingSettings?.locationLng;

            if (!locationLat || !locationLng) {
                setGpsStatus('no_location');
                showToast('관리자가 모임 장소를 아직 설정하지 않았습니다.', 'error');
                return;
            }

            const dist = calcDistance(latitude, longitude, locationLat, locationLng);
            setDistance(Math.round(dist));
            const radius = meetingSettings?.locationRadius || 100;

            if (testMode || dist <= radius) {
                setGpsStatus('within');
            } else {
                setGpsStatus('outside');
            }
        }, (err) => {
            setGpsStatus('error');
            const msg = err.code === 1 ? '위치 권한을 허용해주세요.' : err.code === 2 ? 'GPS 신호를 찾을 수 없습니다.' : '위치 확인 시간이 초과되었습니다.';
            showToast(msg, 'error');
        }, { timeout: 10000, maximumAge: 0, enableHighAccuracy: true });
    };

    const handleGPSAttend = async () => {
        if (!mySession) return showToast('오늘 선정 명단에 없습니다. 관리자에게 문의하세요.', 'error');
        if (mySession.checkedIn) return showToast('이미 출석 처리되었습니다.', 'info');
        setIsCheckingIn(true);
        try {
            const now = new Date();
            const[sy,sm,sd] = meetingSettings.date.split('-');
            const[shr,smin] = meetingSettings.start.split(':');
            const[ehr,emin] = (meetingSettings.end || '10:00').split(':');
            const meetingStart = new Date(sy,sm-1,sd,parseInt(shr),parseInt(smin),0);
            const meetingEnd   = new Date(sy,sm-1,sd,parseInt(ehr),parseInt(emin),0);
            const allowFrom = new Date(meetingStart.getTime() - 70*60*1000);
            if (!testMode && now < allowFrom) { showToast('아직 출석 가능 시간이 아닙니다.', 'error'); setIsCheckingIn(false); return; }
            if (!testMode && now > meetingEnd) { showToast('모임이 종료되었습니다.\n자동 노쇼 처리되었습니다.', 'error'); setIsCheckingIn(false); return; }
            const normalThreshold = new Date(meetingStart.getTime() - 9*60*1000);
            const status = now <= normalThreshold ? '정상' : '지각';
            const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
            await getCol('weekly_session').doc(mySession.id).update({ checkedIn:true, checkInTime:timeStr, status });
            showToast(`출석 완료! ${status} (${timeStr})`, 'success');
        } catch(e) { showToast('출석 실패: ' + e.message, 'error'); }
        finally { setIsCheckingIn(false); }
    };

    // 내 팀 정보
    const myTeamInfo = useMemo(() => {
        if (!teamDraftData?.teams || !memberData?.memberId) return null;
        for (let i = 0; i < teamDraftData.teams.length; i++) {
            const team = teamDraftData.teams[i];
            const foundIdx = team.members.findIndex(m => m.memberId === memberData.memberId || m.id === memberData.memberId);
            if (foundIdx !== -1) return { teamIdx: i, teamName: getTeamName(i), members: team.members, jerseyNumber: foundIdx + 1 };
        }
        return null;
    }, [teamDraftData, memberData]);

    // ── 명단/회비 computed ────────────────────────────────────────────────────────
    const activeMembers = useMemo(() => allMembers.filter(m => !m.isResigned), [allMembers]);
    const resignedMembers = useMemo(() => allMembers.filter(m => m.isResigned), [allMembers]);
    const filteredMembers = useMemo(() => {
        let list = [...activeMembers].sort((a,b) => a.name.localeCompare(b.name));
        if (filterCategory !== 'all') {
            list = list.filter(m => getMemberStatusType(m, monthlyStatuses, monthlyReasons, targetMonth) === filterCategory);
        }
        return list;
    }, [activeMembers, filterCategory, monthlyStatuses, monthlyReasons, targetMonth]);
    const filterCounts = useMemo(() => {
        const counts = {all:activeMembers.length, monthly:0, half:0, full:0, rest:0, special:0, unpaid:0};
        activeMembers.forEach(m => {
            const type = getMemberStatusType(m, monthlyStatuses, monthlyReasons, targetMonth);
            if (type !== 'staff' && counts[type] !== undefined) counts[type]++;
        });
        return counts;
    }, [activeMembers, monthlyStatuses, monthlyReasons, targetMonth]);
    // ─────────────────────────────────────────────────────────────────────────────

    // ── 명단/회비 핸들러 ──────────────────────────────────────────────────────────
    const showAlert = (title, content, type='info', onConfirm=null) => setAlertModal({show:true, title, content, type, onConfirm});
    const showConfirm = (title, content, onConfirm) => setAlertModal({show:true, title, content, type:'confirm', onConfirm});
    const moveMonth = (offset) => {
        const [y,m] = targetMonth.split('-').map(Number);
        const d = new Date(y, m-1+offset, 1);
        setTargetMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
        setFilterCategory('all');
    };
    const handleAddMember = async () => {
        if (!newMemberForm.name.trim()) return showAlert('알림', '이름을 입력해주세요.');
        try {
            await getMemberCol().add({...newMemberForm, birth:String(newMemberForm.birth).replace(/[^0-9]/g,''), createdAt:new Date().toISOString()});
            setNewMemberForm({name:'',birth:'',gender:'남성',position:'all',level:'4',role:'회원',coupleId:'',joinDate:'',address:'',phone:''});
            setIsAddModalOpen(false);
            showAlert('성공', '회원이 등록되었습니다.');
        } catch(e) { showAlert('오류', '등록 실패'); }
    };
    const handleUpdateMember = async () => {
        try {
            await getMemberCol().doc(editingMember.id).update({...editingMember, birth:String(editingMember.birth||'').replace(/[^0-9]/g,'')});
            setEditingMember(null);
            showAlert('완료', '정보가 수정되었습니다.');
        } catch(e) { showAlert('오류', '수정 실패'); }
    };
    const handleResignConfirm = async () => {
        if (!resignForm.date) return showAlert('알림', '탈퇴 일자를 선택해주세요.');
        try {
            await getMemberCol().doc(resigningMember.id).update({isResigned:true, resignDate:resignForm.date, resignReason:resignForm.reason||'사유 미작성', isForcedResign:resignForm.isForced});
            setResigningMember(null);
            showAlert('성공', `${resigningMember.name}님이 탈퇴 처리되었습니다.`);
        } catch(e) { showAlert('오류', '탈퇴 처리 실패'); }
    };
    const handleBillingMemberClick = (m) => {
        setBillingMember(m);
        setActionStep('main');
        setSelectedAction(null);
        const today = new Date();
        setPaymentDateInput(`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`);
        setSpecialRestReason(monthlyReasons[m.id] || '');
        setTempRestCount(m.totalRestMonths || 0);
        setManualEndDate(m.membershipEndDate || '');
    };
    const processAction = async (actionType) => {
        if (!billingMember || !targetMonth) return;
        try {
            const batch = db.batch();
            const monthRef = getMonthlyCol().doc(targetMonth);
            const memberRef = getMemberCol().doc(billingMember.id);
            const mid = billingMember.id;
            if (actionType === 'monthly_paid') {
                batch.set(monthRef, {statuses:{[mid]:'paid'}, paymentDates:{[mid]:paymentDateInput}, updatedAt:new Date().toISOString()}, {merge:true});
                batch.update(monthRef, {[`reasons.${mid}`]: firebase.firestore.FieldValue.delete()});
                batch.update(memberRef, {membershipType:'monthly', membershipStartDate:'', membershipEndDate:'', totalRestMonths:0});
            } else if (actionType === 'start_half') {
                const finalEnd = manualEndDate || calculateEndDate(targetMonth, 6);
                batch.update(memberRef, {membershipType:'half_year', membershipStartDate:`${targetMonth}-01`, membershipEndDate:finalEnd, totalRestMonths:0});
                batch.set(monthRef, {paymentDates:{[mid]:paymentDateInput}, updatedAt:new Date().toISOString()}, {merge:true});
                batch.update(monthRef, {[`statuses.${mid}`]: firebase.firestore.FieldValue.delete(), [`reasons.${mid}`]: firebase.firestore.FieldValue.delete()});
            } else if (actionType === 'start_full') {
                const finalEnd = manualEndDate || calculateEndDate(targetMonth, 12);
                batch.update(memberRef, {membershipType:'full_year', membershipStartDate:`${targetMonth}-01`, membershipEndDate:finalEnd, totalRestMonths:0});
                batch.set(monthRef, {paymentDates:{[mid]:paymentDateInput}, updatedAt:new Date().toISOString()}, {merge:true});
                batch.update(monthRef, {[`statuses.${mid}`]: firebase.firestore.FieldValue.delete(), [`reasons.${mid}`]: firebase.firestore.FieldValue.delete()});
            } else if (actionType === 'rest') {
                const isLong = billingMember.membershipType==='half_year' || billingMember.membershipType==='full_year';
                if (billingMember.membershipType==='half_year' && (billingMember.totalRestMonths||0)>=3) return showAlert('알림','반년납 최대 3회 휴식');
                if (billingMember.membershipType==='full_year' && (billingMember.totalRestMonths||0)>=6) return showAlert('알림','1년납 최대 6회 휴식');
                batch.set(monthRef, {statuses:{[mid]:'rest'}, updatedAt:new Date().toISOString()}, {merge:true});
                if (isLong) {
                    batch.update(memberRef, {membershipEndDate:extendEndDate(billingMember.membershipEndDate,1), totalRestMonths:firebase.firestore.FieldValue.increment(1)});
                    batch.update(monthRef, {[`reasons.${mid}`]:firebase.firestore.FieldValue.delete(), [`paymentDates.${mid}`]:firebase.firestore.FieldValue.delete()});
                } else {
                    batch.set(monthRef, {paymentDates:{[mid]:paymentDateInput}, updatedAt:new Date().toISOString()}, {merge:true});
                    batch.update(monthRef, {[`reasons.${mid}`]:firebase.firestore.FieldValue.delete()});
                }
            } else if (actionType === 'cancel_rest') {
                batch.update(monthRef, {[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(), [`reasons.${mid}`]:firebase.firestore.FieldValue.delete(), [`paymentDates.${mid}`]:firebase.firestore.FieldValue.delete()});
                if (billingMember.membershipType==='half_year'||billingMember.membershipType==='full_year') {
                    batch.update(memberRef, {membershipEndDate:extendEndDate(billingMember.membershipEndDate,-1), totalRestMonths:firebase.firestore.FieldValue.increment(-1)});
                }
            } else if (actionType === 'special_rest') {
                batch.update(memberRef, {isSpecialRest:true, specialRestReason:specialRestReason||'특별 휴식', specialRestStartMonth:targetMonth});
                batch.update(monthRef, {[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(), [`reasons.${mid}`]:firebase.firestore.FieldValue.delete(), [`paymentDates.${mid}`]:firebase.firestore.FieldValue.delete()});
            } else if (actionType === 'cancel_special_rest') {
                const sm = billingMember.specialRestStartMonth;
                let ext = 0;
                if (sm) { const[sy,smm]=sm.split('-').map(Number); const[ty,tm]=targetMonth.split('-').map(Number); ext=(ty-sy)*12+(tm-smm); }
                const upd = {isSpecialRest:false, specialRestReason:firebase.firestore.FieldValue.delete(), specialRestStartMonth:firebase.firestore.FieldValue.delete()};
                if (ext>0&&(billingMember.membershipType==='half_year'||billingMember.membershipType==='full_year')) upd.membershipEndDate=extendEndDate(billingMember.membershipEndDate,ext);
                batch.update(memberRef, upd);
            } else if (actionType === 'end_membership') {
                batch.update(memberRef, {membershipType:'monthly', membershipStartDate:'', membershipEndDate:'', totalRestMonths:0});
                batch.update(monthRef, {[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(), [`reasons.${mid}`]:firebase.firestore.FieldValue.delete()});
            } else if (actionType === 'clear') {
                batch.update(monthRef, {[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(), [`reasons.${mid}`]:firebase.firestore.FieldValue.delete(), [`paymentDates.${mid}`]:firebase.firestore.FieldValue.delete()});
            } else if (actionType === 'update_longterm_info') {
                batch.update(memberRef, {membershipEndDate:manualEndDate, totalRestMonths:tempRestCount});
                batch.set(monthRef, {paymentDates:{[mid]:paymentDateInput}, updatedAt:new Date().toISOString()}, {merge:true});
            }
            await batch.commit();
            setBillingMember(null);
            showAlert('성공','상태가 반영되었습니다.');
        } catch(e) { console.error(e); showAlert('오류','처리 실패'); }
    };
    // ─────────────────────────────────────────────────────────────────────────────

    // ============================
    // 뷰 렌더링
    // ============================

    // 로딩
    if (appView === 'loading') return (
        <div className="min-h-screen flex flex-col items-center justify-center">
            <div className="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p className="text-slate-400 text-sm font-medium">모이다 연결 중...</p>
        </div>
    );

    // ============================
    // 메인 회원 앱
    // ============================
    const memberName = memberInfo?.name || memberData?.name || '회원';
    const myTeamIdx = myTeamInfo?.teamIdx ?? -1;

    return (
        <div className="min-h-screen pb-24 text-slate-800">
            {testMode && (
                <div style={{background:'#fbbf24',position:'sticky',top:0,zIndex:50}} className="text-amber-900 text-xs font-black text-center py-2 px-4">
                    🧪 테스트 모드 — GPS·QR 시간·거리 제한이 해제된 상태입니다.
                </div>
            )}
            {/* 헤더 */}
            <div className="px-5 pt-12 pb-6 member-header-bg">
                <div className="flex items-center justify-between mb-4">
                    <div>
                        <p className="text-teal-600 text-xs tracking-widest uppercase font-bold">OTP FC</p>
                        <h1 className="text-2xl font-black text-slate-800 mt-0.5">{memberName} 님</h1>
                    </div>
                    <div className="flex flex-col items-end gap-1.5">
                        <div className="flex gap-1.5">
                            <button onClick={()=>window.location.href='index.html'} className="p-2 rounded-lg bg-slate-200/70 hover:bg-slate-200 transition-all text-slate-500"><Icon.Home size={15}/></button>
                            {isAdmin && (
                                <button onClick={toggleAdminMode}
                                    className="flex items-center gap-1.5 text-[10px] font-black px-2.5 py-1.5 rounded-lg transition-all active:scale-95"
                                    style={isAdminMode
                                        ? {background:'linear-gradient(135deg,#14b8a6,#0d9488)',color:'white'}
                                        : {background:'rgba(203,213,225,0.7)',color:'#64748b'}}>
                                    {isAdminMode && <span className="w-1.5 h-1.5 rounded-full bg-white flex-shrink-0 animate-ping"/>}
                                    {isAdminMode ? '관리자 ON' : '⚙️'}
                                </button>
                            )}
                            <button onClick={handleLogout} className="text-[10px] font-black text-slate-500 px-2.5 py-1 rounded-lg bg-slate-200/70 hover:bg-slate-200 transition-all">로그아웃</button>
                            <button onClick={toggleTheme} className="p-2 rounded-lg bg-slate-200/70 hover:bg-slate-200 transition-all text-slate-500" title="테마">{darkMode ? <Icon.Sun size={15}/> : <Icon.Moon size={15}/>}</button>
                        </div>
                        <img src="icon.png" alt="OTP FC" className="w-10 h-10 object-contain opacity-70" onError={e=>e.target.style.display='none'}/>
                    </div>
                </div>

                {/* 오늘 모임 정보 */}
                {meetingSettings && (
                    <div className="card rounded-2xl p-4 mt-2">
                        <p className="text-[10px] text-teal-500 font-black uppercase tracking-widest mb-2">다음 모임</p>
                        <div className="flex items-center justify-between">
                            <div>
                                <p className="font-black text-lg">{meetingSettings.date}</p>
                                <p className="text-slate-400 text-xs mt-0.5">{meetingSettings.start} ~ {meetingSettings.end}</p>
                                {meetingSettings.location && <p className="text-slate-400 text-xs mt-0.5 flex items-center gap-1"><Icon.MapPin size={11}/>{meetingSettings.location}</p>}
                            </div>
                            {mySession?.checkedIn
                                ? <div className="bg-emerald-500 px-4 py-2 rounded-xl text-sm font-black text-white">✓ 출석</div>
                                : !teamReady
                                    ? <div className="bg-slate-100 px-3 py-2 rounded-xl text-[10px] font-black text-slate-400 text-center leading-tight">
                                        🔒<br/>{allowFromDisplay} 공개
                                      </div>
                                    : myTeamInfo
                                        ? <div className={`${getTeamBadge(myTeamIdx)} px-3 py-2 rounded-xl text-sm font-black text-center`}>
                                            <div>{myTeamInfo.teamName}팀 {myTeamInfo.jerseyNumber}번</div>
                                            <div className="text-[10px] opacity-80">{getTeamColorName(myTeamIdx)} 조끼</div>
                                          </div>
                                        : <div className="bg-slate-100 px-4 py-2 rounded-xl text-xs font-black text-slate-400">미편성</div>
                            }
                        </div>
                    </div>
                )}
            </div>

            {/* 탭 콘텐츠 */}
            <div className="px-4 pt-4">

                {/* ===== 홈 탭 ===== */}
                {tab === 'home' && (
                    <div className="animate-in space-y-3">
                        {/* iOS PWA 설치 안내 */}
                        {/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone && (
                            <div className="card rounded-2xl p-4 border-orange-100">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center flex-shrink-0 text-lg">📲</div>
                                    <div className="flex-1">
                                        <p className="font-black text-sm text-orange-500">iPhone 알림 받으려면</p>
                                        <p className="text-xs text-slate-400 mt-0.5">Safari → 공유 버튼 → "홈 화면에 추가" 후 앱에서 실행하세요</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        {/* 알림 허용 배너 */}
                        {notifPermission === 'default' && (
                            <button onClick={registerFcmToken} className="w-full card rounded-2xl p-4 text-left border-teal-100 active:scale-98 transition-all">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-teal-50 rounded-xl flex items-center justify-center flex-shrink-0">
                                        <Icon.Bell size={18} className="text-teal-500"/>
                                    </div>
                                    <div className="flex-1">
                                        <p className="font-black text-sm text-teal-600">푸시 알림 받기</p>
                                        <p className="text-xs text-slate-400 mt-0.5">팀 편성, 모임 알림을 받아보세요</p>
                                    </div>
                                    <span className="text-xs font-black text-teal-500 bg-teal-50 px-3 py-1 rounded-xl">허용</span>
                                </div>
                            </button>
                        )}
                        {/* 빠른 출석 */}
                        <button onClick={()=>setTab('attend')} className="w-full card rounded-3xl p-5 text-left active:scale-98 transition-all">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-teal-500 rounded-2xl flex items-center justify-center flex-shrink-0"><Icon.CheckSq size={26} className="text-white"/></div>
                                <div className="flex-1 min-w-0">
                                    <p className="font-black text-lg">출석 체크</p>
                                    <p className="text-slate-400 text-xs mt-0.5">GPS 또는 QR로 출석</p>
                                </div>
                                {meetingDayInfo && meetingDayInfo.type !== 'past' && (
                                    <div className={`flex-shrink-0 text-center px-3 py-1.5 rounded-xl text-xs font-black ${
                                        meetingDayInfo.type==='started'?'bg-emerald-50 text-emerald-500':
                                        meetingDayInfo.urgent?'bg-red-50 text-red-500':
                                        meetingDayInfo.type==='today'?'bg-teal-50 text-teal-500':
                                        'bg-slate-100 text-slate-500'}`}>
                                        {meetingDayInfo.label}
                                    </div>
                                )}
                            </div>
                        </button>

                        {/* 내 팀 */}
                        {!teamReady ? (
                            <div className="card rounded-3xl p-5 text-center text-slate-400">
                                <div className="flex justify-center mb-2 opacity-25"><Icon.Users size={36}/></div>
                                <p className="font-black text-sm">팀 편성 비공개 중</p>
                                {allowFromDisplay && <p className="text-xs mt-1">{allowFromDisplay}부터 공개됩니다</p>}
                            </div>
                        ) : myTeamInfo ? (
                            <div className="card rounded-3xl p-5">
                                <p className="text-xs font-black text-teal-500 uppercase tracking-widest mb-3">내 팀</p>
                                <div className="flex items-center gap-3 mb-3">
                                    <span className={`w-10 h-10 rounded-xl font-black text-lg flex items-center justify-center ${getTeamBadge(myTeamIdx)} text-white flex-shrink-0`}>{myTeamInfo.jerseyNumber}</span>
                                    <div>
                                        <p className="font-black text-lg leading-tight">{myTeamInfo.teamName}팀 {myTeamInfo.jerseyNumber}번</p>
                                        <p className="text-xs text-slate-400">{getTeamColorName(myTeamIdx)} 조끼 · {myTeamInfo.members.length}명</p>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {myTeamInfo.members.map((m,i)=>(
                                        <span key={i} className={`px-3 py-1.5 rounded-xl text-xs font-black ${m.memberId===memberData?.memberId?'bg-teal-500 text-white':'bg-slate-100 text-slate-600'}`}>
                                            <span className="opacity-60 mr-0.5">{i+1}.</span>{m.name}{m.gender==='여성'&&<span className="ml-1 opacity-60">W</span>}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="card rounded-3xl p-5 text-center text-slate-500">
                                <div className="flex justify-center mb-2 opacity-30"><Icon.Users size={36}/></div>
                                <p className="font-black text-sm">아직 팀이 편성되지 않았습니다</p>
                            </div>
                        )}

                        {/* 출석 현황 */}
                        {mySession && (
                            mySession.checkedIn ? (
                                <div className="bg-emerald-50 border border-emerald-200 rounded-3xl p-5">
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center flex-shrink-0"><Icon.Check size={24} className="text-white"/></div>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-black text-xl text-emerald-500">출석 완료</p>
                                            <p className="text-emerald-500 text-xs opacity-70">{meetingSettings?.date}</p>
                                        </div>
                                        <span className={`flex-shrink-0 text-xs font-black px-3 py-1.5 rounded-xl ${mySession.status==='정상'?'bg-emerald-500 text-white':'bg-yellow-400 text-slate-800'}`}>
                                            {mySession.status}
                                        </span>
                                    </div>
                                    <div style={{background: darkMode ? 'rgba(255,255,255,0.07)' : 'rgba(255,255,255,0.6)'}} className="rounded-2xl p-3 flex items-center justify-between">
                                        <span className="text-slate-500 text-xs font-black">{memberName}</span>
                                        <span className="text-slate-700 font-black text-sm">{mySession.checkInTime}</span>
                                    </div>
                                </div>
                            ) : (
                                <div className="card rounded-3xl p-5">
                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">오늘 출석 현황</p>
                                    <div className="flex items-center justify-between">
                                        <p className="text-slate-500 font-black text-sm">미출석</p>
                                        <button onClick={()=>setTab('attend')} className="text-xs font-black px-3 py-2 bg-teal-50 text-teal-500 rounded-xl active:scale-95">
                                            출석하기 →
                                        </button>
                                    </div>
                                    {meetingDayInfo?.type === 'today' && (
                                        <p className={`text-xs font-black mt-2 ${meetingDayInfo.urgent?'text-red-500':'text-teal-500'}`}>⏰ {meetingDayInfo.label}</p>
                                    )}
                                    {meetingDayInfo?.type === 'started' && (
                                        <p className="text-xs font-black mt-2 text-emerald-500 flex items-center gap-1"><Icon.Activity size={11}/>모임이 진행 중입니다</p>
                                    )}
                                </div>
                            )
                        )}
                        {/* 공지사항 */}
                        {announcements.length > 0 && (
                            <div className="card rounded-3xl p-5">
                                <p className="text-xs font-black text-teal-500 uppercase tracking-widest mb-3">공지사항</p>
                                <div className="space-y-3">
                                    {announcements.map(a => (
                                        <div key={a.id} className="pb-3 border-b border-slate-100 last:pb-0 last:border-0">
                                            <div className="flex items-start justify-between gap-2">
                                                <p className="font-black text-sm text-slate-800 flex-1">{a.title}</p>
                                                <span className="text-[10px] text-slate-400 flex-shrink-0 whitespace-nowrap">
                                                    {a.sentAt ? new Date(a.sentAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'}) : ''}
                                                </span>
                                            </div>
                                            <p className="text-xs text-slate-500 mt-1 leading-relaxed">{a.body}</p>
                                            {a.sentBy && <p className="text-[10px] text-slate-400 mt-1.5">{a.sentBy}</p>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                )}

                {/* ===== 팀 탭 ===== */}
                {tab === 'team' && (
                    <div className="animate-in">
                        {!teamDraftData
                            ? <div className="text-center py-20 text-slate-500">
                                <div className="flex justify-center mb-4 opacity-25"><Icon.Users size={56}/></div>
                                <p className="font-black text-lg mb-2">아직 팀이 편성되지 않았습니다</p>
                                <p className="text-sm text-slate-400">운영진이 팀 편성을 완료하면<br/>여기에 표시됩니다</p>
                              </div>
                            : !teamReady
                            ? <div className="text-center py-20 text-slate-500">
                                <div className="flex justify-center mb-4 opacity-25"><Icon.Users size={56}/></div>
                                <p className="font-black text-lg mb-2">팀 편성 비공개 중</p>
                                <p className="text-sm text-slate-400">{allowFromDisplay}부터 공개됩니다</p>
                              </div>
                            : (
                                <div>
                                    <div className="text-center mb-4">
                                        <p className="text-xs text-slate-500 uppercase tracking-widest font-black">{teamDraftData.meetingDate} 팀 편성</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        {teamDraftData.teams.map((team, teamIdx)=>(
                                            <div key={teamIdx} className={`rounded-2xl p-4 border ${teamIdx===myTeamIdx?'border-teal-500 bg-teal-50':'card border-slate-100'}`}>
                                                <div className="flex items-center gap-2 mb-3">
                                                    <span className={`w-8 h-8 rounded-xl font-black text-sm flex items-center justify-center text-white ${getTeamBadge(teamIdx)}`}>{getTeamName(teamIdx)}</span>
                                                    {teamIdx===myTeamIdx&&<span className="text-[9px] font-black text-teal-500 uppercase">내 팀</span>}
                                                </div>
                                                {team.members.map((m,mi)=>(
                                                    <div key={mi} className={`text-xs py-1 font-black flex items-center gap-1 ${m.memberId===memberData?.memberId?'text-teal-500':'text-slate-400'}`}>
                                                        <span className="opacity-50 w-4 text-right flex-shrink-0">{mi+1}.</span>
                                                        <span>{m.name}{m.gender==='여성'&&' W'}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )
                        }
                    </div>
                )}

                {/* ===== 매치 탭 ===== */}
                {tab === 'match' && (
                    <div className="animate-in">
                        {!scheduleData
                            ? <div className="text-center py-20 text-slate-500">
                                <div className="flex justify-center mb-4 opacity-25"><Icon.Calendar size={56}/></div>
                                <p className="font-black text-lg mb-2">매치 테이블 준비 중</p>
                                <p className="text-sm text-slate-400">팀 편성이 확정되면<br/>경기 일정이 공개됩니다</p>
                              </div>
                            : (() => {
                                const sessions = scheduleData.schedule?.list || [];
                                const cmi = scheduleData.currentMatchIndex ?? 0;
                                const currentSession = sessions[cmi];
                                const allDone = cmi >= sessions.length;
                                const myTeam = myTeamInfo?.teamName;
                                const myTeamIdx2 = myTeamInfo?.teamIdx ?? 0;
                                return (
                                    <div>
                                        {/* 날짜 + 뷰 토글 */}
                                        <div className="flex items-center justify-between mb-4">
                                            <div>
                                                <p className="text-xs text-slate-500 uppercase tracking-widest font-black">{scheduleData.meetingDate}</p>
                                                <p className="text-[10px] text-slate-400 mt-0.5">총 {sessions.length}라운드</p>
                                            </div>
                                            <div className="flex bg-slate-100 rounded-xl p-1 gap-1">
                                                <button onClick={()=>setMatchViewMode('my')} className={`px-3 py-1.5 rounded-lg font-black text-xs transition-all ${matchViewMode==='my'?'bg-white text-teal-600 shadow-sm':'text-slate-400'}`}>내 경기</button>
                                                <button onClick={()=>setMatchViewMode('all')} className={`px-3 py-1.5 rounded-lg font-black text-xs transition-all ${matchViewMode==='all'?'bg-white text-teal-600 shadow-sm':'text-slate-400'}`}>전체 보기</button>
                                            </div>
                                        </div>

                                        {/* ── 내 경기 뷰 ── */}

                                            <div>
                                                {allDone ? (
                                                    <div className="text-center py-16">
