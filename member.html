<script type="text/babel">
const { useState, useEffect, useMemo } = React;

function App() {
    const [appView, setAppView] = useState('loading');
    const [tab, setTab] = useState(() => {
        try {
            const t = sessionStorage.getItem('moida_tab') || 'home';
            // кё°мЎҙ м¶ңм„қ/нҢҖ/л§Өм№ҳ нғӯмқҖ 'лӘЁмһ„' нғӯмңјлЎң нҶөн•© вҶ’ ліөмӣҗ мӢң лӘЁмһ„мңјлЎң л§Өн•‘
            return (t === 'attend' || t === 'team' || t === 'match') ? 'meeting' : t;
        } catch(e) { return 'home'; }
    });
    // лӘЁмһ„ нғӯ м•Ҳмқҳ н•ҳмң„ нғӯ(м¶ңм„қ/нҢҖ/л§Өм№ҳ)
    const [meetingSubTab, setMeetingSubTab] = useState(() => {
        try {
            const t = sessionStorage.getItem('moida_tab');
            if (t === 'attend' || t === 'team' || t === 'match') return t;
            return sessionStorage.getItem('moida_meeting_sub') || 'attend';
        } catch(e) { return 'attend'; }
    });
    // лӘЁмһ„ нғӯм—җм„ң ліҙкі  мһҲлҠ” лӘЁмһ„ (null = лӘЁмһ„ м№ҙл“ң лӘ©лЎқ). мғҲлЎңкі м№Ё нӣ„м—җлҸ„ мң м§Җ.
    const [viewMeetingId, setViewMeetingId] = useState(() => {
        try { return sessionStorage.getItem('moida_view_meeting') || null; } catch(e) { return null; }
    });
    // мғҒм„ё нҷ”л©ҙ [мҲҳм •] лІ„нҠј вҶ’ лӘ©лЎқмқҳ лӘЁмһ„ кҙҖлҰ¬м—җм„ң мҲҳм • нҸј мһҗлҸҷ мҳӨн”Ҳ
    const [pendingEditMeeting, setPendingEditMeeting] = useState(null);
    // нҳ„мһ¬ нғӯ/н•ҳмң„ нғӯ кё°м–ө вҶ’ мғҲлЎңкі м№Ё(лӢ№кІЁм„ң/F5) нӣ„ к°ҷмқҖ мң„м№ҳлЎң ліөмӣҗ. м•ұмқ„ мҷ„м „нһҲ лӢ«мңјл©ҙ мҙҲкё°нҷ”(нҷҲ).
    React.useEffect(() => { try { sessionStorage.setItem('moida_tab', tab); } catch(e) {} }, [tab]);
    React.useEffect(() => { try { sessionStorage.setItem('moida_meeting_sub', meetingSubTab); } catch(e) {} }, [meetingSubTab]);
    React.useEffect(() => { try { if (viewMeetingId) sessionStorage.setItem('moida_view_meeting', viewMeetingId); else sessionStorage.removeItem('moida_view_meeting'); } catch(e) {} }, [viewMeetingId]);
    // л§Өм№ӯлӘЁмһ„мқҖ нҢҖнҺём„ұВ·л§Өм№ҳн…Ңмқҙлё”мқҙ м—ҶмқҢ вҶ’ 'attend'/'team'(лӘ…лӢЁ)л§Ң. 'match' м„ңлёҢнғӯмқҙл©ҙ м¶ңм„қмңјлЎң ліҙлғ„.
    React.useEffect(() => {
        if (activeMeetingKind === 'match' && meetingSubTab === 'match') setMeetingSubTab('attend');
    }, [activeMeetingKind, meetingSubTab]);
    // нҷҲ нғӯмңјлЎң лҸҢм•„мҳӨл©ҙ н•ӯмғҒ м •кё° лӘЁмһ„ м»Ён…ҚмҠӨнҠёлЎң лҰ¬м…Ӣ (н—ӨлҚ”/нҷҲм№ҙл“ң мҳӨлІ„л Ҳмқҙк°Җ м •кё° лӘЁмһ„ кё°мӨҖмңјлЎң лҸҷмһ‘н•ҳлҸ„лЎқ)
    React.useEffect(() => { if (tab === 'home') setActiveMeetingKind('self'); }, [tab]);
    // м¶ңм„қ/нҢҖ/л§Өм№ҳлЎңмқҳ мқҙлҸҷмқ„ 'лӘЁмһ„' нғӯ + н•ҳмң„ нғӯмңјлЎң ліҖнҷҳн•ҳлҠ” л„Өл№„кІҢмқҙм…ҳ н—¬нҚј.
    // meetingIdлҘј мЈјл©ҙ к·ё лӘЁмһ„ мғҒм„ёлЎң м§Ғн–ү(нҷҲ м№ҙл“ң). м—Ҷмқҙ л“Өм–ҙмҳӨл©ҙ(QR м¶ңм„қ л“ұ) н•ҙлӢ№ мў…лҘҳмқҳ нҳ„мһ¬ лӘЁмһ„мңјлЎң.
    const navTab = (t, kind, meetingId) => {
        if (t === 'meeting-list') { setViewMeetingId(null); setTab('meeting'); return; }
        if (t === 'attend' || t === 'team' || t === 'match') {
            if (kind) setActiveMeetingKind(kind);
            if (meetingId) setViewMeetingId(meetingId);
            else if (!viewMeetingId) {
                const k = kind || activeMeetingKind;
                const act = getActiveMeeting((meetings || []).filter(m => k === 'match' ? (m.meetingType||'self') === 'match' : (m.meetingType||'self') !== 'match'));
                if (act) setViewMeetingId(act.id);
            }
            setMeetingSubTab(t); setTab('meeting');
        }
        else setTab(t);
    };
    const [memberData, setMemberData] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (!s) { location.href = 'index.html'; return null; }
            return s;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const [memberInfo, setMemberInfo] = useState(null);
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const isAdmin = ADMIN_ROLES.includes(memberData?.role);
    const isAdminMode = ADMIN_ROLES.includes(memberData?.role);
    const [meetingSettings, setMeetingSettings] = useState(null);
    const [meetingSettingsMatch, setMeetingSettingsMatch] = useState(null);
    const [activeMeetingKind, setActiveMeetingKind] = useState('self');
    const [meetings, setMeetings] = useState([]);
    const displayMeetingSettings = activeMeetingKind === 'match' ? meetingSettingsMatch : meetingSettings;
    // лӘЁмһ„ нғӯм—җм„ң ліҙкі  мһҲлҠ” лӘЁмһ„ к°қмІҙ (meetings мӢӨмӢңк°„ кө¬лҸ…м—җм„ң нҢҢмғқ вҖ” мҲҳм •/мӮӯм ң мҰүмӢң л°ҳмҳҒ)
    const viewMeeting = meetings.find(m => m.id === viewMeetingId) || null;
    const viewKind = viewMeeting ? ((viewMeeting.meetingType || 'self') === 'match' ? 'match' : 'self') : null;
    // ліҙкі  мһҲлҠ” лӘЁмһ„ мў…лҘҳм—җ л§һм¶° лҚ°мқҙн„° м»Ён…ҚмҠӨнҠё(м •кё°/л§Өм№ӯ лҜёлҹ¬) мһҗлҸҷ м „нҷҳ
    React.useEffect(() => { if (viewKind) setActiveMeetingKind(viewKind); }, [viewMeetingId, viewKind]);
    // лӘЁмһ„ нғӯ м»Ён…ҚмҠӨнҠё вҖ” ліҙкі  мһҲлҠ” лӘЁмһ„ мҡ°м„ , м•„лӢҲл©ҙ нҳ„мһ¬ лӘЁмһ„(лҜёлҹ¬). нҢҖнҺём„ұВ·л§Өм№ҳ лҚ°мқҙн„°к°Җ мқҙ лӘЁмһ„мқ„ л”°лқјк°„лӢӨ.
    const effectiveMeeting = viewMeeting || displayMeetingSettings;
    // л§Өм№ҳн…Ңмқҙлё”мқҖ м •кё°(мһҗмІҙм „) лӘЁмһ„ м „мҡ© вҖ” л§Өм№ӯлӘЁмһ„мқ„ ліҙлҠ” мӨ‘м—җлҠ” м •кё° лҜёлҹ¬ мң м§Җ
    const effectiveSelfMeeting = (viewMeeting && viewKind === 'self') ? viewMeeting : meetingSettings;
    // лӘЁмһ„ нғӯмқ„ лІ—м–ҙлӮҳл©ҙ ліҙлҚҳ лӘЁмһ„ н•ҙм ң вҶ’ нҷҲ м№ҙл“ңВ·н—ӨлҚ”к°Җ н•ӯмғҒ 'нҳ„мһ¬ лӘЁмһ„' кё°мӨҖмңјлЎң лҸҷмһ‘
    React.useEffect(() => { if (tab !== 'meeting') setViewMeetingId(null); }, [tab]);
    const testMode = !!displayMeetingSettings?.testMode;
    const [mySession, setMySession] = useState(null);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null});
    const [announcementModal, setAnnouncementModal] = useState({ open: false, mode: 'add', data: null });
    const showAlert = (title, content, type='info', onConfirm=null) => setAlertModal({show:true, title, content, type, onConfirm});
    const showConfirm = (title, content, onConfirm) => setAlertModal({show:true, title, content, type:'confirm', onConfirm});
    const [toast, setToast] = useState({ show:false, msg:'', type:'info' });
    const showToast = (msg, type='info') => { setToast({show:true,msg,type}); setTimeout(()=>setToast(p=>({...p,show:false})),3000); };
    const [gpsStatus, setGpsStatus] = useState('idle');
    const [distance, setDistance] = useState(null);
    const [isCheckingIn, setIsCheckingIn] = useState(false);
    const [qrStatus, setQrStatus] = useState('idle');
    const [qrMessage, setQrMessage] = useState('');
    const [isQRScannerOpen, setIsQRScannerOpen] = useState(false);
    const [lastScannedQR, setLastScannedQR] = useState({ token:null, date:null });
    const [nowTime, setNowTime] = useState(() => new Date());
    useEffect(() => { const t = setInterval(() => setNowTime(new Date()), 30000); return () => clearInterval(t); }, []);

    // кё°лҠҘлі„ нӣ…
    const { notifPermission, registerFcmToken, announcements } = useFCM({ memberData, showToast });

    // в”Җв”Җ кіөм§Җ кІҢмӢңнҢҗ м§„мһ… + м•ҲмқҪмқҢ л°°м§Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // м•ҲмқҪмқҢ нҢҗм •: localStorageм—җ 'л§Ҳм§Җл§үмңјлЎң ліё мөңмӢ  кіөм§Җ sentAt'мқ„ м ҖмһҘн•ҳкі 
    // к·ёліҙлӢӨ мғҲ кіөм§Җ мҲҳлҘј л°°м§ҖлЎң. н•ңкі„: кё°кё°/лёҢлқјмҡ°м Җлі„лЎң л”°лЎң кҙҖлҰ¬лҗҳкі  мәҗмӢң мӮӯм ң мӢң мҙҲкё°нҷ”лҗЁ.
    const [lastSeenAnnounce, setLastSeenAnnounce] = useState(() => {
        try { return localStorage.getItem('moida_lastSeenAnnounce') || ''; } catch { return ''; }
    });
    const unreadCount = announcements.filter(a => a.sentAt && a.sentAt > lastSeenAnnounce).length;
    // мў…/мҲңнҷҳ лқ  вҶ’ кіөм§Җ кІҢмӢңнҢҗ нҷ”л©ҙмңјлЎң мқҙлҸҷ(лӘЁлӢ¬ лҢҖмӢ  нғӯ м „нҷҳ). м§„мһ… мӢң м•ҲмқҪмқҢ к°ұмӢ .
    const openAnnouncements = () => {
        setTab('notice');
        const newest = announcements[0]?.sentAt; // мөңмӢ мҲңмқҙлқј [0]мқҙ к°ҖмһҘ мғҲ кіөм§Җ
        if (newest && newest > lastSeenAnnounce) {
            try { localStorage.setItem('moida_lastSeenAnnounce', newest); } catch {}
            setLastSeenAnnounce(newest);
        }
    };
    const roster = useRoster({ isAdminMode });
    const team = useTeam({ isAdminMode, meetingSettings: effectiveMeeting, allMembers: roster.allMembers });
    const match = useMatch({ isAdminMode, meetingSettings: effectiveSelfMeeting, confirmedDrafts: team.confirmedDrafts });
    const { scheduleData, matchViewMode, setMatchViewMode } = match;
    const attend = useAttend({
        isAdminMode, memberData, meetingSettings: displayMeetingSettings,
        tmSessionData: team.tmSessionData,
        activeMembers: roster.activeMembers,
        tmMonthlyStatuses: team.tmMonthlyStatuses,
        teamDraftData: team.teamDraftData,
    });
    const { handleRegister, handleCancel } = makeRegistrationHandlers({
        meetingDate: displayMeetingSettings?.date,
        memberData,
        meetingSettings: displayMeetingSettings,
        showToast,
        showAlert,
    });

    useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(e=>console.error(e));
    }, []);

    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_v2').onSnapshot(doc => {
            if (doc.exists) setMeetingSettings(doc.data());
        });
        return () => unsub();
    }, []);

    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_match').onSnapshot(doc => {
            if (doc.exists && doc.data()?.date) setMeetingSettingsMatch(doc.data());
            else setMeetingSettingsMatch(null);
        });
        return () => unsub();
    }, []);

    useEffect(() => {
        const unsub = getCol('meetings').onSnapshot(snap =>
            setMeetings(snap.docs.map(d => ({id: d.id, ...d.data()})))
        );
        return () => unsub();
    }, []);

    useEffect(() => {
        if (!memberData?.memberId || !displayMeetingSettings?.date) return;
        setMySession(null);
        const _mid = getMeetingId(displayMeetingSettings);
        const unsub = getCol('weekly_session')
            .where('memberId', '==', memberData.memberId)
            .where('date', '==', displayMeetingSettings.date)
            .onSnapshot(snap => {
                const docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const found = docs.find(d => d.meetingId ? d.meetingId === _mid : !_mid.endsWith('__match'));
                setMySession(found || null);
            });
        return () => unsub();
    }, [memberData?.memberId, displayMeetingSettings?.date, displayMeetingSettings?.meetingType]);

    // м°ём—¬ лӘ…лӢЁ(л§Өм№ӯлӘЁмһ„) вҖ” нҷҲ м№ҙл“ң м°ём—¬мқёмӣҗ + л§Өм№ӯлӘЁмһ„ лӘ…лӢЁ нғӯ н‘ңмӢңмҡ©.
    // лӘЁмһ„ нғӯм—җм„ң л§Өм№ӯлӘЁмһ„мқ„ ліҙкі  мһҲмңјл©ҙ к·ё лӘЁмһ„ кё°мӨҖ, м•„лӢҲл©ҙ нҳ„мһ¬ л§Өм№ӯ лҜёлҹ¬ кё°мӨҖ.
    const [meetingParticipants, setMeetingParticipants] = useState([]);
    useEffect(() => {
        const ms = (viewMeeting && viewKind === 'match') ? viewMeeting : meetingSettingsMatch;
        if (!ms?.date) { setMeetingParticipants([]); return; }
        const lim = parseInt(ms?.maxLimit || 18);
        const _mid = getMeetingId(ms);
        const unsub = getCol('weekly_session')
            .where('date', '==', ms.date)
            .onSnapshot(snap => {
                const list = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .filter(p => p.status !== 'л…ёмҮј' && (p.meetingId ? p.meetingId === _mid : !_mid.endsWith('__match')))
                    .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0) || (a.name || '').localeCompare(b.name || ''));
                setMeetingParticipants(list.slice(0, lim));
            }, () => setMeetingParticipants([]));
        return () => unsub();
    }, [meetingSettingsMatch?.date, meetingSettingsMatch?.maxLimit, viewMeetingId, viewKind, viewMeeting?.maxLimit]);

    useEffect(() => {
        if (!memberData?.memberId) return;
        const unsub = getCol('members').doc(memberData.memberId).onSnapshot(doc => {
            if (doc.exists) setMemberInfo({ id: doc.id, ...doc.data() });
        });
        return () => unsub();
    }, [memberData]);

    useEffect(() => { if (memberData?.memberId) setAppView('app'); }, []);

    const urlParams = useMemo(() => getUrlParams(), []);

    const meetingDayInfo = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [my,mm,md] = meetingSettings.date.split('-').map(Number);
        const [sh,sm] = meetingSettings.start.split(':').map(Number);
        const meetingStart = new Date(my,mm-1,md,sh,sm,0);
        const today0 = new Date(nowTime.getFullYear(),nowTime.getMonth(),nowTime.getDate(),0,0,0);
        const meetDay0 = new Date(my,mm-1,md,0,0,0);
        const dDays = Math.round((meetDay0-today0)/(1000*60*60*24));
        if (dDays < 0) return { type:'past' };
        if (dDays > 0) return { type:'future', label:`D-${dDays}` };
        const minsUntil = Math.round((meetingStart-nowTime)/60000);
        if (minsUntil > 60) return { type:'today', label:`${Math.floor(minsUntil/60)}мӢңк°„ ${minsUntil%60}л¶„ нӣ„` };
        if (minsUntil > 0) return { type:'today', label:`${minsUntil}л¶„ нӣ„ мӢңмһ‘`, urgent: minsUntil <= 30 };
        return { type:'started', label:'лӘЁмһ„ мӨ‘' };
    }, [meetingSettings, nowTime]);

    // нҢҖ кіөк°ң мӢңк°Ғ/м—¬л¶Җ вҖ” ліҙкі  мһҲлҠ” лӘЁмһ„ кё°мӨҖ (нҷҲм—җм„ңлҠ” ліҙлҚҳ лӘЁмһ„мқҙ н•ҙм ңлҗҳм–ҙ нҳ„мһ¬ лӘЁмһ„ кё°мӨҖ)
    const allowFromDisplay = useMemo(() => {
        if (!effectiveMeeting?.date || !effectiveMeeting?.start) return null;

        const onStart = (e) => {
            // мҶҗк°ҖлқҪ 1к°ң + нҷ”л©ҙ мөңмғҒлӢЁм—җм„ң мӢңмһ‘н•  л•Ңл§Ң 'л¬ҙмһҘ'
            if (e.touches.length !== 1 || topOffset() > 0) { armed = false; return; }
            armed = true; startY = e.touches[0].clientY; dist = 0;
        };
        const onMove = (e) => {
            if (!armed) return;
            const dy = e.touches[0].clientY - startY;
            // мң„лЎң мҠӨнҒ¬лЎӨ(мқҢмҲҳ)мқҙкұ°лӮҳ, лӢ№кё°лҠ” лҸ„мӨ‘ мҠӨнҒ¬лЎӨмқҙ мғқкё°л©ҙ мҰүмӢң н•ҙм ң вҶ’ мқјл°ҳ мҠӨнҒ¬лЎӨлЎң м·Ёкёү

            dist = Math.min(dy * RESIST, MAX);

            if (!armed) return;

            else setPtrDist(0);
        };
        document.addEventListener('touchstart', onStart, { passive: true });
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd, { passive: true });
        document.addEventListener('touchcancel', onEnd, { passive: true });
        return () => {

                tmLoadDraft={tmLoadDraft}
                isLoadMatchModalOpen={match.isLoadMatchModalOpen} setIsLoadMatchModalOpen={match.setIsLoadMatchModalOpen}

                matchSavePreset={matchSavePreset}

                attendModal={attend.attendModal} setAttendModal={attend.setAttendModal}
                attendHandleUncheckIn={attendHandleUncheckIn} attendHandleCheckIn={attendHandleCheckIn}
                isAttendGuestModalOpen={attend.isAttendGuestModalOpen}
                setIsAttendGuestModalOpen={attend.setIsAttendGuestModalOpen}
                attendNewGuest={attend.attendNewGuest} setAttendNewGuest={attend.setAttendNewGuest}
                attendIsPending={attend.attendIsPending} attendHandleAddGuest={attendHandleAddGuest}
                attendEditingGuestId={attend.attendEditingGuestId}
                historyEditTarget={attend.historyEditTarget} setHistoryEditTarget={attend.setHistoryEditTarget}
                handleHistoryStatusUpdate={handleHistoryStatusUpdate}
                isQRGenModalOpen={attend.isQRGenModalOpen} setIsQRGenModalOpen={attend.setIsQRGenModalOpen}
                meetingSettings={meetingSettings}
                isLocationPickerOpen={attend.isLocationPickerOpen}
                setIsLocationPickerOpen={attend.setIsLocationPickerOpen}
                updateMeetingSettingsAdmin={updateMeetingSettingsAdmin}
                announcementModal={announcementModal} setAnnouncementModal={setAnnouncementModal}
