<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

function App() {
    // 앱 상태
    const [appView, setAppView] = useState('loading'); // loading | app
    const [tab, setTab] = useState('home');

    // 회원 데이터
    const [memberData, setMemberData] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (!s) { location.href = 'index.html'; return null; }
            return s;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const [memberInfo, setMemberInfo] = useState(null); // Firestore members doc

    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));

    // 관리자 여부 (role 기반)
    const isAdmin = ADMIN_ROLES.includes(memberData?.role);
    const [isAdminMode, setIsAdminMode] = useState(
        () => ADMIN_ROLES.includes(memberData?.role) && localStorage.getItem('moida_admin_mode') === 'true'
    );

    // Firebase 데이터
    const [meetingSettings, setMeetingSettings] = useState(null);
    // testMode는 관리자(attendance.html)만 제어 — 회원 앱은 읽기 전용
    const testMode = !!meetingSettings?.testMode;
    const [teamDraftData, setTeamDraftData] = useState(null);
    const [confirmedDrafts, setConfirmedDrafts] = useState([]);
    const [scheduleData, setScheduleData] = useState(null);
    const [matchViewMode, setMatchViewMode] = useState('my'); // 'my' | 'all'
    const [mySession, setMySession] = useState(null); // 오늘 내 출석 세션

    // ── 명단/회비 (관리자 전용) ──────────────────────────────────────────────────
    const [allMembers, setAllMembers] = useState([]);
    const [rosterSubTab, setRosterSubTab] = useState('directory');
    const [targetMonth, setTargetMonth] = useState(()=>{
        const n=new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
    });
    const [filterCategory, setFilterCategory] = useState('all');
    const [monthlyStatuses, setMonthlyStatuses] = useState({});
    const [monthlyReasons, setMonthlyReasons] = useState({});
    const [monthlyPaymentDates, setMonthlyPaymentDates] = useState({});
    const [isAddModalOpen, setIsAddModalOpen] = useState(false);
    const [newMemberForm, setNewMemberForm] = useState({name:'',birth:'',gender:'남성',position:'all',level:'4',role:'회원',coupleId:'',joinDate:'',address:'',phone:''});
    const [editingMember, setEditingMember] = useState(null);
    const [resigningMember, setResigningMember] = useState(null);
    const [resignForm, setResignForm] = useState({date:'',reason:'',isForced:false});
    const [billingMember, setBillingMember] = useState(null);
    const [actionStep, setActionStep] = useState('main');
    const [selectedAction, setSelectedAction] = useState(null);
    const [paymentDateInput, setPaymentDateInput] = useState('');
    const [manualEndDate, setManualEndDate] = useState('');
    const [specialRestReason, setSpecialRestReason] = useState('');
    const [tempRestCount, setTempRestCount] = useState(0);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null});
    const showAlert = (title, content, type='info', onConfirm=null) => setAlertModal({show:true, title, content, type, onConfirm});
    const showConfirm = (title, content, onConfirm) => setAlertModal({show:true, title, content, type:'confirm', onConfirm});
    // ─────────────────────────────────────────────────────────────────────────────

    // ── 팀 편성 관리자 패널 ──────────────────────────────────────────────────────
    const [isTeamPanelOpen, setIsTeamPanelOpen] = useState(false);
    const [teamMakerTab, setTeamMakerTab] = useState('generator');
    const [tmSessionData, setTmSessionData] = useState([]);
    const [tmMonthlyStatuses, setTmMonthlyStatuses] = useState({});
    const [excludedIds, setExcludedIds] = useState([]);
    const [teamingSettings, setTeamingSettings] = useState({teamCount:3,keepCouples:true,avoidOverlap:true});
    const [editTeams, setEditTeams] = useState([]);
    const [editIsConfirmed, setEditIsConfirmed] = useState(false);
    const [editMeetingDate, setEditMeetingDate] = useState('');
    const [draggedItem, setDraggedItem] = useState(null);
    const [selectedMemberTM, setSelectedMemberTM] = useState(null);
    const [selectedTeamTM, setSelectedTeamTM] = useState(null);
    const [dropIndicator, setDropIndicator] = useState(null);
    const [savedDrafts, setSavedDrafts] = useState([]);
    const [teamStorageSubTab, setTeamStorageSubTab] = useState('confirmed');
    const [previewDraft, setPreviewDraft] = useState(null);
    const [isCapturing, setIsCapturing] = useState(false);
    const isDraggingRef = useRef(false);
    // ─────────────────────────────────────────────────────────────────────────────

    // ── 매치 관리자 패널 ──────────────────────────────────────────────────────────
    const [isMatchPanelOpen, setIsMatchPanelOpen] = useState(false);
    const [matchAdminView, setMatchAdminView] = useState('setup');
    const [matchConfig, setMatchConfig] = useState({
        meetingDate:'', courtCount:3, matchDuration:12, breakDuration:3,
        startTime:'08:00', endTime:'10:00',
        fieldNames:['1구장','2구장','3구장'], fieldTypes:['6vs6','6vs6','6vs6'],
        strictCourtSize:false
    });
    const [localSchedule, setLocalSchedule] = useState({list:[],stats:{}});
    const [localCompletedMatches, setLocalCompletedMatches] = useState(new Set());
    const [localMatchIndex, setLocalMatchIndex] = useState(0);
    const [presets, setPresets] = useState([]);
    const [savedMatchSchedules, setSavedMatchSchedules] = useState([]);
    const [selectedPresetId, setSelectedPresetId] = useState('manual');
    const [presetToggles, setPresetToggles] = useState([]);
    const [isLoadMatchModalOpen, setIsLoadMatchModalOpen] = useState(false);
    const [isPresetModalOpen, setIsPresetModalOpen] = useState(false);
    const [presetForm, setPresetForm] = useState({name:'',courtCount:3,fieldNames:['1구장','2구장','3구장'],fieldTypes:['6vs6','6vs6','6vs6']});
    const [matchIsSaving, setMatchIsSaving] = useState(false);
    const [activeMatchScheduleId, setActiveMatchScheduleId] = useState(null);
    const [matchIsCapturing, setMatchIsCapturing] = useState(false);
    // ─────────────────────────────────────────────────────────────────────────────

    // ── 출석 관리 패널 (관리자 전용) ──────────────────────────────────────────────
    const [isAttendPanelOpen, setIsAttendPanelOpen] = useState(false);
    const [attendSubTab, setAttendSubTab] = useState('setup'); // 'setup'|'attend'|'history'
    const [attendHistory, setAttendHistory] = useState([]);
    const [selectedHistoryDetail, setSelectedHistoryDetail] = useState(null);
    const [historySortKey, setHistorySortKey] = useState('time');
    const [historySortOrder, setHistorySortOrder] = useState('asc');
    const [isEditingHistoryLocation, setIsEditingHistoryLocation] = useState(false);
    const [editHistoryLocationValue, setEditHistoryLocationValue] = useState('');
    const [historyEditTarget, setHistoryEditTarget] = useState(null);
    const [attendModal, setAttendModal] = useState({type:null, data:null});
    const [isAttendGuestModalOpen, setIsAttendGuestModalOpen] = useState(false);
    const [attendNewGuest, setAttendNewGuest] = useState({name:'', gender:'남성', inviterId:'', level:'1'});
    const [isQRGenModalOpen, setIsQRGenModalOpen] = useState(false);
    const [currentQRToken, setCurrentQRToken] = useState('');
    const [isLocationPickerOpen, setIsLocationPickerOpen] = useState(false);
    const [attendIsPending, setAttendIsPending] = useState(false);
    const [localMaxLimit, setLocalMaxLimit] = useState(null);
    const [testModeBackup, setTestModeBackup] = useState(null);
    const hasAutoNoShowRef = useRef(false);
    const hasAutoFixedRef = useRef(false);
    const [attendCurrentTime, setAttendCurrentTime] = useState(() => new Date());
    // ─────────────────────────────────────────────────────────────────────────────

    // GPS 상태
    const [gpsStatus, setGpsStatus] = useState('idle'); // idle | checking | within | outside | no_location | error
    const [distance, setDistance] = useState(null);
    const [isCheckingIn, setIsCheckingIn] = useState(false);

    // QR 상태
    const [qrStatus, setQrStatus] = useState('idle'); // idle | processing | success | error
    const [qrMessage, setQrMessage] = useState('');
    const [isQRScannerOpen, setIsQRScannerOpen] = useState(false);
    const [lastScannedQR, setLastScannedQR] = useState({ token:null, date:null });
    const [nowTime, setNowTime] = useState(() => new Date());
    useEffect(() => { const t = setInterval(() => setNowTime(new Date()), 30000); return () => clearInterval(t); }, []);

    const meetingDayInfo = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [my,mm,md] = meetingSettings.date.split('-').map(Number);
        const [sh,sm] = meetingSettings.start.split(':').map(Number);
        const meetingStart = new Date(my,mm-1,md,sh,sm,0);
        const today0 = new Date(nowTime.getFullYear(),nowTime.getMonth(),nowTime.getDate(),0,0,0);
        const meetDay0 = new Date(my,mm-1,md,0,0,0);
        const dDays = Math.round((meetDay0-today0)/(1000*60*60*24));
        if (dDays < 0) return { type:'past' };
        if (dDays > 0) return { type:'future', label:`D-${dDays}` };
        const minsUntil = Math.round((meetingStart-nowTime)/60000);
        if (minsUntil > 60) return { type:'today', label:`${Math.floor(minsUntil/60)}시간 ${minsUntil%60}분 후` };
        if (minsUntil > 0) return { type:'today', label:`${minsUntil}분 후 시작`, urgent: minsUntil <= 30 };
        return { type:'started', label:'모임 중' };
    }, [meetingSettings, nowTime]);

    // 팀 공개 시각 = allowFrom (모임 시작 -70분), 출석 가능 시간과 동일
    const allowFromDisplay = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [y,m,d] = meetingSettings.date.split('-').map(Number);
        const [h,min] = meetingSettings.start.split(':').map(Number);
        const af = new Date(y, m-1, d, h, min, 0);
        af.setTime(af.getTime() - 70*60*1000);
        return `${String(af.getHours()).padStart(2,'0')}:${String(af.getMinutes()).padStart(2,'0')}`;
    }, [meetingSettings]);

    const teamReady = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return false;
        if (testMode) return true;
        if (meetingDayInfo?.type === 'past') return true;
        if (meetingDayInfo?.type === 'future') return false;
        const [y,m,d] = meetingSettings.date.split('-').map(Number);
        const [h,min] = meetingSettings.start.split(':').map(Number);
        const allowFrom = new Date(y, m-1, d, h, min, 0).getTime() - 70*60*1000;
        return nowTime.getTime() >= allowFrom;
    }, [meetingSettings, meetingDayInfo, nowTime, testMode]);

    // 알림
    const [toast, setToast] = useState({ show:false, msg:'', type:'info' });
    const showToast = (msg, type='info') => {
        setToast({show:true,msg,type});
        setTimeout(()=>setToast(p=>({...p,show:false})),3000);
    };

    // URL에 QR 토큰이 있는지 확인
    const urlParams = useMemo(() => getUrlParams(), []);

    // Firebase 인증 + FCM 토큰 등록
    const VAPID_KEY = 'BMuOxkIP0Xm912P0lVDUP8KUFR2y2FD-Acxgal5lNYemqWaldDon6kr9c_KrLEqKRFuumPCenIYnwEn0z_1WuXU';
    useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(e=>console.error(e));
    }, []);

    // FCM 알림 권한 상태
    const [notifPermission, setNotifPermission] = useState(() =>
        ('Notification' in window) ? Notification.permission : 'unsupported'
    );

    const registerFcmToken = async () => {
        try {
            if (!('Notification' in window)) return;
            const permission = await Notification.requestPermission();
            setNotifPermission(permission);
            if (permission !== 'granted') return;
            const swReg = await navigator.serviceWorker.ready;
            const messaging = firebase.messaging();
            const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
            if (token && memberData?.memberId) {
                await getCol('fcm_tokens').doc(memberData.memberId).set({
                    token,
                    name: memberData.name || '',
                    updatedAt: new Date().toISOString(),
                });
                showToast('알림이 등록됐어요!', 'success');
            }
        } catch(e) { console.warn('FCM 토큰 등록 실패:', e); }
    };

    // 이미 허용된 경우 자동 토큰 갱신
    useEffect(() => {
        if (!memberData?.memberId) return;
        if (Notification.permission !== 'granted') return;
        (async () => {
            try {
                const swReg = await navigator.serviceWorker.ready;
                const messaging = firebase.messaging();
                const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
                if (token) {
                    await getCol('fcm_tokens').doc(memberData.memberId).set({
                        token, name: memberData.name || '', updatedAt: new Date().toISOString(),
                    });
                }
            } catch(e) { console.warn('FCM 토큰 갱신 실패:', e); }
        })();
    }, [memberData?.memberId]);

    // 포그라운드 푸시 메시지 처리 (앱이 열려있을 때도 알림 표시)
    useEffect(() => {
        if (!('Notification' in window) || notifPermission !== 'granted') return;
        let unsub = null;
        navigator.serviceWorker.ready.then(swReg => {
            try {
                const messaging = firebase.messaging();
                unsub = messaging.onMessage(payload => {
                    const title = payload.notification?.title || '모이다';
                    const body  = payload.notification?.body  || '';
                    swReg.showNotification(title, {
                        body,
                        icon:  '/moida/icon.png',
                        badge: '/moida/icon.png',
                        data:  { url: 'https://nakdo0415-crypto.github.io/moida/' },
                    });
                });
            } catch(e) { console.warn('FCM onMessage 설정 실패:', e); }
        });
        return () => { if (unsub) unsub(); };
    }, [notifPermission]);

    // 공지사항 로딩
    const [announcements, setAnnouncements] = useState([]);
    useEffect(() => {
        const unsub = getCol('notifications')
            .orderBy('sentAt', 'desc')
            .limit(10)
            .onSnapshot(snap => {
                const list = [];
                snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                setAnnouncements(list);
            }, () => {});
        return () => unsub();
    }, []);

    // 설정 읽기
    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_v2').onSnapshot(doc => {
            if (doc.exists) setMeetingSettings(doc.data());
        });
        return () => unsub();
    }, []);

    // 팀 편성 읽기 (orderBy 없이 — 복합 인덱스 불필요, JS에서 필터/정렬)
    useEffect(() => {
        const unsub = getCol('team_drafts')
            .where('isConfirmed', '==', true)
            .onSnapshot(snap => {
                const list = [];
                snap.forEach(d => list.push(d.data()));
                setConfirmedDrafts(list);
            }, () => {});
        return () => unsub();
    }, []);

    // 현재 모임 날짜에 맞는 확정 팀 편성 선택
    useEffect(() => {
        const date = meetingSettings?.date;
        if (!date || !confirmedDrafts.length) { setTeamDraftData(null); return; }
        const filtered = confirmedDrafts
            .filter(d => d.meetingDate === date)
            .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
        setTeamDraftData(filtered[0] || null);
    }, [confirmedDrafts, meetingSettings?.date]);

    // 매치 테이블 읽기
    useEffect(() => {
        const unsub = getCol('match_schedules')
            .orderBy('createdAt', 'desc')
            .limit(1)
            .onSnapshot(snap => {
                setScheduleData(snap.empty ? null : snap.docs[0].data());
            });
        return () => unsub();
    }, []);

    // 매치 관리자: court_presets + match_schedules 전체 읽기
    useEffect(() => {
        if (!isAdminMode) return;
        const u1 = getCol('court_presets').orderBy('createdAt').onSnapshot(snap => setPresets(snap.docs.map(d => ({id:d.id,...d.data()}))));
        const u2 = getCol('match_schedules').orderBy('createdAt','desc').onSnapshot(snap => setSavedMatchSchedules(snap.docs.map(d => ({id:d.id,...d.data()}))));
        return () => { u1(); u2(); };
    }, [isAdminMode]);

    // matchConfig: 모임날짜/확정팀 자동 반영
    useEffect(() => {
        if (!isAdminMode) return;
        setMatchConfig(p => ({...p, meetingDate: meetingSettings?.date || p.meetingDate}));
    }, [isAdminMode, meetingSettings?.date]);

    // 내 출석 세션 읽기
    useEffect(() => {
        if (!memberData?.memberId || !meetingSettings?.date) return;
        setMySession(null);
        const unsub = getCol('weekly_session')
            .where('memberId', '==', memberData.memberId)
            .where('date', '==', meetingSettings.date)
            .onSnapshot(snap => {
                setMySession(snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() });
            });
        return () => unsub();
    }, [memberData?.memberId, meetingSettings?.date]);

    // members 문서 읽기
    useEffect(() => {
        if (!memberData?.memberId) return;
        const unsub = getCol('members').doc(memberData.memberId).onSnapshot(doc => {
            if (doc.exists) setMemberInfo({ id: doc.id, ...doc.data() });
        });
        return () => unsub();
    }, [memberData]);

    // allMembers: 관리자 모드일 때만 구독
    useEffect(() => {
        if (!isAdminMode) return;
        const unsub = getMemberCol().onSnapshot(snap => {
            setAllMembers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        return () => unsub();
    }, [isAdminMode]);

    // tmSessionData: 관리자 모드 시 weekly_session 구독
    useEffect(() => {
        if (!isAdminMode) return;
        const unsub = getCol('weekly_session').onSnapshot(snap => {
            setTmSessionData(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        return () => unsub();
    }, [isAdminMode]);

    // tmMonthlyStatuses: 모임 날짜 기준 월 구독
    useEffect(() => {
        if (!isAdminMode || !meetingSettings?.date) return;
        const [y, m] = meetingSettings.date.split('-');
        const docKey = `${y}-${m}`;
        const unsub = getCol('monthly_checks').doc(docKey).onSnapshot(doc => {
            setTmMonthlyStatuses(doc.exists ? (doc.data().statuses || {}) : {});
        });
        return () => unsub();
    }, [isAdminMode, meetingSettings?.date]);

    // savedDrafts: 임시저장 목록 (isConfirmed=false)
    useEffect(() => {
        if (!isAdminMode) return;
        const unsub = getCol('team_drafts').where('isConfirmed', '==', false).onSnapshot(snap => {
            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setSavedDrafts(list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || '')));
        }, () => {});
        return () => unsub();
    }, [isAdminMode]);

    // teamingSettings: maxLimit 변경 시 팀 수 자동 조정
    useEffect(() => {
        const lim = parseInt(meetingSettings?.maxLimit || 18);
        setTeamingSettings(prev => ({ ...prev, teamCount: Math.max(2, Math.round(lim / 6)) }));
    }, [meetingSettings?.maxLimit]);

    // monthly_checks: 관리자 모드 + targetMonth 변경 시
    useEffect(() => {
        if (!isAdminMode || !targetMonth) return;
        const unsub = getMonthlyCol().doc(targetMonth).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                setMonthlyStatuses(data.statuses || {});
                setMonthlyReasons(data.reasons || {});
                setMonthlyPaymentDates(data.paymentDates || {});
            } else {
                setMonthlyStatuses({});

                        matchAdminView={matchAdminView} setMatchAdminView={setMatchAdminView}
                        localSchedule={localSchedule} localCompletedMatches={localCompletedMatches} setLocalCompletedMatches={setLocalCompletedMatches} localMatchIndex={localMatchIndex}
                        matchConfig={matchConfig} setMatchConfig={setMatchConfig} matchIsSaving={matchIsSaving} matchIsCapturing={matchIsCapturing}
                        presets={presets} selectedPresetId={selectedPresetId} setSelectedPresetId={setSelectedPresetId} presetToggles={presetToggles}
                        confirmedDrafts={confirmedDrafts} matchStatsData={matchStatsData}
                        scheduleData={scheduleData} matchViewMode={matchViewMode} setMatchViewMode={setMatchViewMode}
                        myTeamInfo={myTeamInfo}
                        matchSaveSchedule={matchSaveSchedule} matchHandleCapture={matchHandleCapture} matchGenerateTable={matchGenerateTable}
                        matchHandleNextMatch={matchHandleNextMatch} matchHandlePresetSelect={matchHandlePresetSelect} matchToggleSubCourt={matchToggleSubCourt}
                        splitTime={splitTime} setIsLoadMatchModalOpen={setIsLoadMatchModalOpen} setIsPresetModalOpen={setIsPresetModalOpen}
                    />
                )}

                {/* ===== 출석 탭 ===== */}
                {tab === 'attend' && (
                    <TabAttend
                        isAdminMode={isAdminMode}
                        isAttendPanelOpen={isAttendPanelOpen} setIsAttendPanelOpen={setIsAttendPanelOpen}
                        generateAttendQRCode={generateAttendQRCode} attendToggleTestMode={attendToggleTestMode} testMode={testMode}
                        attendSubTab={attendSubTab} setAttendSubTab={setAttendSubTab}
                        selectedHistoryDetail={selectedHistoryDetail} setSelectedHistoryDetail={setSelectedHistoryDetail}
                        attendActiveList={attendActiveList} attendIsPending={attendIsPending} attendSaveAndReset={attendSaveAndReset}
                        darkMode={darkMode} meetingSettings={meetingSettings} updateMeetingSettingsAdmin={updateMeetingSettingsAdmin}
                        attendActiveParticipants={attendActiveParticipants} snapMin={snapMin} attendHourOptions={attendHourOptions} attendMinuteOptions={attendMinuteOptions}
                        setIsLocationPickerOpen={setIsLocationPickerOpen} localMaxLimit={localMaxLimit} setLocalMaxLimit={setLocalMaxLimit}
                        memberData={memberData} attendNormalMembers={attendNormalMembers} tmSessionData={tmSessionData}
                        attendToggleParticipant={attendToggleParticipant} setIsAttendGuestModalOpen={setIsAttendGuestModalOpen}
                        attendHandleTestSelect={attendHandleTestSelect} attendHandleResetSelection={attendHandleResetSelection}
                        attendGuestEligibleMembers={attendGuestEligibleMembers} attendToggleParticipantAsGuest={attendToggleParticipantAsGuest}
                        attendCheckedInCount={attendCheckedInCount} attendWaitingList={attendWaitingList} attendGroupedTeams={attendGroupedTeams}
                        setAttendModal={setAttendModal} attendUnassignedActive={attendUnassignedActive} attendLimit={attendLimit} attendHistory={attendHistory}
                        setHistorySortKey={setHistorySortKey} setHistorySortOrder={setHistorySortOrder} historySortKey={historySortKey} historySortOrder={historySortOrder}
                        isEditingHistoryLocation={isEditingHistoryLocation} setIsEditingHistoryLocation={setIsEditingHistoryLocation}
                        editHistoryLocationValue={editHistoryLocationValue} setEditHistoryLocationValue={setEditHistoryLocationValue}
                        handleUpdateHistoryLocation={handleUpdateHistoryLocation} sortedHistoryRecords={sortedHistoryRecords} setHistoryEditTarget={setHistoryEditTarget}
                        attendHandleDeleteHistory={attendHandleDeleteHistory} mySession={mySession}
                        qrStatus={qrStatus} qrMessage={qrMessage} setQrStatus={setQrStatus} setIsQRScannerOpen={setIsQRScannerOpen}
                        gpsStatus={gpsStatus} distance={distance} handleGPSCheckIn={handleGPSCheckIn} handleGPSAttend={handleGPSAttend}
                        isCheckingIn={isCheckingIn} setGpsStatus={setGpsStatus}
                    />
                )}


                {/* ===== 명단 탭 (관리자 모드 전용) ===== */}
                {tab === 'roster' && isAdminMode && (
                    <TabRoster
                        rosterSubTab={rosterSubTab} setRosterSubTab={setRosterSubTab}
                        setIsAddModalOpen={setIsAddModalOpen}
                        activeMembers={activeMembers} allMembers={allMembers} resignedMembers={resignedMembers}
                        setEditingMember={setEditingMember}
                        setResigningMember={setResigningMember} setResignForm={setResignForm}
                        moveMonth={moveMonth} targetMonth={targetMonth}
                        filterCounts={filterCounts} filterCategory={filterCategory} setFilterCategory={setFilterCategory}
                        filteredMembers={filteredMembers}
                        monthlyStatuses={monthlyStatuses} monthlyReasons={monthlyReasons}
                        monthlyPaymentDates={monthlyPaymentDates}
                        handleBillingMemberClick={handleBillingMemberClick}
                    />
                )}
            </div>

            {/* 하단 탭바 */}
            <div className="tab-bar fixed bottom-0 left-0 right-0 z-50 pb-safe">
                <div className="flex items-center h-16 max-w-sm mx-auto px-2">
                    {[
                        {key:'home',   label:'홈',   icon:<Icon.Home size={20}/>},
                        {key:'attend', label:'출석', icon:<Icon.CheckSq size={20}/>},
                        {key:'team',   label:'팀',   icon:<Icon.Users size={20}/>},
                        {key:'match',  label:'매치', icon:<Icon.Calendar size={20}/>},
                        ...(isAdminMode ? [{key:'roster', label:'명단', icon:<Icon.List size={20}/>}] : []),
                    ].map(({key,label,icon})=>(
                        <button key={key} onClick={()=>setTab(key)}
                            className={`flex flex-col items-center justify-center flex-1 h-12 rounded-xl transition-all ${tab===key?'bg-teal-100 text-teal-500':'text-slate-400'}`}>
                            {icon}
                            <span className={`text-[9px] font-black mt-0.5 ${tab===key?'text-teal-500':'text-slate-400'}`}>{label}</span>
                        </button>
                    ))}
                </div>
            </div>

            {/* 토스트 알림 */}
            {toast.show && (
                <div className={`fixed bottom-20 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-sm font-black shadow-xl z-50 whitespace-nowrap transition-all ${toast.type==='error'?'bg-red-500 text-white':toast.type==='success'?'bg-emerald-500 text-white':'bg-slate-700 text-white'}`}>
                    {toast.msg}
                </div>
            )}
            {/* ===== 모달 모음 ===== */}
            <AppModals
                billingMember={billingMember} setBillingMember={setBillingMember}
                actionStep={actionStep} setActionStep={setActionStep}
                paymentDateInput={paymentDateInput} setPaymentDateInput={setPaymentDateInput}
                manualEndDate={manualEndDate} setManualEndDate={setManualEndDate}
                selectedAction={selectedAction} setSelectedAction={setSelectedAction}
                processAction={processAction}
                specialRestReason={specialRestReason} setSpecialRestReason={setSpecialRestReason}
                targetMonth={targetMonth}
                isAddModalOpen={isAddModalOpen} setIsAddModalOpen={setIsAddModalOpen}
                newMemberForm={newMemberForm} setNewMemberForm={setNewMemberForm}
                activeMembers={activeMembers} handleAddMember={handleAddMember}
                editingMember={editingMember} setEditingMember={setEditingMember}
                handleUpdateMember={handleUpdateMember}
                resigningMember={resigningMember} setResigningMember={setResigningMember}
                resignForm={resignForm} setResignForm={setResignForm}
                handleResignConfirm={handleResignConfirm}
                previewDraft={previewDraft} setPreviewDraft={setPreviewDraft}
                tmLoadDraft={tmLoadDraft}
                isLoadMatchModalOpen={isLoadMatchModalOpen} setIsLoadMatchModalOpen={setIsLoadMatchModalOpen}
                savedMatchSchedules={savedMatchSchedules}
                setLocalSchedule={setLocalSchedule} setMatchConfig={setMatchConfig}
                setLocalCompletedMatches={setLocalCompletedMatches} setLocalMatchIndex={setLocalMatchIndex}
                setActiveMatchScheduleId={setActiveMatchScheduleId} setMatchAdminView={setMatchAdminView}
                showConfirm={showConfirm}
                isPresetModalOpen={isPresetModalOpen} setIsPresetModalOpen={setIsPresetModalOpen}
                presetForm={presetForm} setPresetForm={setPresetForm}
                matchSavePreset={matchSavePreset}
                alertModal={alertModal} setAlertModal={setAlertModal}
                isQRScannerOpen={isQRScannerOpen} setIsQRScannerOpen={setIsQRScannerOpen}
                handleInAppQRScan={handleInAppQRScan}
                attendModal={attendModal} setAttendModal={setAttendModal}
                attendHandleUncheckIn={attendHandleUncheckIn} attendHandleCheckIn={attendHandleCheckIn}
                isAttendGuestModalOpen={isAttendGuestModalOpen} setIsAttendGuestModalOpen={setIsAttendGuestModalOpen}
                attendNewGuest={attendNewGuest} setAttendNewGuest={setAttendNewGuest}
                attendIsPending={attendIsPending} attendHandleAddGuest={attendHandleAddGuest}
                historyEditTarget={historyEditTarget} setHistoryEditTarget={setHistoryEditTarget}
                handleHistoryStatusUpdate={handleHistoryStatusUpdate}
                isQRGenModalOpen={isQRGenModalOpen} setIsQRGenModalOpen={setIsQRGenModalOpen}
                meetingSettings={meetingSettings}
                isLocationPickerOpen={isLocationPickerOpen} setIsLocationPickerOpen={setIsLocationPickerOpen}
                updateMeetingSettingsAdmin={updateMeetingSettingsAdmin}
            />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
