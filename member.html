<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f0fdfa">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>모이다 - 회원</title>
    <script>(function(){if(localStorage.getItem('moida_theme')==='dark')document.documentElement.classList.add('dark');})();</script>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="member.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="utils.js"></script>
    <script src="member-helpers.js"></script>
    <script src="member-icons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="text/babel" src="location-picker.js"></script>
    <script type="text/babel" src="qr-scanner.js"></script>
    <script type="text/babel" src="tab-home.js"></script>
    <script type="text/babel" src="tab-team.js"></script>
    <script type="text/babel" src="tab-match.js"></script>
    <script type="text/babel" src="tab-attend.js"></script>
    <script type="text/babel" src="tab-roster.js"></script>
    <script type="text/babel" src="modals.js"></script>
    <script type="text/babel" src="member-header.js"></script>
    <script type="text/babel" src="use-roster.js"></script>
    <script type="text/babel" src="use-team.js"></script>
    <script type="text/babel" src="use-match.js"></script>
    <script type="text/babel" src="use-attend.js"></script>
    <script type="text/babel" src="use-fcm.js"></script>
    <script src="handlers-roster.js"></script>
    <script src="handlers-attend.js"></script>
    <script src="handlers-team.js"></script>
    <script src="handlers-match.js"></script>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

function App() {
    const [appView, setAppView] = useState('loading');
    const [tab, setTab] = useState('home');
    const [memberData, setMemberData] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (!s) { location.href = 'index.html'; return null; }
            return s;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const [memberInfo, setMemberInfo] = useState(null);
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const isAdmin = ADMIN_ROLES.includes(memberData?.role);
    const [isAdminMode, setIsAdminMode] = useState(
        () => ADMIN_ROLES.includes(memberData?.role) && localStorage.getItem('moida_admin_mode') === 'true'
    );
    const [meetingSettings, setMeetingSettings] = useState(null);
    const testMode = !!meetingSettings?.testMode;
    const [mySession, setMySession] = useState(null);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null});
    const showAlert = (title, content, type='info', onConfirm=null) => setAlertModal({show:true, title, content, type, onConfirm});
    const showConfirm = (title, content, onConfirm) => setAlertModal({show:true, title, content, type:'confirm', onConfirm});
    const [toast, setToast] = useState({ show:false, msg:'', type:'info' });
    const showToast = (msg, type='info') => { setToast({show:true,msg,type}); setTimeout(()=>setToast(p=>({...p,show:false})),3000); };
    const [gpsStatus, setGpsStatus] = useState('idle');
    const [distance, setDistance] = useState(null);
    const [isCheckingIn, setIsCheckingIn] = useState(false);
    const [qrStatus, setQrStatus] = useState('idle');
    const [qrMessage, setQrMessage] = useState('');
    const [isQRScannerOpen, setIsQRScannerOpen] = useState(false);
    const [lastScannedQR, setLastScannedQR] = useState({ token:null, date:null });
    const [nowTime, setNowTime] = useState(() => new Date());
    useEffect(() => { const t = setInterval(() => setNowTime(new Date()), 30000); return () => clearInterval(t); }, []);

    // 기능별 훅
    const { notifPermission, registerFcmToken, announcements } = useFCM({ memberData, showToast });
    const roster = useRoster({ isAdminMode });
    const team = useTeam({ isAdminMode, meetingSettings, allMembers: roster.allMembers });
    const match = useMatch({ isAdminMode, meetingSettings, confirmedDrafts: team.confirmedDrafts });
    const { scheduleData, matchViewMode, setMatchViewMode } = match;
    const attend = useAttend({
        isAdminMode, meetingSettings,
        tmSessionData: team.tmSessionData,
        activeMembers: roster.activeMembers,
        tmMonthlyStatuses: team.tmMonthlyStatuses,
        teamDraftData: team.teamDraftData,
    });

    useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(e=>console.error(e));
    }, []);

    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_v2').onSnapshot(doc => {
            if (doc.exists) setMeetingSettings(doc.data());
        });
        return () => unsub();
    }, []);

    useEffect(() => {
        if (!memberData?.memberId || !meetingSettings?.date) return;
        setMySession(null);
        const unsub = getCol('weekly_session')
            .where('memberId', '==', memberData.memberId)
            .where('date', '==', meetingSettings.date)
            .onSnapshot(snap => {
                setMySession(snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() });
            });
        return () => unsub();
    }, [memberData?.memberId, meetingSettings?.date]);

    useEffect(() => {
        if (!memberData?.memberId) return;
        const unsub = getCol('members').doc(memberData.memberId).onSnapshot(doc => {
            if (doc.exists) setMemberInfo({ id: doc.id, ...doc.data() });
        });
        return () => unsub();
    }, [memberData]);

    useEffect(() => { if (memberData?.memberId) setAppView('app'); }, []);

    const urlParams = useMemo(() => getUrlParams(), []);

    const meetingDayInfo = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [my,mm,md] = meetingSettings.date.split('-').map(Number);
        const [sh,sm] = meetingSettings.start.split(':').map(Number);
        const meetingStart = new Date(my,mm-1,md,sh,sm,0);
        const today0 = new Date(nowTime.getFullYear(),nowTime.getMonth(),nowTime.getDate(),0,0,0);
        const meetDay0 = new Date(my,mm-1,md,0,0,0);
        const dDays = Math.round((meetDay0-today0)/(1000*60*60*24));
        if (dDays < 0) return { type:'past' };
        if (dDays > 0) return { type:'future', label:`D-${dDays}` };
        const minsUntil = Math.round((meetingStart-nowTime)/60000);
        if (minsUntil > 60) return { type:'today', label:`${Math.floor(minsUntil/60)}시간 ${minsUntil%60}분 후` };
        if (minsUntil > 0) return { type:'today', label:`${minsUntil}분 후 시작`, urgent: minsUntil <= 30 };
        return { type:'started', label:'모임 중' };
    }, [meetingSettings, nowTime]);

    const allowFromDisplay = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [y,m,d] = meetingSettings.date.split('-').map(Number);
        const [h,min] = meetingSettings.start.split(':').map(Number);
        const af = new Date(y, m-1, d, h, min, 0);
        af.setTime(af.getTime() - 70*60*1000);
        return `${String(af.getHours()).padStart(2,'0')}:${String(af.getMinutes()).padStart(2,'0')}`;
    }, [meetingSettings]);

    const teamReady = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return false;
        if (testMode) return true;
        if (meetingDayInfo?.type === 'past') return true;
        if (meetingDayInfo?.type === 'future') return false;
        const [y,m,d] = meetingSettings.date.split('-').map(Number);
        const [h,min] = meetingSettings.start.split(':').map(Number);
        const allowFrom = new Date(y, m-1, d, h, min, 0).getTime() - 70*60*1000;
        return nowTime.getTime() >= allowFrom;
    }, [meetingSettings, meetingDayInfo, nowTime, testMode]);

    const myTeamInfo = useMemo(() => {
        if (!team.teamDraftData?.teams || !memberData?.memberId) return null;
        for (let i = 0; i < team.teamDraftData.teams.length; i++) {
            const t = team.teamDraftData.teams[i];
            const foundIdx = t.members.findIndex(m => m.memberId === memberData.memberId || m.id === memberData.memberId);
            if (foundIdx !== -1) return { teamIdx: i, teamName: getTeamName(i), members: t.members, jerseyNumber: foundIdx + 1 };
        }
        return null;
    }, [team.teamDraftData, memberData]);

    const { processQRToken, handleQRAttendance, handleInAppQRScan, handleGPSCheckIn, handleGPSAttend } = makeQRGPSHandlers({
        memberData, testMode, meetingSettings, mySession, urlParams,
        setQrMessage, setQrStatus, setTab, setIsQRScannerOpen,
        setGpsStatus, setDistance, setIsCheckingIn, showToast
    });

    useEffect(() => {
        if (urlParams.token && appView === 'app') handleQRAttendance();
    }, [urlParams.token, appView]);

    const handleLogout = () => { localStorage.removeItem('moida_member_data'); localStorage.removeItem('moida_admin_mode'); location.href = 'index.html'; };
    const toggleTheme = () => { const isDark = !darkMode; setDarkMode(isDark); document.documentElement.classList.toggle('dark', isDark); localStorage.setItem('moida_theme', isDark ? 'dark' : 'light'); };
    const toggleAdminMode = () => { const next = !isAdminMode; setIsAdminMode(next); localStorage.setItem('moida_admin_mode', next ? 'true' : 'false'); if (!next && tab === 'roster') setTab('home'); };

    const { updateMeetingSettingsAdmin, attendHandleCheckIn, attendHandleUncheckIn,
            attendToggleParticipant, attendToggleParticipantAsGuest, attendHandleResetSelection,
            attendHandleAddGuest, attendHandleTestSelect, attendSaveAndReset,
            attendHandleDeleteHistory, handleHistoryStatusUpdate, handleUpdateHistoryLocation,
            generateAttendQRCode, attendToggleTestMode } = makeAttendHandlers({
        meetingSettings, testMode, showAlert, showConfirm, setAttendModal: attend.setAttendModal,
        tmSessionData: team.tmSessionData, activeMembers: roster.activeMembers,
        selectedHistoryDetail: attend.selectedHistoryDetail, setSelectedHistoryDetail: attend.setSelectedHistoryDetail,
        setMeetingSettings, historyEditTarget: attend.historyEditTarget, setHistoryEditTarget: attend.setHistoryEditTarget,
        editHistoryLocationValue: attend.editHistoryLocationValue,
        setIsEditingHistoryLocation: attend.setIsEditingHistoryLocation,
        attendIsPending: attend.attendIsPending, setAttendIsPending: attend.setAttendIsPending,
        setIsAttendGuestModalOpen: attend.setIsAttendGuestModalOpen,
        setAttendNewGuest: attend.setAttendNewGuest, attendNewGuest: attend.attendNewGuest,
        setCurrentQRToken: attend.setCurrentQRToken, setIsQRGenModalOpen: attend.setIsQRGenModalOpen,
        testModeBackup: attend.testModeBackup, setTestModeBackup: attend.setTestModeBackup
    });

    const { moveMonth, handleAddMember, handleUpdateMember, handleResignConfirm,
            handleBillingMemberClick, processAction } = makeRosterHandlers({
        newMemberForm: roster.newMemberForm, setNewMemberForm: roster.setNewMemberForm,
        setIsAddModalOpen: roster.setIsAddModalOpen,
        editingMember: roster.editingMember, setEditingMember: roster.setEditingMember,
        resigningMember: roster.resigningMember, setResigningMember: roster.setResigningMember,
        resignForm: roster.resignForm,
        billingMember: roster.billingMember, setBillingMember: roster.setBillingMember,
        targetMonth: roster.targetMonth,
        monthlyReasons: roster.monthlyReasons, paymentDateInput: roster.paymentDateInput,
        specialRestReason: roster.specialRestReason, manualEndDate: roster.manualEndDate,
        tempRestCount: roster.tempRestCount,
        setActionStep: roster.setActionStep, setSelectedAction: roster.setSelectedAction,
        setPaymentDateInput: roster.setPaymentDateInput,
        setSpecialRestReason: roster.setSpecialRestReason, setTempRestCount: roster.setTempRestCount,
        setManualEndDate: roster.setManualEndDate,
        setTargetMonth: roster.setTargetMonth, setFilterCategory: roster.setFilterCategory,
        showAlert, showConfirm
    });

    const { tmSaveDraft, tmLoadDraft, tmConfirm, tmReset, generateTeams, tmReGenerate,
            tmDragStart, tmDragEnd, tmMemberDragOver, tmTeamDragOver, tmTeamDragLeave,
            tmDrop, tmMemberClick, tmMoveToTeam, tmTeamBadgeClick, tmCapture } = makeTeamHandlers({
        meetingSettings, editTeams: team.editTeams, setEditTeams: team.setEditTeams,
        editIsConfirmed: team.editIsConfirmed, setEditIsConfirmed: team.setEditIsConfirmed,
        editMeetingDate: team.editMeetingDate, setEditMeetingDate: team.setEditMeetingDate,
        setTeamMakerTab: team.setTeamMakerTab, teamingSettings: team.teamingSettings,
        tmActiveList: team.tmActiveList, allMembers: roster.allMembers,
        tmMeetingDate: team.tmMeetingDate, confirmedDrafts: team.confirmedDrafts,
        pastTeammatesMap: team.pastTeammatesMap, excludedIds: team.excludedIds,
        draggedItem: team.draggedItem, setDraggedItem: team.setDraggedItem,
        dropIndicator: team.dropIndicator, setDropIndicator: team.setDropIndicator,
        selectedMemberTM: team.selectedMemberTM, setSelectedMemberTM: team.setSelectedMemberTM,
        selectedTeamTM: team.selectedTeamTM, setSelectedTeamTM: team.setSelectedTeamTM,
        isDraggingRef: team.isDraggingRef, setPreviewDraft: team.setPreviewDraft,
        setIsCapturing: team.setIsCapturing, showAlert, showConfirm
    });

    const { splitTime, matchGenerateTable, matchSaveSchedule, matchHandleNextMatch,
            matchHandleCapture, matchHandlePresetSelect, matchToggleSubCourt,
            matchSavePreset } = makeMatchHandlers({
        confirmedDrafts: team.confirmedDrafts, matchConfig: match.matchConfig,
        setMatchConfig: match.setMatchConfig, localSchedule: match.localSchedule,
        setLocalSchedule: match.setLocalSchedule, localCompletedMatches: match.localCompletedMatches,
        setLocalCompletedMatches: match.setLocalCompletedMatches,
        localMatchIndex: match.localMatchIndex, setLocalMatchIndex: match.setLocalMatchIndex,
        activeMatchScheduleId: match.activeMatchScheduleId,
        setActiveMatchScheduleId: match.setActiveMatchScheduleId,
        setMatchIsSaving: match.setMatchIsSaving, setMatchIsCapturing: match.setMatchIsCapturing,
        presets: match.presets, presetToggles: match.presetToggles,
        setPresetToggles: match.setPresetToggles, selectedPresetId: match.selectedPresetId,
        setSelectedPresetId: match.setSelectedPresetId, presetForm: match.presetForm,
        setPresetForm: match.setPresetForm, setIsPresetModalOpen: match.setIsPresetModalOpen,
        setMatchAdminView: match.setMatchAdminView, showAlert
    });

    if (appView === 'loading') return (
        <div className="min-h-screen flex flex-col items-center justify-center">
            <div className="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p className="text-slate-400 text-sm font-medium">모이다 연결 중...</p>
        </div>
    );

    const memberName = memberInfo?.name || memberData?.name || '회원';
    const myTeamIdx = myTeamInfo?.teamIdx ?? -1;

    return (
        <div className="min-h-screen pb-24 text-slate-800">
            {testMode && (
                <div style={{background:'#fbbf24',position:'sticky',top:0,zIndex:50}} className="text-amber-900 text-xs font-black text-center py-2 px-4">
                    🧪 테스트 모드 — GPS·QR 시간·거리 제한이 해제된 상태입니다.
                </div>
            )}
            <MemberHeader
                testMode={testMode} memberName={memberName} meetingSettings={meetingSettings}
                mySession={mySession} teamReady={teamReady} allowFromDisplay={allowFromDisplay}
                myTeamInfo={myTeamInfo} myTeamIdx={myTeamIdx} isAdmin={isAdmin}
                isAdminMode={isAdminMode} toggleAdminMode={toggleAdminMode}
                handleLogout={handleLogout} toggleTheme={toggleTheme} darkMode={darkMode}
            />
            <div className="px-4 pt-4">
                {tab === 'home' && (
                    <TabHome
                        notifPermission={notifPermission} registerFcmToken={registerFcmToken}
                        onTabChange={setTab} meetingDayInfo={meetingDayInfo} teamReady={teamReady}
                        allowFromDisplay={allowFromDisplay} myTeamInfo={myTeamInfo} myTeamIdx={myTeamIdx}
                        memberData={memberData} mySession={mySession} meetingSettings={meetingSettings}
                        darkMode={darkMode} memberName={memberName} announcements={announcements}
                    />
                )}
                {tab === 'team' && (
                    <TabTeam
                        isAdminMode={isAdminMode} isTeamPanelOpen={team.isTeamPanelOpen} setIsTeamPanelOpen={team.setIsTeamPanelOpen}
                        teamMakerTab={team.teamMakerTab} setTeamMakerTab={team.setTeamMakerTab}
                        teamingSettings={team.teamingSettings} setTeamingSettings={team.setTeamingSettings}
                        excludedIds={team.excludedIds} setExcludedIds={team.setExcludedIds}
                        editTeams={team.editTeams} editMeetingDate={team.editMeetingDate} editIsConfirmed={team.editIsConfirmed}
                        selectedMemberTM={team.selectedMemberTM} setSelectedMemberTM={team.setSelectedMemberTM}
                        selectedTeamTM={team.selectedTeamTM} setSelectedTeamTM={team.setSelectedTeamTM}
                        draggedItem={team.draggedItem} dropIndicator={team.dropIndicator} setDropIndicator={team.setDropIndicator}
                        savedDrafts={team.savedDrafts} confirmedDrafts={team.confirmedDrafts}
                        teamStorageSubTab={team.teamStorageSubTab} setTeamStorageSubTab={team.setTeamStorageSubTab}
                        previewDraft={team.previewDraft} setPreviewDraft={team.setPreviewDraft}
                        isCapturing={team.isCapturing} teamDraftData={team.teamDraftData}
                        teamReady={teamReady} allowFromDisplay={allowFromDisplay}
                        myTeamIdx={myTeamIdx} memberData={memberData} allMembers={roster.allMembers}
                        tmMeetingDate={team.tmMeetingDate} tmActiveList={team.tmActiveList}
                        tmEntryList={team.tmEntryList} tmLevelStats={team.tmLevelStats} tmUnassigned={team.tmUnassigned}
                        generateTeams={generateTeams} tmCapture={tmCapture} tmSaveDraft={tmSaveDraft}
                        tmConfirm={tmConfirm} tmReset={tmReset} tmReGenerate={tmReGenerate}
                        tmDragStart={tmDragStart} tmDragEnd={tmDragEnd} tmMemberDragOver={tmMemberDragOver}
                        tmTeamDragOver={tmTeamDragOver} tmTeamDragLeave={tmTeamDragLeave}
                        tmDrop={tmDrop} tmMemberClick={tmMemberClick} tmMoveToTeam={tmMoveToTeam}
                        tmTeamBadgeClick={tmTeamBadgeClick} showConfirm={showConfirm}
                    />
                )}
                {tab === 'match' && (
                    <TabMatch
                        isAdminMode={isAdminMode} isMatchPanelOpen={match.isMatchPanelOpen} setIsMatchPanelOpen={match.setIsMatchPanelOpen}
                        matchAdminView={match.matchAdminView} setMatchAdminView={match.setMatchAdminView}
                        localSchedule={match.localSchedule} localCompletedMatches={match.localCompletedMatches}
                        setLocalCompletedMatches={match.setLocalCompletedMatches} localMatchIndex={match.localMatchIndex}
                        matchConfig={match.matchConfig} setMatchConfig={match.setMatchConfig}
                        matchIsSaving={match.matchIsSaving} matchIsCapturing={match.matchIsCapturing}
                        presets={match.presets} selectedPresetId={match.selectedPresetId}
                        setSelectedPresetId={match.setSelectedPresetId} presetToggles={match.presetToggles}
                        confirmedDrafts={team.confirmedDrafts} matchStatsData={match.matchStatsData}
                        scheduleData={scheduleData} matchViewMode={matchViewMode} setMatchViewMode={setMatchViewMode}
                        myTeamInfo={myTeamInfo}
                        matchSaveSchedule={matchSaveSchedule} matchHandleCapture={matchHandleCapture}
                        matchGenerateTable={matchGenerateTable} matchHandleNextMatch={matchHandleNextMatch}
                        matchHandlePresetSelect={matchHandlePresetSelect} matchToggleSubCourt={matchToggleSubCourt}
                        splitTime={splitTime} setIsLoadMatchModalOpen={match.setIsLoadMatchModalOpen}
                        setIsPresetModalOpen={match.setIsPresetModalOpen}
                    />
                )}
                {tab === 'attend' && (
                    <TabAttend
                        isAdminMode={isAdminMode} isAttendPanelOpen={attend.isAttendPanelOpen}
                        setIsAttendPanelOpen={attend.setIsAttendPanelOpen}
                        generateAttendQRCode={generateAttendQRCode} attendToggleTestMode={attendToggleTestMode}
                        testMode={testMode} attendSubTab={attend.attendSubTab} setAttendSubTab={attend.setAttendSubTab}
                        selectedHistoryDetail={attend.selectedHistoryDetail}
                        setSelectedHistoryDetail={attend.setSelectedHistoryDetail}
                        attendActiveList={attend.attendActiveList} attendIsPending={attend.attendIsPending}
                        attendSaveAndReset={attendSaveAndReset} darkMode={darkMode}
                        meetingSettings={meetingSettings} updateMeetingSettingsAdmin={updateMeetingSettingsAdmin}
                        attendActiveParticipants={attend.attendActiveParticipants}
                        snapMin={attend.snapMin} attendHourOptions={attend.attendHourOptions}
                        attendMinuteOptions={attend.attendMinuteOptions}
                        setIsLocationPickerOpen={attend.setIsLocationPickerOpen}
                        localMaxLimit={attend.localMaxLimit} setLocalMaxLimit={attend.setLocalMaxLimit}
                        memberData={memberData} attendNormalMembers={attend.attendNormalMembers}
                        tmSessionData={team.tmSessionData}
                        attendToggleParticipant={attendToggleParticipant}
                        setIsAttendGuestModalOpen={attend.setIsAttendGuestModalOpen}
                        attendHandleTestSelect={attendHandleTestSelect}
                        attendHandleResetSelection={attendHandleResetSelection}
                        attendGuestEligibleMembers={attend.attendGuestEligibleMembers}
                        attendToggleParticipantAsGuest={attendToggleParticipantAsGuest}
                        attendCheckedInCount={attend.attendCheckedInCount}
                        attendWaitingList={attend.attendWaitingList}
                        attendGroupedTeams={attend.attendGroupedTeams}
                        setAttendModal={attend.setAttendModal}
                        attendUnassignedActive={attend.attendUnassignedActive}
                        attendLimit={attend.attendLimit} attendHistory={attend.attendHistory}
                        setHistorySortKey={attend.setHistorySortKey}
                        setHistorySortOrder={attend.setHistorySortOrder}
                        historySortKey={attend.historySortKey} historySortOrder={attend.historySortOrder}
                        isEditingHistoryLocation={attend.isEditingHistoryLocation}
                        setIsEditingHistoryLocation={attend.setIsEditingHistoryLocation}
                        editHistoryLocationValue={attend.editHistoryLocationValue}
                        setEditHistoryLocationValue={attend.setEditHistoryLocationValue}
                        handleUpdateHistoryLocation={handleUpdateHistoryLocation}
                        sortedHistoryRecords={attend.sortedHistoryRecords}
                        setHistoryEditTarget={attend.setHistoryEditTarget}
                        attendHandleDeleteHistory={attendHandleDeleteHistory} mySession={mySession}
                        qrStatus={qrStatus} qrMessage={qrMessage} setQrStatus={setQrStatus}
                        setIsQRScannerOpen={setIsQRScannerOpen} gpsStatus={gpsStatus} distance={distance}
                        handleGPSCheckIn={handleGPSCheckIn} handleGPSAttend={handleGPSAttend}
                        isCheckingIn={isCheckingIn} setGpsStatus={setGpsStatus}
                    />
                )}
                {tab === 'roster' && isAdminMode && (
                    <TabRoster
                        rosterSubTab={roster.rosterSubTab} setRosterSubTab={roster.setRosterSubTab}
                        setIsAddModalOpen={roster.setIsAddModalOpen}
                        activeMembers={roster.activeMembers} allMembers={roster.allMembers}
                        resignedMembers={roster.resignedMembers}
                        setEditingMember={roster.setEditingMember}
                        setResigningMember={roster.setResigningMember} setResignForm={roster.setResignForm}
                        moveMonth={moveMonth} targetMonth={roster.targetMonth}
                        filterCounts={roster.filterCounts} filterCategory={roster.filterCategory}
                        setFilterCategory={roster.setFilterCategory}
                        filteredMembers={roster.filteredMembers}
                        monthlyStatuses={roster.monthlyStatuses} monthlyReasons={roster.monthlyReasons}
                        monthlyPaymentDates={roster.monthlyPaymentDates}
                        handleBillingMemberClick={handleBillingMemberClick}
                    />
                )}
            </div>

            <div className="tab-bar fixed bottom-0 left-0 right-0 z-50 pb-safe">
                <div className="flex items-center h-16 max-w-sm mx-auto px-2">
                    {[
                        {key:'home',   label:'홈',   icon:<Icon.Home size={20}/>},
                        {key:'attend', label:'출석', icon:<Icon.CheckSq size={20}/>},
                        {key:'team',   label:'팀',   icon:<Icon.Users size={20}/>},
                        {key:'match',  label:'매치', icon:<Icon.Calendar size={20}/>},
                        ...(isAdminMode ? [{key:'roster', label:'명단', icon:<Icon.List size={20}/>}] : []),
                    ].map(({key,label,icon})=>(
                        <button key={key} onClick={()=>setTab(key)}
                            className={`flex flex-col items-center justify-center flex-1 h-12 rounded-xl transition-all ${tab===key?'bg-teal-100 text-teal-500':'text-slate-400'}`}>
                            {icon}
                            <span className={`text-[9px] font-black mt-0.5 ${tab===key?'text-teal-500':'text-slate-400'}`}>{label}</span>
                        </button>
                    ))}
                </div>
            </div>

            {toast.show && (
                <div className={`fixed bottom-20 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-sm font-black shadow-xl z-50 whitespace-nowrap transition-all ${toast.type==='error'?'bg-red-500 text-white':toast.type==='success'?'bg-emerald-500 text-white':'bg-slate-700 text-white'}`}>
                    {toast.msg}
                </div>
            )}
            <AppModals
                billingMember={roster.billingMember} setBillingMember={roster.setBillingMember}
                actionStep={roster.actionStep} setActionStep={roster.setActionStep}
                paymentDateInput={roster.paymentDateInput} setPaymentDateInput={roster.setPaymentDateInput}
                manualEndDate={roster.manualEndDate} setManualEndDate={roster.setManualEndDate}
                selectedAction={roster.selectedAction} setSelectedAction={roster.setSelectedAction}
                processAction={processAction}
                specialRestReason={roster.specialRestReason} setSpecialRestReason={roster.setSpecialRestReason}
                targetMonth={roster.targetMonth}
                isAddModalOpen={roster.isAddModalOpen} setIsAddModalOpen={roster.setIsAddModalOpen}
                newMemberForm={roster.newMemberForm} setNewMemberForm={roster.setNewMemberForm}
                activeMembers={roster.activeMembers} handleAddMember={handleAddMember}
                editingMember={roster.editingMember} setEditingMember={roster.setEditingMember}
                handleUpdateMember={handleUpdateMember}
                resigningMember={roster.resigningMember} setResigningMember={roster.setResigningMember}
                resignForm={roster.resignForm} setResignForm={roster.setResignForm}
                handleResignConfirm={handleResignConfirm}
                previewDraft={team.previewDraft} setPreviewDraft={team.setPreviewDraft}
                tmLoadDraft={tmLoadDraft}
                isLoadMatchModalOpen={match.isLoadMatchModalOpen} setIsLoadMatchModalOpen={match.setIsLoadMatchModalOpen}
                savedMatchSchedules={match.savedMatchSchedules}
                setLocalSchedule={match.setLocalSchedule} setMatchConfig={match.setMatchConfig}
                setLocalCompletedMatches={match.setLocalCompletedMatches}
                setLocalMatchIndex={match.setLocalMatchIndex}
                setActiveMatchScheduleId={match.setActiveMatchScheduleId}
                setMatchAdminView={match.setMatchAdminView} showConfirm={showConfirm}
                isPresetModalOpen={match.isPresetModalOpen} setIsPresetModalOpen={match.setIsPresetModalOpen}
                presetForm={match.presetForm} setPresetForm={match.setPresetForm}
                matchSavePreset={matchSavePreset}
                alertModal={alertModal} setAlertModal={setAlertModal}
                isQRScannerOpen={isQRScannerOpen} setIsQRScannerOpen={setIsQRScannerOpen}
                handleInAppQRScan={handleInAppQRScan}
                attendModal={attend.attendModal} setAttendModal={attend.setAttendModal}
                attendHandleUncheckIn={attendHandleUncheckIn} attendHandleCheckIn={attendHandleCheckIn}
                isAttendGuestModalOpen={attend.isAttendGuestModalOpen}
                setIsAttendGuestModalOpen={attend.setIsAttendGuestModalOpen}
                attendNewGuest={attend.attendNewGuest} setAttendNewGuest={attend.setAttendNewGuest}
                attendIsPending={attend.attendIsPending} attendHandleAddGuest={attendHandleAddGuest}
                historyEditTarget={attend.historyEditTarget} setHistoryEditTarget={attend.setHistoryEditTarget}
                handleHistoryStatusUpdate={handleHistoryStatusUpdate}
                isQRGenModalOpen={attend.isQRGenModalOpen} setIsQRGenModalOpen={attend.setIsQRGenModalOpen}
                meetingSettings={meetingSettings}
                isLocationPickerOpen={attend.isLocationPickerOpen}
                setIsLocationPickerOpen={attend.setIsLocationPickerOpen}
                updateMeetingSettingsAdmin={updateMeetingSettingsAdmin}
            />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
