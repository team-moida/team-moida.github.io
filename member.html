// кұ°лҰ¬ кі„мӮ° (Haversine)
const calcDistance = (lat1, lng1, lat2, lng2) => {
    const R = 6371000;
    const ПҶ1 = lat1 * Math.PI / 180, ПҶ2 = lat2 * Math.PI / 180;
    const О”ПҶ = (lat2-lat1) * Math.PI / 180, О”О» = (lng2-lng1) * Math.PI / 180;
    const a = Math.sin(О”ПҶ/2)**2 + Math.cos(ПҶ1)*Math.cos(ПҶ2)*Math.sin(О”О»/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
};

// URL нҢҢлқјлҜён„° нҢҢмӢұ
const getUrlParams = () => {
    const params = new URLSearchParams(window.location.search);
    return { token: params.get('token'), date: params.get('date') };
};

const getTeamColorName = (idx) => ['н•‘нҒ¬','н•ҳлҠҳ','м—°л‘җ','л…ёлһ‘','нҢҢлһ‘','л№Ёк°•'][idx] || '';

// в”Җв”Җв”Җ мқём•ұ QR мҠӨмәҗл„Ҳ лӘЁлӢ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const QRScannerModal = ({ isOpen, onScan, onClose }) => {
    const videoRef = useRef(null);
    const canvasRef = useRef(null);
    const streamRef = useRef(null);
    const rafRef = useRef(null);
    const [camError, setCamError] = useState('');

    useEffect(() => {
        if (!isOpen) return;
        setCamError('');
        let active = true;

        navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
        }).then(stream => {
            if (!active) { stream.getTracks().forEach(t => t.stop()); return; }
            streamRef.current = stream;
            const video = videoRef.current;
            if (!video) return;
            video.srcObject = stream;
            video.play().then(() => {
                const scan = () => {
                    if (!active || !videoRef.current || !canvasRef.current) return;
                    const v = videoRef.current;
                    if (v.readyState === v.HAVE_ENOUGH_DATA) {
                        const c = canvasRef.current;
                        c.width = v.videoWidth; c.height = v.videoHeight;
                        const ctx = c.getContext('2d');
                        ctx.drawImage(v, 0, 0);
                        const img = ctx.getImageData(0, 0, c.width, c.height);
                        try {
                            const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
                            if (code?.data) { onScan(code.data); return; }
                        } catch(_) {}
                    }
                    rafRef.current = requestAnimationFrame(scan);
                };
                rafRef.current = requestAnimationFrame(scan);
            }).catch(() => setCamError('м№ҙл©”лқјлҘј мӢңмһ‘н•  мҲҳ м—ҶмҠөлӢҲлӢӨ.'));
        }).catch(err => {
            if (!active) return;
            setCamError(err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError'
                ? 'м№ҙл©”лқј к¶Ңн•ңмқ„ н—Ҳмҡ©н•ҙмЈјм„ёмҡ”.\nм„Өм • вҖә лёҢлқјмҡ°м Җ вҖә м№ҙл©”лқј'
                : 'м№ҙл©”лқјлҘј мӮ¬мҡ©н•  мҲҳ м—ҶмҠөлӢҲлӢӨ.');
        });

        return () => {
            active = false;
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
            if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
        };
    }, [isOpen]);

    if (!isOpen) return null;

    return (
        <div style={{ position:'fixed', inset:0, zIndex:9999, background:'#000', display:'flex', flexDirection:'column' }}>
            {camError ? (
                <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center' }}>
                    <p style={{ fontSize:52, marginBottom:16 }}>рҹ“·</p>
                    <p style={{ color:'#f87171', fontWeight:900, fontSize:15, marginBottom:8, whiteSpace:'pre-line' }}>{camError}</p>
                    <button onClick={onClose} style={{ marginTop:24, padding:'12px 32px', background:'#334155', color:'white', border:'none', borderRadius:20, fontWeight:900, fontSize:14 }}>лӢ«кё°</button>
                </div>
            ) : (
                <>
                    <video ref={videoRef} autoPlay playsInline muted
                        style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover' }} />
                    <canvas ref={canvasRef} style={{ display:'none' }} />

                    {/* л°ҳнҲ¬лӘ… мҳӨлІ„л Ҳмқҙ */}
                    <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                        {/* мҠӨмә” к°Җмқҙл“ң л°•мҠӨ */}
                        <div style={{ position:'relative', width:240, height:240 }}>
                            {/* л„Ө лӘЁм„ңлҰ¬ */}
                            {[{top:0,left:0,borderTop:'3px solid #ec4899',borderLeft:'3px solid #ec4899',borderRadius:'6px 0 0 0'},
                              {top:0,right:0,borderTop:'3px solid #ec4899',borderRight:'3px solid #ec4899',borderRadius:'0 6px 0 0'},
                              {bottom:0,left:0,borderBottom:'3px solid #ec4899',borderLeft:'3px solid #ec4899',borderRadius:'0 0 0 6px'},
                              {bottom:0,right:0,borderBottom:'3px solid #ec4899',borderRight:'3px solid #ec4899',borderRadius:'0 0 6px 0'}
                            ].map((s,i) => <div key={i} style={{ position:'absolute', width:30, height:30, ...s }} />)}
                            {/* мҠӨмә” лқјмқё */}
                            <div className="qr-scan-line" style={{ position:'absolute', left:6, right:6, height:2, background:'linear-gradient(90deg,transparent,#ec4899,transparent)', borderRadius:1 }} />
                        </div>
                        <p style={{ color:'white', fontWeight:900, fontSize:14, marginTop:20, textShadow:'0 1px 4px rgba(0,0,0,0.9)' }}>
                            QRмҪ”л“ңлҘј л„ӨлӘЁ м•Ҳм—җ л§һм¶°мЈјм„ёмҡ”
                        </p>
                    </div>

                    {/* лӢ«кё° лІ„нҠј */}
                    <button onClick={onClose} style={{ position:'absolute', top:20, left:16, zIndex:10, background:'rgba(0,0,0,0.5)', border:'1px solid rgba(255,255,255,0.2)', color:'white', padding:'8px 18px', borderRadius:20, fontWeight:900, fontSize:13, backdropFilter:'blur(8px)' }}>
                        вҶҗ лӢ«кё°
                    </button>
                </>
            )}

};
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function App() {
    // м•ұ мғҒнғң
    const [appView, setAppView] = useState('loading'); // loading | login | app
    const [tab, setTab] = useState('home');

    // нҡҢмӣҗ лҚ°мқҙн„°
    const [memberData, setMemberData] = useState(() => {
        try { return JSON.parse(localStorage.getItem('moida_member_data')); } catch(e) { return null; }
    });
    const [memberInfo, setMemberInfo] = useState(null); // Firestore members doc

    // лЎңк·ёмқё нҸј
    const [loginForm, setLoginForm] = useState({ name:'', birth:'' });
    const [isLoggingIn, setIsLoggingIn] = useState(false);
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const [testMode, setTestMode] = useState(false);

    // Firebase лҚ°мқҙн„°
    const [meetingSettings, setMeetingSettings] = useState(null);
    const [teamDraftData, setTeamDraftData] = useState(null);
    const [scheduleData, setScheduleData] = useState(null);
    const [mySession, setMySession] = useState(null); // мҳӨлҠҳ лӮҙ м¶ңм„қ м„ём…ҳ

    // GPS мғҒнғң
    const [gpsStatus, setGpsStatus] = useState('idle'); // idle | checking | within | outside | no_location | error
    const [distance, setDistance] = useState(null);
    const [isCheckingIn, setIsCheckingIn] = useState(false);

    // QR мғҒнғң
    const [qrStatus, setQrStatus] = useState('idle'); // idle | processing | success | error
    const [qrMessage, setQrMessage] = useState('');
    const [isQRScannerOpen, setIsQRScannerOpen] = useState(false);
    const [lastScannedQR, setLastScannedQR] = useState({ token:null, date:null });
    const [nowTime, setNowTime] = useState(() => new Date());
    useEffect(() => { const t = setInterval(() => setNowTime(new Date()), 30000); return () => clearInterval(t); }, []);

    const meetingDayInfo = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [my,mm,md] = meetingSettings.date.split('-').map(Number);
        const [sh,sm] = meetingSettings.start.split(':').map(Number);
        const meetingStart = new Date(my,mm-1,md,sh,sm,0);
        const today0 = new Date(nowTime.getFullYear(),nowTime.getMonth(),nowTime.getDate(),0,0,0);
        const meetDay0 = new Date(my,mm-1,md,0,0,0);
        const dDays = Math.round((meetDay0-today0)/(1000*60*60*24));
        if (dDays < 0) return { type:'past' };
        if (dDays > 0) return { type:'future', label:`D-${dDays}` };
        const minsUntil = Math.round((meetingStart-nowTime)/60000);
        if (minsUntil > 60) return { type:'today', label:`${Math.floor(minsUntil/60)}мӢңк°„ ${minsUntil%60}л¶„ нӣ„` };
        if (minsUntil > 0) return { type:'today', label:`${minsUntil}л¶„ нӣ„ мӢңмһ‘`, urgent: minsUntil <= 30 };
        return { type:'started', label:'лӘЁмһ„ мӨ‘' };
    }, [meetingSettings, nowTime]);

    // м•ҢлҰј
    const [toast, setToast] = useState({ show:false, msg:'', type:'info' });
    const showToast = (msg, type='info') => {
        setToast({show:true,msg,type});
        setTimeout(()=>setToast(p=>({...p,show:false})),3000);
    };

    // URLм—җ QR нҶ нҒ°мқҙ мһҲлҠ”м§Җ нҷ•мқё
    const urlParams = useMemo(() => getUrlParams(), []);

    // Firebase мқёмҰқ
    useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(e=>console.error(e));
    }, []);

    // м„Өм • мқҪкё° (testMode нҸ¬н•Ё)
    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_v2').onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                setMeetingSettings(data);
                setTestMode(data.testMode ?? false);
            }
        });
        return () => unsub();
    }, []);

    // нҢҖ нҺём„ұ мқҪкё°
    useEffect(() => {
        const unsub = getCol('team_drafts')
            .where('isConfirmed', '==', true)
            .orderBy('createdAt', 'desc')
            .limit(1)
            .onSnapshot(snap => {
                setTeamDraftData(snap.empty ? null : snap.docs[0].data());
            });
        return () => unsub();
    }, []);

    // л§Өм№ҳ н…Ңмқҙлё” мқҪкё°
    useEffect(() => {
        const unsub = getCol('match_schedules')
            .orderBy('createdAt', 'desc')
            .limit(1)
            .onSnapshot(snap => {
                setScheduleData(snap.empty ? null : snap.docs[0].data());
            });
        return () => unsub();
    }, []);

    // лӮҙ м¶ңм„қ м„ём…ҳ мқҪкё°
    // testModeлҸ„ мқҳмЎҙм„ұм—җ нҸ¬н•Ё вҶ’ н…ҢмҠӨнҠё мў…лЈҢ мӢң мҰүмӢң null мҙҲкё°нҷ” + лҰ¬мҠӨл„Ҳ мһ¬мғқм„ұ
    useEffect(() => {
        if (!memberData?.memberId || !meetingSettings?.date) return;
        setMySession(null); // лӮ м§ңВ·testMode ліҖкІҪ мӢң мқҙм „ м¶ңм„қ кё°лЎқ мҰүмӢң мҙҲкё°нҷ”
        const unsub = getCol('weekly_session')
            .where('memberId', '==', memberData.memberId)
            .where('date', '==', meetingSettings.date)
            .onSnapshot(snap => {
                setMySession(snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() });
            });
        return () => unsub();
    }, [memberData?.memberId, meetingSettings?.date, testMode]);

    // members л¬ём„ң мқҪкё°
    useEffect(() => {
        if (!memberData?.memberId) return;
        const unsub = getCol('members').doc(memberData.memberId).onSnapshot(doc => {
            if (doc.exists) setMemberInfo({ id: doc.id, ...doc.data() });
        });
        return () => unsub();
    }, [memberData]);

    // мҙҲкё° м•ұ л·° м„Өм •
    useEffect(() => {
        if (memberData?.memberId) setAppView('app');
        else setAppView('login');
    }, []);

    // QR нҶ нҒ° кіөнҶө мІҳлҰ¬ (URL л°©мӢқ + мқём•ұ мҠӨмә” кіөмң )
    const processQRToken = useCallback(async (token, date) => {
        if (!token || !date) return;
        if (!memberData?.memberId) { setQrMessage('лЎңк·ёмқё нӣ„ мқҙмҡ© к°ҖлҠҘн•©лӢҲлӢӨ.'); setQrStatus('error'); return; }
        setQrStatus('processing');
        setTab('attend');
        try {
            const tokenDoc = await getCol('qr_tokens').doc(date).get();
            if (!tokenDoc.exists) { setQrMessage('мң нҡЁн•ҳм§Җ м•ҠмқҖ QRмҪ”л“ңмһ…лӢҲлӢӨ.'); setQrStatus('error'); return; }
            const tokenData = tokenDoc.data();
            if (tokenData.token !== token) { setQrMessage('QR мҪ”л“ңк°Җ мқјм№ҳн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.'); setQrStatus('error'); return; }

            const now = new Date();
            if (!testMode) {
                if (now < new Date(tokenData.validFrom)) { setQrMessage(`м•„м§Ғ м¶ңм„қ мӢңк°„мқҙ м•„лӢҷлӢҲлӢӨ.\nм¶ңм„қ к°ҖлҠҘ: ${new Date(tokenData.validFrom).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`); setQrStatus('error'); return; }
                if (now > new Date(tokenData.validUntil)) { setQrMessage('QR мҪ”л“ң мң нҡЁ мӢңк°„мқҙ м§ҖлӮ¬мҠөлӢҲлӢӨ.'); setQrStatus('error'); return; }
            }

            const usedBy = tokenData.usedBy || [];
            if (usedBy.includes(memberData.memberId)) { setQrMessage('мқҙлҜё QR м¶ңм„қмқҙ мҷ„лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ.'); setQrStatus('success'); return; }

            const sessionSnap = await getCol('weekly_session')
                .where('memberId', '==', memberData.memberId)
                .where('date', '==', date)
                .get();
            if (sessionSnap.empty) { setQrMessage('мҳӨлҠҳ м„ м • лӘ…лӢЁм—җ м—ҶмҠөлӢҲлӢӨ.\nкҙҖлҰ¬мһҗм—җкІҢ л¬ёмқҳн•ҳм„ёмҡ”.'); setQrStatus('error'); return; }

            const sessionDoc = sessionSnap.docs[0];
            if (sessionDoc.data().checkedIn) { setQrMessage('мқҙлҜё м¶ңм„қ мІҳлҰ¬лҗҳм—ҲмҠөлӢҲлӢӨ.'); setQrStatus('success'); return; }

            const [sy,sm,sd] = date.split('-');
            // state лЎңл”© нғҖмқҙл°Қ мқҙмҠҲ л°©м§Җ: Firestoreм—җм„ң м§Ғм ‘ мЎ°нҡҢ
            const settingsDoc = await getCol('settings').doc('meeting_schedule_v2').get();
            const startStr = settingsDoc.exists ? (settingsDoc.data().start || '08:00') : '08:00';
            const [shr,smin] = startStr.split(':');
            const meetingStart = new Date(sy,sm-1,sd,parseInt(shr),parseInt(smin),0);
            // м •мғҒ: allowFrom(мӢңмһ‘-70л¶„) ~ мӢңмһ‘-9л¶„  /  м§Җк°Ғ: мқҙнӣ„ ~ мў…лЈҢ
            const normalThreshold = new Date(meetingStart.getTime() - 9*60*1000);
            const status = now <= normalThreshold ? 'м •мғҒ' : 'м§Җк°Ғ';
            const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

            const batch = db.batch();
            batch.update(getCol('weekly_session').doc(sessionDoc.id), { checkedIn:true, checkInTime:timeStr, status });
            batch.update(getCol('qr_tokens').doc(date), { usedBy: firebase.firestore.FieldValue.arrayUnion(memberData.memberId) });
            await batch.commit();

            setQrMessage(`м¶ңм„қ мҷ„лЈҢ! (${status})\n${timeStr}`);
            setQrStatus('success');
        } catch(e) {
            console.error(e);
            setQrMessage('мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ: ' + e.message);
            setQrStatus('error');
        }
    }, [memberData, testMode]);

    // URL нҢҢлқјлҜён„°лЎң м§„мһ…н•ң кІҪмҡ° (мҷёл¶Җ м№ҙл©”лқј м•ұ мҠӨмә”)
    const handleQRAttendance = useCallback(async () => {
        if (!urlParams.token || !urlParams.date) return;
        await processQRToken(urlParams.token, urlParams.date);
        window.history.replaceState({}, '', window.location.pathname);
    }, [urlParams, processQRToken]);

    // мқём•ұ м№ҙл©”лқјлЎң мҠӨмә”н•ң кІҪмҡ°
    const handleInAppQRScan = useCallback((scannedUrl) => {
        setIsQRScannerOpen(false);
        try {
            const url = new URL(scannedUrl);
            const token = url.searchParams.get('token');
            const date = url.searchParams.get('date');
            if (!token || !date) { setQrMessage('мҳ¬л°”лҘё лӘЁмқҙлӢӨ QRмҪ”л“ңк°Җ м•„лӢҷлӢҲлӢӨ.'); setQrStatus('error'); setTab('attend'); return; }
            setLastScannedQR({ token, date });
            processQRToken(token, date);
        } catch(_) {
            setQrMessage('QRмҪ”л“ңлҘј мқҪмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.'); setQrStatus('error'); setTab('attend');
        }
    }, [processQRToken]);

    useEffect(() => {
        if (urlParams.token && appView === 'app') handleQRAttendance();
    }, [urlParams.token, appView]);

    // лЎңк·ёмқё
    const handleLogin = async () => {
        if (!loginForm.name.trim()) return showToast('мқҙлҰ„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.', 'error');
        const birth6 = loginForm.birth.replace(/[^0-9]/g, '').slice(0, 6);
        if (birth6.length !== 6) return showToast('мғқл…„мӣ”мқј 6мһҗлҰ¬(YYMMDD)лҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.', 'error');
        setIsLoggingIn(true);
        try {
            const snap = await getCol('members').where('name', '==', loginForm.name.trim()).get();
            let found = null;
            snap.forEach(doc => {
                const data = doc.data();
                if (data.isResigned) return;
                const b = String(data.birth || '');
                if (b.substring(2) === birth6 || b === birth6) found = { id: doc.id, ...data };
            });
            if (!found) return showToast('мқҙлҰ„ лҳҗлҠ” мғқл…„мӣ”мқјмқҙ мқјм№ҳн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.', 'error');
            const newMemberData = { memberId: found.id, name: found.name, role: found.role || 'нҡҢмӣҗ' };
            localStorage.setItem('moida_member_data', JSON.stringify(newMemberData));
            setMemberData(newMemberData);
            setAppView('app');
        } catch(e) { showToast('лЎңк·ёмқё мӢӨнҢЁ: ' + e.message, 'error'); }
        finally { setIsLoggingIn(false); }
    };

    // лЎңк·ём•„мӣғ
    const handleLogout = () => {
        localStorage.removeItem('moida_member_data');
        setMemberData(null);
        setMemberInfo(null);
        setLoginForm({ name:'', birth:'' });
        setAppView('login');
    };

    const toggleTheme = () => {
        const isDark = !darkMode;
        setDarkMode(isDark);
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem('moida_theme', isDark ? 'dark' : 'light');
    };

    const toggleTestMode = async () => {
        const newVal = !testMode;
        try {
            await getCol('settings').doc('meeting_schedule_v2').update({ testMode: newVal });
            // setTestModeлҠ” onSnapshotмқҙ нҳём¶ңн•Ё
        } catch(e) {
            setTestMode(newVal); // Firestore мӢӨнҢЁ мӢң лЎңм»¬ fallback
        }
    };

    // GPS м¶ңм„қ мІҙнҒ¬
    const handleGPSCheckIn = async () => {
        if (!memberData?.memberId) return;
        setGpsStatus('checking');
        if (!navigator.geolocation) { setGpsStatus('error'); showToast('мқҙ кё°кё°лҠ” GPSлҘј м§Җмӣҗн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.', 'error'); return; }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const locationLat = meetingSettings?.locationLat;
            const locationLng = meetingSettings?.locationLng;

            if (!locationLat || !locationLng) {
                setGpsStatus('no_location');
                showToast('кҙҖлҰ¬мһҗк°Җ лӘЁмһ„ мһҘмҶҢлҘј м•„м§Ғ м„Өм •н•ҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.', 'error');
                return;
            }

            const dist = calcDistance(latitude, longitude, locationLat, locationLng);
            setDistance(Math.round(dist));
            const radius = meetingSettings?.locationRadius || 100;

            if (testMode || dist <= radius) {
                setGpsStatus('within');
            } else {
                setGpsStatus('outside');
            }
        }, (err) => {
            setGpsStatus('error');
            const msg = err.code === 1 ? 'мң„м№ҳ к¶Ңн•ңмқ„ н—Ҳмҡ©н•ҙмЈјм„ёмҡ”.' : err.code === 2 ? 'GPS мӢ нҳёлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.' : 'мң„м№ҳ нҷ•мқё мӢңк°„мқҙ мҙҲкіјлҗҳм—ҲмҠөлӢҲлӢӨ.';
            showToast(msg, 'error');
        }, { timeout: 10000, maximumAge: 0, enableHighAccuracy: true });
    };

    const handleGPSAttend = async () => {
        if (!mySession) return showToast('мҳӨлҠҳ м„ м • лӘ…лӢЁм—җ м—ҶмҠөлӢҲлӢӨ. кҙҖлҰ¬мһҗм—җкІҢ л¬ёмқҳн•ҳм„ёмҡ”.', 'error');
        if (mySession.checkedIn) return showToast('мқҙлҜё м¶ңм„қ мІҳлҰ¬лҗҳм—ҲмҠөлӢҲлӢӨ.', 'info');
        setIsCheckingIn(true);
        try {
            const now = new Date();
            const[sy,sm,sd] = meetingSettings.date.split('-');
            const[shr,smin] = meetingSettings.start.split(':');
            const[ehr,emin] = (meetingSettings.end || '10:00').split(':');
            const meetingStart = new Date(sy,sm-1,sd,parseInt(shr),parseInt(smin),0);
            const meetingEnd   = new Date(sy,sm-1,sd,parseInt(ehr),parseInt(emin),0);
            const allowFrom = new Date(meetingStart.getTime() - 70*60*1000);
            if (!testMode && now < allowFrom) { showToast('м•„м§Ғ м¶ңм„қ к°ҖлҠҘ мӢңк°„мқҙ м•„лӢҷлӢҲлӢӨ.', 'error'); setIsCheckingIn(false); return; }
            if (!testMode && now > meetingEnd) { showToast('лӘЁмһ„мқҙ мў…лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ.\nмһҗлҸҷ л…ёмҮј мІҳлҰ¬лҗҳм—ҲмҠөлӢҲлӢӨ.', 'error'); setIsCheckingIn(false); return; }
            const normalThreshold = new Date(meetingStart.getTime() - 9*60*1000);
            const status = now <= normalThreshold ? 'м •мғҒ' : 'м§Җк°Ғ';
            const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
            await getCol('weekly_session').doc(mySession.id).update({ checkedIn:true, checkInTime:timeStr, status });
            showToast(`м¶ңм„қ мҷ„лЈҢ! ${status} (${timeStr})`, 'success');
        } catch(e) { showToast('м¶ңм„қ мӢӨнҢЁ: ' + e.message, 'error'); }
        finally { setIsCheckingIn(false); }
    };

    // лӮҙ нҢҖ м •ліҙ
    const myTeamInfo = useMemo(() => {
        if (!teamDraftData?.teams || !memberData?.memberId) return null;
        for (let i = 0; i < teamDraftData.teams.length; i++) {
            const team = teamDraftData.teams[i];
            const foundIdx = team.members.findIndex(m => m.memberId === memberData.memberId || m.id === memberData.memberId);
            if (foundIdx !== -1) return { teamIdx: i, teamName: getTeamName(i), members: team.members, jerseyNumber: foundIdx + 1 };
        }
        return null;
    }, [teamDraftData, memberData]);

    // ============================
    // л·° л ҢлҚ”л§Ғ
    // ============================

    // лЎңл”©
    if (appView === 'loading') return (
        <div className="min-h-screen flex flex-col items-center justify-center">
            <div className="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p className="text-slate-400 text-sm font-medium">лӘЁмқҙлӢӨ м—°кІ° мӨ‘...</p>
        </div>
    );

    // лЎңк·ёмқё нҷ”л©ҙ
    if (appView === 'login') return (
        <div className="min-h-screen flex flex-col items-center justify-center p-5">
            <div className="w-full max-w-sm animate-in">
                <div className="text-center mb-8">
                    <img src="icon.png" alt="OTP FC" className="w-20 h-20 object-contain mx-auto mb-4" onError={e=>e.target.style.display='none'}/>
                    <h1 className="text-3xl font-black text-slate-800">лӘЁмқҙлӢӨ</h1>
                    <p className="text-teal-600 text-xs mt-1 tracking-widest font-black">OTP FC нҡҢмӣҗ м•ұ</p>
                </div>

                <div className="bg-white rounded-3xl p-6 shadow-2xl">
                    <h2 className="text-xl font-black text-slate-800 mb-1">нҡҢмӣҗ лЎңк·ёмқё</h2>
                    <p className="text-xs text-slate-400 mb-5">мқҙлҰ„кіј мғқл…„мӣ”мқј л’Ө 6мһҗлҰ¬лҘј мһ…л Ҙн•ҳм„ёмҡ”.</p>

                    <div className="space-y-3">
                        <div>
                            <p className="text-xs font-black text-slate-500 mb-1">мқҙлҰ„</p>
                            <input type="text" placeholder="мӢӨлӘ… мһ…л Ҙ" style={{userSelect:'text'}}
                                className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-black focus:border-teal-400 transition-colors"
                                value={loginForm.name} onChange={e=>setLoginForm(p=>({...p,name:e.target.value}))}
                                onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
                        </div>
                        <div>
                            <p className="text-xs font-black text-slate-500 mb-1">мғқл…„мӣ”мқј <span className="font-normal text-slate-400">YYMMDD В· мҳҲ) 900101</span></p>
                            <input type="text" placeholder="900101" maxLength="6" style={{userSelect:'text'}}
                                className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-black focus:border-teal-400 transition-colors"
                                value={loginForm.birth} onChange={e=>setLoginForm(p=>({...p,birth:e.target.value.replace(/[^0-9]/g,'')}))}
                                onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
                        </div>
                    </div>

                    <button onClick={handleLogin} disabled={isLoggingIn}
                        className="w-full mt-5 py-4 bg-teal-500 text-white rounded-2xl font-black text-base shadow-lg shadow-teal-200 disabled:opacity-50">
                        {isLoggingIn ? 'нҷ•мқё мӨ‘...' : 'лЎңк·ёмқё'}
                    </button>
                </div>
            </div>

            {toast.show && (
                <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-sm font-black shadow-xl transition-all z-50 ${toast.type==='error'?'bg-red-500 text-white':'bg-emerald-500 text-white'}`}>
                    {toast.msg}
                </div>
            )}
        </div>
    );

    // ============================
    // л©”мқё нҡҢмӣҗ м•ұ
    // ============================
    const memberName = memberInfo?.name || memberData?.name || 'нҡҢмӣҗ';
    const myTeamIdx = myTeamInfo?.teamIdx ?? -1;

    return (
        <div className="min-h-screen pb-24 text-slate-800">
            {testMode && (
                <div style={{background:'#fbbf24',position:'sticky',top:0,zIndex:50}} className="text-amber-900 text-xs font-black text-center py-2 px-4">
                    рҹ§Ә н…ҢмҠӨнҠё лӘЁл“ң вҖ” GPSВ·QR мӢңк°„ м ңн•ң н•ҙм ңлҗЁ. мҡ°мёЎ мғҒлӢЁ рҹ§Ә лІ„нҠјмңјлЎң лҒ„м„ёмҡ”.
                </div>
            )}
            {/* н—ӨлҚ” */}
            <div className="px-5 pt-12 pb-6 member-header-bg">
                <div className="flex items-center justify-between mb-4">
                    <div>
                        <p className="text-teal-600 text-xs tracking-widest uppercase font-bold">OTP FC</p>
                        <h1 className="text-2xl font-black text-slate-800 mt-0.5">{memberName} лӢҳ</h1>
                    </div>
                    <div className="flex flex-col items-end gap-1.5">
                        <div className="flex gap-1.5">
                            <button onClick={()=>window.location.href='index.html'} className="text-[10px] font-black text-slate-500 px-2.5 py-1 rounded-lg bg-slate-200/70 hover:bg-slate-200 transition-all">рҹҸ </button>
                            <button onClick={handleLogout} className="text-[10px] font-black text-slate-500 px-2.5 py-1 rounded-lg bg-slate-200/70 hover:bg-slate-200 transition-all">лЎңк·ём•„мӣғ</button>
                            <button onClick={toggleTheme} className="text-[10px] font-black text-slate-500 px-2.5 py-1 rounded-lg bg-slate-200/70 hover:bg-slate-200 transition-all" title="н…Ңл§Ҳ">{darkMode ? 'вҳҖпёҸ' : 'рҹҢҷ'}</button>
                            <button onClick={toggleTestMode} title="н…ҢмҠӨнҠё лӘЁл“ң"
                                className={`text-[10px] font-black px-2.5 py-1 rounded-lg transition-all ${testMode ? 'bg-amber-400 text-amber-900' : 'bg-slate-200/70 text-slate-500'}`}>
                                рҹ§Ә
                            </button>
                        </div>
                        <img src="icon.png" alt="OTP FC" className="w-10 h-10 object-contain opacity-70" onError={e=>e.target.style.display='none'}/>
                    </div>
                </div>

                {/* мҳӨлҠҳ лӘЁмһ„ м •ліҙ */}
                {meetingSettings && (
                    <div className="card rounded-2xl p-4 mt-2">
                        <p className="text-[10px] text-teal-500 font-black uppercase tracking-widest mb-2">лӢӨмқҢ лӘЁмһ„</p>
                        <div className="flex items-center justify-between">
                            <div>
                                <p className="font-black text-lg">{meetingSettings.date}</p>
                                <p className="text-slate-400 text-xs mt-0.5">{meetingSettings.start} ~ {meetingSettings.end}</p>
                                {meetingSettings.location && <p className="text-slate-400 text-xs mt-0.5">рҹ“Қ {meetingSettings.location}</p>}
                            </div>
                            {mySession?.checkedIn
                                ? <div className="bg-emerald-500 px-4 py-2 rounded-xl text-sm font-black">вң“ м¶ңм„қ</div>
                                : myTeamInfo
                                    ? <div className={`${getTeamBadge(myTeamIdx)} px-3 py-2 rounded-xl text-sm font-black text-center`}>
                                        <div>{myTeamInfo.teamName}нҢҖ {myTeamInfo.jerseyNumber}лІҲ</div>
                                        <div className="text-[10px] opacity-80">{getTeamColorName(myTeamIdx)} мЎ°лҒј</div>
                                      </div>
                                    : <div className="bg-slate-100 px-4 py-2 rounded-xl text-xs font-black text-slate-400">лҜёнҺём„ұ</div>
                            }
                        </div>
                    </div>
                )}
            </div>

            {/* нғӯ мҪҳн…җмё  */}
            <div className="px-4 pt-4">

                {/* ===== нҷҲ нғӯ ===== */}
                {tab === 'home' && (
                    <div className="animate-in space-y-3">
                        {/* л№ лҘё м¶ңм„қ */}
                        <button onClick={()=>setTab('attend')} className="w-full card rounded-3xl p-5 text-left active:scale-98 transition-all">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-teal-100 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0">рҹ“Қ</div>
                                <div className="flex-1 min-w-0">
                                    <p className="font-black text-lg">м¶ңм„қ мІҙнҒ¬</p>
                                    <p className="text-slate-400 text-xs mt-0.5">GPS лҳҗлҠ” QRлЎң м¶ңм„қ</p>
                                </div>
                                {meetingDayInfo && meetingDayInfo.type !== 'past' && (
                                    <div className={`flex-shrink-0 text-center px-3 py-1.5 rounded-xl text-xs font-black ${
                                        meetingDayInfo.type==='started'?'bg-emerald-50 text-emerald-500':
                                        meetingDayInfo.urgent?'bg-red-50 text-red-500':
                                        meetingDayInfo.type==='today'?'bg-teal-50 text-teal-500':
                                        'bg-slate-100 text-slate-500'}`}>
                                        {meetingDayInfo.label}
                                    </div>
                                )}
                            </div>
                        </button>

                        {/* лӮҙ нҢҖ */}
                        {myTeamInfo ? (
                            <div className="card rounded-3xl p-5">
                                <p className="text-xs font-black text-teal-500 uppercase tracking-widest mb-3">лӮҙ нҢҖ</p>
                                <div className="flex items-center gap-3 mb-3">
                                    <span className={`w-10 h-10 rounded-xl font-black text-lg flex items-center justify-center ${getTeamBadge(myTeamIdx)} text-white flex-shrink-0`}>{myTeamInfo.jerseyNumber}</span>
                                    <div>
                                        <p className="font-black text-lg leading-tight">{myTeamInfo.teamName}нҢҖ {myTeamInfo.jerseyNumber}лІҲ</p>
                                        <p className="text-xs text-slate-400">{getTeamColorName(myTeamIdx)} мЎ°лҒј В· {myTeamInfo.members.length}лӘ…</p>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {myTeamInfo.members.map((m,i)=>(
                                        <span key={i} className={`px-3 py-1.5 rounded-xl text-xs font-black ${m.memberId===memberData?.memberId?'bg-teal-500 text-white':'bg-slate-100 text-slate-600'}`}>
                                            <span className="opacity-60 mr-0.5">{i+1}.</span>{m.name}{m.gender==='м—¬м„ұ'&&<span className="ml-1 opacity-60">W</span>}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="card rounded-3xl p-5 text-center text-slate-500">
                                <p className="text-2xl mb-2">вҡЎ</p>
                                <p className="font-black text-sm">м•„м§Ғ нҢҖмқҙ нҺём„ұлҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ</p>
                            </div>
                        )}

                        {/* м¶ңм„қ нҳ„нҷ© */}
                        {mySession && (
                            mySession.checkedIn ? (
                                <div className="bg-emerald-50 border border-emerald-200 rounded-3xl p-5">
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0">вң…</div>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-black text-xl text-emerald-500">м¶ңм„қ мҷ„лЈҢ</p>
                                            <p className="text-emerald-500 text-xs opacity-70">{meetingSettings?.date}</p>
                                        </div>
                                        <span className={`flex-shrink-0 text-xs font-black px-3 py-1.5 rounded-xl ${mySession.status==='м •мғҒ'?'bg-emerald-500 text-white':'bg-yellow-400 text-slate-800'}`}>
                                            {mySession.status}
                                        </span>
                                    </div>
                                    <div style={{background: darkMode ? 'rgba(255,255,255,0.07)' : 'rgba(255,255,255,0.6)'}} className="rounded-2xl p-3 flex items-center justify-between">
                                        <span className="text-slate-500 text-xs font-black">{memberName}</span>
                                        <span className="text-slate-700 font-black text-sm">{mySession.checkInTime}</span>
                                    </div>
                                </div>
                            ) : (
                                <div className="card rounded-3xl p-5">
                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">мҳӨлҠҳ м¶ңм„қ нҳ„нҷ©</p>
                                    <div className="flex items-center justify-between">
                                        <p className="text-slate-500 font-black text-sm">лҜём¶ңм„қ</p>
                                        <button onClick={()=>setTab('attend')} className="text-xs font-black px-3 py-2 bg-teal-50 text-teal-500 rounded-xl active:scale-95">
                                            м¶ңм„қн•ҳкё° вҶ’
                                        </button>
                                    </div>
                                    {meetingDayInfo?.type === 'today' && (
                                        <p className={`text-xs font-black mt-2 ${meetingDayInfo.urgent?'text-red-500':'text-teal-500'}`}>вҸ° {meetingDayInfo.label}</p>
                                    )}
                                    {meetingDayInfo?.type === 'started' && (
                                        <p className="text-xs font-black mt-2 text-emerald-500">рҹҸғ лӘЁмһ„мқҙ м§„н–ү мӨ‘мһ…лӢҲлӢӨ</p>
                                    )}
                                </div>
                            )
                        )}
                    </div>
                )}

                {/* ===== нҢҖ нғӯ ===== */}
                {tab === 'team' && (
                    <div className="animate-in">
                        {!teamDraftData
                            ? <div className="text-center py-20 text-slate-500">
                                <p className="text-5xl mb-4">вҡЎ</p>
                                <p className="font-black text-lg mb-2">м•„м§Ғ нҢҖмқҙ нҺём„ұлҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ</p>
                                <p className="text-sm text-slate-400">мҡҙмҳҒм§„мқҙ нҢҖ нҺём„ұмқ„ мҷ„лЈҢн•ҳл©ҙ<br/>м—¬кё°м—җ н‘ңмӢңлҗ©лӢҲлӢӨ</p>
                              </div>
                            : (
                                <div>
                                    <div className="text-center mb-4">
                                        <p className="text-xs text-slate-500 uppercase tracking-widest font-black">{teamDraftData.meetingDate} нҢҖ нҺём„ұ</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        {teamDraftData.teams.map((team, teamIdx)=>(
                                            <div key={teamIdx} className={`rounded-2xl p-4 border ${teamIdx===myTeamIdx?'border-teal-500 bg-teal-50':'card border-slate-100'}`}>
                                                <div className="flex items-center gap-2 mb-3">
                                                    <span className={`w-8 h-8 rounded-xl font-black text-sm flex items-center justify-center text-white ${getTeamBadge(teamIdx)}`}>{getTeamName(teamIdx)}</span>
                                                    {teamIdx===myTeamIdx&&<span className="text-[9px] font-black text-teal-500 uppercase">лӮҙ нҢҖ</span>}
                                                </div>
                                                {team.members.map((m,mi)=>(
                                                    <div key={mi} className={`text-xs py-1 font-black flex items-center gap-1 ${m.memberId===memberData?.memberId?'text-teal-500':'text-slate-400'}`}>
                                                        <span className="opacity-50 w-4 text-right flex-shrink-0">{mi+1}.</span>
                                                        <span>{m.name}{m.gender==='м—¬м„ұ'&&' W'}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )
                        }
                    </div>
                )}

                {/* ===== л§Өм№ҳ нғӯ ===== */}
                {tab === 'match' && (
                    <div className="animate-in">
                        {!scheduleData
                            ? <div className="text-center py-20 text-slate-500">
                                <p className="text-5xl mb-4">рҹҸҹпёҸ</p>
                                <p className="font-black text-lg mb-2">л§Өм№ҳ н…Ңмқҙлё” мӨҖл№„ мӨ‘</p>
                                <p className="text-sm text-slate-400">нҢҖ нҺём„ұмқҙ нҷ•м •лҗҳл©ҙ<br/>кІҪкё° мқјм •мқҙ кіөк°ңлҗ©лӢҲлӢӨ</p>
                              </div>
                            : (
                                <div>
                                    <div className="text-center mb-4">
                                        <p className="text-xs text-slate-500 uppercase tracking-widest font-black">{scheduleData.meetingDate}</p>
                                        <p className="text-[10px] text-slate-600 mt-1">{scheduleData.schedule?.list?.length}лқјмҡҙл“ң</p>
                                    </div>
                                    <div className="space-y-2">
                                        {scheduleData.schedule?.list?.map((session,si)=>{
                                            const myTeamName = myTeamInfo?.teamName;
                                            const hasMyTeam = myTeamName && session.matches.some(m=>m.match.includes(myTeamName));
                                            const isResting = myTeamName && session.resting?.includes(myTeamName);
                                            return (
                                                <div key={si} className={`rounded-2xl p-4 border ${hasMyTeam?'border-teal-300 bg-teal-50':isResting?'border-amber-200 bg-amber-50':'card border-slate-100'}`}>
                                                    <div className="flex items-center gap-2 mb-3">
                                                        <p className="text-xs font-black text-slate-400">{session.time}</p>
                                                        {hasMyTeam&&<span className="text-[9px] font-black text-teal-500 bg-teal-100 px-2 py-0.5 rounded-full">лӮҙ кІҪкё°</span>}
                                                        {isResting&&<span className="text-[9px] font-black text-amber-600 bg-amber-100 px-2 py-0.5 rounded-full">нңҙмӢқ</span>}
                                                    </div>
                                                    {session.matches.map((m,mi)=>{
                                                        const[t1,t2]=m.match;
                                                        const t1Idx=t1.charCodeAt(0)-65;
                                                        const t2Idx=t2.charCodeAt(0)-65;
                                                        const isMyMatch=myTeamName&&(t1===myTeamName||t2===myTeamName);
                                                        return (
                                                            <div key={mi} className="flex items-center gap-2 mb-1.5 last:mb-0">
                                                                <span className="text-[9px] text-slate-600 w-10 shrink-0">{scheduleData.config?.fieldNames?.[m.fieldIdx]||`${m.fieldIdx+1}кө¬мһҘ`}</span>
                                                                <span className={`px-2.5 py-1 rounded-lg text-xs font-black text-white ${getTeamBadge(t1Idx)} ${isMyMatch&&t1===myTeamName?'ring-2 ring-white/80':''}`}>{t1}</span>
                                                                <span className="text-slate-600 text-xs">vs</span>
                                                                <span className={`px-2.5 py-1 rounded-lg text-xs font-black text-white ${getTeamBadge(t2Idx)} ${isMyMatch&&t2===myTeamName?'ring-2 ring-white/80':''}`}>{t2}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )
                        }
                    </div>
                )}

                {/* ===== м¶ңм„қ нғӯ ===== */}
                {tab === 'attend' && (
                    <div className="animate-in space-y-4">

                        {/* нҳ„мһ¬ м¶ңм„қ мғҒнғң */}
                        {mySession?.checkedIn && (
                            <div className="bg-emerald-50 border border-emerald-200 rounded-3xl p-5 text-center">
                                <p className="text-4xl mb-2">вң…</p>
                                <p className="font-black text-xl text-emerald-400">м¶ңм„қ мҷ„лЈҢ!</p>
                                <p className="text-slate-400 text-sm mt-1">{mySession.checkInTime} В· {mySession.status}</p>
                            </div>
                        )}

                        {/* QR мІҳлҰ¬ кІ°кіј */}
                        {qrStatus !== 'idle' && (
                            <div className={`rounded-3xl p-5 text-center border ${qrStatus==='success'?'bg-emerald-50 border-emerald-200':qrStatus==='processing'?'card border-slate-100':'bg-red-50 border-red-200'}`}>
                                {qrStatus==='processing' && <><div className="w-8 h-8 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div><p className="font-black text-slate-500">QR нҷ•мқё мӨ‘...</p></>}
                                {qrStatus==='success' && <><p className="text-3xl mb-2">рҹҺү</p><p className="font-black text-emerald-400 whitespace-pre-line">{qrMessage}</p></>}
                                {qrStatus==='error' && (
                                    <>
                                        <p className="text-3xl mb-2">вҡ пёҸ</p>
                                        <p className="font-black text-red-400 whitespace-pre-line">{qrMessage}</p>
                                        <button onClick={()=>{setQrStatus('idle');setIsQRScannerOpen(true);}} className="mt-3 text-xs text-violet-600 font-black px-5 py-2.5 rounded-xl bg-violet-50 border border-violet-200 block mx-auto">
                                            рҹ“· лӢӨмӢң мҠӨмә”н•ҳкё°
                                        </button>
                                        {(urlParams.token || lastScannedQR.token) && (
                                            <button onClick={async () => {
                                                try { await getCol('settings').doc('meeting_schedule_v2').update({ testMode: true }); }
                                                catch(e) { setTestMode(true); }
                                                processQRToken(urlParams.token || lastScannedQR.token, urlParams.date || lastScannedQR.date);
                                            }} className="mt-2 text-xs text-amber-600 font-black px-5 py-2.5 rounded-xl bg-amber-50 border border-amber-200 block mx-auto">
                                                рҹ§Ә н…ҢмҠӨнҠё лӘЁл“ңлЎң мһ¬мӢңлҸ„
                                            </button>
                                        )}
                                    </>
                                )}
                            </div>
                        )}

                        {/* GPS м¶ңм„қ */}
                        {!mySession?.checkedIn && (
                            <div className="card rounded-3xl p-5">
                                <p className="text-xs font-black text-teal-500 uppercase tracking-widest mb-4">GPS м¶ңм„қ</p>

                                {gpsStatus==='idle' && (
                                    <div className="text-center">
                                        <p className="text-slate-400 text-sm mb-4">лӘЁмһ„ мһҘмҶҢ к·јмІҳм—җ мһҲлӢӨл©ҙ<br/>м•„лһҳ лІ„нҠјмңјлЎң мң„м№ҳлҘј нҷ•мқён•ҳм„ёмҡ”.</p>
                                        <button onClick={handleGPSCheckIn} className="w-full py-4 bg-teal-500 text-white rounded-2xl font-black text-base shadow-lg shadow-teal-100">
                                            рҹ“Қ мң„м№ҳ нҷ•мқён•ҳкё°
                                        </button>
                                    </div>
                                )}

                                {gpsStatus==='checking' && (
                                    <div className="text-center py-4">
                                        <div className="w-10 h-10 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                                        <p className="text-slate-400 font-black">GPS нҷ•мқё мӨ‘...</p>
                                    </div>
                                )}

                                {gpsStatus==='within' && (
                                    <div className="text-center">
                                        <div className="relative w-20 h-20 mx-auto mb-4">
                                            <div className="absolute inset-0 bg-teal-100 rounded-full pulse-ring"></div>
                                            <div className="w-20 h-20 bg-teal-500 rounded-full flex items-center justify-center text-3xl">рҹ“Қ</div>
                                        </div>
                                        <p className="font-black text-emerald-400 text-lg mb-3">лӘЁмһ„ мһҘмҶҢ к·јмІҳ!</p>
                                        {distance !== null && (
                                            <div className="mb-4 px-2">
                                                <div className="flex justify-between text-[10px] font-black mb-1.5">
                                                    <span className="text-emerald-400">вң“ мқём • лІ”мң„ лӮҙ</span>
                                                    <span className="text-slate-400">{distance}m / {meetingSettings?.locationRadius||100}m</span>
                                                </div>
                                                <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-emerald-400 rounded-full transition-all duration-700"
                                                        style={{width:`${Math.max(10, Math.round((1 - distance/(meetingSettings?.locationRadius||100))*100))}%`}}/>
                                                </div>
                                            </div>
                                        )}
                                        <button onClick={handleGPSAttend} disabled={isCheckingIn}
                                            className="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black text-base shadow-lg disabled:opacity-50">
                                            {isCheckingIn ? 'м¶ңм„қ мІҳлҰ¬ мӨ‘...' : 'вң“ м¶ңм„қ мІҙнҒ¬'}
                                        </button>
                                    </div>
                                )}

                                {gpsStatus==='outside' && (
                                    <div className="text-center">
                                        <p className="text-3xl mb-2">рҹҡ¶</p>
                                        <p className="font-black text-yellow-500 text-lg mb-3">м•„м§Ғ л©ҖлҰ¬ мһҲмҠөлӢҲлӢӨ</p>
                                        {distance !== null && (
                                            <div className="mb-4 px-2">
                                                <div className="flex justify-between text-[10px] font-black mb-1.5">
                                                    <span className="text-yellow-500">нҳ„мһ¬ {distance}m</span>
                                                    <span className="text-slate-400">{meetingSettings?.locationRadius||100}m мқҙлӮҙ н•„мҡ”</span>
                                                </div>
                                                <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-yellow-400 rounded-full transition-all duration-700"
                                                        style={{width:`${Math.min(90, Math.round(distance/((meetingSettings?.locationRadius||100)*3)*100))}%`}}/>
                                                </div>
                                                <p className="text-[10px] text-slate-400 mt-1.5">{Math.max(0, distance-(meetingSettings?.locationRadius||100))}m лҚ” мқҙлҸҷн•ҳл©ҙ м¶ңм„қ к°ҖлҠҘ</p>
                                            </div>
                                        )}
                                        <button onClick={handleGPSCheckIn} className="w-full py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">
                                            рҹ”„ лӢӨмӢң нҷ•мқё
                                        </button>
                                    </div>
                                )}

                                {gpsStatus==='no_location' && (
                                    <div className="text-center">
                                        <p className="text-3xl mb-2">вҡҷпёҸ</p>
                                        <p className="font-black text-slate-500 mb-1">мһҘмҶҢ лҜём„Өм •</p>
                                        <p className="text-slate-500 text-xs">кҙҖлҰ¬мһҗк°Җ лӘЁмһ„ мһҘмҶҢ GPSлҘј м„Өм •н•ҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.<br/>{meetingSettings?.enableQR ? 'QR м¶ңм„қмқ„ мқҙмҡ©н•ҙмЈјм„ёмҡ”.' : 'кҙҖлҰ¬мһҗм—җкІҢ л¬ёмқҳн•ҙмЈјм„ёмҡ”.'}</p>
                                    </div>
                                )}

                                {gpsStatus==='error' && (
                                    <div className="text-center">
                                        <p className="text-3xl mb-2">вҡ пёҸ</p>
                                        <p className="font-black text-red-400 mb-3">мң„м№ҳ нҷ•мқё мӢӨнҢЁ</p>
                                        <button onClick={()=>setGpsStatus('idle')} className="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl font-black text-sm">лӢӨмӢң мӢңлҸ„</button>
                                    </div>
                                )}

                            </div>
                        )}

                        {/* QR м¶ңм„қ лІ„нҠј вҖ” кҙҖлҰ¬мһҗк°Җ enableQR нҷңм„ұнҷ” мӢңм—җл§Ң н‘ңмӢң */}
                        {!mySession?.checkedIn && meetingSettings?.enableQR && (
                            <div className="card rounded-3xl p-5">
                                <p className="text-xs font-black text-violet-400 uppercase tracking-widest mb-3">QR м¶ңм„қ</p>
                                <button onClick={()=>setIsQRScannerOpen(true)}
                                    className="w-full py-4 rounded-2xl font-black text-base flex items-center justify-center gap-2 text-white"
                                    style={{ background:'linear-gradient(135deg,#7c3aed,#a855f7)' }}>
                                    <span style={{fontSize:20}}>рҹ“·</span> QR мҠӨмә”н•ҳкё°
                                </button>
                                <p className="text-slate-600 text-xs text-center mt-2">кҙҖлҰ¬мһҗк°Җ ліҙм—¬мЈјлҠ” QRмҪ”л“ңлҘј мҠӨмә”н•ҳм„ёмҡ”</p>
                            </div>
                        )}
                    </div>
                )}
            </div>

            {/* н•ҳлӢЁ нғӯл°” */}
            <div className="tab-bar fixed bottom-0 left-0 right-0 z-50 pb-safe">
                <div className="flex justify-around items-center h-16 max-w-sm mx-auto px-6">
                    {[
                        {key:'home',label:'нҷҲ',emoji:'рҹҸ '},
                        {key:'team',label:'нҢҖ',emoji:'вҡЎ'},
                        {key:'match',label:'л§Өм№ҳ',emoji:'рҹҸҹпёҸ'},
                        {key:'attend',label:'м¶ңм„қ',emoji:'рҹ“Қ'},
                    ].map(({key,label,emoji})=>(
                        <button key={key} onClick={()=>setTab(key)}
                            className={`flex flex-col items-center justify-center w-14 h-12 rounded-xl transition-all ${tab===key?'bg-teal-100 text-teal-500':'text-slate-600'}`}>
                            <span className="text-lg leading-none">{emoji}</span>
                            <span className={`text-[9px] font-black mt-0.5 ${tab===key?'text-teal-500':'text-slate-600'}`}>{label}</span>
                        </button>
                    ))}
                </div>
            </div>

            {/* нҶ мҠӨнҠё м•ҢлҰј */}
            {toast.show && (
                <div className={`fixed bottom-20 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-sm font-black shadow-xl z-50 whitespace-nowrap transition-all ${toast.type==='error'?'bg-red-500 text-white':toast.type==='success'?'bg-emerald-500 text-white':'bg-slate-700 text-white'}`}>
                    {toast.msg}
                </div>
            )}

            {/* мқём•ұ QR мҠӨмәҗл„Ҳ */}
            <QRScannerModal
                isOpen={isQRScannerOpen}
                onScan={handleInAppQRScan}
                onClose={()=>setIsQRScannerOpen(false)}
            />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
