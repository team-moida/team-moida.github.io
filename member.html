<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ── 전역 뒤로가기 등록소: 모달·전체화면 오버레이를 LIFO로 닫기 (자식 컴포넌트 공용) ──
window.MoidaBack = window.MoidaBack || {
    stack: [], onChange: null,
    register(close) {
        const e = { close };
        this.stack.push(e);
        this.onChange && this.onChange();
        return () => { const i = this.stack.indexOf(e); if (i >= 0) { this.stack.splice(i, 1); this.onChange && this.onChange(); } };
    },
    pop() { const e = this.stack.pop(); if (e) { e.close(); this.onChange && this.onChange(); return true; } return false; },
    get depth() { return this.stack.length; }
};
// 오버레이가 열려 있는 동안 등록소에 닫기 함수를 올려둔다 (자식 어디서든 한 줄로 뒤로가기 연동)
function useMoidaBack(isOpen, close) {
    const closeRef = React.useRef(close);
    closeRef.current = close;
    React.useEffect(() => {
        if (!isOpen) return;
        return window.MoidaBack.register(() => closeRef.current && closeRef.current());
    }, [isOpen]);
}
window.useMoidaBack = useMoidaBack;

function App() {
    const [appView, setAppView] = useState('loading');
    const [tab, setTab] = useState(() => {
        try {
            const t = sessionStorage.getItem('moida_tab') || 'home';
            // 기존 출석/팀/매치 탭은 '모임' 탭으로 통합 → 복원 시 모임으로 매핑
            return (t === 'attend' || t === 'team' || t === 'match') ? 'meeting' : t;
        } catch(e) { return 'home'; }
    });
    // 모임 탭 안의 하위 탭(출석/팀/매치)
    const [meetingSubTab, setMeetingSubTab] = useState(() => {
        try {
            const t = sessionStorage.getItem('moida_tab');
            if (t === 'attend' || t === 'team' || t === 'match') return t;
            return sessionStorage.getItem('moida_meeting_sub') || 'attend';
        } catch(e) { return 'attend'; }
    });
    // 모임 탭에서 보고 있는 모임 (null = 모임 카드 목록). 새로고침 후에도 유지.
    const [viewMeetingId, setViewMeetingId] = useState(() => {
        try { return sessionStorage.getItem('moida_view_meeting') || null; } catch(e) { return null; }
    });
    // 모임 상세 섹션 다중 펼침: meetingSubTab(주 펼침)에 더해 추가로 펼친 섹션들을 함께 펼친다
    const [openExtra, setOpenExtra] = useState([]);
    const [adminHub, setAdminHub] = useState(false);   // 운영 허브(편집 진입) 열림 — 운영진 전용
    React.useEffect(() => { setOpenExtra([]); setAdminHub(false); }, [viewMeetingId]);
    const isSecOpen = (k) => meetingSubTab === k || openExtra.includes(k);
    const toggleSection = (k) => {
        if (meetingSubTab === k || openExtra.includes(k)) {
            if (meetingSubTab === k) setMeetingSubTab('');
            setOpenExtra(a => a.filter(x => x !== k));
        } else {
            setOpenExtra(a => [...a, k]);
        }
    };
    // 상세 화면 [수정] 버튼 → 목록의 모임 관리에서 수정 폼 자동 오픈
    const [pendingEditMeeting, setPendingEditMeeting] = useState(null);
    // 현재 탭/하위 탭 기억 → 새로고침(당겨서/F5) 후 같은 위치로 복원. 앱을 완전히 닫으면 초기화(홈).
    React.useEffect(() => { try { sessionStorage.setItem('moida_tab', tab); } catch(e) {} }, [tab]);
    React.useEffect(() => { try { sessionStorage.setItem('moida_meeting_sub', meetingSubTab); } catch(e) {} }, [meetingSubTab]);
    React.useEffect(() => { try { if (viewMeetingId) sessionStorage.setItem('moida_view_meeting', viewMeetingId); else sessionStorage.removeItem('moida_view_meeting'); } catch(e) {} }, [viewMeetingId]);
    // 매칭모임은 팀편성·매치테이블이 없음 → 'attend'/'team'(명단)만. 'match' 서브탭이면 출석으로 보냄.
    React.useEffect(() => {
        if (activeMeetingKind === 'match' && meetingSubTab === 'match') setMeetingSubTab('attend');
    }, [activeMeetingKind, meetingSubTab]);
    // 홈 탭으로 돌아오면 항상 정기 모임 컨텍스트로 리셋 (헤더/홈카드 오버레이가 정기 모임 기준으로 동작하도록)
    React.useEffect(() => { if (tab === 'home') setActiveMeetingKind('self'); }, [tab]);
    // 출석/팀/매치로의 이동을 '모임' 탭 + 하위 탭으로 변환하는 네비게이션 헬퍼.
    // meetingId를 주면 그 모임 상세로 직행(홈 카드). 없이 들어오면(QR 출석 등) 해당 종류의 현재 모임으로.
    const navTab = (t, kind, meetingId) => {
        if (t === 'meeting-list') { setViewMeetingId(null); setTab('meeting'); return; }
        if (t === 'attend' || t === 'team' || t === 'match') {
            if (kind) setActiveMeetingKind(kind);
            if (meetingId) setViewMeetingId(meetingId);
            else if (!viewMeetingId) {
                const k = kind || activeMeetingKind;
                const act = getActiveMeeting((meetings || []).filter(m => k === 'match' ? (m.meetingType||'self') === 'match' : (m.meetingType||'self') !== 'match'));
                if (act) setViewMeetingId(act.id);
            }
            setMeetingSubTab(t); setTab('meeting');
        }
        else setTab(t);
    };
    const [memberData, setMemberData] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (!s) { location.href = 'index.html'; return null; }
            return s;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const [memberInfo, setMemberInfo] = useState(null);
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    // ── 개발자 모드: 내 계정 하나로 [개발자/운영진/회원] 모드를 오가며 본다 (데이터는 내 계정 그대로) ──
    //   PIN 해제(devUnlocked) 후 viewMode로 권한을 '낮춰' 본다. 개발자가 아니면 기존 역할 기반 그대로(영향 0).
    const DEV_PIN_HASH = 2085915753;
    const _devHash = (s) => { let x = 5381; const t = String(s || ''); for (let i = 0; i < t.length; i++) x = ((x * 33) ^ t.charCodeAt(i)) >>> 0; return x; };
    const devUnlocked = (() => { try { return localStorage.getItem('moida_dev') === '1'; } catch(e) { return false; } })();
    const viewMode = (() => { try { return localStorage.getItem('moida_view_mode') || 'dev'; } catch(e) { return 'dev'; } })();
    const isDeveloper = devUnlocked;
    // 역할은 라이브(memberInfo, Firestore 실시간)를 우선 — 로그인 후 운영진으로 승격돼도 재로그인 없이 즉시 반영.
    // memberInfo 로드 전(null)에는 로그인 시 저장된 스냅샷(memberData.role)로 폴백.
    const myRole = memberInfo?.role || memberData?.role;
    const roleIsAdmin = ADMIN_ROLES.includes(myRole);
    const effAdmin = isDeveloper ? (viewMode !== 'member') : roleIsAdmin;
    const isAdmin = effAdmin;
    const isAdminMode = effAdmin;
    const isDevMode = isDeveloper && viewMode === 'dev';   // 개발 전용 기능(테스트 모임 등) 노출 여부
    // 테스트 모임은 개발 모드에서만 보인다 — 운영진·회원 모드(및 실제 다른 회원)에겐 목록·홈·현재모임 전부 숨김
    const _isTestMirror = (s) => !!s && (s.location === '🧪 테스트 모임' || s.location === '테스트 현재위치' || s.location === '📍 테스트 현재위치');
    const promptDeveloper = () => {
        if (devUnlocked) return;
        let pin; try { pin = window.prompt('개발자 PIN'); } catch(e) { return; }
        if (pin == null) return;
        if (_devHash(String(pin).trim()) === DEV_PIN_HASH) {
            try { localStorage.setItem('moida_dev', '1'); localStorage.setItem('moida_view_mode', 'dev'); } catch(e) {}
            location.reload();
        } else { try { showToast('PIN이 올바르지 않습니다', 'error'); } catch(_) {} }
    };
    const changeViewMode = (m) => { try { localStorage.setItem('moida_view_mode', m); } catch(e) {} location.reload(); };
    const lockDeveloper = () => { try { localStorage.removeItem('moida_dev'); localStorage.removeItem('moida_view_mode'); } catch(e) {} location.reload(); };
    const inTestPreview = (() => { try { return !!localStorage.getItem('moida_admin_backup'); } catch(e) { return false; } })();
    const [testExists, setTestExists] = useState(false);
    useEffect(() => {
        if (!isAdmin || inTestPreview) { setTestExists(false); return; }
        const unsub = getCol('members').where('isTest','==',true).onSnapshot(s => setTestExists(!s.empty), () => {});
        return () => unsub();
    }, [isAdmin, inTestPreview]);
    const [meetingSettings, setMeetingSettings] = useState(null);
    const [meetingSettingsMatch, setMeetingSettingsMatch] = useState(null);
    const [activeMeetingKind, setActiveMeetingKind] = useState('self');
    const [meetings, setMeetings] = useState([]);
    const [deletedMeetings, setDeletedMeetings] = useState([]);  // 보관함(soft-deleted) 모임
    // 개발 모드가 아니면 테스트 모임(isTest)은 목록·홈·공지에서 숨긴다 (viewMeeting 등 내부 참조는 원본 meetings 유지)
    const visibleMeetings = isDevMode ? meetings : meetings.filter(m => !m.isTest);
    const displayMeetingSettings = activeMeetingKind === 'match' ? meetingSettingsMatch : meetingSettings;
    // 모임 탭에서 보고 있는 모임 객체 (meetings 실시간 구독에서 파생 — 수정/삭제 즉시 반영)
    const viewMeeting = meetings.find(m => m.id === viewMeetingId) || null;
    const viewKind = viewMeeting ? ((viewMeeting.meetingType || 'self') === 'match' ? 'match' : 'self') : null;
    // 보고 있는 모임 종류에 맞춰 데이터 컨텍스트(정기/매칭 미러) 자동 전환
    React.useEffect(() => { if (viewKind) setActiveMeetingKind(viewKind); }, [viewMeetingId, viewKind]);
    // 모임 탭 컨텍스트 — 보고 있는 모임 우선, 아니면 현재 모임(미러). 팀편성·매치 데이터가 이 모임을 따라간다.
    const effectiveMeeting = viewMeeting || displayMeetingSettings;
    // 매치테이블은 정기(자체전) 모임 전용 — 매칭모임을 보는 중에는 정기 미러 유지
    const effectiveSelfMeeting = (viewMeeting && viewKind === 'self') ? viewMeeting : meetingSettings;
    // 모임 탭을 벗어나면 보던 모임 해제 → 홈 카드·헤더가 항상 '현재 모임' 기준으로 동작
    React.useEffect(() => { if (tab !== 'meeting') setViewMeetingId(null); }, [tab]);
    const testMode = !!displayMeetingSettings?.testMode;
    const [mySession, setMySession] = useState(null);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null,variant:null});
    const [duesReject, setDuesReject] = useState(null);          // 회비 신고 반려 대상 report (null이면 닫힘)
    const [duesRejectReason, setDuesRejectReason] = useState(''); // 반려 사유 입력값
    const [announcementModal, setAnnouncementModal] = useState({ open: false, mode: 'add', data: null });
    const showAlert = (title, content, type='info', onConfirm=null, variant=null) => setAlertModal({show:true, title, content, type, onConfirm, variant});
    const showConfirm = (title, content, onConfirm, variant=null) => setAlertModal({show:true, title, content, type:'confirm', onConfirm, variant});
    const showLoading = (title, content='') => setAlertModal({show:true, title, content, type:'loading', onConfirm:null, variant:'info'});
    // 회비 신고 반려: 사유 입력 모달 열기 → 확인 시 신고 삭제 + 회원에게 반려 푸시(사유 포함).
    // 푸시는 notifications 문서 추가(type:'dues',pushOnly) → 서버가 전송, 공지엔 안 뜸.
    const openDuesReject = (report) => { if (!report || !report.memberId || !report.month) return; setDuesRejectReason(''); setDuesReject(report); };
    const submitDuesReject = async () => {
        const r = duesReject; if (!r) return;
        const reason = duesRejectReason.trim();
        try {
            await getCol('dues_reports').doc(`${r.month}_${r.memberId}`).delete();
            await getCol('notifications').add({
                title: '회비 신고가 반려되었어요',
                body: reason ? `${r.month} 회비 신고가 반려되었어요. 사유: ${reason}` : `${r.month} 회비 신고가 반려되었어요. 입금 내역을 다시 확인해 주세요.`,
                targetMemberIds: [r.memberId], type: 'dues', pushOnly: true,
                sentAt: new Date().toISOString(),
            });
            setDuesReject(null);
            showAlert('반려 완료', `${r.memberName || '회원'}님께 반려 알림을 보냈어요.`);
        } catch(e) { console.error(e); showAlert('오류', '반려 처리에 실패했어요.'); }
    };
    const [toast, setToast] = useState({ show:false, msg:'', type:'info' });
    const showToast = (msg, type='info') => { setToast({show:true,msg,type}); setTimeout(()=>setToast(p=>({...p,show:false})),3000); };
    const [gpsStatus, setGpsStatus] = useState('idle');
    const [distance, setDistance] = useState(null);
    const [isCheckingIn, setIsCheckingIn] = useState(false);
    const [qrStatus, setQrStatus] = useState('idle');
    const [qrMessage, setQrMessage] = useState('');
    const [isQRScannerOpen, setIsQRScannerOpen] = useState(false);
    const [attendModalOpen, setAttendModalOpen] = useState(false);
    const [dismissedMeetingId, setDismissedMeetingId] = useState(null); // F-2a-1b 자동표시 대비(이번엔 onClose 기록만)
    const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
    const [lastScannedQR, setLastScannedQR] = useState({ token:null, date:null });
    const [nowTime, setNowTime] = useState(() => new Date());
    useEffect(() => { const t = setInterval(() => setNowTime(new Date()), 30000); return () => clearInterval(t); }, []);

    // 기능별 훅
    const { notifPermission, registerFcmToken, announcements, notifFeed } = useFCM({ memberData, showToast });

    // ── 알림 센터(종) + 게시판 진입 + 안읽음 배지 ─────────────────────────────────
    // sentAt이 ISO 문자열(클라)/Timestamp(서버) 혼재 → ms로 정규화해 비교.
    // 안읽음 기준은 localStorage(기기/브라우저별, 캐시 삭제 시 초기화).
    const notifMs = (v) => (v && typeof v.toMillis === 'function') ? v.toMillis() : (v ? (Date.parse(v) || 0) : 0);

    // (A) 종/알림 센터: 전체 알림 피드(pushOnly 포함)
    // ※ 확인/삭제는 공유 문서(notifications)를 건드리지 않고 기기별 localStorage로 처리 → 다른 회원에게 영향 없음
    const [notifConfirmed, setNotifConfirmed] = useState(() => {
        try { return JSON.parse(localStorage.getItem('moida_notifConfirmed') || '[]'); } catch { return []; }
    });
    const [notifDismissed, setNotifDismissed] = useState(() => {
        try { return JSON.parse(localStorage.getItem('moida_notifDismissed') || '[]'); } catch { return []; }
    });
    const visibleNotifs = notifFeed.filter(a => !notifDismissed.includes(a.id));
    // 완료(불투명) 판정: 직접 '확인'했거나, 연결된 모임이 종료됐으면 완료
    const isNotifDone = (a) => {
        if (!a) return false;
        if (notifConfirmed.includes(a.id)) return true;
        if (a.linkMeetingId && typeof isMeetingEnded === 'function') {

    const confirmNotif = (id) => setNotifConfirmed(prev => {

    const dismissNotif = (id) => setNotifDismissed(prev => {

    // 출석 풀스크린 모달 열기/닫기 (홈 카드 '출석하기' → 열기, X/뒤로/빈영역 → 닫기). F-2a-1a
    const openAttendModal = () => { setDismissedMeetingId(null); setAttendModalOpen(true); };

    // 짝1: 지금 보는 자기(self) 매치표가 '살아있는 모임(미러)' 것인지 — 워치용 활성 매치표를 그때만 갱신(지난/다른 모임 구경 중엔 안 건드림).

    const attend = useAttend({

    const [regDuesBlock, setRegDuesBlock] = useState(false);

    useEffect(() => {

    const regDuesUnpaid = useMemo(() => {

    useEffect(() => {

        auth.signInAnonymously().catch(e=>console.error(e));
    }, []);

    // ── Android 뒤로가기: 오버레이(등록소) → 화면 히스토리(직전 탭/상세) → 홈 → 종료 ──
    // member.html 레벨 모달들도 같은 등록소에 등록 (자식 오버레이와 동일하게 LIFO 처리)
    useMoidaBack(isQRScannerOpen, () => setIsQRScannerOpen(false));
    useMoidaBack(attendModalOpen, () => setAttendModalOpen(false));
    useMoidaBack(attend.isKioskOpen, () => attend.setIsKioskOpen(false));
    useMoidaBack(announcementModal.open, () => setAnnouncementModal(m => ({ ...m, open: false })));

    useMoidaBack(!!(attend.attendModal && attend.attendModal.type), () => attend.setAttendModal({ type: null, data: null }));
    useMoidaBack(alertModal.show, () => setAlertModal(m => ({ ...m, show: false })));

    // 화면 히스토리 스택 (탭/모임상세 이동 기록 → 뒤로가기 시 '직전 화면' 복원, 홈 하드코딩 X)
    const navStackRef = React.useRef([]);
    const navTrapArmedRef = React.useRef(false);
    const navPoppingRef = React.useRef(false);
    const tabRef = React.useRef(tab);
    tabRef.current = tab;
    const navView = tab === 'meeting' ? viewMeetingId : null; // 모임 상세는 모임 탭일 때만 화면 구분에 의미
    const curScreen = { tab, viewMeetingId: navView };
    const curSig = `${tab}|${navView || ''}`;
    const prevSigRef = React.useRef(curSig);
    const prevScreenRef = React.useRef(curScreen);
    const syncBackTrap = React.useCallback(() => {
        const has = window.MoidaBack.depth > 0 || navStackRef.current.length > 0 || tabRef.current !== 'home';
        if (has && !navTrapArmedRef.current) { history.pushState({ moidaNav: true }, ''); navTrapArmedRef.current = true; }
    }, []);
    const restoreScreen = (s) => {
        navPoppingRef.current = true;
        setViewMeetingId(s.viewMeetingId || null);
        setTab(s.tab);
    };
    // 화면이 바뀌면(전진) 직전 화면을 스택에 저장. 뒤로가기로 복원된 경우엔 저장 안 함.
    React.useEffect(() => {
        if (curSig !== prevSigRef.current) {
            if (navPoppingRef.current) navPoppingRef.current = false;
            else navStackRef.current.push(prevScreenRef.current);
            prevSigRef.current = curSig;
            prevScreenRef.current = curScreen;
        }
        syncBackTrap();
    }, [curSig]);
    // 등록소 변화(자식 오버레이 열림/닫힘) 시에도 트랩 동기화
    React.useEffect(() => {
        window.MoidaBack.onChange = syncBackTrap;
        return () => { if (window.MoidaBack.onChange === syncBackTrap) window.MoidaBack.onChange = null; };
    }, [syncBackTrap]);
    // 뒤로가기 리스너 (한 번만 등록)
    React.useEffect(() => {
        const onPop = () => {
            navTrapArmedRef.current = false;          // 방금 트랩이 빠짐
            let remaining;
            if (window.MoidaBack.depth > 0) {         // 1) 오버레이부터 닫기 (LIFO)
                window.MoidaBack.pop();
                remaining = window.MoidaBack.depth + navStackRef.current.length;
            } else if (navStackRef.current.length > 0) { // 2) 직전 화면으로
                restoreScreen(navStackRef.current.pop());
                remaining = navStackRef.current.length;
            } else if (tabRef.current !== 'home') {   // 3) 스택 비었지만 홈 아니면 홈으로
                restoreScreen({ tab: 'home', viewMeetingId: null });
                remaining = 0;
            } else {
                return;                               // 4) 홈 루트 → 앱 종료 허용
            }
            if (remaining > 0) { history.pushState({ moidaNav: true }, ''); navTrapArmedRef.current = true; }
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
    }, []);

    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_v2').onSnapshot(doc => {
            if (!doc.exists) return;

            else setMeetingSettingsMatch(null);
        });
        return () => unsub();
    }, []);

    useEffect(() => {
        const unsub = getCol('meetings').onSnapshot(snap => {

            .onSnapshot(snap => {
                const docs = snap.docs.map(d => ({id: d.id, ...d.data()}));

    const meetingDayInfo = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [my,mm,md] = meetingSettings.date.split('-').map(Number);
        const [sh,sm] = meetingSettings.start.split(':').map(Number);
        const meetingStart = new Date(my,mm-1,md,sh,sm,0);
        const today0 = new Date(nowTime.getFullYear(),nowTime.getMonth(),nowTime.getDate(),0,0,0);
        const meetDay0 = new Date(my,mm-1,md,0,0,0);
        const dDays = Math.round((meetDay0-today0)/(1000*60*60*24));
        if (dDays < 0) return { type:'past' };
        if (dDays > 0) return { type:'future', label:`D-${dDays}` };
        const minsUntil = Math.round((meetingStart-nowTime)/60000);
        if (minsUntil > 60) return { type:'today', label:`${Math.floor(minsUntil/60)}시간 ${minsUntil%60}분 후` };
        if (minsUntil > 0) return { type:'today', label:`${minsUntil}분 후 시작`, urgent: minsUntil <= 30 };

    const startInlineGPS = () => {

    // 관리자에서 확인을 마친 뒤 직접 호출 — 테스트 계정·기록 일괄 삭제
    const cleanupTestData = async () => {
        if (!window.confirm('테스트 계정과 테스트가 만든 모든 기록을 삭제할까요?')) return;

            const snap = await getCol('members').where('isTest','==',true).get();

                const testId = docu.id;

                    const drs = await getCol('dues_reports').where('memberId','==',testId).get();
                    const months = new Set(); const b1 = db.batch();
                    drs.forEach(d => { const r=d.data(); if(r.month) months.add(r.month); b1.delete(d.ref); });
                    await b1.commit();
                    for (const mth of months) { try { await getCol('monthly_checks').doc(mth).update({ [`statuses.${testId}`]: firebase.firestore.FieldValue.delete(), [`paymentDates.${testId}`]: firebase.firestore.FieldValue.delete() }); } catch(_) {} }
                } catch(_) {}
                try { await getCol('fcm_tokens').doc(testId).delete(); } catch(_) {}
                try { const ws = await getCol('weekly_session').where('memberId','==',testId).get(); const b2 = db.batch(); ws.forEach(d => b2.delete(d.ref)); await b2.commit(); } catch(_) {}
                try { await getCol('members').doc(testId).delete(); } catch(_) {}
            }
            showToast('테스트 기록을 정리했어요.', 'success');
        } catch(e) { showToast('정리 실패: ' + e.message, 'error'); }

    // 공지 관리 권한: 개발자(나)는 전부 가능 / 그 외엔 내가 올린 글만. 옛 글(authorId 없음)은 작성자명 일치로 보조 판정.

        if (isDeveloper) return true;
        const myId = memberInfo?.id || memberData?.memberId || '';
        const myName = memberInfo?.name || memberData?.name || '';
        if (myId && a?.authorId) return a.authorId === myId;

        const senderRole = memberInfo?.role || memberData?.role || '';
        const senderName = (senderRole && senderRole !== '회원') ? `${baseName} ${senderRole}` : baseName;
        const cat = category || '공지';
        if (mode === 'add') {
            const notifDoc = { title, body, category: cat, sentAt: new Date().toISOString(), sentBy: senderName, authorId: memberInfo?.id || memberData?.memberId || '' };
            if (cat === '일반') notifDoc.noPush = true;              // 일반 글 = 알림 없이 게시판에만
            else if (targetMode === 'select') notifDoc.targetMemberIds = selectedMemberIds;
            await getCol('notifications').add(notifDoc);
        } else {
            const target = (announcements || []).find(x => x.id === id);
            if (!canManageAnnouncement(target)) { showAlert('권한 없음', '내가 올린 공지만 수정할 수 있어요.'); return; }
            await getCol('notifications').doc(id).update({ title, body, category: cat, updatedAt: new Date().toISOString() });
        }

        showConfirm('공지 삭제', '이 공지를 삭제하시겠습니까?', async () => {
            await getCol('notifications').doc(id).delete();
        });
    };

    const handleDeleteAnnouncements = (ids) => {
        const map = new Map((announcements || []).map(a => [a.id, a]));

            ? `내가 올린 ${allowed.length}개만 삭제됩니다. (다른 사람 글 ${skipped}개는 제외) 되돌릴 수 없습니다.`
            : `선택한 ${allowed.length}개의 공지를 삭제할까요? 되돌릴 수 없습니다.`;
        showConfirm('공지 삭제', msg, async () => {

                {/* 운영진 전용 — 운영 허브(편집 진입). 열려 있으면 아래 섹션 대신 이 화면만 */}
                {tab === 'meeting' && viewMeeting && isAdminMode && adminHub && (
                    <MeetingAdminHub
                        meeting={viewMeeting} teamStatus={teamStatus} matchStatus={matchStatus}
                        isMatchKind={viewKind === 'match'}
                        onClose={() => setAdminHub(false)}
                        onEditInfo={() => { setPendingEditMeeting(viewMeeting); setViewMeetingId(null); }}
                        onTeam={() => { setAdminHub(false); setMeetingSubTab('team'); setOpenExtra([]); }}
                        onMatch={() => { setAdminHub(false); setMeetingSubTab('match'); setOpenExtra([]); }}
                    />
                )}
                {/* 회원=지금 할 일(맨 위) / 관리자=출석 서브탭 */}
                {tab === 'meeting' && viewMeeting && !(isAdminMode && adminHub) && (
                  <MeetingSection title="출석"
                    icon={{ el: <Icon.CheckSq size={18}/>, bg:'#eef2fb', fg:'#122E78' }}
                    summary={mySession?.checkedIn ? '출석 완료' : attend.myRegistration?.status === 'confirmed' ? `신청 완료 · ${meetingParticipants.length}/${viewMeeting.maxLimit||18}명` : attend.myRegistration?.status === 'waiting' ? `대기 ${attend.myWaitingPosition||''}번` : `${meetingParticipants.length}/${viewMeeting.maxLimit||18}명 참여`}

                    <TabAttend
                        viewMeeting={viewMeeting} isViewActive={isViewActive}
                        onEditMeeting={(m) => { setPendingEditMeeting(m); setViewMeetingId(null); }}
                        isAdminMode={isAdminMode} isAttendPanelOpen={attend.isAttendPanelOpen}
                        setIsAttendPanelOpen={attend.setIsAttendPanelOpen}
                        generateAttendQRCode={generateAttendQRCode} attendToggleTestMode={attendToggleTestMode}
                        testMode={testMode} attendSubTab={attend.attendSubTab} setAttendSubTab={attend.setAttendSubTab}
                        selectedHistoryDetail={attend.selectedHistoryDetail}
                        setSelectedHistoryDetail={attend.setSelectedHistoryDetail}
                        attendActiveList={attend.attendActiveList} attendIsPending={attend.attendIsPending}
                        darkMode={darkMode}
                        meetingSettings={displayMeetingSettings} updateMeetingSettingsAdmin={updateMeetingSettingsAdmin}
                        attendActiveParticipants={attend.attendActiveParticipants}
                        snapMin={attend.snapMin} attendHourOptions={attend.attendHourOptions}
                        attendMinuteOptions={attend.attendMinuteOptions}
                        setIsLocationPickerOpen={attend.setIsLocationPickerOpen}
                        localMaxLimit={attend.localMaxLimit} setLocalMaxLimit={attend.setLocalMaxLimit}
                        memberData={memberData} memberInfo={memberInfo} inTestPreview={inTestPreview} attendNormalMembers={attend.attendNormalMembers}
                        activeMembers={roster.activeMembers}
                        tmSessionData={team.tmSessionData}
                        attendToggleParticipant={attendToggleParticipant}
                        setIsAttendGuestModalOpen={attend.setIsAttendGuestModalOpen}
                        attendHandleTestSelect={attendHandleTestSelect}
                        attendHandleResetSelection={attendHandleResetSelection}
                        attendGuestEligibleMembers={attend.attendGuestEligibleMembers}
                        attendToggleParticipantAsGuest={attendToggleParticipantAsGuest}
                        attendOpenAddGuest={attendOpenAddGuest}
                        attendOpenEditGuest={attendOpenEditGuest}
                        attendDeleteParticipant={attendDeleteParticipant}
                        attendCheckedInCount={attend.attendCheckedInCount}
                        attendWaitingList={attend.attendWaitingList}
                        attendGroupedTeams={attend.attendGroupedTeams}
                        setAttendModal={attend.setAttendModal}
                        attendUnassignedActive={attend.attendUnassignedActive}
                        attendLimit={attend.attendLimit} attendHistory={attend.attendHistory}
                        setHistorySortKey={attend.setHistorySortKey}
                        setHistorySortOrder={attend.setHistorySortOrder}
                        historySortKey={attend.historySortKey} historySortOrder={attend.historySortOrder}
                        isEditingHistoryLocation={attend.isEditingHistoryLocation}
                        setIsEditingHistoryLocation={attend.setIsEditingHistoryLocation}
                        editHistoryLocationValue={attend.editHistoryLocationValue}
                        setEditHistoryLocationValue={attend.setEditHistoryLocationValue}
                        handleUpdateHistoryLocation={handleUpdateHistoryLocation}
                        sortedHistoryRecords={attend.sortedHistoryRecords}
                        setHistoryEditTarget={attend.setHistoryEditTarget}
                        attendHandleDeleteHistory={attendHandleDeleteHistory} mySession={mySession}
                        qrStatus={qrStatus} qrMessage={qrMessage} setQrStatus={setQrStatus}
                        setIsQRScannerOpen={setIsQRScannerOpen} gpsStatus={gpsStatus} distance={distance}
                        handleGPSCheckIn={handleGPSCheckIn} handleGPSAttend={handleGPSAttend}
                        isCheckingIn={isCheckingIn} setGpsStatus={setGpsStatus}
                        isKioskOpen={attend.isKioskOpen} setIsKioskOpen={attend.setIsKioskOpen}
                        attendHandleCheckIn={attendHandleCheckIn} attendHandleUncheckIn={attendHandleUncheckIn}
                        isMeetingOver={attend.isMeetingOver}
                        attendHandleEndMeeting={attendHandleEndMeeting}
                        myRegistration={attend.myRegistration}
                        regConfirmedCount={attend.regConfirmedCount}
                        myWaitingPosition={attend.myWaitingPosition}
                        handleRegister={handleRegister}
                        handleCancel={handleCancel}
                        handleAbsent={handleAbsent}
                        handleUndoAbsent={handleUndoAbsent}
                        onOpenAttendModal={openAttendModal}
                    />
                  </MeetingSection>
                )}
                {/* 회원=내 팀 / 관리자=팀 편성 */}
                {tab === 'meeting' && viewMeeting && !(isAdminMode && adminHub) && (
                  <MeetingSection title={viewKind === 'match' ? '명단' : '팀'}
                    icon={{ el: <Icon.Users size={18}/>, bg:'#dcfce7', fg:'#15803d' }}
                    summary={viewKind === 'match' ? `${meetingParticipants.length}명 참여` : (teamStatus.done ? `${teamStatus.label}${myTeamInfo ? ` · 내 팀 ${getTeamColorName(myTeamIdx)} ${myTeamInfo.jerseyNumber}번` : ''}` : teamStatus.label)}
                    open={isSecOpen('team')} onToggle={() => toggleSection('team')}>
                    <TabTeam
                        isAdminMode={isAdminMode} isTeamPanelOpen={team.isTeamPanelOpen} setIsTeamPanelOpen={team.setIsTeamPanelOpen}
                        teamMakerTab={team.teamMakerTab} setTeamMakerTab={team.setTeamMakerTab}
                        teamingSettings={team.teamingSettings} setTeamingSettings={team.setTeamingSettings}
                        excludedIds={team.excludedIds} setExcludedIds={team.setExcludedIds}
                        editTeams={team.editTeams} editMeetingDate={team.editMeetingDate} editIsConfirmed={team.editIsConfirmed}
                        selectedMemberTM={team.selectedMemberTM} setSelectedMemberTM={team.setSelectedMemberTM}
                        selectedTeamTM={team.selectedTeamTM} setSelectedTeamTM={team.setSelectedTeamTM}
                        draggedItem={team.draggedItem} dropIndicator={team.dropIndicator} setDropIndicator={team.setDropIndicator}
                        savedDrafts={team.savedDrafts} confirmedDrafts={team.confirmedDrafts}
                        teamStorageSubTab={team.teamStorageSubTab} setTeamStorageSubTab={team.setTeamStorageSubTab}
                        previewDraft={team.previewDraft} setPreviewDraft={team.setPreviewDraft}
                        isCapturing={team.isCapturing} teamDraftData={team.teamDraftData}
                        teamReady={teamReady} allowFromDisplay={allowFromDisplay}
                        myTeamIdx={myTeamIdx} memberData={memberData} allMembers={roster.allMembers}
                        teamsDisabled={viewKind === 'match'} participants={meetingParticipants}
                        tmMeetingDate={team.tmMeetingDate} tmActiveList={team.tmActiveList}
                        tmEntryList={team.tmEntryList} tmLevelStats={team.tmLevelStats} tmUnassigned={team.tmUnassigned}
                        generateTeams={generateTeams} tmCapture={tmCapture} tmSaveDraft={tmSaveDraft}
                        tmConfirm={tmConfirm} tmReset={tmReset} tmReGenerate={tmReGenerate}
                        tmDragStart={tmDragStart} tmDragEnd={tmDragEnd} tmMemberDragOver={tmMemberDragOver}
                        tmTeamDragOver={tmTeamDragOver} tmTeamDragLeave={tmTeamDragLeave}
                        tmDrop={tmDrop} tmMemberClick={tmMemberClick} tmMoveToTeam={tmMoveToTeam}
                        tmTeamBadgeClick={tmTeamBadgeClick} showConfirm={showConfirm}
                        selectedDraftIds={team.selectedDraftIds} setSelectedDraftIds={team.setSelectedDraftIds}
                        tmDeleteConfirmed={tmDeleteConfirmed} tmDeleteSelectedDrafts={tmDeleteSelectedDrafts}
                        embedded={!isAdminMode}
                    />
                  </MeetingSection>
                )}
                {/* 회원=경기 / 관리자=매치 관리 (매칭 모임 제외) */}
                {tab === 'meeting' && viewMeeting && viewKind !== 'match' && !(isAdminMode && adminHub) && (
                  <MeetingSection title="매치"
                    icon={{ el: <Icon.Swords size={16}/>, bg:'#fee2e2', fg:'#b91c1c' }}
                    summary={matchStatus.label}
                    open={isSecOpen('match')} onToggle={() => toggleSection('match')}>
                    <TabMatch
                        isAdminMode={isAdminMode} isMatchPanelOpen={match.isMatchPanelOpen} setIsMatchPanelOpen={match.setIsMatchPanelOpen}
                        matchAdminView={match.matchAdminView} setMatchAdminView={match.setMatchAdminView}
                        localSchedule={match.localSchedule} localCompletedMatches={match.localCompletedMatches}
                        setLocalCompletedMatches={match.setLocalCompletedMatches} localMatchIndex={match.localMatchIndex}
                        matchConfig={match.matchConfig} setMatchConfig={match.setMatchConfig}
                        meetings={visibleMeetings}
                        matchIsSaving={match.matchIsSaving} matchIsCapturing={match.matchIsCapturing}
                        presets={match.presets} selectedPresetId={match.selectedPresetId}
                        setSelectedPresetId={match.setSelectedPresetId} presetToggles={match.presetToggles}
                        confirmedDrafts={team.confirmedDrafts} matchStatsData={match.matchStatsData}
                        scheduleData={scheduleData} matchViewMode={matchViewMode} setMatchViewMode={setMatchViewMode}
                        myTeamInfo={myTeamInfo}
                        matchSaveSchedule={matchSaveSchedule} matchHandleCapture={matchHandleCapture}
                        matchGenerateTable={matchGenerateTable}
                        matchHandleNextMatch={matchHandleNextMatch} matchHandlePrevMatch={matchHandlePrevMatch}
                        matchHandleToggleComplete={matchHandleToggleComplete} matchHandleAutoAdvance={matchHandleAutoAdvance}
                        matchHandlePresetSelect={matchHandlePresetSelect} matchToggleSubCourt={matchToggleSubCourt}
                        splitTime={splitTime} setIsLoadMatchModalOpen={match.setIsLoadMatchModalOpen}
                        setIsPresetModalOpen={match.setIsPresetModalOpen}
                        embedded={!isAdminMode}
                    />
                  </MeetingSection>
                )}
                {/* (지금 할 일은 맨 위로 이동) */}
                {/* 회비 탭 제거(단계 3) — 회비/벌금 카드·DevDuesToggle은 MY 탭으로 일원화 */}
                {tab === 'rules' && (
                    <TabRules isAdminMode={isAdminMode} showAlert={showAlert} memberName={memberName}/>
                )}
                {tab === 'my' && (
                    <TabMy
                        memberInfo={memberInfo} memberName={memberName} isAdminMode={isAdminMode}
                        onOpenProfile={() => setIsProfileModalOpen(true)}
                        notifPermission={notifPermission} registerFcmToken={registerFcmToken}
                        darkMode={darkMode} toggleTheme={toggleTheme} handleLogout={handleLogout}
                        isDeveloper={isDeveloper} viewMode={viewMode} onChangeViewMode={changeViewMode} onLockDeveloper={lockDeveloper}
                        attendHistory={attend.attendHistory} managers={managers}
                    />
                )}
                {tab === 'roster' && isAdminMode && (
                    <TabRoster
                        rosterSubTab={roster.rosterSubTab} setRosterSubTab={roster.setRosterSubTab}
                        setIsAddModalOpen={roster.setIsAddModalOpen}
                        activeMembers={roster.activeMembers} allMembers={roster.allMembers}
                        resignedMembers={roster.resignedMembers} attendHistory={attend.attendHistory}
                        attendHistoryTrash={attend.attendHistoryTrash} showConfirm={showConfirm} showAlert={showAlert}
                        setEditingMember={roster.setEditingMember}
                        setResigningMember={roster.setResigningMember} setResignForm={roster.setResignForm}
                        handleRestoreResigned={handleRestoreResigned} setDeletingMember={roster.setDeletingMember}
                        moveMonth={moveMonth} targetMonth={roster.targetMonth}
                        filterCounts={roster.filterCounts} filterCategory={roster.filterCategory}
                        setFilterCategory={roster.setFilterCategory}
                        filteredMembers={roster.filteredMembers}
                        monthlyStatuses={roster.monthlyStatuses} monthlyReasons={roster.monthlyReasons}
                        monthlyPaymentDates={roster.monthlyPaymentDates} duesReports={roster.duesReports}
                        handleBillingMemberClick={handleBillingMemberClick}
                        onConfirmDuesReport={confirmDuesReport} onRejectDuesReport={openDuesReject}
                    />
                )}
            </div>

            {!attend.isKioskOpen && <div className="tab-bar fixed bottom-0 left-0 right-0 z-50 pb-safe">
                <div className="flex items-center gap-1 h-24 w-full px-2">
                    {[
                        {key:'home',    label:'홈',   Comp:Icon.Home},
                        {key:'meeting', label:'모임', Comp:Icon.Calendar},
                        {key:'notice',  label:'게시판', Comp:Icon.Clipboard},
                        {key:'my',      label:'MY', Comp:Icon.User},
                        ...(isAdminMode ? [{key:'roster', label:'명단', Comp:Icon.List}] : []),
                    ].map(({key,label,Comp})=>{
                        const active = tab===key;
                        return (
                            <button key={key} onClick={()=>{ if (key === 'meeting') setViewMeetingId(null); setTab(key); }}
                                className={`relative flex flex-col items-center justify-center flex-1 h-full transition-all ${active?'text-teal-500':'text-slate-400'}`}>
                                {active && <span className="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-[3px] rounded-full bg-teal-500"/>}
                                <Comp size={30}/>
                                <span className={`text-[11px] font-black mt-1 ${active?'text-teal-500':'text-slate-400'}`}>{label}</span>
                            </button>
                        );
                    })}
                </div>
            </div>}

            {toast.show && (
                <div className={`fixed bottom-28 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-sm font-black shadow-xl z-50 whitespace-nowrap transition-all ${toast.type==='error'?'bg-red-500 text-white':toast.type==='success'?'bg-emerald-500 text-white':'bg-slate-700 text-white'}`}>
                    {toast.msg}
                </div>
            )}
            <AppModals
                billingMember={roster.billingMember} setBillingMember={roster.setBillingMember}
                actionStep={roster.actionStep} setActionStep={roster.setActionStep}
                paymentDateInput={roster.paymentDateInput} setPaymentDateInput={roster.setPaymentDateInput}
                manualEndDate={roster.manualEndDate} setManualEndDate={roster.setManualEndDate}
                selectedAction={roster.selectedAction} setSelectedAction={roster.setSelectedAction}
                processAction={processAction}
                specialRestReason={roster.specialRestReason} setSpecialRestReason={roster.setSpecialRestReason}
                targetMonth={roster.targetMonth}
                monthlyStatuses={roster.monthlyStatuses} monthlyReasons={roster.monthlyReasons}
                meetingParticipants={attend.attendActiveParticipants}
                isAddModalOpen={roster.isAddModalOpen} setIsAddModalOpen={roster.setIsAddModalOpen}
                newMemberForm={roster.newMemberForm} setNewMemberForm={roster.setNewMemberForm}
                activeMembers={roster.activeMembers} handleAddMember={handleAddMember}
                editingMember={roster.editingMember} setEditingMember={roster.setEditingMember}
                handleUpdateMember={handleUpdateMember}
                resigningMember={roster.resigningMember} setResigningMember={roster.setResigningMember}
                resignForm={roster.resignForm} setResignForm={roster.setResignForm}
                handleResignConfirm={handleResignConfirm}
                deletingMember={roster.deletingMember} setDeletingMember={roster.setDeletingMember}
                handleDeleteMember={handleDeleteMember}
                previewDraft={team.previewDraft} setPreviewDraft={team.setPreviewDraft}
                tmLoadDraft={tmLoadDraft}
                isLoadMatchModalOpen={match.isLoadMatchModalOpen} setIsLoadMatchModalOpen={match.setIsLoadMatchModalOpen}
                savedMatchSchedules={match.savedMatchSchedules}
                setLocalSchedule={match.setLocalSchedule} setMatchConfig={match.setMatchConfig}
                setLocalCompletedMatches={match.setLocalCompletedMatches}
                setLocalMatchIndex={match.setLocalMatchIndex}
                setActiveMatchScheduleId={match.setActiveMatchScheduleId}
                setMatchAdminView={match.setMatchAdminView} showConfirm={showConfirm}
                isPresetModalOpen={match.isPresetModalOpen} setIsPresetModalOpen={match.setIsPresetModalOpen}
                presetForm={match.presetForm} setPresetForm={match.setPresetForm}
                matchSavePreset={matchSavePreset}
                alertModal={alertModal} setAlertModal={setAlertModal}
                isQRScannerOpen={isQRScannerOpen} setIsQRScannerOpen={setIsQRScannerOpen}
                handleInAppQRScan={handleInAppQRScan}
                attendModal={attend.attendModal} setAttendModal={attend.setAttendModal}
                attendHandleUncheckIn={attendHandleUncheckIn} attendHandleCheckIn={attendHandleCheckIn}
                isAttendGuestModalOpen={attend.isAttendGuestModalOpen}
                setIsAttendGuestModalOpen={attend.setIsAttendGuestModalOpen}
                attendNewGuest={attend.attendNewGuest} setAttendNewGuest={attend.setAttendNewGuest}
                attendIsPending={attend.attendIsPending} attendHandleAddGuest={attendHandleAddGuest}
                attendEditingGuestId={attend.attendEditingGuestId}
                historyEditTarget={attend.historyEditTarget} setHistoryEditTarget={attend.setHistoryEditTarget}
                handleHistoryStatusUpdate={handleHistoryStatusUpdate}
                isQRGenModalOpen={attend.isQRGenModalOpen} setIsQRGenModalOpen={attend.setIsQRGenModalOpen}
                meetingSettings={meetingSettings}
                isLocationPickerOpen={attend.isLocationPickerOpen}
                setIsLocationPickerOpen={attend.setIsLocationPickerOpen}
                updateMeetingSettingsAdmin={updateMeetingSettingsAdmin}
                announcementModal={announcementModal} setAnnouncementModal={setAnnouncementModal}
                handleSaveAnnouncement={handleSaveAnnouncement}
                isProfileModalOpen={isProfileModalOpen} setIsProfileModalOpen={setIsProfileModalOpen}
                memberInfo={memberInfo} memberData={memberData} showAlert={showAlert}
            />
            {/* 출석 풀스크린 모달 (홈 카드 '출석하기') — CheckInPanel(GPS/QR) F-2a-1a */}
            {attendModalOpen && (
                <AttendModal
                    onClose={closeAttendModal} meeting={displayMeetingSettings}
                    mySession={mySession} meetingSettings={displayMeetingSettings}
                    gpsStatus={gpsStatus} distance={distance} setGpsStatus={setGpsStatus}
                    handleGPSCheckIn={handleGPSCheckIn} handleGPSAttend={handleGPSAttend} isCheckingIn={isCheckingIn}
                    qrStatus={qrStatus} qrMessage={qrMessage} setQrStatus={setQrStatus} setIsQRScannerOpen={setIsQRScannerOpen}
                />
            )}
            {/* 회비 신고 반려 사유 모달 (관리자) */}
            {duesReject && (
                <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40" onClick={() => setDuesReject(null)}>
                    <div className="bg-white rounded-3xl p-5 w-full max-w-sm" onClick={e => e.stopPropagation()}>
                        <p className="font-black text-lg text-slate-800">납부 신고 반려</p>
                        <p className="text-sm text-slate-500 mt-1 leading-relaxed">
                            <b className="text-slate-700">{duesReject.memberName || '회원'}</b>님의 {duesReject.month} 회비 신고를 반려합니다. 사유를 적으면 회원에게 함께 전달돼요.
                        </p>
                        <textarea value={duesRejectReason} onChange={e => setDuesRejectReason(e.target.value)} rows={3}
                            placeholder="반려 사유 (예: 입금 확인 안 됨) · 비워도 됩니다"
                            className="w-full mt-3 p-3 rounded-xl border border-slate-200 text-sm resize-none focus:outline-none focus:border-teal-400"/>
                        <div className="flex gap-2 mt-4">
                            <button onClick={() => setDuesReject(null)} className="flex-1 py-2.5 rounded-xl bg-slate-100 text-slate-500 font-black text-sm active:scale-95 transition-all">취소</button>
                            <button onClick={submitDuesReject} className="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-black text-sm active:scale-95 transition-all">반려하고 알림 보내기</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
