<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// в”Җв”Җ м „м—ӯ л’ӨлЎңк°Җкё° л“ұлЎқмҶҢ: лӘЁлӢ¬В·м „мІҙнҷ”л©ҙ мҳӨлІ„л ҲмқҙлҘј LIFOлЎң лӢ«кё° (мһҗмӢқ м»ҙнҸ¬л„ҢнҠё кіөмҡ©) в”Җв”Җ
window.MoidaBack = window.MoidaBack || {
    stack: [], onChange: null,
    register(close) {
        const e = { close };
        this.stack.push(e);
        this.onChange && this.onChange();
        return () => { const i = this.stack.indexOf(e); if (i >= 0) { this.stack.splice(i, 1); this.onChange && this.onChange(); } };
    },
    pop() { const e = this.stack.pop(); if (e) { e.close(); this.onChange && this.onChange(); return true; } return false; },
    get depth() { return this.stack.length; }
};
// мҳӨлІ„л Ҳмқҙк°Җ м—ҙл Ө мһҲлҠ” лҸҷм•Ҳ л“ұлЎқмҶҢм—җ лӢ«кё° н•ЁмҲҳлҘј мҳ¬л Өл‘”лӢӨ (мһҗмӢқ м–ҙл””м„ңл“  н•ң мӨ„лЎң л’ӨлЎңк°Җкё° м—°лҸҷ)
function useMoidaBack(isOpen, close) {
    const closeRef = React.useRef(close);
    closeRef.current = close;
    React.useEffect(() => {
        if (!isOpen) return;
        return window.MoidaBack.register(() => closeRef.current && closeRef.current());
    }, [isOpen]);
}
window.useMoidaBack = useMoidaBack;

function App() {
    const [appView, setAppView] = useState('loading');
    const [tab, setTab] = useState(() => {
        try {
            const t = sessionStorage.getItem('moida_tab') || 'home';
            // кё°мЎҙ м¶ңм„қ/нҢҖ/л§Өм№ҳ нғӯмқҖ 'лӘЁмһ„' нғӯмңјлЎң нҶөн•© вҶ’ ліөмӣҗ мӢң лӘЁмһ„мңјлЎң л§Өн•‘
            return (t === 'attend' || t === 'team' || t === 'match') ? 'meeting' : t;
        } catch(e) { return 'home'; }
    });
    // лӘЁмһ„ нғӯ м•Ҳмқҳ н•ҳмң„ нғӯ(м¶ңм„қ/нҢҖ/л§Өм№ҳ)
    const [meetingSubTab, setMeetingSubTab] = useState(() => {
        try {
            const t = sessionStorage.getItem('moida_tab');
            if (t === 'attend' || t === 'team' || t === 'match') return t;
            return sessionStorage.getItem('moida_meeting_sub') || 'attend';
        } catch(e) { return 'attend'; }
    });
    // лӘЁмһ„ нғӯм—җм„ң ліҙкі  мһҲлҠ” лӘЁмһ„ (null = лӘЁмһ„ м№ҙл“ң лӘ©лЎқ). мғҲлЎңкі м№Ё нӣ„м—җлҸ„ мң м§Җ.
    const [viewMeetingId, setViewMeetingId] = useState(() => {
        try { return sessionStorage.getItem('moida_view_meeting') || null; } catch(e) { return null; }
    });
    // мғҒм„ё нҷ”л©ҙ [мҲҳм •] лІ„нҠј вҶ’ лӘ©лЎқмқҳ лӘЁмһ„ кҙҖлҰ¬м—җм„ң мҲҳм • нҸј мһҗлҸҷ мҳӨн”Ҳ
    const [pendingEditMeeting, setPendingEditMeeting] = useState(null);
    // нҳ„мһ¬ нғӯ/н•ҳмң„ нғӯ кё°м–ө вҶ’ мғҲлЎңкі м№Ё(лӢ№кІЁм„ң/F5) нӣ„ к°ҷмқҖ мң„м№ҳлЎң ліөмӣҗ. м•ұмқ„ мҷ„м „нһҲ лӢ«мңјл©ҙ мҙҲкё°нҷ”(нҷҲ).
    React.useEffect(() => { try { sessionStorage.setItem('moida_tab', tab); } catch(e) {} }, [tab]);
    React.useEffect(() => { try { sessionStorage.setItem('moida_meeting_sub', meetingSubTab); } catch(e) {} }, [meetingSubTab]);
    React.useEffect(() => { try { if (viewMeetingId) sessionStorage.setItem('moida_view_meeting', viewMeetingId); else sessionStorage.removeItem('moida_view_meeting'); } catch(e) {} }, [viewMeetingId]);
    // л§Өм№ӯлӘЁмһ„мқҖ нҢҖнҺём„ұВ·л§Өм№ҳн…Ңмқҙлё”мқҙ м—ҶмқҢ вҶ’ 'attend'/'team'(лӘ…лӢЁ)л§Ң. 'match' м„ңлёҢнғӯмқҙл©ҙ м¶ңм„қмңјлЎң ліҙлғ„.
    React.useEffect(() => {
        if (activeMeetingKind === 'match' && meetingSubTab === 'match') setMeetingSubTab('attend');
    }, [activeMeetingKind, meetingSubTab]);
    // нҷҲ нғӯмңјлЎң лҸҢм•„мҳӨл©ҙ н•ӯмғҒ м •кё° лӘЁмһ„ м»Ён…ҚмҠӨнҠёлЎң лҰ¬м…Ӣ (н—ӨлҚ”/нҷҲм№ҙл“ң мҳӨлІ„л Ҳмқҙк°Җ м •кё° лӘЁмһ„ кё°мӨҖмңјлЎң лҸҷмһ‘н•ҳлҸ„лЎқ)
    React.useEffect(() => { if (tab === 'home') setActiveMeetingKind('self'); }, [tab]);
    // м¶ңм„қ/нҢҖ/л§Өм№ҳлЎңмқҳ мқҙлҸҷмқ„ 'лӘЁмһ„' нғӯ + н•ҳмң„ нғӯмңјлЎң ліҖнҷҳн•ҳлҠ” л„Өл№„кІҢмқҙм…ҳ н—¬нҚј.
    // meetingIdлҘј мЈјл©ҙ к·ё лӘЁмһ„ мғҒм„ёлЎң м§Ғн–ү(нҷҲ м№ҙл“ң). м—Ҷмқҙ л“Өм–ҙмҳӨл©ҙ(QR м¶ңм„қ л“ұ) н•ҙлӢ№ мў…лҘҳмқҳ нҳ„мһ¬ лӘЁмһ„мңјлЎң.
    const navTab = (t, kind, meetingId) => {
        if (t === 'meeting-list') { setViewMeetingId(null); setTab('meeting'); return; }
        if (t === 'attend' || t === 'team' || t === 'match') {
            if (kind) setActiveMeetingKind(kind);
            if (meetingId) setViewMeetingId(meetingId);
            else if (!viewMeetingId) {
                const k = kind || activeMeetingKind;
                const act = getActiveMeeting((meetings || []).filter(m => k === 'match' ? (m.meetingType||'self') === 'match' : (m.meetingType||'self') !== 'match'));
                if (act) setViewMeetingId(act.id);
            }
            setMeetingSubTab(t); setTab('meeting');
        }
        else setTab(t);
    };
    const [memberData, setMemberData] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (!s) { location.href = 'index.html'; return null; }
            return s;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const [memberInfo, setMemberInfo] = useState(null);
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const isAdmin = ADMIN_ROLES.includes(memberData?.role);
    const isAdminMode = ADMIN_ROLES.includes(memberData?.role);
    const inTestPreview = (() => { try { return !!localStorage.getItem('moida_admin_backup'); } catch(e) { return false; } })();
    const [testExists, setTestExists] = useState(false);
    useEffect(() => {
        if (!isAdmin || inTestPreview) { setTestExists(false); return; }
        const unsub = getCol('members').where('isTest','==',true).onSnapshot(s => setTestExists(!s.empty), () => {});
        return () => unsub();
    }, [isAdmin, inTestPreview]);
    const [meetingSettings, setMeetingSettings] = useState(null);
    const [meetingSettingsMatch, setMeetingSettingsMatch] = useState(null);
    const [activeMeetingKind, setActiveMeetingKind] = useState('self');
    const [meetings, setMeetings] = useState([]);
    const displayMeetingSettings = activeMeetingKind === 'match' ? meetingSettingsMatch : meetingSettings;
    // лӘЁмһ„ нғӯм—җм„ң ліҙкі  мһҲлҠ” лӘЁмһ„ к°қмІҙ (meetings мӢӨмӢңк°„ кө¬лҸ…м—җм„ң нҢҢмғқ вҖ” мҲҳм •/мӮӯм ң мҰүмӢң л°ҳмҳҒ)
    const viewMeeting = meetings.find(m => m.id === viewMeetingId) || null;
    const viewKind = viewMeeting ? ((viewMeeting.meetingType || 'self') === 'match' ? 'match' : 'self') : null;
    // ліҙкі  мһҲлҠ” лӘЁмһ„ мў…лҘҳм—җ л§һм¶° лҚ°мқҙн„° м»Ён…ҚмҠӨнҠё(м •кё°/л§Өм№ӯ лҜёлҹ¬) мһҗлҸҷ м „нҷҳ
    React.useEffect(() => { if (viewKind) setActiveMeetingKind(viewKind); }, [viewMeetingId, viewKind]);
    // лӘЁмһ„ нғӯ м»Ён…ҚмҠӨнҠё вҖ” ліҙкі  мһҲлҠ” лӘЁмһ„ мҡ°м„ , м•„лӢҲл©ҙ нҳ„мһ¬ лӘЁмһ„(лҜёлҹ¬). нҢҖнҺём„ұВ·л§Өм№ҳ лҚ°мқҙн„°к°Җ мқҙ лӘЁмһ„мқ„ л”°лқјк°„лӢӨ.
    const effectiveMeeting = viewMeeting || displayMeetingSettings;
    // л§Өм№ҳн…Ңмқҙлё”мқҖ м •кё°(мһҗмІҙм „) лӘЁмһ„ м „мҡ© вҖ” л§Өм№ӯлӘЁмһ„мқ„ ліҙлҠ” мӨ‘м—җлҠ” м •кё° лҜёлҹ¬ мң м§Җ
    const effectiveSelfMeeting = (viewMeeting && viewKind === 'self') ? viewMeeting : meetingSettings;
    // лӘЁмһ„ нғӯмқ„ лІ—м–ҙлӮҳл©ҙ ліҙлҚҳ лӘЁмһ„ н•ҙм ң вҶ’ нҷҲ м№ҙл“ңВ·н—ӨлҚ”к°Җ н•ӯмғҒ 'нҳ„мһ¬ лӘЁмһ„' кё°мӨҖмңјлЎң лҸҷмһ‘
    React.useEffect(() => { if (tab !== 'meeting') setViewMeetingId(null); }, [tab]);
    const testMode = !!displayMeetingSettings?.testMode;
    const [mySession, setMySession] = useState(null);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null});
    const [duesReject, setDuesReject] = useState(null);          // нҡҢл№„ мӢ кі  л°ҳл Ө лҢҖмғҒ report (nullмқҙл©ҙ лӢ«нһҳ)
    const [duesRejectReason, setDuesRejectReason] = useState(''); // л°ҳл Ө мӮ¬мң  мһ…л Ҙк°’
    const [announcementModal, setAnnouncementModal] = useState({ open: false, mode: 'add', data: null });
    const showAlert = (title, content, type='info', onConfirm=null) => setAlertModal({show:true, title, content, type, onConfirm});
    const showConfirm = (title, content, onConfirm) => setAlertModal({show:true, title, content, type:'confirm', onConfirm});
    // нҡҢл№„ мӢ кі  л°ҳл Ө: мӮ¬мң  мһ…л Ҙ лӘЁлӢ¬ м—ҙкё° вҶ’ нҷ•мқё мӢң мӢ кі  мӮӯм ң + нҡҢмӣҗм—җкІҢ л°ҳл Ө н‘ёмӢң(мӮ¬мң  нҸ¬н•Ё).
    // н‘ёмӢңлҠ” notifications л¬ём„ң м¶”к°Җ(type:'dues',pushOnly) вҶ’ м„ңлІ„к°Җ м „мҶЎ, кіөм§Җм—” м•Ҳ лңё.
    const openDuesReject = (report) => { if (!report || !report.memberId || !report.month) return; setDuesRejectReason(''); setDuesReject(report); };
    const submitDuesReject = async () => {
        const r = duesReject; if (!r) return;
        const reason = duesRejectReason.trim();
        try {
            await getCol('dues_reports').doc(`${r.month}_${r.memberId}`).delete();
            await getCol('notifications').add({
                title: 'нҡҢл№„ мӢ кі к°Җ л°ҳл Өлҗҳм—Ҳм–ҙмҡ”',
                body: reason ? `${r.month} нҡҢл№„ мӢ кі к°Җ л°ҳл Өлҗҳм—Ҳм–ҙмҡ”. мӮ¬мң : ${reason}` : `${r.month} нҡҢл№„ мӢ кі к°Җ л°ҳл Өлҗҳм—Ҳм–ҙмҡ”. мһ…кёҲ лӮҙм—ӯмқ„ лӢӨмӢң нҷ•мқён•ҙ мЈјм„ёмҡ”.`,
                targetMemberIds: [r.memberId], type: 'dues', pushOnly: true,
                sentAt: new Date().toISOString(),
            });
            setDuesReject(null);
            showAlert('л°ҳл Ө мҷ„лЈҢ', `${r.memberName || 'нҡҢмӣҗ'}лӢҳк»ҳ л°ҳл Ө м•ҢлҰјмқ„ ліҙлғҲм–ҙмҡ”.`);
        } catch(e) { console.error(e); showAlert('мҳӨлҘҳ', 'л°ҳл Ө мІҳлҰ¬м—җ мӢӨнҢЁн–Ҳм–ҙмҡ”.'); }
    };
    const [toast, setToast] = useState({ show:false, msg:'', type:'info' });
    const showToast = (msg, type='info') => { setToast({show:true,msg,type}); setTimeout(()=>setToast(p=>({...p,show:false})),3000); };
    const [gpsStatus, setGpsStatus] = useState('idle');
    const [distance, setDistance] = useState(null);
    const [isCheckingIn, setIsCheckingIn] = useState(false);
    const [qrStatus, setQrStatus] = useState('idle');
    const [qrMessage, setQrMessage] = useState('');
    const [isQRScannerOpen, setIsQRScannerOpen] = useState(false);
    const [attendModalOpen, setAttendModalOpen] = useState(false);
    const [dismissedMeetingId, setDismissedMeetingId] = useState(null); // F-2a-1b мһҗлҸҷн‘ңмӢң лҢҖл№„(мқҙлІҲм—” onClose кё°лЎқл§Ң)
    const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
    const [lastScannedQR, setLastScannedQR] = useState({ token:null, date:null });
    const [nowTime, setNowTime] = useState(() => new Date());
    useEffect(() => { const t = setInterval(() => setNowTime(new Date()), 30000); return () => clearInterval(t); }, []);

    // кё°лҠҘлі„ нӣ…
    const { notifPermission, registerFcmToken, announcements } = useFCM({ memberData, showToast });

    // в”Җв”Җ кіөм§Җ кІҢмӢңнҢҗ м§„мһ… + м•ҲмқҪмқҢ л°°м§Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // м•ҲмқҪмқҢ нҢҗм •: localStorageм—җ 'л§Ҳм§Җл§үмңјлЎң ліё мөңмӢ  кіөм§Җ sentAt'мқ„ м ҖмһҘн•ҳкі 
    // к·ёліҙлӢӨ мғҲ кіөм§Җ мҲҳлҘј л°°м§ҖлЎң. н•ңкі„: кё°кё°/лёҢлқјмҡ°м Җлі„лЎң л”°лЎң кҙҖлҰ¬лҗҳкі  мәҗмӢң мӮӯм ң мӢң мҙҲкё°нҷ”лҗЁ.
    const [lastSeenAnnounce, setLastSeenAnnounce] = useState(() => {
        try { return localStorage.getItem('moida_lastSeenAnnounce') || ''; } catch { return ''; }
    });
    const unreadCount = announcements.filter(a => a.sentAt && a.sentAt > lastSeenAnnounce).length;
    // мў…/мҲңнҷҳ лқ  вҶ’ кіөм§Җ кІҢмӢңнҢҗ нҷ”л©ҙмңјлЎң мқҙлҸҷ(лӘЁлӢ¬ лҢҖмӢ  нғӯ м „нҷҳ). м§„мһ… мӢң м•ҲмқҪмқҢ к°ұмӢ .
    const openAnnouncements = () => {
        setTab('notice');
        const newest = announcements[0]?.sentAt; // мөңмӢ мҲңмқҙлқј [0]мқҙ к°ҖмһҘ мғҲ кіөм§Җ
        if (newest && newest > lastSeenAnnounce) {
            try { localStorage.setItem('moida_lastSeenAnnounce', newest); } catch {}
            setLastSeenAnnounce(newest);
        }
    };
    // м¶ңм„қ н’ҖмҠӨнҒ¬лҰ° лӘЁлӢ¬ м—ҙкё°/лӢ«кё° (нҷҲ м№ҙл“ң 'м¶ңм„қн•ҳкё°' вҶ’ м—ҙкё°, X/л’ӨлЎң/л№ҲмҳҒм—ӯ вҶ’ лӢ«кё°). F-2a-1a
    const openAttendModal = () => { setDismissedMeetingId(null); setAttendModalOpen(true); };
    const closeAttendModal = () => { setAttendModalOpen(false); setDismissedMeetingId(getMeetingId(meetingSettings)); };
    const roster = useRoster({ isAdminMode });
    const team = useTeam({ isAdminMode, meetingSettings: effectiveMeeting, allMembers: roster.allMembers });
    // м§қ1: м§ҖкёҲ ліҙлҠ” мһҗкё°(self) л§Өм№ҳн‘ңк°Җ 'мӮҙм•„мһҲлҠ” лӘЁмһ„(лҜёлҹ¬)' кІғмқём§Җ вҖ” мӣҢм№ҳмҡ© нҷңм„ұ л§Өм№ҳн‘ңлҘј к·ёл•Ңл§Ң к°ұмӢ (м§ҖлӮң/лӢӨлҘё лӘЁмһ„ кө¬кІҪ мӨ‘м—” м•Ҳ кұҙл“ңлҰј).
    //   нҷҲ(ліҙлҚҳ лӘЁмһ„ м—ҶмқҢ)мқҙл©ҙ лҜёлҹ¬ кё°мӨҖмқҙлқј н•ӯмғҒ лқјмқҙлёҢ. лӘЁмһ„ нғӯм—җм„ң self лӘЁмһ„мқ„ ліј л•җ к·ё лӮ м§ңк°Җ лҜёлҹ¬ лӮ м§ңмҷҖ к°ҷмқ„ л•Ңл§Ң лқјмқҙлёҢ(selfлҠ” лӮ м§ңк°Җ кі§ мӢқлі„мһҗ).
    const isLiveSelfView = !viewMeeting || (viewKind === 'self' && !!meetingSettings?.date && viewMeeting.date === meetingSettings.date);
    const match = useMatch({ isAdminMode, meetingSettings: effectiveSelfMeeting, confirmedDrafts: team.confirmedDrafts, isLiveView: isLiveSelfView });
    const { scheduleData, matchViewMode, setMatchViewMode } = match;
    const attend = useAttend({
        isAdminMode, memberData, meetingSettings: displayMeetingSettings,
        tmSessionData: team.tmSessionData,
        activeMembers: roster.activeMembers,
        tmMonthlyStatuses: team.tmMonthlyStatuses,
        teamDraftData: team.teamDraftData,
    });
    const { handleRegister, handleCancel, handleAbsent } = makeRegistrationHandlers({
        meetingDate: displayMeetingSettings?.date,
        memberData,
        meetingSettings: displayMeetingSettings,
        showToast,
        showAlert,
    });

    useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(e=>console.error(e));
    }, []);

    // в”Җв”Җ Android л’ӨлЎңк°Җкё°: мҳӨлІ„л Ҳмқҙ(л“ұлЎқмҶҢ) вҶ’ нҷ”л©ҙ нһҲмҠӨнҶ лҰ¬(м§Ғм „ нғӯ/мғҒм„ё) вҶ’ нҷҲ вҶ’ мў…лЈҢ в”Җв”Җ
    // member.html л ҲлІЁ лӘЁлӢ¬л“ӨлҸ„ к°ҷмқҖ л“ұлЎқмҶҢм—җ л“ұлЎқ (мһҗмӢқ мҳӨлІ„л ҲмқҙмҷҖ лҸҷмқјн•ҳкІҢ LIFO мІҳлҰ¬)
    useMoidaBack(isQRScannerOpen, () => setIsQRScannerOpen(false));
    useMoidaBack(attendModalOpen, () => setAttendModalOpen(false));
    useMoidaBack(attend.isKioskOpen, () => attend.setIsKioskOpen(false));
    useMoidaBack(announcementModal.open, () => setAnnouncementModal(m => ({ ...m, open: false })));
    useMoidaBack(isProfileModalOpen, () => setIsProfileModalOpen(false));
    useMoidaBack(!!(attend.attendModal && attend.attendModal.type), () => attend.setAttendModal({ type: null, data: null }));
    useMoidaBack(alertModal.show, () => setAlertModal(m => ({ ...m, show: false })));

    // нҷ”л©ҙ нһҲмҠӨнҶ лҰ¬ мҠӨнғқ (нғӯ/лӘЁмһ„мғҒм„ё мқҙлҸҷ кё°лЎқ вҶ’ л’ӨлЎңк°Җкё° мӢң 'м§Ғм „ нҷ”л©ҙ' ліөмӣҗ, нҷҲ н•ҳл“ңмҪ”л”© X)
    const navStackRef = React.useRef([]);
    const navTrapArmedRef = React.useRef(false);
    const navPoppingRef = React.useRef(false);
    const tabRef = React.useRef(tab);
    tabRef.current = tab;
    const navView = tab === 'meeting' ? viewMeetingId : null; // лӘЁмһ„ мғҒм„ёлҠ” лӘЁмһ„ нғӯмқј л•Ңл§Ң нҷ”л©ҙ кө¬л¶„м—җ мқҳлҜё
    const curScreen = { tab, viewMeetingId: navView };
    const curSig = `${tab}|${navView || ''}`;
    const prevSigRef = React.useRef(curSig);
    const prevScreenRef = React.useRef(curScreen);
    const syncBackTrap = React.useCallback(() => {
        const has = window.MoidaBack.depth > 0 || navStackRef.current.length > 0 || tabRef.current !== 'home';
        if (has && !navTrapArmedRef.current) { history.pushState({ moidaNav: true }, ''); navTrapArmedRef.current = true; }
    }, []);
    const restoreScreen = (s) => {
        navPoppingRef.current = true;
        setViewMeetingId(s.viewMeetingId || null);
        setTab(s.tab);
    };
    // нҷ”л©ҙмқҙ л°”лҖҢл©ҙ(м „м§„) м§Ғм „ нҷ”л©ҙмқ„ мҠӨнғқм—җ м ҖмһҘ. л’ӨлЎңк°Җкё°лЎң ліөмӣҗлҗң кІҪмҡ°м—” м ҖмһҘ м•Ҳ н•Ё.
    React.useEffect(() => {
        if (curSig !== prevSigRef.current) {
            if (navPoppingRef.current) navPoppingRef.current = false;
            else navStackRef.current.push(prevScreenRef.current);
            prevSigRef.current = curSig;
            prevScreenRef.current = curScreen;
        }
        syncBackTrap();
    }, [curSig]);
    // л“ұлЎқмҶҢ ліҖнҷ”(мһҗмӢқ мҳӨлІ„л Ҳмқҙ м—ҙлҰј/лӢ«нһҳ) мӢңм—җлҸ„ нҠёлһ© лҸҷкё°нҷ”
    React.useEffect(() => {
        window.MoidaBack.onChange = syncBackTrap;
        return () => { if (window.MoidaBack.onChange === syncBackTrap) window.MoidaBack.onChange = null; };
    }, [syncBackTrap]);
    // л’ӨлЎңк°Җкё° лҰ¬мҠӨл„Ҳ (н•ң лІҲл§Ң л“ұлЎқ)
    React.useEffect(() => {
        const onPop = () => {
            navTrapArmedRef.current = false;          // л°©кёҲ нҠёлһ©мқҙ л№ м§җ
            let remaining;
            if (window.MoidaBack.depth > 0) {         // 1) мҳӨлІ„л Ҳмқҙл¶Җн„° лӢ«кё° (LIFO)
                window.MoidaBack.pop();
                remaining = window.MoidaBack.depth + navStackRef.current.length;
            } else if (navStackRef.current.length > 0) { // 2) м§Ғм „ нҷ”л©ҙмңјлЎң
                restoreScreen(navStackRef.current.pop());
                remaining = navStackRef.current.length;
            } else if (tabRef.current !== 'home') {   // 3) мҠӨнғқ л№„м—Ҳм§Җл§Ң нҷҲ м•„лӢҲл©ҙ нҷҲмңјлЎң
                restoreScreen({ tab: 'home', viewMeetingId: null });
                remaining = 0;
            } else {
                return;                               // 4) нҷҲ лЈЁнҠё вҶ’ м•ұ мў…лЈҢ н—Ҳмҡ©
            }
            if (remaining > 0) { history.pushState({ moidaNav: true }, ''); navTrapArmedRef.current = true; }
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
    }, []);

    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_v2').onSnapshot(doc => {
            if (doc.exists) setMeetingSettings(doc.data());
        });
        return () => unsub();
    }, []);

    useEffect(() => {
        const unsub = getCol('settings').doc('meeting_schedule_match').onSnapshot(doc => {
            if (doc.exists && doc.data()?.date) setMeetingSettingsMatch(doc.data());
            else setMeetingSettingsMatch(null);
        });
        return () => unsub();
    }, []);

    useEffect(() => {
        const unsub = getCol('meetings').onSnapshot(snap =>
            setMeetings(snap.docs.map(d => ({id: d.id, ...d.data()})))
        );
        return () => unsub();
    }, []);

    useEffect(() => {
        if (!memberData?.memberId || !displayMeetingSettings?.date) return;
        setMySession(null);
        const _mid = getMeetingId(displayMeetingSettings);
        const unsub = getCol('weekly_session')
            .where('memberId', '==', memberData.memberId)
            .where('date', '==', displayMeetingSettings.date)
            .onSnapshot(snap => {
                const docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const found = docs.find(d => d.meetingId ? d.meetingId === _mid : !_mid.endsWith('__match'));
                setMySession(found || null);
            });
        return () => unsub();
    }, [memberData?.memberId, displayMeetingSettings?.date, displayMeetingSettings?.meetingType]);

    // м°ём—¬ лӘ…лӢЁ(л§Өм№ӯлӘЁмһ„) вҖ” нҷҲ м№ҙл“ң м°ём—¬мқёмӣҗ + л§Өм№ӯлӘЁмһ„ лӘ…лӢЁ нғӯ н‘ңмӢңмҡ©.
    // лӘЁмһ„ нғӯм—җм„ң л§Өм№ӯлӘЁмһ„мқ„ ліҙкі  мһҲмңјл©ҙ к·ё лӘЁмһ„ кё°мӨҖ, м•„лӢҲл©ҙ нҳ„мһ¬ л§Өм№ӯ лҜёлҹ¬ кё°мӨҖ.
    const [meetingParticipants, setMeetingParticipants] = useState([]);
    useEffect(() => {
        const ms = (viewMeeting && viewKind === 'match') ? viewMeeting : meetingSettingsMatch;
        if (!ms?.date) { setMeetingParticipants([]); return; }
        const lim = parseInt(ms?.maxLimit || 18);
        const _mid = getMeetingId(ms);
        const unsub = getCol('weekly_session')
            .where('date', '==', ms.date)
            .onSnapshot(snap => {
                const list = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .filter(p => p.status !== 'л…ёмҮј' && (p.meetingId ? p.meetingId === _mid : !_mid.endsWith('__match')))
                    .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0) || (a.name || '').localeCompare(b.name || ''));
                setMeetingParticipants(list.slice(0, lim));
            }, () => setMeetingParticipants([]));
        return () => unsub();
    }, [meetingSettingsMatch?.date, meetingSettingsMatch?.maxLimit, viewMeetingId, viewKind, viewMeeting?.maxLimit]);

    useEffect(() => {
        if (!memberData?.memberId) return;
        const unsub = getCol('members').doc(memberData.memberId).onSnapshot(doc => {
            if (doc.exists) setMemberInfo({ id: doc.id, ...doc.data() });
        });
        return () => unsub();
    }, [memberData]);

    useEffect(() => { if (memberData?.memberId) setAppView('app'); }, []);

    const urlParams = useMemo(() => getUrlParams(), []);

    const meetingDayInfo = useMemo(() => {
        if (!meetingSettings?.date || !meetingSettings?.start) return null;
        const [my,mm,md] = meetingSettings.date.split('-').map(Number);
        const [sh,sm] = meetingSettings.start.split(':').map(Number);
        const meetingStart = new Date(my,mm-1,md,sh,sm,0);
        const today0 = new Date(nowTime.getFullYear(),nowTime.getMonth(),nowTime.getDate(),0,0,0);
        const meetDay0 = new Date(my,mm-1,md,0,0,0);
        const dDays = Math.round((meetDay0-today0)/(1000*60*60*24));
        if (dDays < 0) return { type:'past' };
        if (dDays > 0) return { type:'future', label:`D-${dDays}` };
        const minsUntil = Math.round((meetingStart-nowTime)/60000);
        if (minsUntil > 60) return { type:'today', label:`${Math.floor(minsUntil/60)}мӢңк°„ ${minsUntil%60}л¶„ нӣ„` };
        if (minsUntil > 0) return { type:'today', label:`${minsUntil}л¶„ нӣ„ мӢңмһ‘`, urgent: minsUntil <= 30 };
        return { type:'started', label:'лӘЁмһ„ мӨ‘' };
    }, [meetingSettings, nowTime]);

    // нҢҖ кіөк°ң мӢңк°Ғ/м—¬л¶Җ вҖ” ліҙкі  мһҲлҠ” лӘЁмһ„ кё°мӨҖ (нҷҲм—җм„ңлҠ” ліҙлҚҳ лӘЁмһ„мқҙ н•ҙм ңлҗҳм–ҙ нҳ„мһ¬ лӘЁмһ„ кё°мӨҖ)
    const allowFromDisplay = useMemo(() => getAttendOpenTime(effectiveMeeting), [effectiveMeeting]);

    const teamReady = useMemo(() => isAttendOpen(effectiveMeeting, nowTime, testMode), [effectiveMeeting, nowTime, testMode]);

    // F-2a-1b мһҗлҸҷн‘ңмӢң вҖ” нҷҲм—җм„ң нҷңм„ұ м •кё°В·лҜём¶ңм„қВ·м¶ңм„қм—ҙлҰјмқҙл©ҙ н’ҖмҠӨнҒ¬лҰ° м¶ңм„қм°Ҫмқ„ 1нҡҢ мһҗлҸҷмңјлЎң лқ„мӣҖ(нҷ”л©ҙл§Ң, DBм“°кё° 0).
    // лӢ«мқҖ лӘЁмһ„(dismissedMeetingId)В·мқҙлҜё м—ҙлҰј(attendModalOpen)В·м¶ңм„қмҷ„лЈҢ(checkedIn)л©ҙ м•Ҳ лңё вҶ’ мһ¬мҳӨн”Ҳ/лЈЁн”„ м—ҶмқҢ.
    useEffect(() => {
        if (tab !== 'home' || attendModalOpen) return;
        if (activeMeetingKind !== 'self') return;
        if (!mySession || mySession.checkedIn) return;
        if (attend.isMeetingOver) return;
        if (!isAttendOpen(meetingSettings, nowTime, testMode)) return;
        const mid = getMeetingId(meetingSettings);
        if (!mid || mid === dismissedMeetingId) return;
        setAttendModalOpen(true);
    }, [tab, activeMeetingKind, mySession, attend.isMeetingOver, nowTime, dismissedMeetingId, meetingSettings, testMode, attendModalOpen]);

    // F-2a-1b мҷ„лЈҢ мһҗлҸҷлӢ«нһҳ вҖ” м¶ңм„қ мҷ„лЈҢлҗҳл©ҙ "м¶ңм„қ мҷ„лЈҢ!"лҘј м•Ҫ 1.2мҙҲ ліҙм—¬мЈјкі  лӘЁлӢ¬мқ„ мһҗлҸҷмңјлЎң лӢ«мқҢ.
    useEffect(() => {
        if (!attendModalOpen || !mySession?.checkedIn) return;
        const t = setTimeout(() => setAttendModalOpen(false), 1200);
        return () => clearTimeout(t);
    }, [attendModalOpen, mySession?.checkedIn]);

    const myTeamInfo = useMemo(() => {
        if (!team.teamDraftData?.teams || !memberData?.memberId) return null;
        for (let i = 0; i < team.teamDraftData.teams.length; i++) {
            const t = team.teamDraftData.teams[i];
            const foundIdx = t.members.findIndex(m => m.memberId === memberData.memberId || m.id === memberData.memberId);
            if (foundIdx !== -1) return { teamIdx: i, teamName: getTeamName(i), members: t.members, jerseyNumber: foundIdx + 1 };
        }
        return null;
    }, [team.teamDraftData, memberData]);

    const { processQRToken, handleQRAttendance, handleInAppQRScan, handleGPSCheckIn, handleGPSAttend } = makeQRGPSHandlers({
        memberData, testMode, meetingSettings: displayMeetingSettings, mySession, urlParams,
        setQrMessage, setQrStatus, setTab: navTab, setIsQRScannerOpen,
        setGpsStatus, setDistance, setIsCheckingIn, showToast
    });

    useEffect(() => {
        if (urlParams.token && appView === 'app') handleQRAttendance();
    }, [urlParams.token, appView]);

    const handleLogout = () => { showConfirm('лЎңк·ём•„мӣғ', 'лЎңк·ём•„мӣғ н•ҳмӢңкІ м–ҙмҡ”?', () => { localStorage.removeItem('moida_member_data'); localStorage.removeItem('moida_admin_backup'); location.href = 'index.html'; }); };
    const enterTestPreview = async () => {
        try {
            const snap = await getCol('members').where('isTest','==',true).get();
            let testId, testName;
            const usable = snap.docs.find(d => !d.data().isResigned);
            if (usable) { testId = usable.id; testName = usable.data().name || 'н…ҢмҠӨнҠёнҡҢмӣҗ'; }
            else {
                const d = new Date();
                const today = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const ref = await getCol('members').add({ name:'рҹ”§ н…ҢмҠӨнҠёнҡҢмӣҗ', role:'нҡҢмӣҗ', isTest:true, isResigned:false, gender:'лҜём„Өм •', position:'all', level:'4', birth:'', phone:'', joinDate:today, createdAt:new Date().toISOString() });
                testId = ref.id; testName = 'рҹ”§ н…ҢмҠӨнҠёнҡҢмӣҗ';
            }
            localStorage.setItem('moida_admin_backup', localStorage.getItem('moida_member_data') || '');
            localStorage.setItem('moida_member_data', JSON.stringify({ memberId:testId, name:testName, role:'нҡҢмӣҗ' }));
            localStorage.removeItem('moida_admin_mode');
            location.reload();
        } catch(e) { try { showToast('н…ҢмҠӨнҠё м „нҷҳ мӢӨнҢЁ: ' + e.message, 'error'); } catch(_) { alert('н…ҢмҠӨнҠё м „нҷҳ мӢӨнҢЁ: ' + e.message); } }
    };
    const exitTestPreview = () => {
        try {
            const bak = localStorage.getItem('moida_admin_backup');
            if (bak) localStorage.setItem('moida_member_data', bak);
            localStorage.removeItem('moida_admin_backup');
            localStorage.setItem('moida_admin_mode', 'true');
        } catch(e) {}
        location.reload();
    };
    // кҙҖлҰ¬мһҗм—җм„ң нҷ•мқёмқ„ л§Ҳм№ң л’Ө м§Ғм ‘ нҳём¶ң вҖ” н…ҢмҠӨнҠё кі„м •В·кё°лЎқ мқјкҙ„ мӮӯм ң
    const cleanupTestData = async () => {
        if (!window.confirm('н…ҢмҠӨнҠё кі„м •кіј н…ҢмҠӨнҠёк°Җ л§Ңл“  лӘЁл“  кё°лЎқмқ„ мӮӯм ңн• к№Ңмҡ”?')) return;
        try {
            const snap = await getCol('members').where('isTest','==',true).get();
            for (const docu of snap.docs) {
                const testId = docu.id;
                try {
                    const drs = await getCol('dues_reports').where('memberId','==',testId).get();
                    const months = new Set(); const b1 = db.batch();
                    drs.forEach(d => { const r=d.data(); if(r.month) months.add(r.month); b1.delete(d.ref); });
                    await b1.commit();
                    for (const mth of months) { try { await getCol('monthly_checks').doc(mth).update({ [`statuses.${testId}`]: firebase.firestore.FieldValue.delete(), [`paymentDates.${testId}`]: firebase.firestore.FieldValue.delete() }); } catch(_) {} }
                } catch(_) {}
                try { await getCol('fcm_tokens').doc(testId).delete(); } catch(_) {}
                try { const ws = await getCol('weekly_session').where('memberId','==',testId).get(); const b2 = db.batch(); ws.forEach(d => b2.delete(d.ref)); await b2.commit(); } catch(_) {}
                try { await getCol('members').doc(testId).delete(); } catch(_) {}
            }
            showToast('н…ҢмҠӨнҠё кё°лЎқмқ„ м •лҰ¬н–Ҳм–ҙмҡ”.', 'success');
        } catch(e) { showToast('м •лҰ¬ мӢӨнҢЁ: ' + e.message, 'error'); }
    };
    const handleSaveAnnouncement = async ({ title, body, category, id, mode, targetMode, selectedMemberIds }) => {
        const senderName = memberInfo?.name || memberData?.name || 'кҙҖлҰ¬мһҗ';
        const cat = category || 'кіөм§Җ';
        if (mode === 'add') {
            const notifDoc = { title, body, category: cat, sentAt: new Date().toISOString(), sentBy: senderName };
            if (targetMode === 'select') notifDoc.targetMemberIds = selectedMemberIds;
            await getCol('notifications').add(notifDoc);
        } else {
            await getCol('notifications').doc(id).update({ title, body, category: cat, updatedAt: new Date().toISOString() });
        }
    };
    const handleDeleteAnnouncement = (id) => showConfirm('кіөм§Җ мӮӯм ң', 'мқҙ кіөм§ҖлҘј мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?', async () => {
        await getCol('notifications').doc(id).delete();
    });
    // м„ нғқ мқјкҙ„ мӮӯм ң вҖ” notifications л¬ём„ңл§Ң batch.delete (лӢӨлҘё м»¬л үм…ҳ м•Ҳ кұҙл“ңлҰј)
    const handleDeleteAnnouncements = (ids) => {
        if (!ids || ids.length === 0) return; // л№Ҳ л°°м—ҙ к°Җл“ң
        showConfirm('кіөм§Җ мӮӯм ң', `м„ нғқн•ң ${ids.length}к°ңмқҳ кіөм§ҖлҘј мӮӯм ңн• к№Ңмҡ”? лҗҳлҸҢлҰҙ мҲҳ м—ҶмҠөлӢҲлӢӨ.`, async () => {
            const batch = db.batch();
            ids.forEach(id => batch.delete(getCol('notifications').doc(id)));
            await batch.commit();

                resigningMember={roster.resigningMember} setResigningMember={roster.setResigningMember}
                resignForm={roster.resignForm} setResignForm={roster.setResignForm}
                handleResignConfirm={handleResignConfirm}
                deletingMember={roster.deletingMember} setDeletingMember={roster.setDeletingMember}
                handleDeleteMember={handleDeleteMember}
                previewDraft={team.previewDraft} setPreviewDraft={team.setPreviewDraft}
                tmLoadDraft={tmLoadDraft}

                setLocalSchedule={match.setLocalSchedule} setMatchConfig={match.setMatchConfig}

                setLocalMatchIndex={match.setLocalMatchIndex}
                setActiveMatchScheduleId={match.setActiveMatchScheduleId}
                setMatchAdminView={match.setMatchAdminView} showConfirm={showConfirm}
                isPresetModalOpen={match.isPresetModalOpen} setIsPresetModalOpen={match.setIsPresetModalOpen}
                presetForm={match.presetForm} setPresetForm={match.setPresetForm}
                matchSavePreset={matchSavePreset}
                alertModal={alertModal} setAlertModal={setAlertModal}
                isQRScannerOpen={isQRScannerOpen} setIsQRScannerOpen={setIsQRScannerOpen}
                handleInAppQRScan={handleInAppQRScan}
                attendModal={attend.attendModal} setAttendModal={attend.setAttendModal}
                attendHandleUncheckIn={attendHandleUncheckIn} attendHandleCheckIn={attendHandleCheckIn}
                isAttendGuestModalOpen={attend.isAttendGuestModalOpen}
                setIsAttendGuestModalOpen={attend.setIsAttendGuestModalOpen}
                attendNewGuest={attend.attendNewGuest} setAttendNewGuest={attend.setAttendNewGuest}
                attendIsPending={attend.attendIsPending} attendHandleAddGuest={attendHandleAddGuest}
                attendEditingGuestId={attend.attendEditingGuestId}
                historyEditTarget={attend.historyEditTarget} setHistoryEditTarget={attend.setHistoryEditTarget}
                handleHistoryStatusUpdate={handleHistoryStatusUpdate}
                isQRGenModalOpen={attend.isQRGenModalOpen} setIsQRGenModalOpen={attend.setIsQRGenModalOpen}
                meetingSettings={meetingSettings}

                setIsLocationPickerOpen={attend.setIsLocationPickerOpen}

                memberInfo={memberInfo} memberData={memberData} showAlert={showAlert}
            />

            {attendModalOpen && (
                <AttendModal

                    <div className="bg-white rounded-3xl p-5 w-full max-w-sm" onClick={e => e.stopPropagation()}>
                        <p className="font-black text-lg text-slate-800">лӮ©л¶Җ мӢ кі  л°ҳл Ө</p>
                        <p className="text-sm text-slate-500 mt-1 leading-relaxed">
                            <b className="text-slate-700">{duesReject.memberName || 'нҡҢмӣҗ'}</b>лӢҳмқҳ {duesReject.month} нҡҢл№„ мӢ кі лҘј л°ҳл Өн•©лӢҲлӢӨ. мӮ¬мң лҘј м Ғмңјл©ҙ нҡҢмӣҗм—җкІҢ н•Ёк»ҳ м „лӢ¬лҸјмҡ”.

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
