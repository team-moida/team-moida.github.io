<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8fafc">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>모이다 - 명단 관리</title>
    <script>(function(){if(localStorage.getItem('moida_theme')==='dark')document.documentElement.classList.add('dark');})();</script>
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="utils.js"></script>
    <script src="roster-utils.js" type="text/babel"></script>
    <script src="roster-members.js" type="text/babel"></script>
    <style>
        body{font-family:'Esamanru',sans-serif!important;-webkit-tap-highlight-color:transparent;background:#f8fafc;user-select:none;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;touch-action:manipulation}
        select,input{transition:border-color 0.2s}
        select:focus,input:focus{border-color:#14b8a6!important}
        .dragging-item{opacity:0.4;border:2px dashed #3b82f6!important;background:#eff6ff!important}
    </style>
</head>
<body>
<div id="loading-screen">
    <div class="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-bold text-slate-500 italic">모이다 연결 중...</p>
</div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const getMonthlyCol = () => getCol('monthly_checks');
const getMemberCol = () => getCol('members');

function App() {
    const [members, setMembers] = useState([]);
    const [alertModal, setAlertModal] = useState({show:false,title:'',content:'',type:'info',onConfirm:null});
    const [subTab, setSubTab] = useState(()=>sessionStorage.getItem('moida_roster_tab')||'directory');
    const [targetMonth, setTargetMonth] = useState(()=>{
        const s=sessionStorage.getItem('moida_target_month');
        if(s)return s;
        const n=new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
    });
    const [filterCategory, setFilterCategory] = useState('all');
    const [monthlyStatuses, setMonthlyStatuses] = useState({});
    const [monthlyReasons, setMonthlyReasons] = useState({});
    const [monthlyPaymentDates, setMonthlyPaymentDates] = useState({});
    const [darkMode, setDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
    const [isAddModalOpen, setIsAddModalOpen] = useState(false);
    const [newMember, setNewMember] = useState({name:'',birth:'',gender:'남성',position:'all',level:'4',role:'회원',coupleId:'',joinDate:'',address:'',phone:''});
    const [editingMember, setEditingMember] = useState(null);
    const [resigningMember, setResigningMember] = useState(null);
    const [resignForm, setResignForm] = useState({date:'',reason:'',isForced:false});
    const [selectedMember, setSelectedMember] = useState(null);
    const [actionStep, setActionStep] = useState('main');
    const [selectedAction, setSelectedAction] = useState(null);
    const [paymentDateInput, setPaymentDateInput] = useState('');
    const [manualEndDate, setManualEndDate] = useState('');
    const [specialRestReason, setSpecialRestReason] = useState('');
    const [tempRestCount, setTempRestCount] = useState(0);

    const activeMembers = useMemo(()=>members.filter(m=>!m.isResigned),[members]);
    const resignedMembers = useMemo(()=>members.filter(m=>m.isResigned),[members]);

    useEffect(()=>{sessionStorage.setItem('moida_roster_tab',subTab);},[subTab]);
    useEffect(()=>{sessionStorage.setItem('moida_target_month',targetMonth);},[targetMonth]);

    const filteredMembers = useMemo(()=>{
        let list=[...activeMembers].sort((a,b)=>a.name.localeCompare(b.name));
        if(filterCategory!=='all'){
            list=list.filter(m=>{
                const type=getMemberStatusType(m,monthlyStatuses,monthlyReasons,targetMonth);
                return type===filterCategory;
            });
        }
        return list;
    },[activeMembers,filterCategory,monthlyStatuses,monthlyReasons,targetMonth]);

    const filterCounts = useMemo(()=>{
        const counts={all:activeMembers.length,monthly:0,half:0,full:0,rest:0,special:0,unpaid:0};
        activeMembers.forEach(m=>{
            const type=getMemberStatusType(m,monthlyStatuses,monthlyReasons,targetMonth);
            if(type!=='staff'&&counts[type]!==undefined)counts[type]++;
        });
        return counts;
    },[activeMembers,monthlyStatuses,monthlyReasons,targetMonth]);

    const toggleTheme = () => { const isDark = !darkMode; setDarkMode(isDark); document.documentElement.classList.toggle('dark', isDark); localStorage.setItem('moida_theme', isDark ? 'dark' : 'light'); };
    const showAlert=(title,content,type='info',onConfirm=null)=>setAlertModal({show:true,title,content,type,onConfirm});

    const [loggedInManager] = useState(() => {
        try {
            const s = JSON.parse(localStorage.getItem('moida_member_data'));
            if (s && s.kakaoId) return s;
            location.href = 'index.html';
            return null;
        } catch(e) { location.href = 'index.html'; return null; }
    });
    const showConfirm=(title,content,onConfirm)=>setAlertModal({show:true,title,content,type:'confirm',onConfirm});

    const moveMonth=(offset)=>{
        const[y,m]=targetMonth.split('-').map(Number);
        const d=new Date(y,m-1+offset,1);
        setTargetMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
        setFilterCategory('all');
    };

    const handleAddMember = async () => {
        if(!newMember.name.trim())return showAlert('알림','이름을 입력해주세요.');
        try {
            await getMemberCol().add({...newMember,birth:String(newMember.birth).replace(/[^0-9]/g,''),createdAt:new Date().toISOString()});
            setNewMember({name:'',birth:'',gender:'남성',position:'all',level:'4',role:'회원',coupleId:'',joinDate:''});
            setIsAddModalOpen(false);
            showAlert('성공','회원이 등록되었습니다.');
        } catch(e){showAlert('오류','등록 실패');}
    };

    const handleUpdateMember = async () => {
        try {
            await getMemberCol().doc(editingMember.id).update({...editingMember,birth:String(editingMember.birth||'').replace(/[^0-9]/g,'')});
            setEditingMember(null);
            showAlert('완료','정보가 수정되었습니다.');
        } catch(e){showAlert('오류','수정 실패');}
    };

    const handleResignConfirm = async () => {
        if(!resignForm.date)return showAlert('알림','탈퇴 일자를 선택해주세요.');
        try {
            await getMemberCol().doc(resigningMember.id).update({isResigned:true,resignDate:resignForm.date,resignReason:resignForm.reason||'사유 미작성',isForcedResign:resignForm.isForced});
            setResigningMember(null);
            showAlert('성공',`${resigningMember.name}님이 탈퇴 처리되었습니다.`);
        } catch(e){showAlert('오류','탈퇴 처리 실패');}
    };

    const handleMemberClick = (m) => {
        setSelectedMember(m);
        setActionStep('main');
        setSelectedAction(null);
        const today=new Date();
        const offset=today.getTimezoneOffset()*60000;
        setPaymentDateInput((new Date(today-offset)).toISOString().split('T')[0]);
        setSpecialRestReason(monthlyReasons[m.id]||'');
        setTempRestCount(m.totalRestMonths||0);
        setManualEndDate(m.membershipEndDate||'');
    };

    const processAction = async (actionType) => {
        if(!selectedMember||!targetMonth)return;
        try {
            const batch=db.batch();
            const monthRef=getMonthlyCol().doc(targetMonth);
            const memberRef=getMemberCol().doc(selectedMember.id);
            const mid=selectedMember.id;
            if(actionType==='monthly_paid'){
                batch.set(monthRef,{statuses:{[mid]:'paid'},paymentDates:{[mid]:paymentDateInput},updatedAt:new Date().toISOString()},{merge:true});
                batch.update(monthRef,{[`reasons.${mid}`]:firebase.firestore.FieldValue.delete()});
                batch.update(memberRef,{membershipType:'monthly',membershipStartDate:'',membershipEndDate:'',totalRestMonths:0});
            } else if(actionType==='start_half'){
                const finalEnd=manualEndDate||calculateEndDate(targetMonth,6);
                batch.update(memberRef,{membershipType:'half_year',membershipStartDate:`${targetMonth}-01`,membershipEndDate:finalEnd,totalRestMonths:0});
                batch.set(monthRef,{paymentDates:{[mid]:paymentDateInput},updatedAt:new Date().toISOString()},{merge:true});
                batch.update(monthRef,{[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(),[`reasons.${mid}`]:firebase.firestore.FieldValue.delete()});
            } else if(actionType==='start_full'){
                const finalEnd=manualEndDate||calculateEndDate(targetMonth,12);
                batch.update(memberRef,{membershipType:'full_year',membershipStartDate:`${targetMonth}-01`,membershipEndDate:finalEnd,totalRestMonths:0});
                batch.set(monthRef,{paymentDates:{[mid]:paymentDateInput},updatedAt:new Date().toISOString()},{merge:true});
                batch.update(monthRef,{[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(),[`reasons.${mid}`]:firebase.firestore.FieldValue.delete()});
            } else if(actionType==='rest'){
                const isLong=selectedMember.membershipType==='half_year'||selectedMember.membershipType==='full_year';
                if(selectedMember.membershipType==='half_year'&&(selectedMember.totalRestMonths||0)>=3)return showAlert('알림','반년납 최대 3회 휴식');
                if(selectedMember.membershipType==='full_year'&&(selectedMember.totalRestMonths||0)>=6)return showAlert('알림','1년납 최대 6회 휴식');
                batch.set(monthRef,{statuses:{[mid]:'rest'},updatedAt:new Date().toISOString()},{merge:true});
                if(isLong){
                    const nextEnd=extendEndDate(selectedMember.membershipEndDate,1);
                    batch.update(memberRef,{membershipEndDate:nextEnd,totalRestMonths:firebase.firestore.FieldValue.increment(1)});
                    batch.update(monthRef,{[`reasons.${mid}`]:firebase.firestore.FieldValue.delete(),[`paymentDates.${mid}`]:firebase.firestore.FieldValue.delete()});
                } else {
                    batch.set(monthRef,{paymentDates:{[mid]:paymentDateInput},updatedAt:new Date().toISOString()},{merge:true});
                    batch.update(monthRef,{[`reasons.${mid}`]:firebase.firestore.FieldValue.delete()});
                }
            } else if(actionType==='cancel_rest'){
                batch.update(monthRef,{[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(),[`reasons.${mid}`]:firebase.firestore.FieldValue.delete(),[`paymentDates.${mid}`]:firebase.firestore.FieldValue.delete()});
                if(selectedMember.membershipType==='half_year'||selectedMember.membershipType==='full_year'){
                    const prevEnd=extendEndDate(selectedMember.membershipEndDate,-1);
                    batch.update(memberRef,{membershipEndDate:prevEnd,totalRestMonths:firebase.firestore.FieldValue.increment(-1)});
                }
            } else if(actionType==='special_rest'){
                batch.update(memberRef,{isSpecialRest:true,specialRestReason:specialRestReason||'특별 휴식',specialRestStartMonth:targetMonth});
                batch.update(monthRef,{[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(),[`reasons.${mid}`]:firebase.firestore.FieldValue.delete(),[`paymentDates.${mid}`]:firebase.firestore.FieldValue.delete()});
            } else if(actionType==='cancel_special_rest'){
                const startMonth=selectedMember.specialRestStartMonth;
                let monthsToExtend=0;
                if(startMonth){const[sy,sm]=startMonth.split('-').map(Number);const[ty,tm]=targetMonth.split('-').map(Number);monthsToExtend=(ty-sy)*12+(tm-sm);}
                const updates={isSpecialRest:false,specialRestReason:firebase.firestore.FieldValue.delete(),specialRestStartMonth:firebase.firestore.FieldValue.delete()};
                if(monthsToExtend>0&&(selectedMember.membershipType==='half_year'||selectedMember.membershipType==='full_year'))updates.membershipEndDate=extendEndDate(selectedMember.membershipEndDate,monthsToExtend);
                batch.update(memberRef,updates);
            } else if(actionType==='end_membership'){
                batch.update(memberRef,{membershipType:'monthly',membershipStartDate:'',membershipEndDate:'',totalRestMonths:0});
                batch.update(monthRef,{[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(),[`reasons.${mid}`]:firebase.firestore.FieldValue.delete()});
            } else if(actionType==='clear'){
                batch.update(monthRef,{[`statuses.${mid}`]:firebase.firestore.FieldValue.delete(),[`reasons.${mid}`]:firebase.firestore.FieldValue.delete(),[`paymentDates.${mid}`]:firebase.firestore.FieldValue.delete()});
            } else if(actionType==='update_longterm_info'){
                batch.update(memberRef,{membershipEndDate:manualEndDate,totalRestMonths:tempRestCount});
                batch.set(monthRef,{paymentDates:{[mid]:paymentDateInput},updatedAt:new Date().toISOString()},{merge:true});
            }
            await batch.commit();
            setSelectedMember(null);
            showAlert('성공','상태가 반영되었습니다.');
        } catch(e){console.error(e);showAlert('오류','처리 실패');}
    };

    useEffect(()=>{
        const hideLoader=()=>{const l=document.getElementById('loading-screen');if(l){l.style.opacity='0';setTimeout(()=>{if(l)l.style.display='none';},500);}};
        const t=setTimeout(hideLoader,5000);
        if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        auth.signInAnonymously().catch(()=>{});
        const unsubAuth=auth.onAuthStateChanged(u=>{
            clearTimeout(t);
            hideLoader();
            if(u) getMemberCol().onSnapshot(snap=>setMembers(snap.docs.map(d=>({id:d.id,...d.data()}))));
        });
        return()=>unsubAuth();
    },[]);

    useEffect(()=>{
        if(!targetMonth)return;
        const unsub=getMonthlyCol().doc(targetMonth).onSnapshot(doc=>{
            if(doc.exists){
                const data=doc.data();
                setMonthlyStatuses(data.statuses||{});
                setMonthlyReasons(data.reasons||{});
                setMonthlyPaymentDates(data.paymentDates||{});
            } else {
                setMonthlyStatuses({});setMonthlyReasons({});setMonthlyPaymentDates({});
            }
        });
        return()=>unsub();
    },[targetMonth]);

    const filterButtons = [
        {key:'all',label:`전체 ${filterCounts.all}`},
        {key:'monthly',label:`월납 ${filterCounts.monthly}`},
        {key:'half',label:`반년 ${filterCounts.half}`},
        {key:'full',label:`1년 ${filterCounts.full}`},
        {key:'rest',label:`휴식 ${filterCounts.rest}`},
        {key:'unpaid',label:`미납 ${filterCounts.unpaid}`},
    ];

    const handleLogout = () => {
        localStorage.removeItem('moida_member_data');
        location.href = 'index.html';
    };

    return (
        <div className="min-h-screen pb-32 text-slate-900">
            <nav className="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 h-16 flex items-center px-4 shadow-sm">
                <div className="max-w-5xl mx-auto w-full flex justify-between items-center">
                    <div className="flex items-center gap-1">
                        {[['directory','명단'],['monthly','회비']].map(([v,l])=>(
                            <button key={v} onClick={()=>setSubTab(v)} className={`px-3 py-2 rounded-xl font-black text-xs transition-all ${subTab===v?'bg-teal-500 text-white shadow-lg':'text-slate-400 hover:text-slate-600'}`}>{l}</button>
                        ))}
                    </div>
                    <div className="flex items-center gap-2">
                        <button onClick={()=>setIsAddModalOpen(true)} className="p-2.5 rounded-xl bg-teal-50 text-teal-500"><Icon.UserPlus size={18}/></button>
                        <button onClick={()=>window.location.reload()} className="p-2.5 rounded-xl bg-slate-50 text-slate-400"><Icon.Refresh size={16}/></button>
                        <button onClick={toggleTheme} className="p-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200" title="테마">{darkMode ? <Icon.Sun size={18}/> : <Icon.Moon size={18}/>}</button>
                        <button onClick={()=>window.location.href='index.html'} className="p-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200"><Icon.Home size={18}/></button>
                        <button onClick={handleLogout} className="p-2.5 rounded-xl bg-red-50 text-red-500" title="로그아웃"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                    </div>
                </div>
            </nav>

            <main className="p-4 max-w-5xl mx-auto animate-zoom-in">

                {/* ===== 명단 탭 ===== */}
                {subTab==='directory' && (
                    <DirectoryTab
                        members={members}
                        activeMembers={activeMembers}
                        resignedMembers={resignedMembers}
                        setEditingMember={setEditingMember}
                        setResigningMember={setResigningMember}
                        setResignForm={setResignForm}
                    />
                )}

                {/* ===== 회비 탭 ===== */}
                {subTab==='monthly' && (
                    <div>
                        {/* 월 선택 */}
                        <div className="flex items-center justify-between mb-4 bg-white border border-slate-100 rounded-2xl p-4 shadow-sm">
                            <button onClick={()=>moveMonth(-1)} className="p-2 rounded-xl bg-slate-100 text-slate-600"><Icon.ChevronLeft size={18}/></button>
                            <p className="font-black text-lg text-slate-800">{targetMonth.replace('-','년 ')}월</p>
                            <button onClick={()=>moveMonth(1)} className="p-2 rounded-xl bg-slate-100 text-slate-600"><Icon.ChevronRight size={18}/></button>
                        </div>

                        {/* 필터 버튼 */}
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 mb-4">
                            {filterButtons.map(f=>(
                                <button key={f.key} onClick={()=>setFilterCategory(f.key)}
                                    className={`shrink-0 px-3 py-1.5 rounded-xl font-black text-xs transition-all ${filterCategory===f.key?'bg-teal-500 text-white shadow':'bg-white border border-slate-200 text-slate-500'}`}>
                                    {f.label}
                                </button>
                            ))}
                        </div>

                        {/* 회원 목록 */}
                        <div className="space-y-2">
                            {filteredMembers.map(m=>{
                                const statusType=getMemberStatusType(m,monthlyStatuses,monthlyReasons,targetMonth);
                                const cfg=statusConfig[statusType]||statusConfig.unpaid;
                                const info=getMembershipStatus(m,targetMonth);
                                const payDate=monthlyPaymentDates[m.id];
                                return (
                                    <button key={m.id} onClick={()=>handleMemberClick(m)}
                                        className="w-full flex items-center gap-3 p-4 bg-white border border-slate-100 rounded-2xl text-left hover:border-teal-200 transition-all">
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <span className="font-black text-slate-800">{m.name}</span>
                                                {statusType==='rest'&&info?.active
                                                    ? <>
                                                        <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-lg ${statusConfig[info.type==='반년'?'half':'full'].color}`}>{info.type}납</span>
                                                        <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-lg ${cfg.color}`}>휴식 중</span>
                                                      </>
                                                    : <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-lg ${cfg.color}`}>{cfg.label}</span>
                                                }
                                            </div>
                                            {info?.active&&<p className="text-[10px] text-slate-400 mt-0.5">만료: {info.endDateFormatted} · 잔여휴식 {info.remainingRest}회</p>}
                                            {payDate&&<p className="text-[10px] text-slate-400 mt-0.5">납부일: {payDate}</p>}
                                            {m.isSpecialRest&&<p className="text-[10px] text-orange-400 mt-0.5">특별휴식: {m.specialRestReason}</p>}
                                        </div>
                                        <Icon.ChevronRight size={16} className="text-slate-300 flex-shrink-0"/>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                )}
            </main>

            {/* ===== 회비 액션 모달 ===== */}
            {selectedMember && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end justify-center z-50" onClick={()=>setSelectedMember(null)}>
                    <div className="bg-white rounded-t-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <div className="flex items-center gap-3 mb-5">
                            <div className="flex-1">
                                <p className="font-black text-lg text-slate-800">{selectedMember.name}</p>
                                <p className="text-xs text-slate-400">{selectedMember.role} · Lv.{selectedMember.level}</p>
                            </div>
                            <button onClick={()=>setSelectedMember(null)} className="text-slate-400 text-2xl leading-none">×</button>
                        </div>

                        {actionStep==='main' && (
                            <div className="space-y-2">
                                {/* 납부일 */}
                                <div className="bg-slate-50 rounded-2xl p-3 mb-3">
                                    <p className="text-[10px] font-black text-slate-400 mb-1">납부일</p>
                                    <input type="date" className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm font-black"
                                        value={paymentDateInput} onChange={e=>setPaymentDateInput(e.target.value)}/>
                                </div>
                                {!STAFF_ROLES.includes(selectedMember.role)&&[
                                    {action:'monthly_paid',label:'월납 납부',color:'bg-emerald-500 text-white'},
                                    {action:'start_half',label:'반년납 시작',color:'bg-blue-500 text-white'},
                                    {action:'start_full',label:'1년납 시작',color:'bg-indigo-600 text-white'},
                                    {action:'rest',label:'휴식 처리',color:'bg-amber-400 text-slate-800'},
                                    {action:'cancel_rest',label:'휴식 취소',color:'bg-slate-200 text-slate-600'},
                                    {action:'special_rest',label:'특별휴식',color:'bg-orange-400 text-white'},
                                    selectedMember.isSpecialRest&&{action:'cancel_special_rest',label:'특별휴식 해제',color:'bg-slate-200 text-slate-600'},
                                    {action:'clear',label:'상태 초기화',color:'bg-rose-100 text-rose-600'},
                                ].filter(Boolean).map(item=>(
                                    <button key={item.action} onClick={()=>{
                                        if(item.action==='start_half'){setManualEndDate(calculateEndDate(targetMonth,6));setActionStep('form');setSelectedAction('start_half');}
                                        else if(item.action==='start_full'){setManualEndDate(calculateEndDate(targetMonth,12));setActionStep('form');setSelectedAction('start_full');}
                                        else if(item.action==='special_rest'){setActionStep('form');setSelectedAction('special_rest');}
                                        else processAction(item.action);
                                    }} className={`w-full py-3 rounded-2xl font-black text-sm ${item.color}`}>{item.label}</button>
                                ))}
                            </div>
                        )}

                        {actionStep==='form' && selectedAction==='start_half' && (
                            <div className="space-y-3">
                                <p className="font-black text-slate-700">반년납 설정</p>
                                <div>
                                    <p className="text-xs text-slate-400 mb-1">만료일</p>
                                    <input type="date" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black"
                                        value={manualEndDate} onChange={e=>setManualEndDate(e.target.value)}/>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={()=>setActionStep('main')} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>
                                    <button onClick={()=>processAction('start_half')} className="flex-1 py-3 bg-blue-500 text-white rounded-2xl font-black text-sm">확정</button>
                                </div>
                            </div>
                        )}

                        {actionStep==='form' && selectedAction==='start_full' && (
                            <div className="space-y-3">
                                <p className="font-black text-slate-700">1년납 설정</p>
                                <div>
                                    <p className="text-xs text-slate-400 mb-1">만료일</p>
                                    <input type="date" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black"
                                        value={manualEndDate} onChange={e=>setManualEndDate(e.target.value)}/>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={()=>setActionStep('main')} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>
                                    <button onClick={()=>processAction('start_full')} className="flex-1 py-3 bg-indigo-600 text-white rounded-2xl font-black text-sm">확정</button>
                                </div>
                            </div>
                        )}

                        {actionStep==='form' && selectedAction==='special_rest' && (
                            <div className="space-y-3">
                                <p className="font-black text-slate-700">특별 휴식 사유</p>
                                <input type="text" placeholder="예: 부상, 해외 출장..." className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-black"
                                    value={specialRestReason} onChange={e=>setSpecialRestReason(e.target.value)}/>
                                <div className="flex gap-2">
                                    <button onClick={()=>setActionStep('main')} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>
                                    <button onClick={()=>processAction('special_rest')} className="flex-1 py-3 bg-orange-400 text-white rounded-2xl font-black text-sm">확정</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            )}

            {/* 회원 추가 모달 */}
            <AddMemberModal
                isOpen={isAddModalOpen}
                onClose={()=>setIsAddModalOpen(false)}
                newMember={newMember}
                setNewMember={setNewMember}
                activeMembers={activeMembers}
                handleAddMember={handleAddMember}
            />

            {/* 회원 수정 모달 */}
            <EditMemberModal
                editingMember={editingMember}
                setEditingMember={setEditingMember}
                activeMembers={activeMembers}
                handleUpdateMember={handleUpdateMember}
            />

            {/* 탈퇴 모달 */}
            <ResignModal
                resigningMember={resigningMember}
                setResigningMember={setResigningMember}
                resignForm={resignForm}
                setResignForm={setResignForm}
                handleResignConfirm={handleResignConfirm}
            />

            {/* 알림 모달 */}
            {alertModal.show && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">
                        <h3 className="font-black text-lg text-slate-800 mb-2">{alertModal.title}</h3>
                        <p className="text-sm text-slate-500 whitespace-pre-line mb-5">{alertModal.content}</p>
                        <div className="flex gap-2">
                            {alertModal.type==='confirm'&&<button onClick={()=>setAlertModal(p=>({...p,show:false}))} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">취소</button>}
                            <button onClick={()=>{if(alertModal.onConfirm)alertModal.onConfirm();setAlertModal(p=>({...p,show:false}));}} className="flex-1 py-3 bg-teal-500 text-white rounded-2xl font-black text-sm">
                                {alertModal.type==='confirm'?'확인':'닫기'}
                            </button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
