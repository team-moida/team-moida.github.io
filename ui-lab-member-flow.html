<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>모이다 UI Lab — 회원 모임 한 화면 (탭 없음)</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
/* ============================================================
   모이다 UI Lab — 회원 모임 "탭 없는 한 화면" (미리보기 전용)
   지금 할 일이 맨 위 · 내 팀 · 경기 순서(현재 라운드/상대) · 시점 따라 자동
   실제 앱과 별개 · 더미 데이터
   ============================================================ */
:root{
  --indigo:#183FB0; --indigo-deep:#122E78; --lime:#C2F94A; --lime-ink:#15171E;
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --orange:#f97316; --green:#10b981;
  --A:#ef4444; --B:#2563eb; --C:#16a34a; --D:#f59e0b;
  --bg1:#e8ecf8; --bg2:#f2f4fa; --card:#ffffff; --ink:#0f172a; --mid:#475569; --faint:#94A3B8;
  --border:#e7ebf3; --soft:#eef1f8; --shadow:0 8px 20px rgba(30,40,90,.08);
}
.dark{
  --bg1:#0c0f15; --bg2:#0d1016; --card:#161a22; --ink:#f1f4fa; --mid:#aab2c2; --faint:#6c7689;
  --border:#252b37; --soft:#1b202a; --shadow:0 8px 20px rgba(0,0,0,.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:#0d1016; color:#e6e9f0; min-height:100vh; display:flex; flex-direction:column; align-items:center; letter-spacing:-.01em}

.lab-bar{position:sticky; top:0; z-index:80; width:100%; display:flex; align-items:center; gap:8px;
  padding:10px 14px calc(10px + env(safe-area-inset-top)); background:rgba(13,16,22,.9);
  backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,.08)}
.lab-title{color:#fff; font-weight:800; font-size:14px}
.lab-title b{color:var(--lime)}
.lab-spacer{flex:1}
.lab-mini{border:1px solid rgba(255,255,255,.16); background:transparent; color:#cbd3e1; font-family:inherit;
  font-weight:800; font-size:12px; padding:7px 12px; border-radius:999px; cursor:pointer}
.lab-note{width:100%; max-width:412px; color:#7c8598; font-size:11.5px; font-weight:600; padding:10px 16px 0; text-align:center}

.stage{width:100%; display:flex; justify-content:center; padding:16px 12px 40px}
.phone{width:392px; max-width:94vw; height:800px; border-radius:34px; overflow:hidden; position:relative;
  background:radial-gradient(130% 90% at 100% 0%, var(--bg1) 0%, var(--bg2) 52%);
  box-shadow:0 26px 70px rgba(0,0,0,.5)}
.scroll{position:absolute; inset:0 0 74px 0; overflow-y:auto; -webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.wrap{padding:14px 14px 30px}

@keyframes floatUp{from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none}}
@keyframes pulseLive{0%,100%{box-shadow:0 0 0 0 rgba(194,249,74,.5)} 70%{box-shadow:0 0 0 10px rgba(194,249,74,0)}}
.reveal{animation:floatUp .45s var(--ease-spring) both}
.tap{transition:transform .12s ease}.tap:active{transform:scale(.96)}
@media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}

/* 헤더 (회원: 설정 없음) */
.dh{display:flex; align-items:center; gap:10px; padding:13px 14px; background:var(--card); border-bottom:1px solid var(--border)}
.iconbtn{width:38px; height:38px; border-radius:12px; background:var(--soft); color:var(--mid); border:0; display:grid; place-items:center; cursor:pointer; flex:0 0 auto}
.dh-info{flex:1; min-width:0}
.dh-line{display:flex; align-items:center; gap:6px}
.chip-self{font-size:10px; font-weight:900; color:#fff; background:var(--indigo); padding:3px 8px; border-radius:999px}
.dh-day{font-size:10px; font-weight:900}
.dh-ttl{font-size:15px; font-weight:900; color:var(--ink); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.dh-loc{font-size:12px; font-weight:700; color:var(--faint); margin-top:1px}

/* 데모 시점 토글 */
.demo{margin:13px 2px 4px}
.demo .dl{font-size:10.5px; font-weight:800; color:var(--faint); display:block; margin-bottom:6px}
.seg{display:flex; gap:4px; background:var(--soft); border-radius:13px; padding:4px}
.seg button{flex:1; border:0; background:transparent; font-family:inherit; font-weight:900; font-size:11px; color:var(--faint); padding:8px 4px; border-radius:10px; cursor:pointer}
.seg button.on{background:var(--indigo); color:#fff}

/* "지금 할 일" 히어로 — 공통 */
.now{border-radius:22px; padding:18px; margin-top:12px; box-shadow:var(--shadow)}
.now .lbl{font-size:12px; font-weight:900; letter-spacing:.04em; display:flex; align-items:center; gap:7px}
.now .ttl{font-size:20px; font-weight:900; margin-top:8px; line-height:1.2}
.now .sub{font-size:13px; font-weight:800; margin-top:5px; opacity:.85}

/* 신청 */
.now.reg{background:linear-gradient(160deg,#fde68a,#fcd34d); color:#7c2d12}
.now.reg .lbl{color:#92400e}
.btn-orange{width:100%; margin-top:14px; background:var(--orange); color:#fff; border:0; border-radius:14px; padding:15px; font-family:inherit; font-weight:900; font-size:15px; cursor:pointer}

/* 출석 */
.now.att{background:var(--card); color:var(--ink)}
.now.att .lbl{color:var(--indigo)}
.ckbtns{display:flex; gap:8px; margin-top:14px}
.btn-gps{flex:1; background:linear-gradient(135deg,var(--indigo),var(--indigo-deep)); color:#fff; border:0; border-radius:14px; padding:14px; font-family:inherit; font-weight:900; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px}
.btn-qr{background:var(--soft); color:var(--mid); border:0; border-radius:14px; padding:14px 18px; font-family:inherit; font-weight:900; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px}

/* 경기 중 — 지금 내 경기 */
.now.match{background:linear-gradient(135deg,var(--indigo),var(--indigo-deep)); color:#fff; animation:pulseLive 2s infinite}
.now.match .lbl{color:#c9d4f8}
.live{font-size:10px; font-weight:900; background:var(--lime); color:var(--lime-ink); padding:3px 8px; border-radius:999px}
.now.match .vsrow{display:flex; align-items:center; justify-content:center; gap:22px; margin-top:16px}
.now.match .court{margin-top:14px; text-align:center; font-size:13px; font-weight:900; color:#c9d4f8}
.bigteam{display:flex; flex-direction:column; align-items:center; gap:7px}
.bigteam .bc{width:62px; height:62px; border-radius:18px; display:grid; place-items:center; color:#fff; font-weight:900; font-size:26px; box-shadow:0 6px 14px rgba(0,0,0,.2)}
.bigteam .cap{font-size:10px; font-weight:900}
.vsx{font-size:18px; font-style:italic; font-weight:900; opacity:.7}

/* 확정 한 줄 */
.confirm{display:flex; align-items:center; justify-content:center; gap:7px; background:#ecfdf5; border:1px solid #a7f3d0; color:#047857; border-radius:14px; padding:12px; font-weight:900; font-size:13px; margin-top:12px}
.dark .confirm{background:#0c2a1e; border-color:#14503a; color:#34d399}

/* 섹션 제목 */
.sec{font-size:12px; font-weight:900; color:var(--mid); letter-spacing:.04em; margin:18px 2px 9px; display:flex; align-items:center; gap:7px}
.sec .c{color:var(--indigo)}

/* 내 팀 카드 */
.team{background:var(--card); border-radius:20px; padding:18px; box-shadow:var(--shadow)}
.team .trow{display:flex; align-items:center; gap:14px}
.vest{width:54px; height:54px; flex:0 0 auto; filter:drop-shadow(0 6px 10px rgba(0,0,0,.16))}
.team .tname{font-size:22px; font-weight:900; color:var(--ink)}
.team .tsub{font-size:13px; font-weight:800; color:var(--mid); margin-top:2px}
.team .mates{margin-top:14px; padding-top:14px; border-top:1px solid var(--border)}
.team .mates .ml{font-size:11px; font-weight:900; color:var(--faint); margin-bottom:8px}
.team .mchips{display:flex; flex-wrap:wrap; gap:6px}
.mchip{font-size:12.5px; font-weight:900; color:#1e3a8a; background:#eef4ff; border:1px solid #d3e2ff; border-radius:11px; padding:6px 11px}
.dark .mchip{color:#bcd0ff; background:#15203f; border-color:#23335f}
.mchip.me{background:var(--indigo); color:#fff; border-color:var(--indigo)}

/* 경기 순서 */
.rcard{background:var(--card); border-radius:14px; padding:11px 13px; box-shadow:var(--shadow); margin-bottom:8px; display:flex; align-items:center; gap:11px}
.rcard.cur{background:#f6fce6; border:1px solid #d9ef9b}
.dark .rcard.cur{background:#1c2410; border-color:#3f5417}
.rcard .rn{width:27px; height:27px; border-radius:9px; background:var(--soft); color:var(--mid); font-size:13px; font-weight:900; display:grid; place-items:center; flex:0 0 auto}
.rcard.cur .rn{background:var(--lime); color:var(--lime-ink)}
.tc{display:inline-grid; place-items:center; width:27px; height:27px; border-radius:8px; color:#fff; font-weight:900; font-size:13px; flex:0 0 auto}
.matchteams{display:flex; align-items:center; gap:8px}
.matchteams .vs2{font-size:11px; font-style:italic; font-weight:900; color:var(--faint)}
.rcard .tag{margin-left:auto; font-size:10px; font-weight:900; padding:3px 9px; border-radius:999px; flex:0 0 auto}
.tag-now{background:var(--lime); color:var(--lime-ink)}
.tag-mine{background:#eef2fb; color:var(--indigo)}
.dark .tag-mine{background:#101a3a; color:#9db4ee}
.tag-rest{background:var(--soft); color:var(--faint)}

/* 먼 모임 */
.waitc{background:var(--card); border-radius:22px; padding:40px 22px; box-shadow:var(--shadow); text-align:center; margin-top:12px}
.waitc .em{font-size:36px}
.waitc .a{font-size:15px; font-weight:900; color:var(--mid); margin-top:10px}
.waitc .b{font-size:12.5px; font-weight:700; color:var(--faint); margin-top:7px; line-height:1.6}

/* 하단 탭 */
.tab{position:absolute; left:0; right:0; bottom:0; height:74px; display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); background:var(--card); border-top:1px solid var(--border)}
.tab a{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--faint); font-size:10px; font-weight:800; position:relative}
.tab a.on{color:var(--indigo)}
.tab a.on::after{content:""; position:absolute; top:-8px; width:24px; height:3px; border-radius:999px; background:var(--indigo)}

.hide{display:none !important}
svg{display:block}
</style>
</head>
<body>

<div class="lab-bar">
  <span class="lab-title">모이다 <b>회원 모임 · 탭 없는 한 화면</b></span>
  <span class="lab-spacer"></span>
  <button class="lab-mini" id="theme">🌙 다크</button>
</div>
<div class="lab-note">탭이 없습니다. 맨 위 <b>시점 토글</b>을 눌러 신청→팀→출석→경기로 화면이 어떻게 자라는지 보세요.</div>

<div class="stage">
  <div class="phone" id="phone">
    <div class="scroll" id="scroll"><div class="wrap">

      <!-- 헤더 -->
      <div class="dh reveal">
        <button class="iconbtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="dh-info">
          <div class="dh-line"><span class="chip-self">정기</span><span class="dh-day" id="hDay">진행 중</span></div>
          <div class="dh-ttl">6월 29일 (일) · 08:00~10:00</div>
          <div class="dh-loc">📍 장유 풋살장</div>
        </div>
      </div>

      <!-- 데모 시점 토글 (실제는 날짜로 자동) -->
      <div class="demo reveal">
        <span class="dl">※ 시점에 따라 자동으로 바뀌는 화면 (데모용 전환)</span>
        <div class="seg" id="seg">
          <button data-st="reg">신청</button>
          <button data-st="team">팀 확정</button>
          <button data-st="att">출석</button>
          <button class="on" data-st="play">경기 중</button>
          <button data-st="far">먼 모임</button>
        </div>
      </div>

      <!-- ============ 본문 (시점별) ============ -->
      <div id="body"></div>

    </div></div>

    <!-- 하단 탭 -->
    <div class="tab">
      <a><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-7 9 7v9a2 2 0 0 1-2 2h-3v-6H8v6H5a2 2 0 0 1-2-2z"/></svg>홈</a>
      <a class="on"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>모임</a>
      <a><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20M6 15h4"/></svg>회비</a>
      <a><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v5c0 4.6-3.1 7.8-8 9-4.9-1.2-8-4.4-8-9V6z"/><path d="M9 12l2 2 4-4"/></svg>회칙</a>
    </div>

  </div>
</div>

<script>
(function(){
  var phone=document.getElementById('phone'), scroll=document.getElementById('scroll');
  var body=document.getElementById('body'), seg=document.getElementById('seg'), hDay=document.getElementById('hDay');

  var COL={A:'var(--A)',B:'var(--B)',C:'var(--C)',D:'var(--D)'};
  function tc(t){return '<span class="tc" style="background:'+COL[t]+'">'+t+'</span>';}

  // 6라운드 (내 팀 A) — R3 진행 중
  var rounds=[
    {n:1,a:'A',b:'B'},{n:2,a:'C',b:'D'},{n:3,a:'A',b:'C'},
    {n:4,a:'B',b:'D'},{n:5,a:'A',b:'D'},{n:6,a:'B',b:'C'}
  ];
  function roundsHTML(curN){
    return '<div class="sec">경기 순서 <span class="c">6라운드</span></div>'+
      rounds.map(function(r){
        var mine=(r.a==='A'||r.b==='A');
        var cur=(r.n===curN);
        var tag = cur ? '<span class="tag tag-now">진행 중</span>'
                 : mine ? '<span class="tag tag-mine">내 경기</span>' : '';
        return '<div class="rcard'+(cur?' cur':'')+'"><div class="rn">'+r.n+'</div>'+
          '<div class="matchteams">'+tc(r.a)+'<span class="vs2">vs</span>'+tc(r.b)+'</div>'+tag+'</div>';
      }).join('');
  }
  var teamCard =
    '<div class="sec">내 팀</div>'+
    '<div class="team">'+
      '<div class="trow">'+
        '<svg class="vest" viewBox="0 0 48 48"><rect x="9" y="9" width="30" height="30" rx="8" fill="var(--A)" stroke="rgba(0,0,0,.12)" stroke-width="1.5"/></svg>'+
        '<div><div class="tname">A팀</div><div class="tsub">빨강 조끼 · 내 등번호 3</div></div>'+
      '</div>'+
      '<div class="mates"><div class="ml">팀원 6명</div><div class="mchips">'+
        '<span class="mchip me">나 (성훈)</span><span class="mchip">박준호</span><span class="mchip">한지우</span>'+
        '<span class="mchip">강도현</span><span class="mchip">윤재석</span><span class="mchip">김도영</span>'+
      '</div></div>'+
    '</div>';

  var STATES={
    reg: {
      day:['D-3 · 신청중','var(--orange)'],
      html:
        '<div class="now reg reveal"><div class="lbl">📋 이번 정기모임</div>'+
        '<div class="ttl">신청하고 참여하세요</div>'+
        '<div class="sub">선착순 12 / 18명 · 일 08:00 장유 풋살장</div>'+
        '<button class="btn-orange tap">신청하기</button></div>'
    },
    team: {
      day:['D-1 · 확정','var(--green)'],
      html:
        '<div class="now att reveal"><div class="confirm" style="margin-top:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg> 참가 확정 · 팀이 편성됐어요</div></div>'+
        '<div class="reveal">'+teamCard+'</div>'+
        '<div class="reveal">'+roundsHTML(0)+'</div>'
    },
    att: {
      day:['오늘 · 출석 전','var(--indigo)'],
      html:
        '<div class="now att reveal"><div class="lbl">⚽ 지금 할 일</div>'+
        '<div class="ttl">출석 체크</div>'+
        '<div class="sub">모임 장소 100m 안에서 출석돼요</div>'+
        '<div class="ckbtns"><button class="btn-gps tap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg> 현재 위치로 출석</button>'+
        '<button class="btn-qr tap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v7h-7"/></svg> QR</button></div></div>'+
        '<div class="reveal">'+teamCard+'</div>'+
        '<div class="reveal">'+roundsHTML(0)+'</div>'
    },
    play: {
      day:['진행 중','var(--A)'],
      html:
        '<div class="now match reveal"><div class="lbl"><span class="live">LIVE</span> 지금 내 경기 · 3라운드</div>'+
        '<div class="vsrow"><div class="bigteam"><div class="bc" style="background:var(--A)">A</div><div class="cap" style="color:#c9d4f8">우리 팀</div></div>'+
        '<span class="vsx">vs</span>'+
        '<div class="bigteam"><div class="bc" style="background:var(--C)">C</div><div class="cap" style="color:#c9d4f8">상대 팀</div></div></div>'+
        '<div class="court">📍 1구장</div></div>'+
        '<div class="confirm reveal"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg> 출석 완료 · 08:03</div>'+
        '<div class="reveal">'+teamCard+'</div>'+
        '<div class="reveal">'+roundsHTML(3)+'</div>'
    },
    far: {
      day:['D-10 · 예정','var(--faint)'],
      html:
        '<div class="waitc reveal"><div class="em">⏳</div>'+
        '<div class="a">아직 차례가 오지 않은 모임입니다</div>'+
        '<div class="b">이 모임이 가장 가까운 모임이 되면<br/>신청·출석 기능이 여기에 열립니다</div></div>'
    }
  };

  function render(st){
    var s=STATES[st]; body.innerHTML=s.html;
    hDay.textContent=s.day[0]; hDay.style.color=s.day[1];
    body.querySelectorAll('.reveal').forEach(function(el,i){ el.style.animationDelay=(i*0.05)+'s'; });
    scroll.scrollTop=0;
  }

  seg.addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b)return;
    seg.querySelectorAll('button').forEach(function(x){x.classList.toggle('on', x===b);});
    render(b.getAttribute('data-st'));
  });
  document.getElementById('theme').addEventListener('click', function(){
    var d=phone.classList.toggle('dark'); this.textContent=d?'☀️ 라이트':'🌙 다크';
  });

  render('play'); // 기본: 경기 중 (팀·라운드·상대 다 보임)
})();
</script>
</body>
</html>
